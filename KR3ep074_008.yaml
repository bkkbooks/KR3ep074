body:
  text: 卷六女科要言語云能治十男子莫醫一婦人蓋言審病認證之難也何則凡治病不外望聞問切四法然婦女見人顏色每多嬌羞聲音每逾卑小則聲不得其正色不得其平而脂粉叢中又不得任我之回詳審視則望聞之法廢矣且病多不便之端難為告語欲詰其所以詢其所由莫得一二診其脈氣無定紡緝織紝之餘脈因而動目瞑嗜臥之際脈因而靜而問切之法又廢矣自非悉心觀變闡明至理烏能臨證別有一種元機遍見五內而方藥得當哉然男婦之病不外性情之邪正由正而致病者其病雖險而奏效亦速由邪而致病者其病雖淺而見功尤難慧入杏林閲歷有年常見德性溫良舉止端莊之婦孝敬公姑相夫教子勤務女工廚灶井臼雞犬桑麻之事俱皆一一盡善此女中君子也必無災病偶或起居失節飲食失宜感冒風寒亦易為治若逆妒險惡失敬失養奪夫之權罔尊凌卑醉飽自耽全無婦德又見一等自不生育不容納妾致夫絶嗣此罪重惡極天教病入膏肓即有盧扁再生亦難治療余痛識此弊已久今於婦科篇首因立醫方借作勸戒至於分經辨證按法治病惟馳遠之書於婦科門中獨步千古余不揣譾陋略為增補附録之以為後學廣一津梁云爾女科祕要調經大凡經水不調必皆因病而致無病之婦蓋未有不調者也經曰女子七歲而齒二七而天癸至月事以時下交媾而成孕七七而天癸絶地道不通而無子乃天然不易安有所謂經水不調者哉蓋為病所阻營衛經輸不能自裕運行升降皆失其常以至月事衍期或前或後不以時下倘若不能分經辨證按法治病徒用調經諸方非但經不調病不除而不死者幾希矣務必求其所以致病之由或為六淫外邪或為七情所傷或為飲食傷脾或為痰飲阻隔或本氣多火或多血妄行而經無常或素稟虛寒陽氣不運而血滯或經水短澀由於陰津枯涸或崩中帶下或因脾胃氣虛凡此務宜審其病屬何經察其本氣虛實辨其寒熱陰陽確有所據而後按法以治其病而營衛經輸各自流通運行升降悉如其常則經自調矣所謂治其病正以調其經上乘法也從來女科皆重在調經謂經不調不能受孕故專以調經為主以愚觀之殊屬不然常見有子之婦無論經水調與不調皆能受孕其無子者並非五不女之類雖月信如期終身不産此蓋天地化育之妙有不可得而知也其調經之説竟可以不必而治病之道必不可不講若病不除非但不孕命且危矣豫故諄諄曰治病是其要訣也推之安胎催生亦皆當以治病為要其祕屢試屢驗其理可信可憑女科諸書各形紕繆豫非敢私執臆説創闢新奇竊恐膠柱鼓瑟良多貽誤南華篇云曲士不可以語於道者束於教也同志君子尚其鑑之六淫外邪乃風寒暑濕燥火也天有六氣分為四時序為五節過則為害淫生六疾何謂六氣陰陽風雨晦明是風淫末疾四肢緩急風證也陰淫寒疾寒過則為寒證也陽淫熱疾熱過則喘渴暑證也雨淫腹疾雨濕之氣為泄淫濕證也晦淫惑疾宴寢過節則心惑亂燥證生矣明淫心疾思慮煩多心勞生疾火證作矣春秋前賢和氏已詳言之其為病各不相同然要不外乎六經以六經之法按而治之更當察其本氣虛實寒熱陰陽則皆得之矣七情為病不必穿鑿於所因統而言之皆為抑鬱憤悶之氣阻遏胸中以致飲食漸減則生化之源漸窒因而經水不調法宜主宣暢胸膈條達脾胃收攝腎氣方宜黃耆白朮茯苓遠志砂仁白蔻半夏桔梗菟絲故紙更當相其本氣而為加減飲食傷脾宜用耆朮參苓砂仁神麯痰飲阻膈宜六君加炮薑草果火邪迫血妄行宜用生地丹皮桃仁童便涼血活血更加參耆補氣以統攝之素稟虛寒者宜用參耆白朮薑附肉桂若脾氣虛弱不能統血而為血崩者宜用耆朮參茸山藥芡實故紙凡血妄行者或上行而為吐衄下行而為崩漏均皆脾虛不能統攝所致法宜大補中氣以固脾胃此一定之理也慧常見婦女因月信來日不善調養其六淫外邪乘隙而入血室經期一至血不下行上逆吐衄名曰逆經余每用四物湯大劑加大黃酒浸五錢水煎入童便和勻溫服血熱者用生地一兩血寒者去生地熟地倍加血止然後察其虛實調理曾治一婦患奇證每當經期腹中痛連少腹引入陰中其經血不行於前陰反從後陰而行三日則腹痛諸證自已次月當期亦復如是延豫診視曰此太陰脾氣虛弱不能統攝少陰真陽素虛陰寒內結而為腹痛侵入厥陰則痛連少腹引入陰中其證總為三陰寒結阻截前陰經血不能歸於衝任而直趨大腸宜用耆朮參苓大補中氣附桂薑砂以驅少陰之寒吳萸川椒以散厥陰寒結更加山藥芡實兜澀大腸香附萬年霜老瓦房前半面瓦縫內黑陽塵條取來炒用妙引導前陰一定之理也其夫依法調理數月則經自調乃未幾而自受孕矣女科書或有調經先去病之説然不能分辨六經按法治病如所載赤白帶下白淫白濁癥瘕積聚痃癖腸覃石瘕諸證但執一方而無可憑之理誠恐貽誤世人余故作是書而明其要訣雖僭越無似實出於不得已也否則曷敢更置一喙哉經閉經閉不通各有所因未有無因而經閉者也從前女科諸書不能分經用藥所載方論概不足録今酌定治病手眼總在臨證之際詳悉審問得其所因確有所據按法為治其應如響若其人陰虛火旺精血短少漸至乾枯而經不行者宜用地黃阿膠滋陰養血丹皮以瀉血熱降真香以行血中之氣香附片以通其經而經自行若其人陰盛陽虛冷積胞門而血不歸經者法宜附桂薑砂以逐冷積耆朮參苓大補陽氣使陰退陽回而經自行曾治龔云從之婦經信兩月未行醫用膠艾四物湯加紅花二十餘劑則芒刺滿生舌苔腹膨作泄人事困倦身重惡寒云從來寓求治豫曰飲食減少腹膨作泄屬太陰人事困倦身重惡寒屬少陰苔刺干黑者陽虛不能薰騰津液之所致也方用耆朮薑附砂半桂苓故紙服六劑而身發大熱吾知其泄旦夕必自止再三劑其泄止矣身熱漸微而腹中又覺大熱其夫恐附子太過豫曰里陽來復佳兆也積陰可化經當自通又十餘劑而人事康復飲食加健膨脹俱消舌苔盡退經信行通如故有為精積一證乃因經信當行血海未淨而強與交媾精與汙濁互結而積於胞胎之中以致阻塞經閉不通狀似有孕而證不同有孕之婦飲食喜惡不常且腹中胎息汩汩微動精積之證悶亂不安飲食不下腹無胎息可驗更當密問其夫果有此事與否以憑用藥庶不致誤其法攻堅破結方用糯米一兩斑蝥十五個同炒黃色易斑蝥再炒去斑蝥用糯米花乳石一兩石硫黃五錢同煅煙淨取出研末山羊血甲珠制硫黃無名子肉桂黃耆白朮人參各五錢巴霜紅花桃仁降真香各三錢飛淨硃砂一兩虛寒者加薑附五錢火旺者去肉桂加大黃香附各五錢已上共細末吳神麯糊丸每用開水送五錢攻破堅結即愈若用藥不得其法延至牢不可破無能為也有為濕痰占據胞胎者其腹漸大白帶常來飲食非如孕婦喜怒不常且又無胎息可驗皆由脾胃素虛而生化之源為留飲窒塞是以精血不行兼之腎陽不足不能化氣故痰踞之法宜六君子湯加砂仁草果薑桂南星香附其痰自隨白帶長驅而下其腹漸消經信通而受孕矣通經之道仍在治病調經門言之已盡悉矣茲不復贅安胎安胎之道法當求其動胎之故未有無故而胎自墮者其中或因脾虛氣弱而不能載或因縱欲傷腎而不能安或因攀高或因跌撲凡此均宜大補元氣調理脾胃用耆術參苓覆盆故紙若火旺加阿地歸芩虛寒者加附子薑桂若胃有寒痰加炮薑半夏若嘔逆加砂蔻吳萸丁香若兼三陽外感頭痛壯熱表邪大盛正氣受傷而胎痛不安者則當分經解表以去其邪而胎自安若為三陰中寒陰邪內攻下利厥逆腹中急痛其胎必動宜亟回其陽以驅其陰而胎自安陽明內結火邪入胃鑠竭陰津胞胎立壞外見惡熱不眠舌苔乾燥噴熱如火大便閉結法當亟驅其陽以救其陰能治之於早善自見機調養不失其宜胎亦可保曾醫房嬸懷孕三月而患熱病求豫藥吾見其口燥心煩渴欲飲冷者陽明裡熱也法宜白虎湯以撤其熱汗出惡熱大便閉結者胃實也法宜調胃承氣湯以蕩其實口苦咽乾者少陽腑證也法宜黃芩以瀉腑熱舌苔乾黑芒刺滿口者內火鑠干津液陰欲竭之徵也腹微痛而胎欲動者熱邪逼及胞胎者若不急行驅陽救陰之法胞胎立壞不可為矣即用白虎湯合調胃承氣湯加黃芩一劑而熱勢略殺再投一劑泄下二次結去津回諸證皆愈其胎立安此但治其病不必安胎而胎自無不安也曾見懷孕五月者卒病中寒頭重如壓腰痛如折厥逆惡寒腹痛急而胎欲墜法當急驅其陰以救其陽而胎自安庸工不知分經辨證但用膠艾四物湯數劑其胎竟墜且殞其生又見懷孕七月者漏下清水時值秋分之際燥令大行乃為肺經受燥醫者不識謬執成法以為脾虛而用耆朮砂半之藥不效又謂藥不勝病再加大劑十餘服水更加甚而胎落矣其後仍復下水醫謂小産後元氣暴虛更重用大補數劑而證變喘促直視口不能言延豫診之右寸洪徑無倫面色焦稿肌膚熯燥鼻靨煽動吾知其不可為矣乃斥醫者曰子謂脾虛何所徵驗蓋脾虛者當必自利不渴今大便結硬口乾心煩乃為秋燥傷肺其氣下迫胃中津水長驅而下而反用耆朮砂半健脾愈助其燥而肺愈傷今見脈動無倫鼻靨煽動乃肺氣立絶之候尚何可為哉醫者不能置喙少頃氣湧而死矣冤哉惜豫遇之不早也明年九月又有懷孕七月受秋燥而漏下清水者其證與前死者無異其家懼而求吾藥診視之依然右寸脈洪徑皮色乾枯心煩不眠吾用天冬麥冬玉竹蔞仁阿膠雞子白以清肺燥桔梗開提甘草和中一劑而效五劑痊愈可見安胎必當治病病不能除命且去矣可不慎歟孕婦小便癃閉不通女科書名轉胞謂氣虛則胎下墜壓翻膀胱為轉胞因而胞系了戾了戾者紋細也小便不通法主大補中氣何其胡説也胞為胎胞膀胱為尿脬並非尿胞小便不通關係出竅於系何干何必曰胞系了戾耳小便不通名曰癃閉不宜驟補法當宣暢胸膈而醒脾胃使上焦得通中樞得運而後氣化能行方宜白蔻砂仁半夏肉桂加桔梗開提生薑升散俾轉運之機乃得先升而後降妄投耆朮參芩壅遏不行有何益哉觀胎前諸證惟惡阻一證為中脘停痰可為定例其有子淋子腫子懸子癇子喑等證皆有寒熱虛實不同務必察其根由確有所據而後按法用藥方為妙矣女科諸方中肯綮者鮮矣吾誰適從耶附胎前預服良方炙黃耆制白朮各三錢炙草八分覆盆菟絲子俱酒炒白茯苓破故紙各二錢西砂仁廣陳皮各一錢煨薑一片水煎服若體虛者加歸地火旺者去砂仁加黃芩此方並宜多服自受孕以後即服是藥不可停歇俾元氣足則胎自固而無墮胎之患內氣充則産自易而無難産之厄且臨産不受虧産後必無病胎元足兒體堅此為培母親之後天即所以育兒之先天上乘法也凡孕婦有病必當及時治之務令其病盡愈元氣康復飲食加健方無後患切不可遺其病於産後治之更難甚且不救慎之慎之催生孕婦難産亦各有所由來懷胎十月神完氣足必自力娩産母無病其産自順今既發動兒已出胞頭已向下曷為三五日不産其中必有所因或為氣虛不能運送宜用耆朮參苓補氣之劑或為血虛甚而不流利宜用發灰阿膠龜板或為疾病侵害以致難産當按六經之法分經用治使病去而産自順醫不知此任用催生諸方無端妄投徒斃其生而已矣曾見産婦臨盆數日不産者其證嘔吐不止腹中大痛少氣懶言身重無力此少陰證也催生諸方不可用吾用耆朮附桂砂半炮薑吳萸一劑而嘔止但仍腹痛未減依然少氣無力於是倍用耆術再投一劑則腹痛止而氣力漸加其産如達母子俱無恙又醫一證發動六日兒已出胞頭已向下而竟不産醫用催生諸方又用催生靈符又求靈神爐丹均皆無效延余診視其身壯熱無汗頭項腰背強痛此太陽寒傷營也法主麻黃湯作一大劑投之令溫服少頃得汗熱退身安乃索食食訖豁然而生此皆治其病而産自順者也産後論女科諸書醫産後諸病當以大補氣血為主此言雖得其大概然有當補不當補者而當補之中又有分別血虛補血必當兼補其氣氣虛者必不可兼補其血其氣血兩虛者法當重在補氣蓋陽生則陰長也嘗觀女科諸方往往偏勝補血而又且兼重破血然産後內臟空虛必不可破縱有瘀血亦不必破務在求其所以然者是必因病而致治法總當辨其寒熱陰陽虛實對證用藥使病去而瘀自行不知治病僅知破血必殺之矣産後昏暈不醒人事者俗名血暈主用破血千古胎害此為氣虛陽脫法當重用參耆以固其脫若兼厥冷更加薑附方能奏功又如血脫一證乃為暴虛不能統攝法當大補其氣以固其脫此二證皆為氣虛並非血病不可破血愈傷其元並不可兼補其血以致陰愈長而陽愈消速亡之道也惟人參一物最妙俗醫云此物提氣又恐吊血死不敢用不知何所本也蓋血脫者為氣虛不固惟參能固瘀血不行者多為氣虛不能運行惟參能行此最妙者能於臨産時用參一錢以助內氣則易産且無虛暈虛脫之患邇來參貴可用鹿鞭切片二錢水煨爛入鹽少許連渣服鹿鞭大補腎陽其功效勝於參至有産後心腹痛者多為中寒女科書皆曰血氣亦主破血不知法宜耆朮薑桂人參砂蔻若兼表證仍當分經解表合而治之斯為至善也所貴治病病去而瘀自行曾醫一證産後而瘀未行小便滴瀝醡脹異常醫用破血之劑三服更加胸腹脹滿人事昏迷喘促不能臥余曰此非汙積仲景有云小便不利者為無血也此病在氣分不當用血分之藥蓋為膀胱蓄尿過滿脹翻出竅致尿不得出吾用白蔻宣暢胸膈砂仁半夏醒脾開胃肉桂化氣桔梗開提生薑升散令服是藥並教以手從上拂而膀胱之氣乃能轉運斯竅自順而尿出果如吾言其竅通利自言寬了一節旋即又行更覺舒暢乃索食食訖則安睡睡起再行腹消如故於是改用扶脾健胃之劑數服而痊愈此所以小便不利而驗其無血也又醫産後一證身重惡寒飲食不下大便泄小便不利腹中痞塊作痛庸工謬謂血氣用元胡四物湯加蒲黃服之無效轉加膨脹矣於是再加厚朴木香則脹滿加劇湊上胸膈喘促不能臥豫曰其身重惡寒者少陰證也腹中痞塊作痛陰寒凝結也食不下者陰邪逼塞胃口也且陰邪下奔而作泄膀胱無陽其氣不化而小便不利凡此皆為病在氣分彼妄投血藥陰愈長而陽愈消又誤破其氣則氣虧而邪愈湊其證危矣吾用砂蔻薑半宣暢胸膈溫醒脾胃附子御陰肉桂化氣使上焦得通中樞得運而後氣化行桔梗開提生薑升散俾轉運之機乃得先升而後降一劑而小便通胸膈略寬再加耆術三劑而腹痛止脹漸消飲食加健身復發熱其家曰表見發熱何故也豫曰真陽來復休徵也經曰傷寒先厥後發熱下利必自止再重加黃耆白朮而泄止其脹更消忽加口渴腹中作餓食未久又索食其家恐服附桂助起胃火故能消食商議改用清涼余曰不可也經曰脈滑而數手足自溫渴欲飲水飢欲得食此陽進欲愈之證也再加益智故紙收固腎氣又二劑而身輕腹脹俱消再加覆盆菟絲鹿鞭兼補腎陽數劑而痊愈矣痞塊消弭終無血行下者調理兩月經信行通如故曾見一婦腹中有塊作痛醫者因以行瘀未見血下轉增膨脹更加檳榔厚朴木香沉香數劑而脹滿加甚庸工謬謂成血蠱矣竭力破之其脹彌堅飲食不下連更數手皆為破血消脹氣湧息高而死矣此病在氣分誤用血分藥之覆轍也前條雖誤隨即改用陽藥著著合法病故愈此則專從破血恬不自悟其遄死也宜哉産後胞衣不下多由氣虛不能送運方中必兼大補其氣否則非法也下胞衣方人參黃耆白朮肉桂山羊血無名子沒藥苡仁硃砂楂肉紫降香制硫黃已上各等分為末飯碾成丸梧子大開水吞服五錢又方用芡實葉大如盤者取完全無破損曬乾備用凡用一葉扯作三塊水煎濃汁酒和服薑湯亦可其胞衣即裂為三塊而出扯作二塊其胞衣即裂二塊而出此方得之萬天純屢試屢驗又聞臨川世醫黃在田下胞衣用紅菱葉用法與前方同功效亦同屢經試驗凡用此方必察其果為胞衣未下者方可徑用若遇駢胎産下一個腹內稍停因母氣虛不能送必俟母氣來復此等方藥切須仔細不可妄投恐傷兒命黎明入署有洪元正薄莫問曰吾姊於午間産一女胞衣未下特來求方豫問此刻人事何如曰其腹仍大不作脹痛飲食有味嗜臥懶言別無所苦豫曰此駢胎也還有一個在內故腹大而無所苦若為胞衣灌血勢必濁氣上干而為脹痛悶亂莫可名狀欲其飲食有味而安靜何可得也此為氣虛不能運送觀嗜臥懶言駢胎顯然矣吾用黃耆白朮苡仁各三錢肉桂半夏益智各二錢生薑一片令即煎服明早再看次日元正來云吾姊服藥後即熟睡至半夜又産一女胞衣隨落無恙可見用藥必當詳察不可忽略此明驗也乳病乳汁不行各有所因或血弱氣虛不能生化宜服參耆歸桂乳香脾胃虛寒宜服耆朮參桂砂附薑半或內臟多火津枯血燥而生化無源宜用歸地阿膠橘核苡仁栝蔞仁之類或因外邪阻滯法當分經用藥以去外邪則乳自通如女科書所載通草漏蘆豬蹄湧泉諸方皆非正理不可用也妒乳吹乳二證女科謂因兒口氣內外吹乳則乳汁不行而成腫硬此説荒唐實為解懷乳子外邪乘隙侵入乳房壅塞乳道腫硬而痛閉久則潰斯為乳癰若初起未潰宜用白芷半夏桔梗甘草白蔻乳香生薑煎服外用生南星薑黃白芷研末砂糖調敷內外兼治而散若兼三陰加附朮薑桂若兼口渴惡熱形色焮赤頂凸宜加芩地栝貝若兼三陽表證法當分經解表更當看其本氣察其虛實依法用藥自能中肯矣愚意窮鄉僻壤醫藥不便者用蒲公英路傍地角肥土多生數葉一莖而花一名黃花地丁草俗名山萵苣菜此乃毒瘡要藥岐天師統治諸瘡余多用之搗爛入甜酒一碗溫服取渣包乳患處效如桴鼓以上皆驅逐消散之法不令外潰無害乳房為妙若已潰成膿又當重耆朮參苓歸桂乳香極為排托則乳房無損日後有乳若已成潰陷外用紫草一兩真麻油四兩浸三日去渣將白蠟一兩打碎於油內漫火熬煬另用白芷一錢松香降香各三錢枯礬輕粉各二錢共研極細末投油內攪勻候冷以小籤子一塊挑起撻開刮入陷中上蓋膏藥內服托藥排托收功或者可冀僥幸乳房不致有損耳乳岩一證由脾胃素虛痰飲停積協抑鬱之氣而膠結乳下成核此病在氣分不可用血分之藥如流氣飲等方皆不中用法主理脾滌飲開鬱散結方用六君子湯加石菖蒲遠志南星白蔻若虛而寒者更加薑附乳懸一證謂因産後瘀血上攻兩乳伸長直過小腹痛不可忍其説荒唐無理不可信其方主用芎歸皆不通不足録也歷代女科諸書可謂備矣然而見理多有不確用藥鮮能中病豫不揣魯劣舉女科之要而言之蓋欲學者不誤於所往也但於各證微發其端而未詳其治務當熟讀三百九十七法體備六經陰陽之理則信手拈來頭頭是道否則不但不得女科之要並不足以言醫也馳遠舒先生苦心於醫發菩提心運廣長舌特出手眼並度金針女科書另闢一境界使學者能珍寶之又熟體之則舉病即迎刃而解矣豫故摘録入是書中便於參覽以廣其傳調經論愚按經曰飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行又曰二陽之病發於心脾二陽肚子大腸有不得隱曲女子不月故心脾和平則百骸五臟皆潤澤而經期如常苟或心脾受傷則血無所養亦無所統而月經不調矣是故調經當以理心脾為主也學者不可不知丹溪曰先期而至者血熱也後期而至者血虛也竊謂先期而至者有因脾經血燥有因脾經鬱火有因肝經怒火有因血分血熱有因勞役火動過期而至者有因脾經血虛有因肝經血虛有因氣虛血弱主治之法脾經血燥者加味逍遙散脾經鬱火者歸脾湯肝經怒火者加味小柴胡湯血分有熱加味四物湯勞役火動者補中益氣湯脾經血虛者人參養營湯肝經血虛者六味地黃丸氣血虛弱者八珍湯蓋血生於脾土故云脾統血凡血病者當苦甘之劑以助陽氣而生陰血凡肝脾血燥四物為主肝脾血弱補中益氣為主肝脾鬱火歸脾湯加柴胡白芍為主肝經怒火加味逍遙散為主病因多端不能悉舉智者臨證詳審可也治驗一婦人晡熱肢體瘦倦食少無味月經不行或鼻衄或血崩半載矣醫用清熱止血順氣不應更加寒熱且時欲作嘔余曰此鬱怒虧損脾胃虛火錯經妄行而然耳朝用補中益氣湯夕用六味地黃丸半載而痊一婦人素沉靜晡熱內熱月經不調或一月二月一行或齒縫出血或舌下或咽喉出血碗許如此年餘醫與清熱涼散藥益甚問治於余余曰此肝脾血熱上行先用加味歸脾湯後用加味逍遙散兼用補中益氣湯加麥味茯神遠志山藥熟地攝血歸源而經自調前證如失一室女年十七腿外臁忽腫起一紅點作癢搔破鮮血如注飛出小蟲甚多審察其由每先寒熱兩耳下或結核蓋外臁耳下俱屬少陽膽為肝經之腑肝主風熱生蟲血得風熱而妄行肝火旺而出血其少陽厥陰陰陽並虛矣凡病虛則補其母腎乃肝之母余用六味地黃湯以滋腎水生肝木四物湯加柴胡山梔鉤藤生肝血以抑風熱而瘥傳授靈丹昔在武昌超凡夫子曾囑余曰子今既遊吾門當知濟人利己之法吾於載籍中選擇靈應丹頭修合數料多年用皆奏功今以授子其中神妙不可測度宜虔心依法修制磁瓶收貯出入佩帶身邊路途中可預防自己之病亦可力救他人之生但須誠心施治不論富貴貧賤酬償聽其有無不可刻較錙銖致遭殃咎至於肆中售賣無妨平價古人云半積陰功半養身子其勉之勿怠遇仙丹即神保丸廣香胡椒各二錢半全蠍七枚巴豆十枚去油研末共為極細末水打為丸如火麻子大硃砂水飛淨為衣每服三七粒此丹專治心腹諸氣疼痛及肺氣盛氣喘氣噎血積宿食面酒過度俱用生薑柿蒂湯送下諸氣中惟膀胱腎氣脅下三處氣痛者最為難治獨此丹用小茴香酒下效如桴鼓神仙萬病解毒丹一名太乙紫金丹一名玉樞丹一名紫金錠子雄黃硃砂麝香各三錢川文蛤二兩山慈菰去毛二兩紅芽大戟一兩五千金子仁去油一兩主人揀選上品藥料淨室中精製卜端午七夕重陽或天月德天醫黃道先朝齋戒三日至期更衣沐手薰香拜禱天地畢將藥稱準重篩七次再和再研糯米稀糊調和軟硬得當入臼杵搗勻光潤為度每錠一錢隨使用人外一切忌見貓犬六畜均忌此方之妙惟在潔身誠心若一有草率用之便不靈應此丹專治瘟疫煙瘴藥毒蟲蠱腫脹河豚菌毒自死牛馬一切諸毒涼水磨下得吐亦佳傷寒陰陽二毒心悶狂言喉痹喉風冷水磨薄荷一小葉吞下一切癰疽疔毒及諸惡瘡無名腫毒用無灰酒磨服冷水調塗小兒急慢驚風五疳五痢脾病黃疸隱疹瘡瘤痘毒攻心並用蜜水磨三分服傳尸勞治之能斷根治驗詳載三卷中凡病有疑似難明即以此丹磨服能治數十種雜證用引各殊詳載金鑑及保元諸書中茲不多贅沉香丸即百消丸沉香紫菀不拘多少香附靈脂各四兩黑醜八兩去頭末老酒醋米糊為丸梧子大每服六十丸酌加每飯後一時許生薑湯送下此丸大能消酒消食消痰消氣消水消腫消脹消痛消積消痞消塊消而不見響而不動藥味平淡奏效神奇單用百消丸實者宜之虛人則忌加沉香降氣和胃白蔻宣暢胸脾不傷元氣病去而飲食如常誠為良藥前三方修合配製務要精工得法否則世人亦有知者何以用之多不見效耶紅靈丹明雄硃砂礞石火硝月石各六錢麝香洋片各二分佛金四十張各制合研極細末磁瓶收貯勿令泄氣輕重量用此丹或燒酒冷水打丸梧子大專治感冒傷風傷寒傷暑用溫茶送五丸慢緊痧脹稍冷茶下中惡中毒暴病五絶將此丹水擦牙下咽即活重者三五丸勿多過服冷水解九種心疼腹痛哮喘痰嗽溫茶送下口熱少許輕擦牙痛碎一丸放痛處小兒急驚五疳諸積食傷飽脹霍亂吐瀉用三丸或二丸放舌尖上和津嚼之凡麻冷水吞寒證用溫茶時證瘟疫沿門傳染用銀簪點大眼角中男左女右能治一切癰疽疔毒陰陽瘡癤痰核痰疱以及蜂螫蟲咬初起未陷用蔥頭酒煎加蜜開擦陽瘡加豬膽汁擦吞三五丸即消婦女月經或前或後俱用黃酒送下五丸七丸取汗立效佩之在身不染瘟疫並治六畜染疫均點眼角點忌冷水孕婦禁用四季丹麝香二分制乳香沒藥各一錢丁香八分蟲蛻一錢五分硃砂明雄各二錢五分蟾酥二錢四分茅山蒼朮二錢五分此丹專治外感寒熱瘴癘似覺意似不快取少許嗅鼻取嚏隨嚏而散若犯緊慢痧脹及膈證紅白痢疾九種心疼並腹痛一切難明之狀均用陰陽水少許調服以上五方解毒通關通治百病真能起死回生凡人居家出入興工動兵及閩廣云貴煙瘴時發不服水土者仕宦商賈尤不可無誠濟世之良方衛身之至寶也目此五方者尚其毋忽避瘟諸法雄黃丸治防溫疫傳染明雄一兩丹參赤小豆炒鬼箭羽各二兩為末蜜丸梧子大每早空心溫酒送下五丸避瘟丹蒼朮紅棗和丸燒之或置床下或薰屋中亦能疫透頂清涼散白芷細辛當歸明雄牙皂共為極細末磁瓶收貯聽用切勿泄氣每遇未患已患之人噙水口內嗅鼻取嚏否再吹必取嚏方止如入病家先以雄黃抹鼻孔內或香油塗鼻孔仍取嚏更妙化金疫老醫臧枚吉云其證初覺昏不知人不治即死急以生黃豆令嚼其味甘美不腥臭即是此證速以河字錢一文放入口中即化而愈否再放一文有放至四文而愈者扣頸瘟治驗曾治湯思祖之妻年五十四其家富饒三子二庠一廩夫婦和諧乃一日無故自縊幸孫見救問之鬱郁不語藏繩袖中一見無人即尋自縊其子向余道其故余曰是病也書有之名扣頸瘟即求余治乃與小柴胡提出少陽之邪雄黃香附鬱金開膻中之郁去白陳皮法夏破膈中之痰羌活細辛溫肝驅風丹參赤小豆鬼箭羽通心包絡而兼泄火邪生薑煎服頭痛身熱大作自出其袖中之繩曰誰納我乎語以故恍然自失曰豈有此事後再用發汗兼散疫邪而安羊毛掙疔二證治法大同小異其證發熱無汗心內發熱口乾嘔吐前後心孔生泡瘤漸大內有羊毛不治立刻痛死即用銀針挑破剔出毛淨蒙被取汗而愈不應用砂糖少許生薑三片用武夷茶一撮煎服忌腥冷一法用青布蘸燒酒擦遍身蒿枝水薰洗亦可出汗又一道人傳用黑豆蕎麥末和塗毛落而愈用時採擇後載有羊毛瘟痧參看神鬼箭打其證卒然昏迷顛仆身痛有青筋以亂髮搓痛處是則髮捲成團而硬即用兩寶濃煎服不愈加甘草發不卷硬者非另察其脈證在何經即以何經之藥施治之劉松峰云凡挑刺掙痧無血必用手極力捻之血出即愈如遇口噤不開者用烏梅擦牙齦上涎出即開蓋酸先入筋木來剋土使牙關痠軟則開矣若用鐵器摮之恐其傷齒摘附醒醫六書瘟疫論吳又可曰疫病者感天地之厲氣在歲有多寡在方隅有厚薄在四時有盛衰此氣之來人觸而即病所客內不在臟腑外不在經絡舍於伏脊之內去表不遠附近於胃乃表裡之分界是為半表半裡即針經所謂橫連膜原是也其熱淫之氣浮越某經即見其經之證其始也格陽於內不及於表故先凜凜惡寒甚則四肢厥逆陽氣漸積鬱結而通則厥回而中外皆熱不惡寒此際或有汗或無汗在乎邪結之輕重也即使有汗乃肌表之汗若是感邪在經一汗而解今邪在膜原表雖有汗徒損真氣即邪深入何能得解必俟其伏邪已潰乃作大戰積氣內自膜原以達表振戰出而後發熱此時表裡相通大汗淋漓邪從而解此名戰汗若非大戰伏邪不能傳表雖有汗而邪不解也故曰邪未潰則伏而不傳邪離膜原謂之潰而後方有傳變其變或從外解或從內陷外解者順內陷者逆更有表裡先後之不同有但表而不里者有但里而不表者有表而再表者有里而再里者有表勝於里者有里勝於表者有先表而後里者有先里而後表者有表裡分傳者謂之疫有九傳識此九者其去病一也舒馳遠曰余按疫有九傳者病人皆得其一非一病而有此九也證有表裡輕重而法之宜先宜後即出其間其先表而後里者此非表邪入里乃膜原伏邪潰有先後也先潰者先傳後潰者後傳若先傳表者則表證先見宜先傳表表解已而里證後見者乃後潰之伏邪至是方傳裡也其先里而後表者亦非里邪外出仍是後潰之伏邪至是方傳表也至於表裡分傳亦是伏邪分潰也其初用表藥之時亦不可不先看其本氣虛寒者宜加附子火旺者宜加芩地石膏等藥用下亦然元氣虛者承氣湯中宜加人參黃耆陽虛者宜加附子陰虛者倍用生地熬膏煎藥凡此皆法中之法也其表而再表者是方解其表而表證復見此亦伏邪以次第而潰也故不妨再表之其里而再里者是下去其結而腑邪復結亦伏邪以次第而聚胃也再一下之則愈至於下後諸證總在相其津液其潰邪傳表身發熱而脈續浮者法宜分經解表假若舌上依然乾燥氣噴如火則表藥不可用又宜白虎湯重用石膏知母甘草粳米倍生地以救津液乃得自汗而解其津干飲結者栝貝養營湯栝蔞實知母貝母花粉蘇子當歸白芍橘紅陰枯血燥者清燥養營湯重用生地一兩花粉歸身白芍陳皮甘草知母燈心酌加里邪未盡者承氣養營湯歸身知母厚朴生薑枳實大黃生熟並用生地倍加本氣虛寒下後微惡寒者又宜參附以溫補之養營又所當禁立法誠大備矣而醒醫六書醫家又不可不留心考究焉斑汗合論吳又可曰疫摶氣分法當汗解疫摶血分法當斑消氣血兩摶法當斑汗並行而愈此皆邪從外傳由肌表而出也斑有斑疹桃花斑紫雲斑之殊汗有自汗盜汗狂汗戰汗之異然不必較論但求其得斑得汗為愈疾耳凡外傳為順勿藥自愈間有汗出不徹而熱不退者亦宜白虎湯斑出不透而熱不退者宜舉斑湯用當歸白芍升麻白芷柴胡穿甲生薑斑汗不得並行而熱不退者宜白虎湯合舉斑湯舒馳遠曰余按斑出不透者舉斑湯可主汗出不徹者白虎湯未可概主是必津干口燥大渴飲冷者方可與白虎湯不然務宜分經辨證按法用表藥以發之庶不致誤藥煩吳又可曰應下失下致傷中氣反投承氣額反汗出髮根燥癢手足厥冷甚則振戰心煩坐臥不安此脾胃虧損不能勝藥名曰藥煩急投薑湯即已假令前投承氣湯中加生薑必無此證停藥用尉法其效速吳又可曰服承氣湯腹中不行此因病久失下中氣大虧不能運藥名為停藥宜生薑以和藥性加人參以助胃氣熱結旁流吳又可曰內有結燥日久失下續得下利臭水宜大承氣湯蕩除燥屎而利自止舒馳遠曰余按熱結旁流之證上實下虛也法宜承氣以蕩上燥合理中兼理內虛單用承氣不合法也大腸膠閉吳又可曰其人平素大便不實設遇疫邪傳裡但蒸作極臭黏膠狀若敗醬愈蒸愈閉以致胃氣不能下行疫毒無路而出不下即死但得膠滯一去自愈補瀉兼施吳又可曰證本應下耽擱失治火毒內壅耗氣搏血外見循衣摸床撮空理線筋惕肉瞤眩暈鬱冒目中不了了皆緣失下之咎今則元神將脫補之則疫毒愈壅下之則元氣僅存一線不勝其攻兩無生理不得已而重加參附於下藥之中或可回生於萬一奪氣不語松峰云下後奪氣與失汗失下不語迥別不語惡候也服竹瀝立效吳又可曰凡疫證下後中氣大虛神思不清惟向里臥呼之不應此正氣被奪危在旦夕宜參耆藥補之蓄血發黃吳又可曰經氣不郁不發黃熱不幹血分不蓄血治黃茵陳蒿湯蓄血桃仁承氣犀角地黃抵當等湯下後身反熱吳又可曰應下之證下後當脈靜身涼今反發熱者此內結開正氣通郁陽暴伸此不久自愈仍有餘邪未盡當明辨表裡用法以消悉之辨達原飲按劉松峰先生稱吳又可為瘟疫科中之聖其所謂疫證與傷寒不同是千古隻眼余嘗察其所以不同者伏邪未潰之時但覺人事懨懨胸脅苦滿飲食無味語言不清心中鬱悶體倦神疲然觀先生所制達原飲方其用檳榔厚朴知母草果黃芩白芍甘草諸藥皆不合經旨何也意者先生學雖宏通尚未知分經用藥乎夫膜原屬少陽檳榔知母厚朴皆走陽明安能除少陽之伏邪草果治懸飲伏邪非懸飲黃芩瀉少陽腑熱此無腑熱白芍收斂伏邪愈不得出此方焉能中病愚意當用柴胡開提少陽胸脅苦滿飲食無味用白蔻半夏宣暢胸膈醒脾開胃人事懨懨用人參以助內氣庶乎合法寒疫治法舌苔積粉滿口布白寒疫亦有此證曾治王元雙患寒疫人事倦臥飲食不進滿口布白牙齦上齶以及喉間皆無空隙余驗其證舌上滑而冷四肢厥冷小便色白其為寒疫也明矣證與喉間白骨無異即令濃煎生附汁綿蘸頻攪口舌遂用人參白朮茯苓故紙乾薑白蔻生附熟附大劑煎飲二劑溫醒胸中冷痰嘔出碗許而人事稍安前藥再投冷痰漸活布白漸退旬日而痊若是熱證則必心煩口臭聲音清亮身輕惡熱又當斟酌於白虎承氣諸法庶無差誤至於膜原伏邪已潰或從外傳或不從外傳而歸結必入胃者十常八九非若傷寒從表解者多而入腑者恆少此歸結又不同也然而治法仍不外乎分經辨證發表攻裡養營清燥諸法皆從傷寒門中脫化而來乃深得錯縱之妙耳是則六書雖得瘟疫門中肯要苟非熟習於分經辨證又茫乎不識其肯要也而六書論疫專在胃腑長於用下更精於下後嘉言瘟證三例謂冬傷於寒春必病瘟者主三陽冬不藏精春必病瘟者主少陰既冬傷於寒冬不藏精同時發病例於兩感乃諄諄於發表溫經而反鮮于用下余嘗驗諸疫證歸結多入胃腑或燥結或膠滯每每皆從下奪此六書實足以輔嘉言之不逮也然而盡闢溫經則又六書之偏也邇來冬不藏精之人恆多患疫輒兼中寒者有之其始也腹痛下利頭眩身重厥逆惡寒舌苔白潤服四逆真武等湯數劑其泄漸止而大便轉閉舌苔乾燥口渴腹滿不惡寒反惡熱急用大承氣湯其陰邪尚有未盡者大承氣湯中仍加附子此固疫門之圓機亦即可為定法矣溫經豈可盡闢大頭瘟治法又有大頭瘟者頭面腮頤腫如瓜瓠蝦蟆瘟者喉疸失音頸筋脹大瓜瓤瘟者胸高脅起嘔汁如血疙瘩瘟者遍身紅腫發塊如瘤絞腸瘟者腹鳴乾嘔水泄不止軟腳瘟者便泄清白足腫難移已上諸證必皆壯熱頭痛舌乾口渴否則不得謂之瘟矣嘉慶甲戌郡中大疫余曾治患大頭瘟者數人皆頭面腫甚目不能開憎惡壯熱頭痛煩躁渴欲飲冷乃用普濟消毒飲解其表而清其毒外以甜瓜蒂赤小豆為末嗅鼻取出黃水以瀉髓臟熱毒而頭痛自止再服前藥數劑俱皆得活其餘諸證皆未驗過喻氏亦未立法他書有方於理未暢未敢輕試以理揆之仍宜察其本氣相其津液驗其寒熱虛實用法處方自能中肯附治溫疫方夫仲景三百九十七法乃萬法之祖誠能潛心體備則治瘟疫乃余技耳又何必六書為哉然猶慮學者艱於觸類也故附録其大概聊資啓發云爾普濟消毒飲一方無薄荷有人參黃連黃芩酒炒各五錢陳皮甘草元參青黛連翹馬勃注見喉疸門牛子桔梗各二錢薄荷升麻各一錢三消飲生薑引水煎服檳榔厚朴草果白芍甘草知母大棗黃芩羌活柴胡葛根大黃犀角地黃湯犀角磨汁白芍粉丹各三錢生地一兩搗絨入水攪取汁其渣入藥同煎和汁服紫背浮萍性專涼散入肺經達皮膚能發瘟疫之汗力較麻黃更勝慧試驗有年取汗最神效起斑湯消斑神效湯見二卷斑證案清燥養營湯生地花粉歸身白芍陳皮甘草知母燈芯生地一兩搗汁渣同煎汁和服柴胡養營湯柴胡黃芩陳皮甘草當歸白芍知母花粉生薑大棗用生地如前法承氣養營湯大黃枳實厚朴生薑知母當歸白芍亦用生地如前煎法栝貝養營湯貝母知母花粉蘇子白芍當歸橘紅栝蔞實柴胡清燥湯柴首黃芩陳皮甘草花粉知母生薑大棗黃龍湯大黃芒硝枳實厚朴人參當歸生地參附養營湯人參附子炮薑當歸白芍生地按大下之後證見目瞑嗜臥少氣懶言者真陽暴虛元氣虧損也法主參附以回其陽而補其氣切不可兼養其營蓋陽不能從陰陰愈長則陽愈消矣此法殊覺不合衄血近聞軍營患疫半多衄血諸藥不應余考傷寒感天地之正氣藥宜辛溫發散瘟疫感天地之戾氣藥宜清涼解熱二證治法天淵不得其法無怪乎其不應慧數十年來於丙寅甲戌癸巳遇郡屬城鄉市鎮大疫沿村闔戶傳染者多余治衄血多用緑糖飲或加薑棗活人多矣緑糖飲方用緑豆功力在皮不拘多少煮熟取汁白糖調服凡治諸疾均用此方無汗加浮萍三錢同煎服之即汗按緑豆甘寒清熱解毒驅瘟上品洋糖同功涼散疫熱薑棗助少陽生髮之氣逐疫速出膜原少陽豆糖二味患疫者始終可用渴則飲汁飢則食豆且又捷便甚者用兩寶湯兼治兩寶湯緑豆多加甘草陳皮殭蠶蟬蛻四味酌加井花水煎服按兩寶緑豆甘草各有清熱解毒之功陳皮調中理氣和營衛而不凝滯殭蠶退熱能散疫毒風濕蟬蛻輕清易透肌膚散風解熱能驅瘟疫化為烏有二方藥味平淡奏功甚捷可於瘟疫十傳中加減消息之一助以便窮鄉僻壤寒士征夫倉卒無醫即用此法亦可以漸次汗解即有醫藥此方亦可兼服更能添助藥力以成厥功經證未明者服之亦概不犯禁忌寶之寶之止鼻血歌石榴花瓣可以塞卜藕二汁可以滴火煅龍骨可以吹龍骨能治九竅出血水煎茅花可以吃無花用根牆頭苔蘚可以塞車前草汁可以滴火燒蓮房可以吹水調鍋煤可以吃不止者以粗紙十餘層井水浸貼頂心尉即止罨尉法昔人專治傷寒結胸抑知瘟疫服藥不效六七日應汗不汗覺心腹稍有悶痛尉之立效並治諸證結胸痞氣支結臟結中氣虛弱不敢攻擊或藥停或才服藥後均以此法尉之以散胸中實邪往往大汗而解此慧屢試屢驗百發百中者也生蔥生薑生蘿蔔按原方薑蔥各數兩蘿蔔倍之愚意隨證加減更妙如表邪氣滯生蔥為君寒多者生薑為君痰食凝滯蘿蔔為君若泛用各等分或蔥多加亦可共搗勿過爛爛則水多難包入鍋焙熱住火用布包一半尉患處冷則換鍋中熱的輪流更換覺尉熱透為度開通毛竅汗出而愈摘選痧脹玉衡要略凡病防兼痧脹診視細心詳察郭右陶曰余考痧證古人未有論及後人稍有青筋之説仍略而不詳至康熙癸未秋燕都時疫大作患者胸腹稍滿生白羊毛幾莖日死數千竟不知為何病名幸有海昌明經李君見之曰痧也宜用針挑出血而愈緩則不救於是城中就診日以千計皆隨手而應頃之證變為嗽嗽甚輕不半日而斃時李君已出都矣有知者曰此亦痧也用前法挑之亦得愈焉及至己丑庚寅年間痧證復作鄉村城市皆有或為暗痧悶痧痛痧落弓痧噤口痧撲鵝痧角弓痧盤腸痧或又有因傷寒疫痢暨夫胎前産後諸證而兼發痧甚有闔門被禍鄰里相傳染者不可屈指余嘗臨證救急有三法焉如痧在肌膚刮之而愈痧在血肉放之而愈斯二者其痧尚淺雖重亦輕痧之深而重者脹塞腸胃壅阻經絡直犯心君命懸旦夕扶之不起呼之不應而痧脹已極難於刮放矣嗚乎病鄰於死誰不傷心非藥救醒烏能回生則刮放之外又必以藥濟之惟智者三法兼備救生而生全其如世人只知刮放少知用藥因而枉死者多或有云諸書不載非藥可療不知載籍之內原有絞腸痧有云青筋有云中惡此皆痧之散見諸書但略而不詳且歷代未有專家耳夫痧有真頭痛朝發夕死夕發旦死記載頭痛之條痧有真心痛亦夕發旦死早發暮死載在心痛之例此二證者雖屬不治若能見機於早或從痧脹門中揣摹治之或可挽回於無何有之鄉況痧有為頭痛而腫脹一似大頭瘟痧有為咽喉鎖悶一似急喉風有為眩暈昏悶倏焉云亡一似中風中暑有為喑啞沉迷身體重痛一似驚魂落魄此皆勢在危急刮放不及者非藥將何以救之乎且痧有頭痛寒熱類於傷寒咳嗽煩悶類於傷風與夫瘧而兼痧因痧而化瘧又有痢以痧發痧緣痢生而痧證百出傳變多端更有吐衄瀉血便血因痧而得者有之更有大腫大毒流火流痰由痧而生者有之或又有胎前産後氣鬱火鬱食鬱血鬱而痧之兼發者有之或又有痧而手腫足腫手痛足痛連及遍身不能轉側者或又有痧而胸脅肚腹結成一塊一似痞悶一似結胸者有之或又有痧而吐蛔瀉蛔食結氣結血結者有之或又有痧而心痛脅痛腹痛腰痛盤腸吊痛遍身疼痛幾不能生者有之況痧又有內證所傷將鄰於死者男方犯此一似蓄血而血分之治法不同女子犯此一似倒經而氣分之治法亦異痧之為病種種害人全在醫家望色聞聲問因切脈真假認證的確投藥乃應痧在肌膚當刮即刮痧在血肉當放即放痧在腸胃經絡與肝脾腎三經當藥即藥若痧氣肆行不拘表裡傳變皆同務宜三法兼用其效捷於桴鼓語云救人一命勝造七級浮屠此慧屢經試驗敢為先生暢發其義焉痧脹看證法治病必須憑脈若犯痧脹則脈不對證證不合脈或云痧筋為據亦惟現外焉夫痧脹有為食積血痰阻滯者或阻於上或阻於下或阻於左或阻於右或阻於兩脅苟非認證的確求其中病也難矣治痧一見脈有不合先看痧筋次審氣色三聽聲音四問犯病之由其間或有食積血痰阻於上中下左右各處之分須細辨其病原庶乎用藥不誤凡痧脈有一部獨異有六脈俱異而異之中亦有陰陽寒熱表裡虛實脈息之神氣可辨並非一端可執惟善醫者審之放痧辨客曰子於痧也有先用藥而放刮者有先放刮而用藥者舍放與刮治無別歟答曰明乎哉問也若犯太陽經表證用麻桂羌活里用五苓散犯陽明經表證用升麻葛根里用白虎承氣諸法犯少陽經證表用柴胡里用黃芩證有所犯治有所宜若氣分有痧宜刮血分有痧宜放至於臟腑經絡有痧其人昏迷不醒者宜急放刮而兼用藥療之何嘗拘於一法耶司命之士神明其法以救人庶無愧焉耳痧脈十二經辨脈芤而浮者手太陰肺痧也脈芤而數者手少陰心痧也脈弦長而動者足厥陰肝痧也脈芤大而滑實者足太陰脾痧也脈沉細而動止不勻者足少陰腎痧也手陽明大腸之痧類於肺而長手太陽小腸之痧類於心而細足少陽膽之痧類於肝而數足陽明胃之痧類於脾而緊足太陽膀胱之痧類於腎而浮虛手少陽三焦之痧脈必怪異痧證內傷外感辨傷食之痧脈多戰動傷血之痧脈多芤滑傷暑之痧脈多洪滑而疾數傷風之痧脈多沉微穢濁之痧脈多變異不常傷氣之痧脈多沉伏或形如雀啄傷濕之痧脈多沉細痧證之脈與諸證之脈不同如傷寒傷風之脈一兼痧證其脈必變病必凶暴是也凡遇雜證兼痧皆然痧證表裡辨痧之初發必從外感感於肌表人不自知則入於半表半里故胸中作悶或嘔吐而腹痛生焉此可刮放而愈不愈選用荊芥湯藿香湯痧入於裡故欲吐不吐欲瀉不瀉痧痛衝心則心胸大痛痧毒攻腹則盤腸吊痛此可以放痧而愈不愈選用陳皮紫朴湯稜術湯痧中於里則痧氣壅阻毒攻心膂立時發暈放痧刮痧皆不中用強於發暈時放之氣血不流即有些虛不過紫黑血點而已此痧毒深而凶危立見惟智者能審脈辨證果系風寒暑濕燥火氣血食積痰飲審在何因而施治候其蘇醒氣血活動然後扶起放痧細心調治倘或不醒再用牛黃丸三香丸救苦丸亦庶乎可以挽回此等危候曲全其生德莫大焉唇舌辨痧者急證也不醒不言心胸煩悶將何以辨之善治者先看其唇舌舌黑者凶黃者重淡紅者略輕黃色者內熱黑色者熱極淡紅色雖熱用藥不可太涼大小便宜通放痧自愈咽喉危急則痰喘如鋸先放其痧急用薄荷大力子童便山豆根或兼用冰硼散吹之餘證緩治治痧三法肌膚痧用油鹽刮之則痧毒不內攻血肉痧看青紫筋刺之則痧毒有所泄腸胃脾腎肝三陰經絡痧治之須辨經絡臟腑在氣分血分則痧之攻內者可消可散可驅欲絶其病根宜服斷痧丸治痧當識痧筋痧證輕者脈固如常重者脈必變異若但據夫脈不識痧筋勢必據脈用藥而脈已多變則實病變虛虛病變實誠不可恃倘脈證不合認痧筋有無有則據痧用藥無則據脈用藥尤須兼望聞問三法行之方無差誤放痧有十一在頭頂心百會穴一在印堂一在少陽兩側一在喉管兩旁一在舌下兩旁一在雙乳一在兩手十指尖一在兩臂灣一在兩足十指尖一在兩腿灣凡痧有青筋紫筋或現在數處或現在一處必須用銀針刺之先去其毒血然後據痧用藥治肝脾腎及腸胃經絡痧萬不失一要知痧者熱毒也或誤飲熱湯則青筋紫筋反隱而不現即或見青筋紫筋而放之其血亦不流並刮痧亦不出何也熱湯之為害也此當急飲涼水以解之然後可再放而血流再刮而痧出或又有痧毒方發而為食物積滯所阻食積與痧毒凝結於中即放之不出刮之亦不出食物積滯之為害也此當先消食積而再刮放或又有痧毒瘀滯熱極血凝而瘀血不流阻於胸腹故放之刮之有不盡者此當先散其瘀血而後刮放或又有痧毒方發而兼遇惱怒氣逆怒氣傷肝則愈作脹故痧氣益盛而放刮俱難盡此又當先用破氣之藥以順之而再行刮放痧毒自爾消矣如此則治痧之法庶乎以全是在臨證之細心審究耳刺腿灣痧筋法腿灣上下有細筋深青色或紫色或深紅色者肌膚白嫩方有紫紅色此即是痧筋刺之方有紫黑毒血其腿上大筋不可刺刺亦無毒血反令人心煩腿上兩邊硬筋上筋不可刺刺之恐令筋吊若臂灣筋色亦如此辨之其餘非親見不明白故不敢載至有頭頂心一針惟取挑破略見微血以泄痧毒之氣而已不可直刺其指尖刺之太近爪甲雖無大害當知虛人頭眩若應該刺宜銀針鋒尖微微入內切勿深入嘗見放痧用鐵針病輕體旺者一針而愈重者不惟不應鐵性有毒防痧難解慧溷杏林數十年俱用銀針尖鋒細心輕針未誤一人又考銀性最善入肉無毒余每刺痧務要鋒尖乃可下手蓋不敢視人命如兒戲也刮痧法背脊頸骨上下胸脅肋兩背肩臂等處痧俱用青銅錢蘸香油刮或用牙刷子腳蘸香油刮亦可頭額腿三處之痧俱用棉紗線或苧麻線蘸香油刷上刮之大小腹肉內痧用食鹽以手量輕重擦之其效甚速遍身腫脹痧痧有遍身腫脹乃誤中時疫暑熱惡毒之氣若再誤飲熱酒熱湯禍不旋踵治驗曾治長邑縣令曹秉讓來郡患遍身腫脹勢在危急吳友迫視見其手足俱腫將逮胸腹診之脈微如絲視腿灣十指青筋交現命刺之出紫黑毒血乃命冷服寶花散及桃仁紅花湯腫痛消而回縣悶痧痧毒攻心發暈昏悶無知一似中暑中風等證者然人不知覺立時而殂此痧之最急者如略蘇醒扶起放痧審證用藥如暈不醒扶不起者尤須詳審證在何經用藥灌醒然後扶起刮放細心調理庶不致乎誤人治驗曾治長邑明經鄧庚兄來寓謁見發暈昏迷余即診之兩寸芤而散餘脈如常重按歇指此暑熱穢氣觸犯心君先與寶花散薄荷湯繼與藿香湯冷服覺醒扶起速刺腿灣三針用沉香阿魏丸薄荷湯微冷飲之稍愈用四物湯調理而痊落弓痧此證倏忽昏迷不醒或痰喘不已眼目上吊形如小兒落弓證此暗痧難識必須審脈辨證果是痧毒摹身上涼熱唇上燥潤細心治之治驗曾治瀘陽湯時順首夏忽發熱口渴昏迷不醒兩目上翻延余診之六脈微細而伏先與寶花散調砂仁湯冷服而蘇扶起放痧出紫黑毒血繼與救苦丹及大黃細辛丸調砂仁湯稍冷服又與防風散痧湯加金銀花丹參山楂萊蔔子而安噤口痧默默不語語亦無聲形如啞子此乃痧氣壅盛熱痰上升阻逆氣管故咽喉閉塞治宜先放其痧審肺腎脾三經之脈而後推詳余經則問起於何時得於何因則病源自知矣治驗曾治瀘陽周長庚忽患痧脹心中煩悶昏昏不言延豫診之左脈有力右脈沉微余曰怒氣傷肝痧氣阻塞肝經刺腿灣紫筋三針血流如注又刺頂心臂指二十餘針乃與三香散陳皮厚朴湯加元胡香附微溫飲之而愈霍亂痧痛而不吐名乾霍亂毒入血分急宜放痧新食宜燒淡鹽湯入童便攪勻三飲而三吐之久食宜消下結宜攻痛而吐者毒入氣分宜刮痧視有青筋宜放總之調和氣血為主山藥茯苓不可亂施燥濕之劑俱在所禁熱湯滾酒切勿亂投切囑切囑右陶治沈篆玉九月間患乾霍亂腹中盤腸大痛放痧三十餘針用寶花散加大黃丸清茶稍冷飲之而愈治驗曾治庠生凌弼祖之母患乾霍亂余即用燒鹽探吐法治之而效此案詳載四卷中右陶治童敬橋之妻患吐血腹痛自刮痧服陰陽水其痛加劇余用三香丸微冷飲之而安絞痛痧心腹絞絞大痛或如石硬或如繩縛或如錐觸或如刀割痛不可忍輕者亦微脹悶絞痛非常放痧可愈否則毒攻臟腑有立壞之勢世有無知者謂此宜聽命於天不可救藥不知多放痧數次審證用藥亦可挽回右陶治賈公清腹痛如繩絞診其脈大而數實放痧不應乃與烏藥順氣湯加大黃下積而愈又治何君雅子暮春患盤腸絞痛診之脈伏令刮放痧乃與沉香郁金散稜術湯冷飲之稍愈將晚復絞痛異常喊叫不已又與細辛大黃丸清茶微冷飲之繼用紫朴湯而痊頭痛痧痧毒中於臟腑之氣閉塞不通上攻三陽顛頂故痛入腦髓發暈沉重不省人事名曰真頭痛朝發夕死夕發旦死速急刺破顛頂出毒血以泄其氣藥惟破其毒氣清其臟腑為主痧毒中於臟腑之血壅而不流上通三陽頭面肌肉故肌肉腫脹目閉耳塞心胸煩悶亦宜急刺顛頂及諸青筋出紫黑毒血藥宜清其血分破其壅阻為要右陶治張顯如患頭痛發暈沉重六脈俱伏刺顛頂百會穴一針余痧筋俱刺少蘇復診其脈沉實而上魚際用清氣化痰飲冷服而安心痛痧痧毒衝心屬之於氣則時痛時止痰涎壅盛昏迷煩悶此其候也治宜刺手臂灣服順氣之藥為主痧毒攻心屬之於血則大痛不已昏沉不醒此其候也治宜刺兩腿灣服活血之劑為主遲則難救右陶治鄭延旦次子心中暴痛口吐痰涎迷悶不能出聲診之兩寸沉而伏關尺洪而緊刺痧筋二十針用烏藥順氣湯四劑而安腰痛痧痧毒入腎則腰痛不能俯仰若誤飲熱湯熱酒必然煩躁昏迷手足搐搦舌短耳聾垂斃而已右陶治黃敬宇內室腰中大痛強硬如板誤飲熱酒發熱煩躁昏沉痰壅左尺虛微右尺洪實脈且歇指此痧中於腎也刺腿灣痧筋僅有紫黑血點不流用降香桃花散微冷服腿灣痧筋復現刺二針血流如注痧退痛減調理而痊脅痛痧不忌食物痧毒裹食結成痧塊入於脅作痛且痧塊變證多端最為難治治痧惟在初發若不識痧或誤飲熱湯毒血凝滯遂為慢痧雖不傷人亦成脅痛瘀蓄既久勢必難散右陶治朱子佩內室患身熱吐痰脅痛飲湯喘嘔不已左脈洪數右脈似伏余曰痧也刺腿灣痧筋二針不應令服童便喘嘔稍減乃與阿魏丸大黃丸白湯微冷下三劑而瘳小腹痛痧痧毒一入大小腸腹大痛不止形如板推絞絞不已治之須分左右二股屈伸為驗右陶治盛成均子患小腹大痛每每坐臥左足不能屈伸此手太陽小腸經痧也筋隱不現用木通湯微冷服四劑方見左腿灣痧筋刺二針出紫黑毒血乃與紅花湯冷服痧退調理而愈角弓痧不治撲鵝痧痰涎湧盛氣急發喘喉聲如鋸痛若喉鵝但喉鵝之證喉內腫脹若痧則有如喉鵝之痛而無其腫脹又形若急喉風但喉風之證痛而不移痧則痛無一定且痧有痧筋可驗喉鵝喉風無痧筋臨證之際以此為辨耳治驗曾治王子男痰氣壅盛凶暴痛極延豫診視脈多怪異余曰此三焦命門痧也閲臂灣手指筋刺十二針腿灣二針出紫黑毒血乃用救苦丹沉香郁金散清茶冷飲之外吹冰硼散繼與荊芥金銀花湯微冷飲之二劑而愈曾見周龍生喉痛之極痰涎壅盛余曰痧也不信頻飲熱湯至夕而歿惜哉眼目痧痧者火證也若犯痧適與心君之火相合故痧毒逆沖每要防攻心之患今少陰心君不受邪逆犯厥陰肝母故雙目紅腫如桃甚則眼珠突出最是凶險然他證患目惟在於目因痧為患必預覺心中煩悶而目疾因之設不知早治則痧毒已參陽位其火勢炎熱輕則壞目重則殞命治宜先刺百會穴以泄痧毒之氣當放者放當刮者刮用清火活血順氣之劑加牛膝石斛引火下行斯為良法治驗曾治汪名揚心中煩熱頭眩兩目紅腫如桃其痛不可忍因飲熱酒眼珠突出左目尤甚是晚昏沉發暈延余診之左脈微細無根乃痧毒為害放痧不應乃用兩寶茜草連翹黑梔枳殼丹皮赤芍牛膝石斛草決明煎和入童便微冷飲之眼珠方收調理而安瘟痧寒氣伏郁肌膚血肉之間至春而發變為溫證是為瘟痧又暑熱傷感凝滯於肌膚血肉之中至秋而發亦名瘟痧但春瘟痧少不相傳染至秋瘟痧即多互相傳染無分老幼其發也必惡寒發熱或腹痛或不痛似瘧非瘧或氣急發喘頭面腫痛胸腹飽悶或變下痢膿血輕者牽延歲月重者立見凶危治宜放刮消食為主俟痧毒已泄然後用和解調理之法治驗曾治楊和明重九登高忽寒熱如瘧心腹絞痛吐瀉不已六脈沉緊是瘟痧為害也用沉香阿魏丸清茶微冷下繼與和脾宣化飲入大黃二三錢合煎微冷飲之次日再服而愈盤腸痧痧毒肆行盤轉腸胃雖不疼不痛苦楚萬狀命在須臾此緊痧證也治驗曾治張天元室人患胸腹中氣不舒暢惟盤旋絞絞於胸腹腸胃中喊叫幾死將近一日時晚延治余診其脈洪大無倫余放指頭痧二十餘針乃與救苦丹沉香丸清茶稍冷飲之繼與防風勝金湯加桃仁紅花服之而安又治牛四美患胸腹迷悶作苦之極自謂死無所逃舉室惶惶迫豫診治按之右脈俱伏左脈洪大無倫即放指頭痧二十餘針遂與白礬湯冷飲二碗吐去新食繼與蒲黃飲去薑黃加萊蔔子微冷飲之而愈凡腹之痛急者絞腸痧也用干馬屎炒黑一兩干黃壁土炒枯一塊淡黃酒一斤煎服而安余屢試屢驗其方案載四卷中咽喉諸證兼痧咽喉腫脹水藥不入古人刺少商穴少商屬肺經刺之出血以泄其毒治在一經尚能見效況兼痧乎凡諸經兼痧或上或下隨經刺放痧毒一去繼服藥餌外用吹敷何懼兼痧有不愈者治驗曾治從元孫仲子犯喉疳證脈細而數視腿灣痧筋放五針出紫黑毒血外吹冰硼散服清涼至寶飲減細辛加射干連翹枳殼牛膝貝母微溫飲之而安口舌兼痧口舌有痰適因感觸犯痧痧證雖發在後治之刻不容緩即使口舌證凶痧脹較之尤急切勿先治口舌而後刺放痧脹以致有死生反掌之虞治驗曾治徐四可患重舌苦不可言連更數醫不應促騎求救按之左寸沉細右關無力據證宜補據脈宜涼余知其有痧令放腿灣痧筋十三針出紫黑毒血乃與清涼之味加川連吹用引涎之藥多加冰片藥以溫涼服之調理五日而痊耳痛痧耳孔甚微腫痛最苦若兼痧脹其勢必甚治法宜以痧為急而耳痛亦易奏效焉治驗曾治萬鶴鳴右耳腫痛日夜不安診之脈微而緊放腿灣痧十三針出紫黑血甚多乃服清涼至寶飲減細辛加射干連翹枳殼牛膝貝母微溫飲之而安小兒夜啼痧治驗曾治鄰右徐盈科二女周歲時將夜半忽然啼哭不止余意必胸腹疼痛恐其是痧令伊母用刷子蘸香油刮之痧起不藥而安又治胡怡泰子二歲時更深啼哭黎明不止延余視之腿灣有痧筋現放一針出紫黑毒血乃與防風勝金湯倍加麥芽稍冷飲之而安驚風兼痧小兒患痧類於驚風用藥定驚而驚更甚余常審此證候稍雜細閲之有痧筋即以痧治而安治驗曾治莊以恭次子發熱面赤痰涎如鋸兩目上視昏迷之極諸醫不應余在興邑回寓診之脈數急甚乃與圓紅散稍冷飲之然後刮痧痧起用和脾宣化飲研細辛大黃丸微冷飲之而愈筋骨疼痛兼痧筋骨疼痛多致延蔓終身治之細審或風或濕或氣阻血凝或流痰流火然治之有效有不效此必為暗痧相纏也辨證者宜留意焉治驗曾治梁爾章筋骨疼痛臥床一載諸醫不應延豫診之右脈微弦左脈沉細視腿灣痧筋放之俟紫黑毒血流盡乃與圓紅散微溫飲之繼與蒲黃飲加五靈脂天丁溫服四劑而愈癇證兼痧癇固疾也患者防跌水火岩坎否往往有永壽者治惟疏風消痰清熱或溫補下元世人鮮有知其兼痧者臨證宜詳辨之右陶治盛昭元次子患豬癇風六載其脈浮緊而數閲痧筋放之脈乃平即以沉香滾痰丸微溫湯飲之遂果不發治驗曾治徐知州妾犯羊癇風七載矣已生二子諸醫不應延余診之六脈緊伏不勻視其手臂兩側少陽穴有痧筋現放之乃與沉香滾痰丸微溫湯飲之遂不再發痧證變吐衄亡血痧毒衝心則昏迷沖肺則氣喘痰湧甚則鼻衄痧毒入肝則胸脅疼痛入大腸則便血入膀胱則尿血此等證治宜先清痧毒之氣順其所出之路則氣順而血和矣設不知此緊痧變在頃刻慢則變成勞弱或便血溺血難愈右陶治周瑞亭子六歲大便紅令其放痧服散血消瘀之劑而痊又治潘國安患鼻衄泄瀉兼痧令伊服清涼至寶飲而痊小兒痘前兼痧痘本先天因時而發必由外感痧脹亦因時疫所感而胎元之毒因感即發凡痘未見點之時遇痧必心胸煩悶痰涎壅阻昏迷沉重此其候也若疑似難明看痧筋可辨是痧即刺放毒血而後用清理則痧自退而痘自起矣若痘點既現觸穢痘隱者痘科自悉茲不多贅右陶治夏子亮次子蒲月發熱痰喘氣急四肢戰動兩目無神口熱如爐面有隱隱紅紫細點視腿灣有青紫筋兩條乃曰兩目無神四肢戰動痘之候也口熱如爐面色紅紫痘之熱也隱隱微點痘之形也但痰喘氣急腿灣有青筋兩條必痘兼痧而發治宜先治其痧後發其痘則痘自起用針刺出毒血隨用荊防連翹紅花青皮桔梗枳殼山楂萊蔔子一劑微冷飲之其痘即發至十五日而安痘後兼痧痘後中氣大虛有感必傷尤貴保護常見痘後收靨脫痂安然無恙一遇暑熱所侵或穢惡所觸即成痧脹往往有忽然生變人多認為熱毒痘後移害痘科不識亦以為貿貿然竟不知痧之為害也右陶治胡丹子七歲出痘脫痂光潔飲食如常行動如故已二十五日忽然喊叫不已發暈欲死人皆以為痘後餘毒診之六脈俱微細而伏乃曰痘後餘毒脈當沉緊有力今微細而伏若此脈證不合視其痧筋歷歷可指刺出紫黑毒血不應乃與荊芥金銀花湯合和脾宣化飲稍冷飲之而蘇後小腹痛變為痢疾用當歸五錢楂肉二錢酒軍二錢入童便微溫飲之稍安仍用前藥去酒軍四劑而愈胎前兼痧胎前痧毒攻胎可畏者胎孕絞痛宜防隕命況痧有毒血攻衝胎中胎孩嫩極難於安靜安胎宜歸朮陳砂痧所大禁痧脹宜破氣破血胎孕又忌余常刮放不應活血用紅花兩寶丹參益母草真桑寄生消瘀而不損胎元順氣用香附陳皮朴砂烏藥行氣而不傷胎氣散痧用荊防獨活細辛透竅而不動胎氣消食用曲麥楂肉萊蔔寬中而不伐胎性採擇穩當用最神奇皆從寤寐神遊中得來若痧毒勢盛權宜用克伐一二味又恐於胎有害余故反復躊躇而不敢輕任也高明酌之治驗曾治俞光鬥之妻孕娠七月悶亂不安寒熱交作延余至時兼痧已發脈尚未現用藥不應更漸昏沉如癡如醉明早復脈左脈俱伏面色微黑方知其有痧也令視其腿灣果有青筋刺六針出紫黑毒血稍安乃與真桑寄生紅花益母草荊防吳曲萊蔔子煎湯沖砂仁末調冷服之繼與小柴胡湯用黃芩退少陽之腑熱加茯苓歸地以健脾養血而安産後兼痧産後用藥必須溫暖痧脹用藥獨喜清涼斯二證相反也施治之法毋執産後亦毋執痧證惟調劑得宜斯可耳余制一法散痧用獨活細辛破血用紅花桃仁順氣用香附烏藥陳皮解毒用紫花地丁消食用曲麥山楂如産後利用薑灰肉桂溫血痧證大禁痧利荊防散痧連翹薄荷清熱産後不宜況痧脹急尤重大黃枳實檳榔以通積滯産後又禁恐傷氣分産後服藥宜溫痧脹宜冷痧誤用溫脹更加脹産後用冷瘀漸加瘀余臨證惟取微溫之氣毋害産後亦毋助痧禍痧若凶危微溫之劑難於制之重加童便消瘀清熱方保兩全同志者委曲調護周旋其術以救人誠能仰體上帝好生之心而亦自求多福之階也治驗曾治貢生梁爾常之側室産後七日周身疼痛寒熱往來昏沉之極診其六脈乍隱乍現視其中指無名指稍黑方知兼痧也刺二指各三針出紫黑毒血臂灣一針舌底一針痧退用歸朮地芍加桃仁山楂益母草四劑寒熱乃退調補月餘而元氣康復倒經痧經信來時適遇痧發阻經逆行或吐衄或腫脹臥難轉側是也肚腹不痛亦為暗痧若痧毒攻壞臟腑者不治婦人隱疾痧婦人隱疾多有兼痧最難認識惟在審脈倘脈不合更當祕問其夫方知病情庶不致誤耳治驗曾治俞清庭室人血淋半載矣頭面手足俱腫診之六脈洪大緊盛熱已極矣因何頭面手足俱腫殆非痧乎令其家老成人放痧筋二十餘針乃用解毒之劑而腫痛俱消繼用補中益氣湯六味地黃丸調理而愈瘧痢兼痧夏傷於暑秋必瘧痢痢疾初發必先泄瀉腸胃空虛虛則易於感觸穢惡之氣時行疫痢感觸腸胃均致痧痛痢不兼痧積去而痊若一兼痧勢必絞痛異常只治其痢藥必無效余必先治其痧兼治其積則痧消而積易去積去而痧可清矣易曰神而明之存乎其人洵不誣耳至於瘧疾為害尚屬纏綿若一兼痧更見凶迫即令慢痧不知治法難於奏功設遇緊痧危亡立至矣知瘧有兼痧之害可不細心審究哉治驗曾治雷洪興痢血日數十次腹中絞痛嘔噦不食診之六脈或遲或數或時歇指余曰此秋痢兼痧也恐防危殆乃放痧時許其痛略鬆煎砂仁湯送阿魏丸稍冷飲之繼與當歸楂肉紅花枳實赤芍澤蘭青皮檳榔萊蔔子加酒軍二錢沖童便一鍾稍冷飲二劑痢轉鶩溏而無紅諸證悉退重用參耆苓朮芡實苡米炮薑建蓮米懷山藥以兜澀大腸而愈曾治張天全室人季秋患瘧發熱痰嗽煩悶口渴診之左三部微澀數甚余曰此瘧兼痧之證即放痧十二針服散痧順氣活血解毒不應明日又復放痧脈始弦緊仍與前藥諸證頓退繼服柴胡雙解散四劑瘧愈止用消痰順氣藥沖童便服四劑而痰嗽如失吐蛔瀉蛔蛔結兼痧痧毒入胃胃必熱脹蛔不能留因上湧乘吐而出或蛔結腹痛不大便或痧脹而蛔入大腸由大便出或痧毒攻胃而蛔死入大腸與宿糞相結腹中大痛名曰蛔結與傷寒吐蛔不同治宜清其痧毒為主治驗曾治蔣東升次子心疼發熱口吐涎沫吐蛔數條診之右關沉細而緊餘脈洪數刺腿痧筋二針微有紫黑血出乃與連翹薄荷飲四劑痧退而仍寒熱往來乃與小柴胡湯三劑而熱退身安曾治汪多士長子七歲痧發痛極頭汗如雨診之脈芤洪數放痧不出刮亦不起乃與細辛大黃丸微冷服又用荊芥防風湯稍冷飲之明日痧筋自現放之血流如注仍服前藥加大黃下死蛔數條結糞隨下其痛不止痧筋復現又復放之仍服前藥二劑而愈痧變腫毒痧毒不盡留滯肌肉腠理之內積成腫毒宜先刮放用散痧解毒之藥以絶其根然後審其毒之所發分十二經絡臟腑陰陽表裡寒熱而施治輕則消而重則托虛則補而實則瀉腫者屬陽宜忍冬湯加引經藥治之白色不紅平腫不起者屬陰用參歸化毒湯加引經藥托之毒有半陰半陽用活絡透毒飲加引經藥透之穿破之後用神仙太乙膏貼之若腫毒無膿只有毒水流出或膿少血多用飛龍奪命丹研末些子填太乙膏中貼上拔去毒水膿血後單用太乙膏貼之毒口難收用紅肉散擦上肉黑者用伐刀散以棉花絮微摻之即變紅色貼膏自愈右陶治薑云衢遍身疼痛背發一毒黑爛痛苦診之脈沉微指頭黑色而惡熱飲此痧變惡毒用冷圍藥而成背疽也令去其圍藥放痧訖俟痧氣已絶根用參耆薑桂熟附子溫托之外敷以代刀散黑變紅色貼太乙膏而痊治驗曾治曾榮先暑月吐瀉腹中絞痛余令刮痧其痛即止但兩臂紅腫而癢遂與香薷飲服之一劑而腫消矣羊毛瘟痧豫友自北歸云及北人胸前生白羊毛治法用大青銅錢置患所以陳艾絨放錢上用細捻子燒之即將瓦罐或竹罐盒之立時收出汗水而愈又一法用手推臂上二筋撮起掐緊一時許揪之數次亦能治痧痛此二法甚為簡便可為窮鄉僻壤無藥治療者廣生一路焉掐音恰用兩指掐住余出遊轎伕發痧昏暈欲死正倉卒無藥忽來一老翁告曰可即透取煙油如豆大放舌下捧田水飲之余然其言而依其法翁又曰此法不特治痧猶能治毒蛇咬傷以煙管燒熱滴油擦患處立效後余試用果驗少頃轎伕起曰真靈丹也我病去如失翁忽不見慧疑仙也望空拜謝轎伕遂能抬豫回家小兒痧脹夫痧有陰陽之辨陰痧腹痛則手足冷陽痧腹痛則四肢溫又有似寒非寒似熱非熱四肢懶動不思飲食或因水驚激或感冒風寒宜用青布蘸熱水搭膊將苧麻線頻頻刮之候紫紅色出為度甚者將兩手自臂捋下令血聚指頭用銀針輕輕刺十指背近爪甲一分處或視其身背有紅點以燈草蘸香油燃灸之開通腠理使寒邪易散血氣流通其病自愈火龍丹明雄焰硝等分共研極細磁瓶收貯治小兒心腹腰背痧痛及一切患痧痛每用銀針挑少許點大眼角內男左女右附小兒撮口噤風臍風三證名異受病則同余於幼科雖未專習而閲歷亦多余每見小兒初生患此三證不數日而夭亡者比比皆然慧深憫之乃考其因撮口者舌強唇青啼聲不出齒齦上有小泡子似粟米狀急用溫水蘸熟青布裹指輕輕擦破口開便安甚者用真牛黃苦竹瀝調勻滴入口中神妙之極噤風者口噤不開啼聲漸小舌上聚肉如粟米狀吮乳不得上齶必有點子以指甲輕輕刮破即服定命散不應用生南星末和龍腦紫蘇葉一張入生薑汁蘸指上擦大牙齦其口立開臍風者多因斷臍時因風濕所乘或胎元有熱毒兒一下地即視其臍若直若硬者定有臍風由臍發出青筋一道兩岔行至心者必死一見青筋初發即用燈心蘸香油燃點焠青筋頭並岔行盡處焠之以截住不致攻心外灸中脘三壯內服萬億丸二三粒以泄胎毒也定命散治噤口風用蟬退十四個去嘴足全蠍十四枚酒洗焙去毒入輕粉少許為末和乳汁入碗中加百沸湯溫服一治撮口臍風用連根鬚生蔥搗汁和直殭蠶三個細末調乳塗母乳頭令兒吮之灌之亦可又方用生地生薑蔥白卜子田螺肉等分入麝香五釐共搗塗臍四圍抱住一時許有屁下屎尿而愈治驗曾治余甥喻觀佑患臍風每痛即啼哭不止將近百日醫治罔效適餘外歸妹求救療視之脫證已具用乳沒廣香為末調乳灌之外用連須蔥子一握搗爛焙熱包臍少頃二便俱下痛去如失能治盤腸痧脹要方纂防風散痧湯痧有因於風者此方為主防風陳皮細辛兩寶荊芥枳殼頭面腫加薄荷甘菊腹脹加腹毛厚朴手足腫加牛膝靈仙倍兩寶煩熱加連翹知母痰多加貝母蔞仁寒熱加柴首獨活吐不止加童便小腹痛加青皮血滯加茜草丹參咽痛加射干豆根食積腹痛加山楂卜子心痛加元胡蓬朮赤痢加檳榔口渴加花粉面黑血瘀也加紅花蘇木放痧不出倍荊芥細辛加蘇木桃仁穢觸加藿香薄荷水二鍾煎七分稍冷服以下諸方俱同此法煎服荊芥穗湯痧有鬱氣不通此方為主荊芥防風各一錢川芎三分陳皮青皮連翹各八分食不消加山楂卜子心煩熱加山梔去川芎有積加檳榔痰多加貝母白芥子氣壅加烏藥香附血壅加桃仁紅花鬱悶加細辛食積加三稜莪朮大便不通加枳實大黃暑熱加油朴香薷小便不通加澤瀉木通喉痛去川芎加薄荷射干大力子咳嗽加桑皮馬兜鈴陳皮厚朴湯痧有因於氣阻者此方為主陳皮厚朴山藥烏藥青皮痰多加白芥子川貝母痧筋不現加細辛荊芥穗血瘀加桃仁紅花香附元胡索頭汗加枳實大黃口渴加薄荷天花粉寶花散此方治痧之仙劑鬱金痧毒攻心非鬱金不能奏奇功薑黃破滯氣惡血不能代鬱金細辛三分降香三錢芥穗四錢四共為末每服三錢清水調冷服救苦丹治痧氣鬱悶之劑枳實卜子各一錢鬱金二錢烏藥連翹各八分共為細末清茶調冷服三香散治過飲冷水痧不愈者木香沉香檀香各等分共為極細末每服五分砂仁湯調冷服以砂仁末泡開水即砂仁湯是也三香丸於前散中加靈脂砂仁各六錢萊蔔八錢共末水打為丸微溫白湯送下化毒丹治痧氣壅盛金銀花蘇薄荷北細辛大枳殼川貝母共為末每服六分約用冷茶下之沉香郁金散治痧氣寒凝之劑沉香鬱金木香各一錢烏藥降香各三錢細辛五錢共為細末每服三分砂仁湯稍冷服紅花湯治血痰之劑紅花蒲黃青皮各一錢川貝香附各五分枳殼一錢清涼至寶飲治熱痧之妙劑薄荷骨皮丹皮黑梔元參花粉細辛各等分防風勝金湯痧有因於血積血滯者此方為主防風烏藥元胡桔梗枳殼各七分檳榔兩寶山楂連翹赤芍各一錢萊蔔二錢稜術湯痧有因於食積者此方為主三稜莪朮卜子青皮烏藥檳榔枳實各一錢藿香湯痧有因於穢氣者此方為主藿香香附枳殼山楂連翹各一錢薄荷六分冰硼散治咽喉腫痛痧真硼砂天竹黃二錢淨硃砂二分真洋片元胡粉各一分共細末磁瓶收貯每用吹喉牛黃丸治痧涎喘急膽南星天竹黃各三錢淨明雄淨硃砂水飛漂各五分真牛黃官麝香各四分共末甘草水為丸梧子大每服二丸淡生薑湯稍冷下細辛大黃丸治痧大便乾結氣血不通煩悶壅盛沉迷者細辛大黃厚朴枳實麻仁青皮桃仁去皮尖共等分為末水丸每服一錢重者二三錢淡薑湯稍冷下和脾宣化飲治痧氣食積胸中飽悶腹內絞痛廣皮細辛卜子前胡腹毛麥芽各一錢外用楂肉二兩煎水後入前六味煎好稍冷飲之沉香阿魏丸治痧氣壅血阻昏迷不醒周身沉重不能轉側真阿魏一錢紫蔻仁五錢五靈脂廣皮各一兩青皮薑黃蓬朮三稜各七錢枳實六錢木香三錢烏藥五錢天仙子七錢真沉香三錢水打丸緑豆大每服三十丸稍冷湯下蒲黃飲治痧毒散瘀引火下行之劑牛膝三錢獨活枳殼連翹桃仁澤蘭赤芍楂肉薑黃蒲黃各一錢水煎微溫服烏藥順氣湯治痧氣內攻之劑三稜莪朮卜子白芥元胡各一錢枳殼青皮烏藥各八分紅花香附各七分水煎稍冷服必勝湯痧有因於血實者此方為主紅花香附各五分桃仁去皮尖大黃貝母青皮赤芍山楂靈脂各一錢紫朴湯痧有食氣壅盛者此方為主紫朴山楂卜子三稜莪朮枳實連翹青皮陳皮細辛射干兜鈴湯治痧似傷風咳嗽射干桑皮兜鈴桔梗薄荷元參花粉貝母枳殼甘菊兩寶嗽甚沖童便微冷服如聖散治痧咽喉腫痛牛蒡子蘇梗甘菊兩寶蘇薄荷連翹各一錢桔梗烏藥各八分川貝母枳殼各一錢水煎微溫湯沖童便服消疳解毒散治痧後牙疳人中白兒茶硼砂花粉老川連薄荷甘草青黛雨前茶冰片牛黃珍珠研細末以無聲為度先用濃茶拭淨去其腐肉然後吹敷患處阿魏丸治食滯壅阻痧毒氣滯血凝疼痛難忍頭面黑手足俱腫胸腹脹悶元胡蘇木靈脂卜子各一兩真阿魏二錢降真香真沉香各三錢天仙子一兩香附子四錢油厚朴檳榔薑黃各七錢烏藥五錢三稜莪朮各七錢廣皮五錢枳實七錢水打丸緑豆大每服十五丸砂仁湯稍冷下木通湯治痧毒結於膀胱牛膝三錢丹皮細辛連翹兩寶澤蘭白芨蒲黃元胡木通各一錢水煎加童便微溫服探吐法治痧有新食吐去之以解痧毒必須多飲乃吐並列二方於下食鹽一塊燒去滷水用水煮化嘗其味淡俟溫冷扶病者灌下三飲而三吐之名淡鹽湯白礬一塊用滾水泡水稍冷服即名礬湯沉香丸治痧氣急胸腹脹痛迷悶昏沉天仙子即大蓼子三稜蓬朮廣皮各六錢真沉香檳榔各五錢卜子枳實油厚朴各七錢白蔻烏藥各四錢廣香三錢薑黃末五錢水打丸緑豆大每服三十丸砂仁湯稍冷下圓紅散治痧血鬱不散北細辛四錢沒藥去油桃仁去皮尖元胡各三錢白蒺藜一兩降香四錢共為末每服一錢紫荊皮湯溫服忍冬解毒湯治痧後餘毒竊發者以此消之牛蒡子兩寶甘菊紅花川貝母芥穗甘草木通紫花地丁連翹等分胡桃一個水煎溫服參歸化毒湯治痧後餘毒流連氣血虛不能速潰以此化毒托出之人參當歸黃耆甘草兩寶牛膝紅花貝母楂肉天丁白芷等分胡桃一個水煎溫服活絡透毒飲治痧後熱毒流連餘毒在所不免以此湯預活之羌活紅花芥穗木通牛蒡子當歸川牛膝蟬蛻青皮連翹等分水煎溫服參苓歸術散治痧氣已絶氣血虛弱者人參黃耆白朮當歸川芎白芍熟地茯苓陳皮炙草水煎空心溫服奏凱和解飲痧退調理和解者此湯主之兩寶貝母山藥楂肉白扁豆荊芥穗各一錢官揀參四分當歸一錢甘草四分胡桃一枚蓮肉六粒水煎溫服一方用河水井水各半同服治痧痛一方用黃泥漿水服之治痧痛一方用白糖攪梅水服之治痧痛一方用北細辛為末調砂仁湯冷服治痧痛一方用晚蠶砂為末調開水冷服治痧痛已上五方用之神效然必無食積阻滯者乃可斷痧丸治數患痧脹必俟痧氣已愈然後可服此丸以絶其根否則痧氣稍有未除切不可服恐甘者作脹熱者助邪不惟無益而反害之甘草明礬食鹽各一兩川烏二錢乾薑三錢共為極細末米飯碾為丸每服五分白溫湯下凡新患痧者服此藥一二次即愈久犯痧者十服痊愈永不再發蓋用甘草以助胃薑烏以充胃礬以解毒鹽以斷痧誠良劑也但薑烏性熱故每服只五分惟取能斷痧根焉耳若虛寒之人必多服方效崇正辨訛醫案緒言大哉醫道之難知也甚哉醫道之不可以不深知也庚戌之春豫以病軀辭館遊南嶽露宿風餐愈形困憊因此益飄然有世外想欲訪道德之士而師事之而養生而延年焉行有日矣至一云岩松枝拂帽桃芯流霞更數武見一石扉上題仙鵝洞三字叩關而入遇一道士羽衣翩躚儼似神仙中人豫拱而立言論久之願執弟子禮道士曰居吾語子父母俱存胤子尚幼此道安可為也觀子骨秀神清語言雋雅乃仕路中人但形骸羸弱既無心榮貴盍學為良醫保身活人則養生延年即在於是豫曰然則高士知醫乎哉曰難言也世之淺於醫者徒記藥性湯頭簡捷歌括一切無方之書全不考究而一切有方之書奉為靈寶偶試而效遂而自長豈知醫學淵源名賢著作之富哉夫醫近於儒靈素諸書儒之五經也傷寒論説儒之四書也張劉李朱之典籍周程朱張之注疏也二者皆貴乎精研之未有不精研而能條對詳明臨文制勝之儒者亦未有不精研而能分經辨證見病知源之醫者吾勸子學醫吾即授子以學醫之玉尺也特恐持此以量天下士難存什一於千百耳余聞言如夢初覺始嘆前此之日就診視而與參苓為伍者均無當於法也揖別後博覽方書貿易遍遊足迹幾半天下而訪遇醫士類皆一表堂堂高車駟馬即叩其中藏或執有據之論而病情全不相符或興無本之言而醫理何曾夢見左支右吾漫無實際因信道士之言不謬而愈信醫道為難知丁巳初夏武昌遊仙館得謁黃超凡先生見其言論丰采迥邁時流知為夙學其臨證也則曰病在何經主用何藥有一定不移之見其論古也則曰孰當於理孰悖於道有卓然至正之規豫心焉折之操贄就業先生出馳遠集注以示豫閲至少陽頭痛在兩側之語遂掩卷曰世書咸繪少陽穴為太陽矣先生今辨訛雖確而指示則尚未明也豫閲至此而生疑得毋有閲至此而亦如我之生疑者乎何如分經繪圖注明脈穴使人一見而瞭然乎師曰馳遠先生非見不及此特著書難於周詳留待親傳口授耳子既有見地留心精習他日可作補遺遂於館中步月樓獨居二載課讀録寫者數十餘部繪圖摘要者滿案盈箱師見而訝曰子誠非無恆人醫道洵可作也吾弗逮子也遠矣豫領吾師之命益存濟世之心覽古凝神臨證加意不偏執己見不阿徇古人迄今三十六年而成此書非敢出而問世聊欲共證將來首編六經傷寒示醫門之領要臨證之首務也中之先天後天示治療之根本也繼之以吐血證治示豫之所心得也又繼之以婦科雜治示醫學之宜研搜博考也雖然微道士之言豫烏知醫之難哉微吾師之訓豫烏能精心於醫哉癸巳小陽梨棗告峻謹志顛末以質同人有堂齊秉慧書於課易草堂時年七十病家十戒一戒節色欲世人驕恣慆淫常近女色不自保護及至有病徒乞靈於草木尚不能堅力以遠房幃惟持智慧劍者防之極嚴以理制欲心如稿木死灰直視四大假合則心以清而腎以寧未病者終不病已病者可無病耳語云服補劑十朝不如獨眠一宵又大中丞享高壽者自謂平生惟服獨睡丸豫故讀詩至真精送與粉骷髏卻向人間鑠秋石之句而不禁為世之不善守身者三嘆也一戒信醫不專蓋醫之工拙審擇在於平時苟至臨證猶疑信相參旦暮更醫藥力未行前方又換不惟無益而反害之又且有病家親朋偏論是非或舉薦醫或自獻方攻補妄投毫不中病豈不戕生一戒不節飲食蓋病中好食煿炙醉飽自耽即日服參茸終屬無效惟淡泊清芬以調養脾胃始能助藥力以成功一戒信巫不信醫若妄事殺牲祈禱干瀆神靈書曰自作孽不可活可立待也慧歷年來惟見力行善果叩許即送太上感應篇文昌帝君陰騭文關聖帝君覺世真經或聖訓合編丹桂籍諸書量力勉為者每每病有轉機藥能奏效蓋惟以善補過乃能仰邀庇佑云一戒不能安命怨天尤人橫生懊惱須知疾苦顛連夙業所致惟歡喜領受自然服藥有益可保長年一戒治療失時或艱於服藥或過於惜錢怠緩因循日復一日及至大勢已去始俯首乞憐雖有善者亦終無如之何也一戒心性務宜和平不可動怒蓋怒則傷肝病愈難治須知祛病延年第一妙法惟尋花鳥以抒情對魚蝦而悅性或覓良朋益友講開懷出世之談庶幾心曠神怡日服藥餌而日有生機也一戒專心服藥屏去雜念凡人患病酒色財氣各有所因知其所因即當畏如狼虎苟復營營心中致使神明內亂則病必加劇終亦必亡而已矣一戒起居不慎蓋病中春夏宜早起以養陽秋冬宜晏眠以養陰苟不善保養致為風寒所侵神昏擾亂又遇粗工表裡不分糊亂雜投釀成壞證斯時欲補益不得欲表散不能雖明醫值此亦大費躊躇矣一戒輕身重財遇病來時但索簡便方頭妄自加減價貴之品置而不用濫惡之材隨便煎服此非愛命之君子也病之輕者必重重者必致死矣冤哉冤哉是書以十勸首欲醫士之為良醫也以十戒終欲病家之為明人也明人不遇良醫固無以療其病良醫不遇明人幾無以展其術醫士病家實兩相需而兩相成者也慧故於是篇之始末諄諄告誡均為三致意焉
