body:
  text: 卷三先天圖命門左邊小黑圈是真水之穴右邊小白圈是相火之穴此一水一火俱屬無形日夜潛行不息息則無生矣圖略先天圖説嘗觀內經注文以心為主愚謂人身別有一主非心也心為君主之官當與十二官平等不得獨尊若以心之官為主則六經圖説中主不明則十二官危危當云十一官矣何注內經者昧此耶蓋人之軀殼皮袋猶之暗室心在軀殼中猶人之在暗室若無一點燈光雖至靈動者亦蠢然無用倀倀乎其何之所謂終夜有求於幽室之中非燭何見也惟一燈才照機巧運動便爾自如可見主者非心而真宰之陽光乃主也其不明則危之義即息則無主之義也此主也氣血之根生死之關十二經之綱維此理含糊未經道破業醫而不知此醫云乎哉又一日遇一高僧問之曰心即是佛然則佛在胸中也曰非也在胸中是一團肉塊心有一真如心是佛又問曰真如心有何形狀曰無形又問此在何處安寄曰想在下邊余曰此可幾於道矣因與談內經諸書及銅人圖豁然超悟唯唯而退今將六經真陰真陽一一申示俾學者潛玩深思據有形之中以求無形之妙自得之矣特撰先天一圖十二官載於六經圖説中及復查考則醫學之真傳有由而仙佛之微燈不絶其所謂靈光也舍利也嬰兒也元神也玄牝也空中也浩然也太極也同此一火而已為仙為佛延年養生不過克全此火而歸之耳區區茲論闡千古之未明後之君子慎勿以為迂趙氏曰余考古銅人圖畫一形象而人身太極之妙顯然可見豈好事哉余不得已也試即命門言之命門在人身之中對臍附脊骨自上數下則為十四椎自下數上則為七椎內經曰七節之旁有小心此處兩腎所寄形似太極左邊一腎屬陰水右邊一腎屬陽水各開一寸五分中間所居之宮即太極圖中之白圈也其右旁一小白竅即相火也其左旁之小黑竅即天一之真水也此一水一火俱屬無形之氣相火稟命於命門真水又隨相火自寅至申行陽二十五度自酉至醜行陰二十五度日夜周流於五臟六腑之間滯則病息則死矣凡人有生之時男女交媾之時先有火會而後精聚故曰火在水之先人生先生命門火此褚齊賢之言也發前人之所未發諸書皆謂父精母血非也男女俱以火為先男女俱有精但男子陽精中有陰以火為主女子陰精中有陽以精為主謂陰精陽氣則可謂男女合此二氣交聚然後成形成形俱屬後天矣後天百骸俱備若無一點先天火氣盡屬死灰矣故曰主不明則十二官危豫有譬焉譬之元宵鰲山走馬燈拜者舞者飛者走者無一不具其中間惟是一火耳火旺則動速火微則動緩火息則寂然不動而拜者舞者飛者走者軀殼未嘗不存也故曰汝身非汝所有是天地之委形也豫所以諄諄必欲明此理者欲世之養生者治病者的以命門之火氣為君主有火方有氣無火則氣斷矣故人身中以氣為至貴至寶何世之養身者不知節欲而日夜戕賊此火即病矣不知溫養此火而直用寒涼以日滅此火焉望其有生氣耶故曰主不明則十二官危此之謂也夫先天腎中有陽水有陰水有火中之水有土中之水有金中之水有木中之水陽水者坎水也氣也陳希夷論曰坎以一陽陷於二陰水氣潛行地中為萬物受命根本蓋潤液也氣之液也月令於仲秋云殺氣浸盛陽氣日衰水始涸是水之涸地之死也於仲冬雲水泉動是月一陽生是水之動地之生也謂之火中之水可也謂之土中之水可也陰水者兌澤也形也一陰上徹於二陽之上以有形之水普施萬物下降為資生之利澤在上即可為雨露之水在下即可為大溪之水人之飲食入胃命門之火蒸腐水穀水穀之氣上薰於肺肺通百脈水精四布五經並行上達皮毛為汗為涕為唾為津下濡膀胱為便為液至於血亦水也以隨相火而行故其色獨紅周而復始滾滾不竭在其上則可為天河水在下則可為長流水始於西北天門終於東南地戶正所謂黃河之水天上來奔流到海不復回故黃河海水皆同色也金中之水礦中之水水銀是也在人身中為骨中之髓至精至貴人之寶也木中水者巽木入於坎水而上出其水即木中之脂膏人身足下有湧泉穴肩上有肩井穴此暗水潛行之道凡津液潤布於皮膚之內者皆井泉水也夫水有如許之不同總之歸於大海天地之水以海為宗人身中之水以腎為源而其所以能晝夜不息者以其有一元之乾氣為太極耳此水中之五行也明此水火之五行而土木金可例推矣夫火有陽火有陰火有水中之火有土中之火有金中之火有木中之火陽火者天上日月之火生於寅而死於酉陰火者燈燭之火生於酉而死於寅此對待之火也水中火者霹靂火也即龍雷之火無形而有聲不焚草木得雨而益熾見於季春而伏於季秋原夫龍雷之見者以五月一陰生水底冷而天上熱龍為陽物故隨陽而上升至冬至一陽來復故龍亦隨陽下伏雷亦收聲人身腎中之相火亦猶是也平日不能節欲以致命門火衰腎中陰盛龍火無藏身之位故遊於上而不歸是以上焦煩熱咳嗽等證善治者以溫腎之藥從其性而引之歸原使行秋冬陽伏之令而龍歸大海此至理也奈何今之醫陰虛火衰者以黃柏知母為君而愈寒其腎益速其斃良可悲哉若有陰虛火旺者此腎水乾枯而火偏盛宜補水以配火亦不宜用苦寒之品以滅火壯水之主以鎮陽光正謂此也如燈燭火亦陰火也須以膏油養之不得雜以一滴寒水得水即滅矣獨有天上火入於人身如河間所論六氣暑熱之病及傷暑中暑之疾可以涼水沃之可以苦寒解之其餘爐中火者乃灰土中無焰之火得木則煙見濕則滅須以炭培實以溫燼人身脾土中火以甘溫養其火而火自退經曰勞者溫之損者溫之甘能除大熱溫能除大熱此之謂也空中之火附於木中以常有坎水滋養故火不外見惟乾柴生火燎原不可止遏力窮方止人身肝火內熾鬱悶煩躁須以辛涼之品發達之經曰木鬱則達之火鬱則發之使之得遂其炎上之性若以寒藥下之則愈郁矣熱藥投之則愈熾矣金中火者凡山中有金銀之礦或五金埋瘞之處夜必有火光此金鬱土中而不得越故有光輝發見於外人身皮毛空竅中自覺如針刺蚊咬及顛頂如火炎者此肺金氣虛火乘虛而現肺主皮毛經曰東方木實因西方金虛也補北方之水即所以瀉南方之火雖曰治金中之火而通治五行之火無餘蘊矣經曰紀於水火餘氣可知腎中真陽乃奉化生身之主內則賴以腐化水穀鼓運機神外則用之溫肌壯表流通營衛耳目得之而視聽手足得之而持行所以為人身之至寶也然而稟受原有不同其中陰陽不無偏勝陽過亢者常宜養陰濟陽陰過旺者更當助陽御陰喻嘉言曰腎中真陽得水以濟之留戀不脫得土以堤之蟄藏不露而手足之陽為之役使流走周身固護腠理而捍衛於衛胸中之陽法曰之馭離照當空消陰除曀而宣布於上脾中之陽法天之健消化飲食傳布精液而運行於內此三者後天之陽豐亨有象而先天真陽安享大寧惟在外在上在中之陽衰微不振陰氣乃始有權或浮冷不溫衛外之陽不用矣或當膺阻礙胸中之陽不用矣或飲食不化脾中之陽不用矣斯時腎中真陽不能安於內而亡於外也於是肌膚得陽而汗燥頭面得陽而戴赤脾胃得陽而除中即不中寒其能久乎嘉言此論開天闢地亙古今之未有也令人讀之千遍不厭先賢往往重在養陰清火亦時勢不同也常見前輩長者陽旺多壽如黃耆白朮概不可用亦必不可用後人漸見陽虛而服芩連者亦漸少近時稟賦又大不同凡病未有能外太少二陰者縱或兼見三陽亦不免里重於表用藥總以耆朮附桂為主而服涼藥者百中難逢一二然而學者亦不當專以時勢為主蓋非至正變通之道也務必陰陽虛實諸法俱備方稱醫手夫仲景六經傷寒其中發表攻裡驅陰回陽與夫清燥瀉火諸法條分縷晰至詳且盡未嘗偏廢今之淺於醫者不知分經辨證始則亂表曰寧可過表不可失表繼則怕火曰千虛易補一火難除籲是何言也此等無稽之談從何得來況六經原有法程病在陽明所怕是火火邪實盛足以竭陰法當急驅其陽以救其陰病在少陰所喜是熱熱尚未去陽即可回法當急驅其陰以救其陽不明其理肆謂某某喜用溫補某某喜用寒涼安知仲景之法條分縷晰分經辨證確有所據溫涼補瀉毫不容混烏容爾之喜好也耶徒形所議之庀謬耳先天要論八味地黃丸昔漢武帝病消渴張仲景為此立方藥只八味以熟地黃為君重可加至二三兩故名八味地黃湯取天一生水之源也至聖元關為萬世無窮之利後薛立齋趙養葵咸重用而珍寶之治病者善用之能治命門火衰不能生養脾土以致脾胃虛寒飲食少思大便不實或下元衰憊臍腹疼痛夜多溲尿等證方列於下干熟地八兩淮山藥四兩山萸肉四兩大粉丹三兩白茯苓三兩光澤瀉三兩紫油桂一兩去皮大附片一兩制地黃法地黃稟北方純陰之性為陰中之陰制之法非太陽烈火交相為制即煮百日終不熟也苟使一煮便熟何以固本膏用生地熟地各半制之時惟夏日秋陽氣盛暴烈用真産懷慶者以酒洗酒浸一宿柳木甑砂鍋內蒸半日取出搗爛手攤薄片盡一日曬乾再蒸再曬九次為度磁壇收固經久不壞臨用酒潤搗泥為丸或以砂鍋微火焙和諸藥磨末尤佳又云地黃非懷慶産者力薄非九蒸九曬不熟製附子法頂大附子有蓮花瓣頭圓底平者佳童便浸五七日候透揭去皮切四塊仍浸三四日用粗紙數層包之浸濕煨灰火中取出切片檢視有白星者仍用新瓦上炙熱至無星為度如急用者切薄大片銅鍋內用童便煮三四沸熱瓦上焙乾至熟用之八味丸藥能伐腎邪皆君主之藥宜加減用加減不依易老之法亦不能收效今人有加人參者人參乃是脾經之藥到不得腎經有加知母黃柏者有去澤瀉者皆不知仲景立方之本意也烏乎其可哉六味地黃丸錢氏於前方中減去桂附以治小兒故名蓋以小兒純陽也都氣丸六味丸中加五味子故名述類象形之義也加減八味丸楊氏云平人常服去附子加五味子三一腎氣丸丹溪所制獨此方不可用金匱腎氣丸仲景所制也治氣虛中滿神方益陰地黃丸治目病火衰者濟陰地黃丸治目病有火者二方見原機啓微易老云八味丸治脈耗而虛西北二方之劑也金弱木盛水少火虧或脈鼓指按之有力服之亦效何也答曰諸緊為寒火虧也為內虛水少為木勝金弱故服之亦效張仲景八味丸中用澤瀉論不過接引桂附歸就腎經王海藏韙之愚謂八味丸以地黃為君而以余藥佐之非止為補血之劑蓋兼補氣也若專為補腎而入腎經則熟地山萸茯苓丹皮皆腎經之藥固不待澤瀉之接引而後至也其附子乃右命門之藥浮中沉無所不至又為通行諸經引用之藥肉桂能補下焦相火不足是亦右腎命門藥也然則桂附亦不待夫澤瀉之接引而後至矣且澤瀉雖曰咸以瀉之乃瀉腎邪非瀉腎之本也故五苓散中用之白茯苓亦瀉腎邪之品也八味用澤瀉者非但為引經瀉邪蓋取其攻邪即以補正能養五臟益氣力起陰氣補虛損五勞之功寇氏又何疑而去之耶況澤瀉雖能瀉腎然用之大補藥中即欲瀉之而力莫能施矣其蘊妙豈冒昧所能窺毫末耶余所以諄諄於此方者蓋深知仲景為立方之祖的認此方為治腎之要毫不敢私意增減今人或以脾胃藥雜之寒涼加之皆妄逞臆見而無當於理者也水火論坎乾水也氣也即小而井大而海也兌坤水也形也即微而露大而雨也一陽陷於二陰為坎坎以水氣潛行地中為萬物受命根本故曰潤萬物者莫潤乎水一陰上徹於二陽為兌兌以有形之水普施於萬物之上為資生之利澤故曰悅萬物者莫悅乎澤明乎此二水可以悟治水之道矣心火者有形之火也相火者無形之火也無形之火內燥熱而津液枯以五行有兌水兌水制之者權也吾身自有上池真水氣也無形者也以無形之水沃無形之火當而可久者也是為真水真火升降既宜而成既濟矣醫家不悟先天太極之真體不窮無形水火之妙用而不能用六味八味之神劑者其於醫理尚欠大半陳希夷曰坎乾水也氣也一陽陷於二陰為坎坎以水氣潛行地中為萬物受命根本故曰潤萬物者莫潤乎水蓋潤液也氣之液也月令於仲秋乃云殺氣浸盛陽氣日衰水始涸是水之涸地之死也於仲冬乃云水泉動然而是月一陽生是水之動地之生也由斯而觀不過欲人脫死地而就生地凡舉動先自潛固根本以待後乃能萬應而萬舉萬勝明其理也六味丸一名地黃丸治腎虛作渴小便淋閉氣壅痰涎頭目眩暈眼花耳聾咽燥舌痛齒痛腰腿痿軟等證及腎虛發熱自汗盜汗便血諸血失音水泛為痰之聖藥血虛發熱之神劑又治腎陰虛弱津液不降敗濁為痰或治咳逆或治小便不禁能收精氣之虛脫養氣滋腎制火導水使機關利而脾土健實上為末和地黃膏如煉白蜜為丸梧子大一早空心淡鹽湯送下少時以美膳壓之使不得停留胃中直至下元以瀉沖逆也六味丸説腎虛不能制火者此方主之腎中非獨水也命門之火併焉不虛則水足以制火虛則火無所制而熱證生矣名之曰陰虛火動河間所謂腎虛則熱是也今人足心熱陰股熱腰脊痛率是此證乃咳血之漸也熟地山萸味厚者也內經曰味厚為陰中之陰故能滋少陰補腎水澤瀉味寒寒先入腎地黃澤瀉山藥皆潤物也腎惡燥喜得所潤此方所補之水系無形之水物之性潤者亦無形故用之丹皮者牡丹之根也即今之香牡丹根是丹者南方之火色牡而非牝屬陽味苦辛故入腎而斂陰益少陰平虛熱茯苓味甘而淡者也甘從土化土能防水淡能滲泄故用之以制水臟之邪且益脾胃而培萬物之母壯水之主以鎮陽光即此藥也八味丸説君子觀象於坎而知腎中具水火之道焉夫一陽居於二陰為坎此人生與天地相似也今人入房盛而陽事易舉者陰虛火動也陽事先痿者命門火衰也真水竭則隆冬不寒真火竭則盛夏不熱是方也熟地山萸茯苓澤瀉丹皮山藥皆濡潤之品所以能壯水之主肉桂附子辛溫之物能於水中補火所以益火之原水火得其養則腎氣復其天矣益火之原以消陰翳即此方也益脾胃而培萬物之母其利溥矣先天水火總論前人之論水火既詳慧再約言而切指之夫人之始生也先生腎腎有兩腎左為陰水右為陽水中間是命門之穴真陽之火居焉此火即是人之命根也火旺則精神強健火微則精神衰弱火息則無生矣心賴命門之火而神明有主能應事事肝賴命門之火而能謀慮膽賴命門之火而能決斷胃賴命門之火而能受納脾賴命門之火而能轉輸肺賴命門之火而能治節膻中賴命門之火而能喜樂大腸賴命門之火而能傳導小腸賴命門之火而能布化腎賴命門之火而能作強三焦賴命門之火而能決瀆膀胱賴命門之火而能收藏此十二官者全藉命門之火以養之也經曰勞者溫之八味地黃湯大劑與之是也而腎中真陰之水亦無一臟不一取資也腎水生肝木肝木生心火心火生胃土相火生脾土脾土生肺金肺金生腎水生生不已故能長有天命心得腎水而神明始渙發也脾得腎水而精微始化導也肺得腎水而清肅始下行也肝膽得腎水而謀慮始決斷也六腑俱賴得腎水而後可分布之也腎中無水六味地黃湯丸大劑與之肝中無水四物湯中熟地用至一兩心中無水天王補心丸中生地換熟地膻中無水歸脾湯脾胃無水六君四君肺金無水生脈散舉一而類推之可也凡人得失榮枯察色便曉有諸內者形諸外不觀之帝王之色龍文鳳彩神仙之色嶽翠山光榮華之色珠明玉潤壽耇之色柏古松蒼貧賤之色薄削垢膩疾病夭枉之色重濁晦滯枯索堊黧故五臟各有正色即以其色之呈於面者分生克黑有黃色土剋水矣紅有黑色水剋火矣黃有紅色火生土矣黑有白色金生水矣相生則生相剋則死克則救生生則制克其理一通方稱醫傑不學無術何知生克窮究六經方知用藥即如內傷諸證脾腎居多脾虛者宜用參苓耆朮砂半薑蔻等藥溫醒脾胃宣暢胸膈飲食健運諸病自愈腎虛者宜用熟地山茱附桂等藥無水者壯水之主無火者益火之原腎氣收藏元氣自復或問曰常見凡人腎中之火亦無一臟不焚燒也腎火犯心而煩躁生焉腎火犯肝而龍雷出焉腎火犯脾而津液干焉腎火犯肺而喘嗽病焉腎火犯於六腑而燥渴枯竭之證種種變生然則治之之法奈何余曰明乎哉問也夫腎中之真火起者由於腎中之真水竭也宜用六味地黃丸料加麥冬五味大劑煎飲以大補腎中之水水盛而火自潛藏何病不愈粗工不達此理誤用梔柏芩連殺人多矣故經曰知其要者一言而終也此論水火之妙用實有至理存焉學者苟能參悟而會通之醫不稱神吾未之能信也滋陰降火論補陰丸中以黃柏知母天麥門冬為佐蓋黃柏苦寒瀉水天冬寒冷損胃服之者不惟不能補水而且有損於腎故滋陰降火者乃謂滋其陰而火自降當串講不必降火也然二尺脈各有陰陽水火互相生化當於二臟中各分陰陽虛實求其所屬而平之若左尺脈虛弱而細數者是左腎之真陰不足也用六味丸右尺脈遲軟或沉細而數欲絶者是命門之相火不足也用八味丸至於兩尺微弱是陰陽俱虛用十補丸治腎經虛冷足寒膝軟即八味丸加五味子嫩鹿茸此皆滋其先天之化源實萬世無窮之利世醫之補陰者多用黃柏知母反戕脾胃多致不起不能無遺憾於世豫特表而出之以廣前人之未詳使病家醫者加意於六味八味二方云相火龍雷論火有人火有相火人火者所謂燎原之火也遇草而燔得木而爇可以濕伏可以水滅可以直折黃連之屬可以制之相火者龍火也雷火也得濕則爇遇水則燔不知其性而以水折之以濕攻之適足以光焰燭天物窮乃止識其性者以火逐之則焰灼自消炎光撲滅古人瀉火之法意蓋如此今世醫家病者多善黃柏知母治相火殊不知此相火者寄於肝腎之間此乃水中之火龍雷之火也若用黃柏苦寒之藥又是水滅濕伏龍雷之火愈熾矣龍雷之火每當濃陰驟雨之時火焰愈熾或燒燬房垣或擊碎木石其勢誠不可抗惟太陽一照火自消滅此得水則熾得火則滅之驗也夫龍雷何以春夏而啓發秋冬而歸藏蓋冬時陽氣在水土之下龍雷就其火氣而居於下夏時陰氣在下龍雷不能安其身而出於上明乎此義惟八味丸中桂附與相火同氣直入腎中以據其窟宅而招之同氣相求相火安得不引而歸原耶凡人非此火不能以有生世人皆曰降火而豫獨以地黃滋養水中之火世人皆曰滅火而豫獨以桂附溫補天真之火此千載不明之論豫更重言以引申之高明以為然否咳嗽論咳無痰而有聲嗽有痰而有聲雖分五臟六腑之殊而其要皆主於肺蓋肺為清虛之腑一物不容毫毛必咳又肺為嬌臟畏熱畏寒火刑金故咳水冷金寒亦咳故咳嗽者必責之肺而治之之法不在於肺而在於脾不專在脾而反歸重於腎蓋脾者肺之母腎者肺之子故虛者補其母虛則補其子也如外感風寒而咳嗽者今人率以麻黃紫蘇之類發散表邪謂從表而入者自表而出如果系形氣病氣俱實者一汗而愈若形氣病氣稍虛者宜以補脾為主而佐以解表之藥何以故蓋肺主皮毛惟其虛也故腠理不密風邪易入若肺不虛邪何從而入耶古人所以制參蘇飲中必有參桂枝湯中有白芍甘草敗毒散有人參解表中兼實脾固氣也脾實則肺金有養皮毛有衛已入之邪易以出後來之邪無路而入矣若專以解表則肺氣益虛而不固腠理愈疏外邪乘間而入者何時而已耶須以人參甘草黃耆以補脾兼用桂枝以驅邪此豫所謂不治肺而治脾虛則補其母之義也直指云肺出氣也腎納氣也肺為氣之主腎為氣之本凡咳嗽暴重動引百骸自覺氣從臍下逆奔而上者皆腎虛不能收氣歸元當以六味丸安腎丸主之毋徒從事於肺此虛則補其子之義也余又有説焉五行之間惟肺腎二臟母盛而子宮受邪何則肺主氣肺有熱則氣得熱而上蒸不能下生於腎而腎受邪矣腎即受邪則肺益病此又何也蓋母藏子宮子隱母胎凡人肺金之氣夜臥則歸藏於腎水之中今因肺受心火之邪欲下避於水中而腎水乾枯有火而遂無可容受之地於是復上而病愈盛矣又有火鑠肺金而咳嗽者宜清金降火今之醫書中論清金降火者以黃芩天冬麥冬桑白皮清肺金以黃連降心火以石膏降胃火以四物黃柏知母降陰火謂枳殼半夏燥泄傷陰易以貝母瓜蔞竹瀝枇杷葉以潤肺金而化痰以上治法豈不平正通達耶殊不知清金降火之理似是而非彼不知補北方正所以瀉南方也滋其陰即所以降其火也獨不觀啓玄子云壯水之主以鎮陽光乎豫於相火論及滋陰降火論中已詳言黃柏知母之不宜用與夫寒涼諸藥之害矣又王節齋云凡酒色過度損傷肺腎真陰者不可服參此言一出誤天下之蒼生去虛咳嗽者視參耆如砒毒奉知柏為靈丹致使患此證者百無一生良可悲也是病本起於房勞太過虧損真陰陰虛而火上火上而刑金故咳嗽而金受傷矣豫意先必壯水之主用六味地黃丸以補其真陰使水升而火降隨即以參苓耆術健脾救肺之品補腎之母使肺金與水相生而病易愈世醫用寒涼者膚淺庸工固不必齒間有知用參耆不知先用六味壯水以鎮火而遽投參耆以補陽反使陽火愈旺而金益受傷此豈藥之罪哉抑世醫之不識先後也有脾胃先虛土虛不能制水水泛為痰子來乘母而咳者又有初雖起於心火刑金因誤服寒涼以致脾土受傷肺益虛而咳者乃火位之下水氣承之子來救母腎水復火之仇寒水扶木勢而上侵於肺胃水冷金寒故嗽前病未除新病愈甚庸工不達此義尚謂痰火難除寒涼倍進豈不殆哉斯時也須用六君子湯加炮薑以補脾胃八味丸以補土母而引水歸原此等治法同志宜留意焉金匱云咳而上氣喉中有雞聲射干麻黃湯主之此論外感有嗽而聲啞者有金實不鳴金破亦不鳴實則清之破則補之皆治肺之事也又須知少陰之絡入肺中循喉嚨挾舌本肺為之標本虛則標弱故聲亂咽嘶舌萎聲不能前出仲景傷寒書又有一等乾咳嗽者丹溪云乾咳嗽極難治此係火鬱之證乃痰鬱其火邪在中用逍遙散以開之下用補陰之劑而瘥人參敗毒散説人參敗毒散一方藥味皆辛平升散為咳嗽門中第一神方世醫鮮有知者凡有咳嗽聲重鼻塞外感風寒內傷飲食夾食夾毒不拘男婦大小胸緊氣急咽痛口苦痰不相應即煎服此方以升散之或感冒重者服之其咳愈甚不知者以為藥不相符棄而不服殊不知正是升散之功真佳兆也再服之漸必輕減不拘劑數總以痰應聲響為度聲響痰出是其驗也若枯燥之人數劑之後略加沙參歸芍地黃麥冬之品以滋其陰無不愈者愚五十年來屢用屢效同志君子凡見咳嗽初起切勿誤用寒涼及滋陰之藥閉其肺竅為害不小必以升散為先著俟痰應之後再用麥味地黃湯以滋其陰則得之矣其方歌曰人參敗毒茯苓草枳桔柴前羌獨芎薄荷少許薑三片感冒咳嗽有奇功治驗曾治儒學王子男每至春交咳嗽即作醫用參蘇飲乃愈其後發時復用前藥不應反致喉瘖來寓請診按之右寸洪數無力余曰此乃少陰陰火刑肺金以六味丸料加麥冬五味山梔作湯與服兼服補中湯加麥味數十劑而愈咳者肺氣傷而不清故咳嗽者脾濕動而生痰故嗽雖分六氣五臟其要皆主於肺尤須知心咳者火也巳午尤甚肺咳者金也申酉尤甚腎咳者水也亥子尤甚肝咳者風也木也寅卯尤甚脾咳者土也辰戌醜未四時微咳脈式歌曰阿阿緩若春楊柳是也善治者先問是咳是嗽或是咳嗽何時咳甚即用何經之藥加入咳嗽方中分新久寒熱虛實而施治之如病欲愈而咳反甚者肺中有鬱火也即取雞鳴丸投之不過數日乃安此方系孫真人去龍宮得來歌曰咳嗽原來十八般只因邪氣入於肝脾咳之時多吐逆胃嗽膈上有痰涎腎咳須知多虛享咳嗽一夜不曾安三陽咳時多潮熱三陰咳時半上難咳嗽吐血連心瘇膀胱咳嗽氣相傳氣咳夜間多沉重肺咳嗽痰多喘難暴咳日間多汗出腸風咳嗽冷痰酸總計前件十八證用心去取雞鳴丸此是神仙真妙訣更加烏梅棗肉煎神仙雞鳴丸方知母去毛貝母去心杏仁去皮款冬炒甜葶藶隔紙炒甘草法子北味炒廣皮去白桔梗炒雞蘇曬天冬去心粟殼炒旋覆花沙參炒原方用人參三錢功較勝東阿膠麵炒珠無真正者以換水牛膠名黃明膠代之亦可通用但功不及東膠上制各一兩足合為極細末煉白蜜為丸如彈子大每服一丸用烏梅二枚棗子三枚泡濃湯細嚼下一丸小兒一丸分四服有病者云烏梅味酸難咽豫曾以烏梅棗肉加白蔻仁各一兩焙乾同前磨末為丸生薑湯化下亦妙治驗曾治淯水範三才患咳唾痰血相兼余親治愈已三載矣一日忽感風寒咳嗽醫家誤用滋陰之藥釀成吐血不止乃弟促騎求治余曰令兄新疾也先宜發散繼以滋陰方為合法今誤早為滋陰閉其肺竅恐不可及也乃勉強以人參敗毒散四劑與之且看緣法何如服之其咳愈劇遂與雞鳴丸令每夜細嚼三五粒日服補中湯加麥味不數日而咳嗽如失血亦不吐遂服六味都氣丸而康此丸余歷驗已久活人亦多同志君子切勿忽視又治一儒者患咳嗽面紅潮熱其脈洪數豫以黃連解毒湯治之而愈又治一人熱燥而咳豫以梔子仁湯又治一書生咳咯有血用麥門冬湯而效以上諸證均用八仙長壽丸善其後若在夏月尤當用大劑壯水以保肺金也余月兼用補中湯加麥味兼服八仙長壽丸屢治屢效麥門冬湯治火熱乘肺咳嗽有血胸膈脹滿五心煩熱等證麥門冬桑白皮大生地法夏子桔梗片淡竹葉麻黃絨各七分五味子大甘草各五分麥門冬湯麥門冬七錢法夏子三錢官揀參五錢炙甘草一錢大紅棗十二枚白粳米一勺治火氣上逆咽喉不利水煎服此手太陰肺金藥也俞嘉言曰此胃中津液乾枯虛火上炎之證用寒涼而反升徒知與火相爭知母貝母屢施不應不知胃者肺之母氣也此方用麥冬為君人參粳米甘草大棗大補中氣以生胃中津液隊中增入半夏之辛溫以利咽下氣此非半夏之功實善於用半夏者此仲景二千餘年之祕開古今未有之奇矣按半夏亦脾胃藥能燥能潤以能行水故燥以味辛故潤也仲景治咽痛不眠皆屢用之今人率以為燥而疑之良由內經之未讀到耳治驗曾治周嘉興每夏至患咳嗽服降火化痰之藥而益甚診之脾肺腎三部脈皆浮而洪按之微細豫曰此脾土虛不能生肺金肺金不能生腎水而虛火上炎也朝用補中益氣湯加麥味夕用八仙長壽丸而愈曾治一儒者夏月唾痰用清火藥不應豫曰此火乘肺金用前麥門冬湯而愈後因勞復嗽遂與補中益氣湯加桔梗黃芩麥味而愈但體倦口乾小便赤澀日服生脈散夕服八仙長壽丸其後遂不復發又治一儒者咳嗽壯熱自汗口乾便赤豫診其脈虛而洪先與白虎湯以徹其熱熱退遂用補中益氣湯加山梔麥冬五味煎服數劑兼服八仙長壽丸而愈痰論王節齋曰痰之本水也源於腎痰之動濕也主於脾古人用二陳湯為治痰通用然以治濕痰寒痰則是矣若陰火炎上薰於上焦肺氣被郁故其津液之隨氣而升者凝結而成痰腥穢稠濁甚則有帶血而出者此非中焦脾胃濕痰實痰之所比亦非半夏南星之所治惟用清氣化痰須有效耳噫節齋論痰而首揭痰之本於腎可為發前人之所未發惜乎啓其端而未竟其説其所制之方皆治標之藥而其中寒涼之品甚多多致損胃惟仲景云氣虛有痰者用八味腎氣丸補而逐之吳茭山辨疑篇云八味地黃丸治痰之本也此二公者真開後學之矇瞶濟無窮之夭枉或曰有火無火何以辨之答曰無火者純是清水有火者中有重濁白沫此為別耳善治者能察果是腎虛先以六味丸壯水之主八味丸益火之原復以四君子或六君子補脾土以制水若果脾土虛弱者既以補中理中又能以六味八味制水益母子母互相生克而於治痰之道其庶幾乎治驗曾治明經某素稱實學舉動狂傲不善保養忽飲食無味口乾吐痰肚腹膨脹二便不利醫家不問虛實便與之化痰行氣轉見胸滿痞悶痰飲愈甚與之導痰又與分消腹脹脅痛坐臥不安又與破血耗氣兩足浮腫知豫在英公署內告急求治即謂余曰賤軀被諸醫治壞請問先生還可救否豫診其脈右寸大而無力右關微弦右尺倏有倏無左三部軟而無力余曰足下脾腎兩傷之證令以午前服補中益氣湯早晚服金匾腎氣丸初服數劑更脹余曰不妨久服則不脹果信余言逾月而諸證盡退飲食漸進繼服八味丸去附子加北味兼服歸脾湯去木香甘草加五味子肉桂半載而康元氣大復曾治蔡孝廉不慎起居患證同前手足逆冷惡寒喜熱語言不清手足不能舉動豫以補中益氣湯加薑附薑黃靈仙南星半夏以溫經回陽服數劑而諸證漸退語言稍覺清楚行動自如余因他往誤聽庸工服清火化痰之劑以致大下鮮血而歿惜哉按化痰丸藥味概用甘苦寒咸之品雖開鬱軟堅降火化痰難免損胃之禍若脾土太過氣滯鬱而生痰者用之得宜若脾土不及氣痞虛熱而生痰者誤用之必致中滿吞酸肚腹腫脹小便不利不治而殞歿者多矣業醫者尚其慎諸凡患痰證若胸膈不開飲食無味此足太陰中州虛也宜理脾滌飲方用黃耆白朮砂仁半夏白蔻研末乾薑炒黃加草蔻一枚能散滯氣中州健旺痰自運化若腎氣虧損精液難降敗濁為痰者乃少陰真臟之證宜六味地黃丸補而逐之有火者痰煉而硬宜六味丸痰清者腎火衰也又宜八味丸寒熱分明不致差池亦有脾陰虧損中州氣弱健運無權而為痰者又有誤服峻厲之劑克伐脾陰不能運化津液凝結而為痰者凡此皆用補中益氣湯加茯半或理脾滌飲加草蔻仁以健理脾氣方為合法不致貽誤也痰飲馳遠舒氏曰凡患痰飲胸中痞硬其氣上衝咽喉不得息乃太陰脾經留飲上入胸膈名曰支飲乃為胸中陽氣衰乏不能宣布飲邪乃得上僭旁流入脅名曰懸飲溢出四肢名曰溢飲法宜大補胸中陽氣兼以散逆逐飲而痰飲自愈按痰飲由於脾虛法屬太陰脾經蓋凡人後天水穀所生津液全藉脾中之陽傳運敷布營養筋骨脈絡設脾氣衰乏傳布不盡其所留者不得謂之津液斯為留飲留飲為患十常八九治驗曾醫幕友柯南年五十體素豐患痰喘每遇風寒即發飲食不進旦夕不寐數日方安余寓長邑道經彼過其證復作較前更甚就診於余按之右寸洪大而數右關微弦滑甚餘脈無力余曰手足太陰二經虧損以致痰飲益甚兼之腎氣渙散氣虛上干而喘法宜黃耆白朮大補中氣砂半茯苓醒脾豁痰白蔻草蔻宣暢胸膈且消滯氣乾薑草果溫中逐飲柯友曰嘗聞耆術提氣我素畏服余曰分經用藥乃千古指南一定而不可易之法今君患太陰留飲耆術乃補中宮陽氣之的藥足下畏如鴆毒又何藥之用乎柯友頓首謝曰我門外漢也今幸遇明公教我不然賤軀不知病至胡底領服一劑而效數劑而安遂與補中益氣湯加茯半兼服八仙長壽丸而痊明年在興邑署中制錦軸撰詩贈曰笑我風塵客昔從洞庭過杏林春燦爛橘井影婆娑仙指含生意豫懷轉太和括囊藏祕訣處處活人多曾治湯孝廉年四十有四形體魁梧性孝友與余莫逆素好勤學四鼓方臥忽患中滿吐痰十指麻木勞則眩暈自謂知醫一日遇諸途恭謂豫曰賤恙已半載矣服清痰理氣之劑不少而病漸加劇醫書曰痰因火動降火為先火因氣逆順氣為要弟依此法調理何乃不應吾兄何以教我也余曰書中所論是治有餘也足下患不足服之必相反中滿者脾氣虛而作痞也四鼓勤勞勞傷脾也痰盛者脾氣虧損不能運化也頭暈者脾氣虛而清陽不能上升也十指麻木者脾氣虛而不能周也岐伯曰脾居中央灌溉四旁故為孤臟太過則令人四肢不舉不及則令人九竅不通名曰重強是以百病生焉孝廉曰吾兄所見甚明敢問賤疾主何藥當用何方余曰東垣補中益氣湯治內傷不足之證實萬世無窮之劑足下宜此方加半夏茯苓以補脾土滋其化源八味丸以補脾母調理三月而元氣大復凡人忽患胸背手足腰項筋骨牽引釣痛走移不定或手足冷痹氣脈不通此是痰涎在胸膈上下誤認癱瘓貽害匪輕控涎丹一名妙應丸甘遂大戟白芥子等分為末糊丸桐子大臨臥薑湯送下五丸七丸加至十丸痰猛者酌加若腳氣加檳榔木瓜松節卷柏若驚痰加硃砂全蠍若驚氣成塊加穿山甲鱉甲元胡莪朮若熱痰加盆硝若寒痰加丁香胡椒乾薑肉桂此足太陽太陰二經藥也痰之為物隨氣升降無處不到入心則迷即成癲癇入肺則塞竅為喘咳背冷入肝則膈痛肋痛乾嘔寒熱往來入經絡則麻痹疼痛入筋骨則牽引釣痛入皮肉則生瘰癧癰腫以上諸證並以妙應丸主之立見神功此乃治痰之本痰之本水也濕也得氣與火則結為痰大戟能泄臟腑之水濕甘遂能行經隧之水濕二物能直達水氣所結之處白芥子散皮裡膜外之痰氣司命之士瓶中不可一日無此丸遇此證神而明之辨而施之則隨手而應曾治徐知州忽患手足痹冷痠疼飲食減少求余診治按之右關沉滑而數余曰公之恙乃足太陰脾經受濕氣虛不能宣布痰飲積在胸膈上下宜理脾滌飲送枯礬丸二錢臨臥用薑湯吞妙應丸十粒旬日安好如故曾治府教授何以善患喘咳背冷膈痛乾嘔寒熱往來余曰公乃少陽膽經受邪痰涎為虐遂與逍遙散煎飲臥時服妙應丸九粒數日而安又治王孝廉患腰背筋骨牽引釣痛余曰君素好飲痰涎積在胸膈上下宜用妙應丸七粒枯礬丸五粒臨臥生薑湯吞下旬日諸痛如失又治張英患眼疾不明不痛醫治罔效來寓就診按之左關沉滑余曰痰也故目昏不明乃與二陳湯十劑臥服妙應丸十粒而眼目復明如舊可見痰之為害無處不到信然枯礬丸以明礬火煅飯碾丸梧子大能驅濕殺蟲治痰飲咳逆用二錢與理脾滌飲同服見功甚神並治濕毒潰清膿流水不幹者服之立效十棗湯芫花醋炒甘遂大戟等分為末磁瓶收著每用五分紅棗十枚煎水調服此湯驅逐里邪使水氣自大小便而泄內經謂潔淨腑去陳苑之法內里不和痰與燥氣壅於中焦故頭痛乾嘔短氣汗出乃是痰隔痰亦水濕病耳得氣與火則凝滯而為痰為飲為涎為涕為癖非十棗湯妙應丸不治然須知緩宜用丸急宜用湯神而明之耳酒客病酒説昔在武昌從吾師遊偶見一人以手按心而痛汗如雨下痛不可忍吾師曰此必酒病也以十棗煮水調前末藥三分與服限一時許下惡水數升而病去如失余曰願問吾師明論師曰酒一入胃漬則成飲濁則成痰酒停不散之故入肺則塞竅喘咳入心則心痛怔忡為噫入肝則肋痛小腹滿痛入膽則嘔苦汁目眛不開入脾則脹腫吞酸健忘入腎則背惡寒腰痛尿澀赤白濁下入胃則嘔吐嘔血血痢或胃脘痛有諸證疾種種難名不亟治之養虎為患只須一劑根株悉拔否再服一劑必愈慧拜聆後修合此藥施治數十年活人多矣願同志者亦如吾心焉則幸甚三因方以前藥末棗肉為丸治水氣喘急浮腫蓋善變通者也陰虛發熱論世間發熱類傷寒者數種治各不同傷寒傷風即寒疫也則用仲景法瘟病即瘟疫也則用河間法此皆論外感者也今人一見發熱便認作傷寒率用汗藥以發表汗後不解又用表藥以涼其肌柴胡湯涼膈散白虎湯雙解散雜然並進若是虛證豈不殆哉自東垣先生出而發明內傷之論此用氣藥補氣之不足者也至於勞心好色內傷真陰真陰既傷則陽無所附故亦發熱其人必面赤煩躁口渴引飲骨痛脈數而大或尺數而無力者是也惟朱丹溪發明補陰之説甚好惜又以四物湯加知母黃柏蓋因陰字認不真誤以血為陰耳故屢用不效何耶要當作腎中之真陰即先天也內經曰諸寒之而熱者取之陰諸熱之而寒者取之陽所謂求其屬也王太僕注云大寒而盛熱之不熱是無火也大熱而盛寒之不寒是無水也又云倏忽往來時發時止是無火也晝見夜伏夜見晝伏時節而動是無水也當求屬而主之無火者宜八味丸益火之原以消陰翳無水者宜六味丸壯水之主以鎮陽光必須六味八味二丸出入增減以補真陰屢用屢效若誤用知母黃柏苦寒苦先入心久而增氣反能助火至於滑泄敗胃損傷脾陰而立斃者不可勝數大抵病熱作渴飲冷便祕此屬實熱人皆知之或惡寒發熱引衣蜷臥四肢逆冷大便清利此屬真寒人亦易曉曾見狂擾煩越不欲近衣欲坐泥水中此屬假熱之證又有甚者煩極發躁渴飲不絶舌如芒刺兩腎燥裂面如塗朱身如焚燎足心如烙吐痰如湧喘急不寧大便閉結小便淋瀝三部脈洪大而無倫當是時也卻似承氣湯證承氣入口即斃又似白虎湯證白虎下咽立亡若用二丸緩不濟事愚即以加減八味丸料一斤入肉桂一兩以水熬煎六碗調桂末冰冷與飲諸證自退翌日必畏寒脈脫是無火也當用八味倍附桂丸料煎服以補真陽而愈若産後或大失血後陰血大傷必大發熱亦名陰虛發熱此陰字正是氣血之陰若以涼藥正治立斃所謂象白虎湯證誤服白虎湯必死當此之時四物湯宜矣然猶舍而去之也蓋有形之血不能速生幾希一線之氣所當急固莫若獨參甚妙然參價昂物少勢難猝辦愚每用當歸補血湯當歸三錢黃耆一兩甚神或獨參湯亦效使有形從無形中生出此陽生陰長之妙用不可不知也或問曰先生之論則詳矣氣虛血虛均是內傷何以辨之余曰明乎哉子之問也陰血虛者面必赤無根之火戴於上也若是陽氣虛者火入於內面必不赤其口渴者腎水乾枯引水自救也但口雖渴而舌必滑脈雖數而尺脈必無力其甚者尺脈雖洪數而按之必不鼓此為辨耳然其人曾服過涼藥脈亦有力而鼓指矣戴氏云服涼藥而脈加數者火鬱也宜升宜補切忌寒涼犯之必死臨證之工更宜詳辨毫釐之差枉人性命尚慎旃哉咳嗽吐血論或問曰吐血多起於咳嗽咳嗽吐血者肺病也方家多以止嗽藥治肺兼治血而不效何也答曰諸書雖分咳血嗽血出於肺咯血唾血出於腎余謂咳嗽咯唾皆出於腎蓋腎脈入肺循喉嚨挾舌本其支者從肺出絡心注胸中故二臟相連病則俱病而其根在腎腎中有火有水水乾火燃陰火刑金故咳水挾相火而上化為痰入於肺肺為清虛之府一物不容故嗽中有痰唾帶血而出者腎水從相火炎上之血也豈可咳嗽獨歸之肺耶褚氏津潤論云天地定位水位乎中人肖天地亦有水居中焉在上為痰在下為水伏皮膚內為血出毛竅中為汗可見痰也水也血也一物也均發源於腎也又云飲溲尿百不一死服寒涼百不一生童便一味世傳治血之要然暴發之際用之以為消瘀之急劑則可若多服久服大能損傷胃氣褚氏特甚言寒涼之不可用耳曰若是乎知柏既在所禁用童便又不宜多服治之當何法曰惟六味丸獨補腎水性不寒涼不損脾胃久服則水升火降而愈又須用人參救肺補胃藥收功使金能生水蓋滋其化源也又有一等腎水泛上上侵於肺水冷金寒故咳嗽肺氣受傷無所附故亦吐血醫者病者一見嗽血者火也以寒涼折之病者危而危者斃矣冤哉若遇智者用八味丸補命門火以引水歸原次用理中湯補脾胃以補肺之母使土能制水則腎水歸原而血復其位矣已上論陰虛吐血者用補天之法若陽虛吐血與夫六淫七情所致各自不同熟讀絳雪丹書及吐血論逐一可考茲不再贅又有一方最妙只是節欲不但節欲直須絶欲不絶欲而徒恃乎藥未有能生者也發熱丹溪朱氏曰近世治病不分氣血不辨虛實但見虛病便用耆參然果屬氣虛者宜矣若是血虛豈不助氣而反耗陰血耶是謂血病治氣則血愈耗甚而至於氣血俱虛故治病用藥要知病在血分不可用氣分之藥以犯仲景之禁耳曾治湯同庚素勤苦飲食失節大便下血或赤其面部或黯其後非盜汗則下血非惡寒則發熱延豫診之按之右寸浮大而芤心脾則澀左關沉弦左尺細數無力余曰此思傷心脾不能攝血歸經蓋血即汗汗即血其面色赤黑便血盜汗皆火之升降微甚耳惡寒發熱氣血俱虛也與之補中益氣湯令午前服以滋脾胃之化源午後用歸脾湯加麥味以統脾陰之血收耗散之津液不兩月諸證痊愈元氣如舊又有後天陽虛之證夜則靜晝則發熱兼表宜小柴胡湯加梔子黃連地骨皮虛加耆朮歸芍寒者酌加乾薑此藥宜五更煎好必須黎明將曙服之方可奏效如神陰虛之證則反此晝則靜夜則發熱或天明或五更清爽而熱便退一到黃昏或更初又覺昏沉宜四物湯重用生地五錢加黃連梔子柴胡粉丹各二錢知柏各一錢虛甚者加干熟地黃一兩或酌加鱉甲首烏必於日將晡申酉二刻煎藥速服二次以截之則陰氣回而邪不敢入矣所以一劑而奏效如響日夜俱發熱者氣血俱受邪也宜用小柴胡合四物湯加梔子仁川黃連一劑而安不應即用升陽散火湯一劑而效若桴鼓升陽散火湯升陽散火湯名義柴胡以發少陽之火為君升麻葛根以發陽明之火羌活防風以發太陽之火獨活以發少陰之火五味各用二錢為臣此皆味薄氣清上行之藥升舉其陽使三焦暢遂而火邪皆散矣人參補正甘草一錢生熟並用益脾土而瀉熱尤妙用白芍五錢泄脾火而斂陰酸斂甘緩散中有收不致有損陰氣以為佐使也治驗曾治子東山於一歲時出花不密不稀紅潤可喜精神如常未藥而安及至四歲而麻出亦紅潤如前至靨未藥因有伏火匿於血分將與清涼解毒之藥忽徐進士家迫請因友誼重強去及二日歸見此子火熱已極人事懨懨刻不容緩即請兒科劉卓然先生診視曰病勢迫矣藥不能及速用取蟾酥的癩蝦蟆劈破撲胸但得鼻中有水出去之果撲二個而應遂與之藥明日先生復視曰無憂也仍服前方余知先生確有識見所用歸地知柏梔子連翹桑皮元參桔梗石膏連進四劑而熱減八分仍然精神不慧先生曰歸師勿掩窮寇勿追歇三日連服二劑而精神爽慧行動如常明年五歲中秋夜二更忽周身如火捫之烙手而人安然熟睡及至五更熱退身涼醒來仍然清爽飲食如常乃請前醫與以人參敗毒散連服二劑其熱更甚於滋陰藥內加陽藥十餘劑而不效病漸昏沉如癡如醉自九月初八至十五不大便摸其腹肢全無影響余與先生商曰七八日不大便得非少陰轉陽明乎先生依余言而用下法愚思此子發熱一退身即涼矣想腹中必有伏陰以致陰邪干犯胃陽灼干津液以致熱邪結於肛門不能運送而然膽於方中加黃耆白朮各三錢大補中氣附子肉桂各一錢以助腎中真陽煎服一劑是夜稍平腹中全無響動天明令伊登廁惟掙時許果出干軟黑糞三寸余皆稀溏連日藥水盡下而人事略疏快即以補中益氣湯滋其化源而熱退身安因幼不肯服藥以致失補明年前證復作又治而愈然竟費手又明年又發是夜更甚余心恨天不明去請前醫明早已行自揣頓止若去請他仍用發散靜而籌之半日方得其解此子由於痘麻後未與滋陰以致陰虧火旺每因失調而作是以晝則靜夜則熱若用發散相隔天淵可見從前治法亦概誤矣余用四物湯生地倍用加梔子仁知柏黃連粉丹柴胡六味各二錢酉初煎藥布漉去渣進服二次自必陰氣回而邪不敢入矣譬如人家門戶緊防鎖鑰嚴整司更值宿之僕俱各精健絶倫賊必望風退卻此亦理之所有者也故日將晡乃服服早則至夜不能敵矣果服後安然熟睡不發熱矣明夜安好如故但不能除根每發則服一劑而安其效如鼓應桴自十二歲以後至今不復發矣曾治蕭善人大公郎廩員蕭岱瑞年十六讀書勤勞患陰虛發熱自與補中益氣數劑每夜身熱如焚手不可近天明退去善人倉皇來舍請診詳説病情余哂曰不須診視倘信吾方便教晚服一帖夜靜即安明晚再服一劑痊愈乃以前案方藥與之善人曰我止有此子發熱數夜我與同臥捫之烙手寸心如割望名公賜一妙方何乃又用四物加知柏黃連大隊陰藥況小兒本之先天不足以此施之恐未相宜乎余曰要知病在陰分不可用陽分之藥以犯仲景之禁耳善人獨不聞有是病必用是藥我乃分辨陰陽斷不致有錯誤用此方藥活人多矣又何疑哉遂信余言而依其法煎服一劑是夜燒熱減去大半明晚仍依前法一劑而安又明日迎豫診與之八珍湯加黃耆五味歸脾湯料去木香甘草加五味子肉桂鹿茸為丸湯丸並進元氣大復曾治宋豪士乃郎患證如前緣由內傷外感醫家不與溫經解表肆行發散病已數旬表證難罷干犯陰血愈治愈熱病者醫家無法可措交相為苦來寓求診按之六脈沉細而數右關微弦余曰發散太過血虛之甚又被陰火逼迫而其勢不可緩乃用當歸白芍元參生地各三錢熟地五錢知柏梔子黃連川芎各二錢柴首三錢如前法煎藥晚服而效改服八珍湯八劑諸證漸退是日晴朗走出街口觀望以致迎風復作是夜較前更甚豪士復延余問曰是病復作其熱如火捫之烙手熱若不退此子危矣余曰足下勿憂不過再多服藥可保無傷又如前藥二劑而熱退其身安矣多服十全大補湯體遂健旺又治三子輯五年六歲時因麻痘後患陰虛發熱其證與二子東山無異亦服前方一劑而愈屢發用之屢效乃一日發時投之不應又明日巳刻人事昏昏捫之亦熱較夜則輕余細察之是陰居六七陽居二三之證經曰火鬱則發之升陽散火湯是的對之方方見前果煎服一劑熱退身安神氣清爽再煎八珍湯加黃耆五味子兼服六味地黃丸至今不發曾治鄒姓者素患咳嗽吐血去秋大作晝則發熱夜則安靜誤服滋陰之藥臥床不起飲食不進諸醫斷以必死伊表曾其恆代請診視按之六脈沉微惟右寸浮大而軟余曰此陽虛之證前醫不知分辨陰陽一見發熱寒涼肆投轉致陰愈長而陽愈消不救之候也猶幸脈小身溫許豫數劑而安遂以補中益氣湯加黑薑茯神遠志熟地麥味倍用耆術一劑而蘇明日不發熱矣即進飲食再服十全大補湯兼龜鹿地黃丸旬日而愈哮吼齁喘論夫齁喘何以哮吼名者喉中有雞聲是也主於痰宜用吐法虛者用紫金丹導之此證遇天陰欲雨即作坐臥不安飲食不進蓋因肺竅中積有冷痰一遇寒氣從背心鼻孔而入則肺脹作聲是證有子母相傳者感之則苦至終身每發如服紫金丹不過七八次覺吐出痰涎腥臭是絶其根也按之脈浮而滑者易治微細者難療紫金丹白砒霜生用一錢白明礬煅枯三錢同研細末淡豆豉水潤去皮蒸熟搗如泥一兩和前藥合勻搓如緑豆大遇證發時先以冷茶送下七丸以不喘為愈不必多增丸數慎之小兒止服二三丸神應之至治驗曾治劉天全年三十二患齁喘證每發則飲食不進坐臥不安日夜為苦至三四日痰盡乃平天將雨偶感風寒又作至今十餘年矣諸藥不應請余診治按之六脈沉微惟右寸肺脈大而滑甚乃與紫金丹九粒令將欲發以冷茶吞服一次稍輕七次而愈繼以六味補中兼服而康曾醫長邑幕友朱榮光年二十七久患齁喘唾痰咯血遺精惡寒喜熱三伏天猶披狐裘不分春冬調治七載無功諸證集劇飲食不入不能床褥日夜作苦欲尋自盡忿不欲生促騎求治診之左關沉細而數右尺沉細而芤余遂以紫金丹治齁喘理脾滌飲送斬關丸溫中逐痰胡巴故紙收納腎氣以保固元精兼服補中湯加麥味茯神遠志懷山熟地攝血歸經繼服八味地黃丸去附子加鹿茸壯水補血三月而康以書謝曰自別臺旌後至今半載賤軀甚為健旺值此暑天朝日赤身尚知大熱諸病已愈心中爽快飲食亦加若非高明妙劑何能回春再造之恩永志於心耳時嘉慶五年八月十三日也紫金丹愚修合至今多年治驗無數不及備載同志君子宜珍寶之虛勞余考內經而知夫人之生也陰血為營陽氣為衛二者運行而無壅滯病安從生若力用不休則龍雷二火逆潛至高故勞字從火曲運神機病心勞而為虛汗怔忡縱情房室病腎勞而為骨蒸夢遺泄精病肝勞而為痛痹拘攣形冷悲哀病肺勞而為上氣喘嗽動作傷形思慮傷意病脾勞而為食少痰多形羸神倦此五勞也故勞者必至於虛虛者必因於勞古稱五勞七傷六極二十三蒸證狀繁多令人眩惑但能明先天後天根本之治無不痊安蓋簡而不繁約而無漏者也夫人之虛非氣即血五臟六腑莫能外焉然血之源頭在乎腎蓋水為天一之元而人資之以為始者故曰先天氣之源頭在乎脾蓋土為萬物之母而人資之以為生者故曰後天二臟安和則百體受調一有虛傷則千疴竟起至哉斯言可為司命者之指南也土為金之母而金為主氣之宮故肺氣受傷者必先求助於脾家水為木之母故肝血受傷者必由藉資於腎臟而虛勞之證扶脾保肺兩不可缺然脾之性喜溫燥而溫燥之劑不利於肺肺之性喜涼潤而涼潤之藥不利於脾兩者並立而論而脾則有生肺之能肺無扶脾之力故曰土壯而生金勿拘拘於保肺者也瀉火之亢以全陰氣壯水之主以鎮陽光法當並行然瀉火之品多寒而損陽氣壯水之劑多平而養陰血兩者並列而論苦寒過投將有敗胃之憂甘平恆用卻無傷中之患故曰水盛而火自息勿急急於寒涼也證如煩渴喘呼脈見數大有力者當潤肺為主而扶脾佐之證如食少善泄脈見細數無力者當扶脾為主而保肺佐之甚則保肺之藥不利於脾當即去之卻宜補土之母少火庶可冀其回春醫家全在分經辨證則陰陽虛實確有所據而後切其脈以治之方無差誤春夏之令主生長秋冬之令主肅殺人皆知之彼不知藥之溫者行天地發育之德藥之寒者象天地肅殺之刑如四物加知母黃柏世醫皆奉為滋陰上品降火靈丹不知秋冬之令非所以生萬物者也涼血之藥常膩滯非痰多食少者所宜涼血之藥常滋潤必至滑滯腸鳴況知母苦寒苦先入心久而增氣反能助火至於滑泄敗胃所不待言丹溪云實火可瀉虛火可補試問癆瘵之火屬之虛乎屬之實乎泄之可乎昔有畏知母黃柏如鴆毒者曰恐戕吾命根耳然如病初起而相火正隆或燥渴而右尺脈滑大偶投一二劑亦可也若多用之則斷乎不可或問曰血主濡潤四物湯豈非濡潤而為血虛者之要藥乎答曰血虛而燥用四物以濡潤未嘗非合劑但恐用之久而多則在上有泥膈奪食之憂在下有滑腸瀉泄之患且主秋冬之令鮮發育之功也或又問曰氣有餘便是火補氣之藥能無助火乎古人云正氣與邪勢不兩立猶低昂然一勝則一負正氣旺則邪氣無所容譬如滿座皆君子一小人而無容身之地五臟雖各有勞心腎為主心主血腎主精精竭血枯則勞成矣惟宜滋養培補調心益腎若過用薑附燥熱等藥則雄駿之氣性太烈火內之精血何堪當此之時雖云壯火適足以發其虛陽然又不可因其熱而純用寒涼以傷胃氣若過用熱藥者猶釜底無火而添水也非徒無益又反害之宜十全大補湯人參養營湯建中湯補中益氣湯選而用之如左尺獨虛者六味地黃丸壯水之主以鎮陽光右尺不足者八味地黃丸益火之原以消陰翳丹溪之論勞證主於陰虛未常非也陰虛之熱以發在午後子前諺云朝涼暮熱也陰虛之汗從寐時盜出陰虛無以制火則火氣逆上喘嗽而吐痰也陰虛則脈浮大或沉虛也四物加知柏主之以四物潤血血為陰又加知柏降火理固然也不知後人不能分辨陰陽虛實以此方概施多致不察變通而纍丹溪有遺恨也蓋川芎上竄非火炎者所宜地黃膩滯若痰多食少者必禁地黃不依製法又不知服法無怪乎膩滯制若精良反為逐痰聖品知母易於滑腸黃柏易於敗胃暫投尤可多用必傷豫今擬一方以苡仁茯苓扶脾且切降下之功桔梗陳皮行氣且有健脾之力麥冬五味保肺而能滋化之源骨皮丹皮除蒸而無寒涼之害痰喘用桑皮川貝止血用童便黑薑瀉泄則山藥芡實燥結則人乳梨汁此以甘溫之品行降收之令而為初病者設也若久病而百脈空虛虛火亢炎非甘溫之品不能復其真元宜異功散補中益氣湯非濡潤之品不能澤其枯朽宜六味地黃丸若少氣懶言目昏面白宜生脈散甘桔湯頻頻啜之若病久而積痰成積腹脅常熱惟頭面手足於寅卯時乍涼宜六君子湯加薑汁竹瀝送滾痰丸三錢先以湯潤丸令其易化有面色不衰肌膚不瘦外若無病內實虛傷俗名桃花證須察其何經何臟何病而施治之勞證久嗽咽痛失音乃下傳上也不嗽不痛尿出脫精此乃上傳下也皆非吉兆至若形色尪羸陽事不禁脈細無根且數而無倫者旦夕必逝癆瘵男子二十前後色欲過度損傷精血必生陰虛火動之病睡中盜汗午後發熱哈哈咳嗽倦怠無力飲食少進甚則痰涎帶出咯血咳血衄血吐血身熱而脈沉數肌膚消瘦此名癆瘵最重治療難矣輕者必服藥數十劑丸餌十數斤重者問愈不可以月計期以年許然必須病者愛命堅心定志絶房室息妄想戒惱怒節飲食以自培其根否則雖有良醫亦無可如何也此病治之於早則易若到肌肉銷鑠昏睡床褥脈至細數則難為矣今制一方治酒色沉迷初起潮熱盜汗咳嗽倦怠趁早服之方用生地炙草炮薑川芎熟地酒芍廣皮白朮當歸門冬知母黃柏生薑煎服一二劑細心斟酌切勿多服慎之慎之按前方治陰虛火盛之法也愚謂此證屬三陰虧損無火之證故見虛熱晝發夜止夜發晝止不時而作當用六味地黃丸為主以補中益氣湯調補脾胃若脾胃先損者當以補中益氣湯為主以六味地黃丸溫補肝腎多有得生者若用知柏之類傷乎脾胃飲食日少諸臟愈虛元氣下陷腹痞作泄則不可救矣又有疰夏之病或少有老態不耐寒暑不勝勞役四時迭病皆因氣血方長而勞心虧損或精血未滿而早斫喪故見其證難以名狀若左尺脈虛弱或細數是左腎之真陰不足也宜六味地黃丸右尺脈遲軟或沉細而數欲絶是命門之相火不足也用八味地黃丸至於兩尺微弱是陰陽俱虛也十補丸此皆滋其化源也仍參前發熱及咳嗽諸法調治之至於衄血咳血咯血在絳雪丹書咳嗽吐血論中詳之治驗曾治韓千總每至夏月無陰一到三伏之時全無氣力悠悠忽忽惟思睡眠一睡不足再睡不足懶於言語或夢遺不已或夜熱不休問治於豫豫曰皆子不善保養腎水泄於冬天夏月陽盛陰無以敵所以如此須用干熟地一兩山萸四錢當歸白芍麥冬白朮芡實生棗仁各三錢茯苓陳皮北味子各一錢水煎服峻補其腎水腎水充足則骨始有力而氣不下陷神自上升矣此方純是補陰蓋骨空則軟補其骨中之髓則骨不堅而堅也此方治骨軟氣軟神驗又治方州同色欲過度煩熱作渴飲水不絶小便淋漓大便祕結唾痰如湧面目俱赤滿舌生刺兩唇燥裂遍身發熱兩足心如火烙診其脈左三部洪數無倫豫曰此腎中之真陰大虛陽無依附而發越於外經曰大熱而盛寒之不寒是無水也極當峻補其陰乃與加減八味丸料一斤內肉桂一兩以水熬六碗水冷與飲熟睡半刻至晚又溫飲一碗諸證悉退翌日畏寒四肢作逆諸證仍至是無火也極當大補其陽乃煎八味地黃湯四劑諸證盡退繼服龜鹿地黃丸而痊岐伯曰膏肓之病成之非一朝治之亦非一日必須多服湯藥於日間久服丸餌於夜半非數百劑之湯藥數十斤之丸餌不能奏功大約癆瘵之證多而虛勞次之方用熟地一兩山萸山藥各四錢丹皮澤瀉茯苓麥冬各三錢北味一錢芡實五錢一日一服又以鹿茸龜膠元參麥冬各三兩山萸地骨白朮白芍棗仁甘杞各四兩干熟地八兩人乳二碗浸曬微火焙和諸藥磨末蜜丸每夜半熬開水吞五錢名為中正丸不寒不熱可以長服如此病已大傷根本扶之不易譬如花木大肆摧殘欲其枝葉之茂豈是一朝可成必須培植灌溉終歲經年自然春意漸回萌芽可達漸漸扶蘇而不可性急也湯丸並進不可歇乎飲食更須得宜病久之難從來眉蹙切勿性急期奏效之速此等證十人中止可逃一二論此治法非盡人能救之也舍此又別無治法余憫世人故立此二方倘肯聽信吾言禁絶色欲口淡滋味心戒貪嗔息一切妄想自然服藥有效否則亦苟延歲月而已又不可不告誡也傳尸癆瘵蟲治驗曾治季三思患尸蟲證飲食如常但瘦削不堪臥床不起起則暈眩舉室愴惶訪求良醫知豫在孫公署內提刺促騎請治余曰是病起於何時得於何因其母泣曰寒門單傳已三代矣昔者吾祖吾父死於此證吾夫又死焉今吾子又染此證年未及強雖有一孫尚幼祖姑年九十有六姑多病望先生憐而救之余慰之曰爾勿憂此尸蟲證也余屢醫驗乃與救癆殺蟲丹用鱉甲一斤酒醋炙透茯苓五兩干熟地山藥沙參地骨皮各一斤山萸八兩白薇白芥子各五兩人參二兩鰻鱺魚一尾一名白鱔蛇魚重一斤余或二斤更好煮熟先將白鱔搗爛和前藥為細末粳米飯碾成丸梧子大每夜五更時洗臉北面仰天念北斗咒七遍咒見後即以開水送丸五錢服畢南面吸生氣入腹中燒降香置床下午時又依前法吞服至七日三思向伊母言曰有堂先生良醫也吾知其不死也心中安穩全無憂懼吾家當戴德於無涯矣服至半料其蟲盡化水由小便長驅而下狀若稀糊此方大補真陰全無殺蟲傷氣之藥補中用攻若非天仙救人烏立此方果服之三月而效半載而康連生五子至今二十五年而不發亦無恙焉曾治州吏目宋豪士為人清高二代單傳年十八患前證醫家不識尸蟲之害誤作虛勞治之一味滋陰以致陰愈長而陽愈虧不竭力殺蟲反去養蟲則蟲之子若孫愈肆猖獗不亡何待乃叔肇堂延請診之六脈沉細而數左關數甚觀其面黯色滯膚無潤澤發焦耳枯形神俱敗尸蟲旺極之候遂與人參耆術各五錢星半薑附各三錢吳萸川椒枯礬各一錢服十劑覺神氣稍清又服十劑皮膚光澤又服三十劑發潤耳紅人事利爽元氣漸復步履自如乃為之竭力殺蟲兼以制鬼法用室女頂門發一小團皂角湯洗去垢酒醋浸曬同黃紙捲筒燒存性川芎五錢當歸三錢廣香一錢安息香明雄各二錢全蠍二枚生活鯉魚一尾取頭酒醋酥炙共為粗末分四服每服入降真香末五分書北斗符一道火化入藥中如前法念北斗咒七遍五更時井花水煎服務要初旬治之乃靈又另買大鰻鱺一尾去腸腹用水清蒸調和五味湯肉任吃留其全骨以火炕干入降真香雷丸大黃川椒吳萸甘草明雄各七錢共為粗末入當門子七分和勻卷黃紙筒以藥貯之令患者高臥於大油紙內覆好留頭面向外燃紙筒薰之熟睡半時九竅作癢醒則諸蟲盡在油紙中矣延余視之形如針嘴近人氣猶作跳躍狀殊甚駭然命除之繼服補中益氣湯數百劑龜鹿地黃丸數十斤而元氣大復連生五子曾治廩生高鳴岐性孝友行端方因堂弟鳴岡文中二人外染尸蟲相繼淪亡此時無人知覺鳴岐念叔父仁慈公直不忍二子連喪日夕不離病者側明年詣館讀書疾作矣自察知是尸蟲傳染之故茫茫歸去來寓求取玉樞丹更深時用無灰酒磨服三錢靜坐一時許自覺腹內似螞蟻搬遷之狀不安殊甚禁食一日餓甚只服稀粥少許又明日其蟲化成魚凍而下若冰條然即服八珍而安未幾一僕一裁縫均曾服侍二亡者同染亦作鳴岐以前法施治均下惡物而痊此丹為驅毒殺蟲神品初起用之奏功自捷若諸證俱見虛勞已成仍依前湯藥丸餌諸法調理自必有效昔有一家患傳尸癆五人兄弟已死其三方士令服此丹各進一錢下惡物如膿狀一下死蟲如蛾形俱獲活命其家遂依法制合藥廣施尸證服之無不驗者又見一女子久患癆瘵為尸蟲所噬磨此丹一錢服之一時許吐出小蟲十餘頭後復配蘇合香丸服半月如常藥品雖不言補羸瘦人服之並效誠衛身之寶也仁人君子合以濟人德莫大焉北斗符咒略反胃證雷公曰反胃之證雖一時不能遽死然治之不得其法終亦必亡而已矣蓋反胃多是腎虛無火故今日食之明日即吐盡經曰食入即出是也夫食入於胃中而吐出似乎病在胃也誰知胃為腎之關門腎病而胃始病飲食入於胃必得腎水以相濟而咽喉有水道之通使上可轉輸下易運化然而腎中無火則釜底無薪又何以蒸腐水穀乎此腎寒而脾亦寒脾寒不能化必上湧於胃而不肯受則湧而上吐矣方用熟地三兩山茱六錢肉桂三錢茯苓三錢水煎服一劑而吐止十劑而痊愈然此治朝食暮吐暮食朝吐者也若食下即吐即於前方中去肉桂加麥冬一兩北味一錢其效如鼓應桴此二方大補腎中之水火全不去治胃勝於治胃也反胃之證初起時當用大劑逍遙散加吳茱萸炒黃連一劑立止也若用行氣消食清火化痰禍不旋踵而至矣如患前證克伐已壞天師憫之乃傳一方用熟地一兩山萸四錢當歸元參白芥子川牛膝麥冬各三錢北味子一錢水煎服此方之妙全不治反胃而正所以治反胃也夫人之反胃乃腎中陰水竭也腎水不足大腸必然細小水不足以潤之故腸細而乾枯腸既細小則飲食入胃不能下行必反而上吐治之之法不可治上而宜治下方中所用熟地山萸純補腎中之水腎中之水足而大腸有水相資則大腸仍復寬轉可以容物而水路既寬則舟楫無礙大舸小舶可以順行又何懼區區小舟不能轉運糧食哉此腎水虛而不足以潤大腸者宜如是治法若腎中寒涼而虛者又不可如是蓋反胃之名雖同而反胃之實各異腎中無水者食下喉即吐腎中無火而反胃食久而始吐也朝食暮吐暮食朝吐者是也宜用八味地黃湯水煎服此方妙在用附桂於補腎之中使去水中補火補火者補命門之火也蓋脾胃中必得命門之火始生譬如人家釜中無火何以煮爨未免水冷金寒結成冰凍必得一陽初復之氣始解和暖人身脾胃亦然然而寒涼之病皆心疼腹痛今反無此證乃上越而吐者何也因脾胃有出路則寒邪之氣不留於中今日日上吐將胃中咽門已成大道熟徑往來無所阻滯則徑行趨奔其勢甚便又何能蓄積於中州盤踞於心腹頓寒乍熱以苦此脾胃哉此反胃下寒心腹之所以不痛也此又不治反胃而正治反胃如神也治驗曾治富商湯名揚自謂體旺酒色無度行年四十飲食漸減形神尪羸或教以每早進牛乳酒初食似可久之朝食至暮酒乳結成羊屎形一一吐去其大小便日夜不過數滴全無渣滓下行臥床不起告急請診按之兩尺脈微如絲右關弦緊乍有乍無兩寸與左關洪大而散余曰足下之恙乃本實先撥先天之陰虛宜補水先天之陽虛宜補火水火既濟庶可得生富商請方乃用熟地一兩山茱山藥各四錢茯苓澤瀉丹皮肉桂附子各三錢煎服一劑明早令進牛乳酒至暮則下行而不上吐矣連服十劑飲食漸進遂以前方藥料為丸日服二次囑戒酒色半載而康曾治筠邑令葉進士坐西臺回任途中沐雨櫛風致患反胃之證余有一面之交令進八味地黃丸不信初食官燕次飲牛乳數旬無功以致朝食暮吐命在垂危葉與余友王馨桂同鄉交好莫逆時王母年逾七旬亦患證同葉延豫診治豫曰伯母之恙乃腎中真水竭真火衰非得上上紫油肉桂合八味丸壯水之主益火之原不可活也忽葉令書至托王聘余治療豫曰葉公之恙前不信余方延至今日恐不可及也王友迫至筠邑診之果不能起但見覓得肉桂甚佳催令速合八味地黃丸計圖脫身余行而公明日不祿來至慶邑幸遇王友遂語之曰足下與葉公父子交厚順去致吊便求丸餌令堂可得生也王求之果惠然而與歸俸為服三日而飲食下行不復上吐丸藥服畢安康如常後猶享壽十二年以此觀之信藥者存不信藥者亡何幸不幸若斯也其命也夫反胃神方喻嘉言曰仲景旋覆代赭石湯乃治傷寒汗吐下解後餘邪挾飲作痞之方妙矣神矣昌竊取此方而治反胃噫氣痰多氣逆並噦者活人已盈千纍萬矣故石室祕録云此方宜補入反胃門旋覆代赭石湯旋覆花六錢人參生薑代赭石煅焠法夏子炙甘草各三錢紅棗十二枚水煎服內經宣明五氣論曰五氣所病心為噫是也旋覆之咸能軟痞硬而下氣代赭石之重能鎮心君而止噫生薑半夏之辛所以散逆止吐人參甘草大棗之甘所以補虛慧得嘉言之心法數十年來活人多矣同志者宜留心焉曾治燮堂伍登相病反胃求治於余診之兩寸關脈大而弱兩尺脈澀而小乃氣血不足大虛之證遂與旋覆代赭湯二劑八味地黃湯八劑繼服八味丸而元氣大復陽強不倒論岐伯曰陽強不倒者乃虛火上炎而肺金之氣不能下行若用知柏二味煎飲立即倒矣但自此以後終歲經年不能重振亦是苦也當知養陽湯甚神治驗曾治邑門丁陳二患陽強不倒延求診治按之右尺洪大而緊餘脈如常視之滿面紅光全無滯氣乃是腎中真陽之人飛越耳遂與元參三兩麥冬三兩煎好取汁一大碗入油桂末七分調藥水服此方妙在用元參最重以泄腎中浮遊之火尤妙在用桂末少許以引其入宅而招散其沸騰之火同氣相求火自回舍況麥冬能助肺金清肅之氣下行以生腎水水足而火自得其養矣此不求倒而自倒也他日亦可重整戈矛再圖歡合耳陽痿不振論岐伯曰陽痿不振乃因過於色欲日泄其腎中真陰之水而腎中真陽之火消亡蓋水去而火亦去自然之理譬如廚下無火何以煮爨生煙必預汲其泉源然後取其薪炭或鑽木取火或擊石取火以煮飲食否則空鐺安爨必至舉室倉皇無生理矣治驗曾治江西徐茂松患陽痿來寓謂余曰愚貿敘郡以勤勞頗獲蠅頭利三十方娶未數月而陽忽痿飲食無味精神衰減松雖不肖亦知不孝有三無後為大如此景況命恐不保焉望嗣乎敢求先生憐治余遂與之酌一方耆術各五錢薑桂附半各二錢砂蔻吳萸川椒各一錢服一劑陽物出而不舉又服一劑舉而不堅改用干熟地一兩白朮五錢山萸杜仲枸杞各四錢遠志巴戟蓯蓉茯神各三錢煎汁沖香甜肉桂末一錢服一劑而陽起三劑而陽強矣此方用熱藥於補水之中則火起而不愁炎燒之禍自然煮湯可飲煮米可餐斷不至焦釜沸干或虞暴碎也繼服強陽壯精丹用干熟地嫩北耆各一斤當歸白朮各八兩巴戟天八兩麥冬柏子仁覆盆子枸杞子虎脛骨嫩鹿茸附子肉桂各四兩白蜜為丸服一料而陽強勢舉飲食健旺步履如舊連生二子縮陽證至有縮陽一證惟立冬至大寒六十日更多春夏秋三時偶而有之治者亦須留心否則殺人頃刻治驗曾治鄧隆太冬月患中寒初則四肢厥逆耳心痛連少腹冷厥關元勢在垂危冒雪請診六脈俱伏面青唇黑舌卷陽縮余曰此正縮陽證也陽縮屬少陰舌卷屬厥陰且耳心亦屬少陰是證乃因酒色過度而釀成耳急用耆術各五錢砂蔻各八分乾薑附桂各二錢吳萸川椒各一錢煎服一劑而效再加蘆巴故紙各三錢收固腎氣四劑而安繼服八味地黃丸而元氣大復附張真人治狐疝神方晝則氣出而腎囊腫夜則氣入而腫脹消白朮五錢沙參一兩柴胡三錢白芍三錢王不留行三錢水煎服一劑即出而不縮矣附孫真人治諸疝痛方沙參一兩橘核三錢柴胡三錢白芍五錢廣陳皮去白二錢家吳萸一錢油桂心一錢香甜者佳水煎服一劑定痛二劑痊愈門人張太和曰吾遊於鄉遇一老翁自云患疝證數十年一日正作無意間與兒童分食梧桐子數勺疾遂止甚訝之後日日摘而食子自此永不作矣因以治患此證者均驗敢問夫子其故何也豫曰疝證乃屬三陰肝木為病想梧桐春榮秋實稟秋金之氣以成其子生於葉之兩旁象病之形矣其味甘而淡合清肅之氣矣性專而直走下行故奏效功如響耳雖然單方之妙多有令人難測者
