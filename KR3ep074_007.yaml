body:
  text: 卷五吐血論余考諸失血之證必察五臟之脈為據心脈沉主咯血尿血肝脈浮主腸風下血脾脈數主嘔吐鮮血肺脈浮主吐衄腎脈沉主小便淋瀝有血診其脈沉小者生身涼者生脈大身熱者死吐後脈微者可治吐衄後脈復大熱躁急者又主死也舒馳遠曰吐血一證諸家以為火證又謂肺金受傷又謂相火爍金是皆不明其理而不知所由來也蓋人生後天水穀精氣所生之血全藉脾胃氣健而為傳布周流設脾胃衰弱不能傳布血乃停蓄膈中然亦不遽動或因憂患或因忿激勞心傷力皆足以動之若其人脾胃強健傳布如常血不停蓄縱使大患卒臨忿激暴起與夫極勞其心傷力之至終未見吐血也可見吐血者必早有停蓄也或又無所因而血自動者乃為積滿之故也又兼有下趨大便而不上逆者雖皆脾胃氣虛然胸中之陽猶能宣布故血不敢犯上而轉下行是便血與吐衄者同源而異流治法總以理脾健胃為主其有誤傳吐衄是火病斯言也貽害天下之蒼生病者亦自謂是火是猶飛蛾而撲燈也冤哉彼不知看本氣分辨寒熱虛實果是火證吐血桃仁承氣湯鼻衄犀角地黃湯弱者或用河間地黃飲子宜矣若是虛證豈不誤矣凡內傷不足而吐衄者又宜加味理脾滌飲溫中散逆脾土虛者加味補中益氣湯以滋化源兼攝血歸經水不足者壯水之主真火衰者益火之原此則一定而不可易者也仲景立法至詳且盡惜雜病論十六捲起死回生因祿山兵火散失無傳總緣王叔和以偽撰而亂仲景陰陽乖舛倒亂六經後人以訛傳訛醫風日趨日下苟非喻嘉言特出手眼尚論三百九十七法釐定六經剖析陰陽金針並度現身說法千古冥冥長夜矣業醫者不讀尚論篇不識六經陰陽之理所以遇病即錯治吐衄者百無一生予常目擊心傷不揆滷下敢將數十年寢食研求得力於仲景嘉言者暢發其意針貶諸家啟迪後賢俾不致貽其誤以償吾生平之所願也夫吐血者非不可治醫家不得其傳不知法主理脾健胃徒據不通之論妄與清金保肺以伐胸中之陽終以滋陰降火伐盡脾中之陽胃陽腎陽均被耗損其命全去雖有善者無能為也憶二十年前醫友人魏學周吐血沖激而出食不下不能言其體火旺陰虧外見舌苔干而口臭心煩惡熱終夜不寐黑暗之中目光如電夫晝明夜晦天道之常今當晦而生明反乎其常矣然所以然者真陰素虧血復暴脫陽無依附而發越於外精華並見故黑夜生明乃是陽光飛墜如星隕光流頃即汨沒危候也藥與大養其陰以濟其陽方用地黃阿膠知母貝母元參側柏童便日服四劑歷五旬服藥二百劑而愈由今思之爾時識力尚欠僅據火旺陰虧一端殊不知吐血者皆由脾胃氣虛不能傳布藥中恨未能重用黃耆白朮等藥以治病之源而彌其後患故病雖愈而根未拔明年九月厥病驟發傾囊大吐血竭而死矣傷心哉向日能用理脾健胃於養陰濟陽之中或者根可除而病不發予無憾矣凡吐血者必兼咳嗽以蓄血與留飲皆由脾胃氣虛故二證每相因或先咳嗽而後吐血或先吐血而後咳嗽又或咳唾而痰血相兼治法總不外乎理脾健胃世醫不得其法不分氣血虛實胡亂瞎撞寒熱雜投以致病者輕而重重者危矣吐血之證多有喘者乃為中氣不足轉運無權兼之腎氣渙散胸中之氣不能下達上逆而為喘法當重用耆術大補中氣故紙益智收固腎氣砂仁半夏醒脾開胃黑姜溫胃逐瘀白蔻宣暢胸膈使中州氣旺健運有權腎氣收藏則胸中之氣肅然下行而喘自止彼皆不得其傳謬謂黃耆白朮二藥提氣死不敢用也曾醫陳子老三之子年十八吐血甚多既則咳唾痰血相兼喘促不能臥奄奄一息人將不堪予曰此證大難非我所能及陳子告曰賤弟兄三人下輩十人皆為吐血已死其九僅此弱子尚未冠敢求先生憐而救之余曰非敢推諉但恐服過清金保肺等藥曷可救也陳子云病雖三月尚未服藥皆因九子被諸醫所殺不敢請耳今聞先生治血神驗故爾相懇乃用黃耆八錢白朮八錢半夏黑姜各二錢砂仁白蔻各一錢煎服明日陳子來寓顏曰昨有數位高醫討藥方一看均皆縮首吐舌詫為不祥謂黃耆白朮提氣是吐血者之大忌若此重用則必喘促加劇而立死矣答曰黃耆白朮提氣之說亦嘗聞之矣舒先生獨不聞有是說乎且吾家九子諸醫皆未用黃耆白朮盡歸於死今舒先生必有精妙之理非尋常所能及吾竟依法與之今早看來覺氣稍平再服數劑血亦漸止飲食漸旺恐其再吐吐亦不妨前藥不可歇乎服至六十餘劑兼服六味地黃丸而痊愈吾見一少年吐血醫家任用止血諸方而強止之以為治得其法殊不知死於此矣夫吐血一證皆由脾胃氣虛不能傳布法主理脾健胃宣暢胸膈使傳布如常血不停蓄其病自愈粗工不明此理希圖暫止謬以為功獨不思停蓄之血敗濁之瘀豈能復行經絡況敗濁不去終為後患壅塞胸膈脾胃愈虧後此新生之血愈不得疏通以致積而復動沖激而出壅塞咽喉搐入鼻管致不得息其死立至醫不強止其血必無搐死之慘未幾少年果為積血復動嗆搐而死矣冤哉繆仲淳有曰吐血有三訣宜行血不宜止血止血血不循經絡而氣逆上壅也行血血行經絡不止自止也強止之則血凝血凝則發熱惡食病日痼矣宜補肝不宜伐肝肝主藏血吐血者肝失其職也補肝亦未為盡善養肝和肝則肝氣平而血有所歸伐肝則肝虛不能藏血血愈不止矣宜降氣不宜降火氣有餘便是火氣降則火降火降則氣不上血隨氣行無溢出上竅之患降氣亦未可盡行惟調之順之降火則必用寒涼之劑反傷胃氣胃氣傷則脾不統血血愈不得歸經矣舉世往往偏用寒涼傷脾作泄多致不救哀哉治吐血精義說大凡虛勞之人亡血失精津液消耗治之尤難內經云針藥所莫制者調以甘藥金匱遵之而用小建中黃耆建中二湯急建其中氣令脾胃強而津液旺自然精生血充而真陰以足余曾考仲景治吐血之方載在雜病論十六卷中專論暴血恨遭祿山兵火遂湮沒無傳自唐迄今千有餘歲偽撰雜出局方甚行世人皆曰吐血是火病斯言一出而治之者概用知柏歸地悶心泥膈欲治血而反耗血竟致百不一救傷哉其殺運使然也國朝喻嘉言先生出深會其旨但用稼穡作甘之味而酸鹹辛苦在所不用誠得神聖之心傳為後世振聾覺聵者善哉嘉言有功千古慧殫心數十年廢寢忘食博考方書研窮經典探賾索隱而會通之提其綱復挈其領且咀嚼其義味真無有過於嘉言先生者觀其心法惟建脾中之陽氣為第一義健脾中之陽氣一舉有三善焉一者脾中之陽氣旺如天晴日朗而龍雷潛伏也一者脾中之陽氣旺能宣散胸中窒塞之陰氣如太空不留纖翳也一者脾中之陽氣旺而飲食運化精微復生其已竭之血也況乎地氣必先蒸土為濕然後上升為云若土燥而不濕地氣於中隔絕矣天氣不常清乎今之方書妄引久嗽或勞痰中見血之陽證不敢用健脾增咳為例不思咯血即有咳嗽不過氣逆上厥之咳氣下則不咳矣而吐衄又有陰火陽火之分如感六淫之邪氣者陽火也則宜以苦寒折之根於七情之逆氣者乃系陰火陰火者龍雷火也相火也相火居於命門寄於肝膽所以為乙癸同源故有龍火雷火之稱肝屬木居東配震震為雷所以為雷火也命門居坎北在兩腎中間龍火居焉故曰龍藏海底動則火騰所以為龍火也龍雷二火藏肝腎中未動不知其為火也及其一發暴不可御以故載陰血而上溢矣夫龍雷之性必陰雲四合然後遂其升騰之勢若天晴日朗則退藏不動矣凡用寒涼清火之藥者皆以水制火之常法若施之於陰火未有不轉助其虐者也古方治龍雷之火每用附桂引火歸元之法然施暴血之證可暫不可常蓋已虧之血不能制其悍而未動之血恐不可滋之擾耳救世君子凡遇斯證必以崇土為先土厚則陰濁不升而血患自息也究而論之治龍雷之火全以收藏為主以秋冬之時則龍潛雷伏也其治法載在三卷相火龍雷論中反復參詳而治吐血之法無餘蘊矣故余案曰治吐血者不得喻嘉言之傳不讀絳雪丹書雖皓首窮經終是下工而已矣適來時勢醫者病家一見吐血認為火證用藥多以歸地芩連鮮用參苓耆術又有親朋毫不知醫交口妄勸寧用寒涼勿用熱藥以致不可救療自誤者無足惜誤人者閻羅王肯輕釋乎余謹剖心瀝血相告且誓之曰今而後治吐血不遵嘉言養葵之法而誤人者死入犁耕地獄並旁操鄙見與天妄薦醫而誤人者均同此罪絳雪丹書血病客有問於余曰失血一證危急駭人醫療鮮效或暴來而頃刻即逝或暫止而終亦必亡敢問有一定之方可獲萬全之利否余曰是未可以執一論也請備言之凡血證先分陰陽有陰虛陽虛陽虛補陽陰虛補陰此真治之法人所共知又有真陰真陽陽根於陰陰根於陽真陽虛者從陰引陽真陰虛者從陽引陰復有假陰假陽似是而非多以誤人此真假二字曠世之所不講舉世之所未聞在雜病不可不知而在血病為尤甚汝知之乎既分陰陽又須分三因風寒暑濕燥火外因也過食生冷好吃炙煿飢飽無度外之因也喜怒憂思恐內因也勞心好色內之因也跌撲閃挫傷重瘀蓄者不內外因也既分三因而必以吾身之陰陽為主或陰虛而挾內外因也或陽虛而挾內外因也蓋陰陽虛者在我之正氣虛也三因者在外之邪氣有餘也內經曰邪之所湊其氣必虛不治其虛安問其餘客問曰吐衄血者從下炎上之火也暑燥濕火宜有之矣何得有風寒之證曰此六淫之氣俱能傷人暑熱者十之一二火燥者半風寒者半而火燥之後卒又歸於虛寒矣內經曰歲火太過炎暑流行肺經受邪民病血溢血泄又曰少陽之復火氣內發血溢血泄是火氣能使人失血也又曰太陽司天寒淫所勝血變於中民病嘔血血泄鼽衄善悲又太陽在泉寒淫所勝民病血見是寒氣使人失血也又云太陰在泉濕淫所勝民病血見是濕氣能使人失血也又云少陰司天之政水火寒熱持於氣交熱病生於上冷病生於下寒熱凌犯能使人失血者也太陰司天之政初之氣風濕相搏民病血溢是風濕相搏血溢也又曰歲金太過燥氣流行民病反側咳逆甚則血溢何獨火乎況火有陰火陽火之不同日月之火與燈燭之火不同爐中之火與龍雷之火不同又有五志過極之火驚而動血者火起於肝憂而動血者火起於肺思而動血者火起於脾勞而動血者火起於腎能明乎火之一字於血之理則思過半矣劉河間先生特以五運六氣暑火立論故專用寒涼以治火而後人宗之不知河間之論但欲與仲景傷寒對講各發其所發之旨耳非通論種種不同之火也自東垣先生出而論脾胃之火必須溫養始禁用寒涼自丹溪先生出而立陰虛火動之論亦發前人所未發可惜大補陰丸補陰丸二丸中俱以黃柏知母為君而寒涼之弊又盛行矣嗟乎丹溪之書不息岐黃之道不著余特撰陰陽五行之論以申明火不可以水滅藥不可以寒攻也六淫中雖俱能病血其中獨寒氣致病者居多何也蓋寒傷營風傷衛自然之理又太陽寒水少陰腎水俱易以感寒一有所感皮毛先入肺主皮毛水冷金寒肺金先受血亦水也故經中之水與血一得寒氣皆凝滯而不行咳嗽帶痰而出問其人必惡寒切其脈必緊視其血中間必有或紫或黑數點者此皆寒淫之驗也醫者不察審其證便以陰虛火動而概用滋陰降火之劑病日深而死日迫矣余嘗用麻黃桂枝湯而愈者數人皆一服得微汗而愈蓋汗與血一物也奪血者無汗奪汗者無血余讀蘭室秘藏而得此意因備記以廣其傳一貧者冬天居大室中臥大熱炕得吐血求治於余余料此病大虛弱而有火熱在內上氣不足陽氣外虛當補表之陽氣瀉里之虛熱是其法也冬天居大室衣蓋單薄是重虛其陽表有大寒壅遏裡熱火邪不得舒伸故血出於口憶仲景所著傷寒論中一證太陽傷寒當以麻黃湯發汗而不與遂成衄血卻以麻黃湯立愈獨有傷暑吐衄者可用河間法必審其證面垢口渴喜飲乾嘔腹痛或不痛發熱或不發熱其脈必虛大汗出者黃連解毒湯主之甚者白虎湯金匱方云心氣不足吐血衄血者瀉心湯主之大黃二兩黃芩黃連各一兩水三升煮取一升頓服之此正所謂手少陰心經之陰氣不足本經之陽火亢甚無所輔肝肺俱受其火而病作以致陰血妄行而飛越故用大黃瀉去其亢甚之火黃芩救肺黃連救肝使之和平則陰血自復而歸經矣愚按暑傷心心氣既虛暑氣故承而入之心主血故吐衄心既虛而不能生血恐不宜過用寒涼以瀉心須清暑益氣湯中加生地丹皮兼犀角地黃治之蓋暑傷心亦傷氣其人必無氣以動脈必虛宜以參耆助氣使氣能攝血斯無弊也客問曰既雲鬚分陰陽則吐衄者陰血受病以四物湯補血是矣參耆補氣奚用之而復有謂陽虛補陽之說何耶曰子正溺於世俗之淺見也自王節齋制本草集要有云陰虛吐血者忌用人參服之則陽愈旺而陰愈消誤服人參者死自節齋一言而世之受病治病者無問陽虛陰虛而畏參如砒毒矣冤哉冤哉蓋天地間之理陽統乎陰血隨乎氣故治血必先理氣血脫必先益氣古人之妙用也凡內傷暴吐血不止或勞力過度其血過行出如湧泉口鼻皆流須臾不救即死急用人參一兩或二兩為細末入飛羅面一錢新汲水調如稀糊不拘時啜服或獨參湯亦可古方純用補氣不入血藥何也蓋有形之血不能速生無形之氣所當急固無形自能生有形也若有真陰失守虛陽泛上亦大吐衄又須八味地黃湯固其真陰以引火歸原不宜用人參其火既引之而歸矣人參又所不禁陰陽不可不辨而先後之分神而明之存乎人耳凡失血之後大發熱者名曰血虛發熱古方立當歸補血湯用黃耆一兩當歸六錢名曰補血湯而以黃耆為主陽旺能生陰血也丹溪於產後發熱用參耆歸芎黑姜以佐之或問曰乾薑辛熱何以用之余曰姜味辛能引血藥入氣分而生新血神而明之不明此理見其大熱六脈洪大而誤用發散之劑或以其象白虎湯證而誤用白虎湯立見危殆不可救矣慎之哉客又曰陽能統陰既聞命矣傷寒吐血亦聞命矣然除傷寒外或者寒涼之藥不能不少加一二以殺其火勢至於辛熱之品以火濟火恐一入口而直衝不止奈何寧和平守中以免怨謗何如若丹溪產後而用乾薑者為有惡露凝留故用之以化其瘀未必可為典要也余見先生治血證不惟不用寒涼而反常用大辛熱之藥屢以奏功不已霸乎余曰子之言不讀古書不究至理不圖活人之命者也試撿古人之名言以驗之金匱方云吐血不止側柏葉湯主之效如桴鼓列方於下側柏葉炒黑乾薑炒黑各二兩陳艾揉絨熟三把炒干馬通炒黑一兩合煮四碗每溫服一碗凡吐血不已則氣血皆虛虛則生寒是故用柏葉柏葉生而向西乃稟兌金之氣而生金可制肝木木主升金主降取其升降相配夫婦之道和則血得以歸藏於肝矣故用是為君乾薑性熱炒黑則止而不走用補虛寒之血陳艾性溫能入內而不炎於上可使陰陽之氣反歸於里以補其寒用一味為佐用馬通者為血生於心心屬午火於是用午獸之通主降火消停血引領而行為使仲景治吐血準繩可以觸類而長之仁齋直指云血遇熱則宣流故止血多用涼藥然亦有氣虛挾寒陰陽不相為守營氣虛散血亦錯行所謂陽虛陰必走耳外必有虛冷之狀法當溫中使血自歸於經絡可用理中湯加南木香或用乾薑甘草湯其效甚速又有飲食傷胃或胃虛不能傳化其氣上逆亦能吐衄木香理中湯甘草乾薑湯出血諸證每以胃藥收功曹氏必用方吐血須煎乾薑甘草作湯與服或四物理中湯亦可如此無不愈者若服生地藕節茅根竹茹去生便遠三因方云理中湯能止傷胃吐血以其方最理中脘分別陰陽安定氣血按患者果身受寒氣口受冷物邪入血分血得冷而凝不歸經絡而血妄行者其血必黑黯其色必白而夭其脈必微遲其身必清涼斯時不急用薑桂而用涼血之劑殆矣臨證之工宜詳審焉褚氏云喉有竅咳血殺人腸有竅便血殺人便血猶可治咳血不易醫飲溲尿百不一死服寒涼百不一生血雖陰類運之者其和陽乎玩和陽二字褚氏深達陰陽之妙者矣王海藏云胸中積聚之殘火腹裡積久之太陰上下隔絕脈絡部分陰陽不通用苦熱以定若中使辛熱以行於外升以甘溫降以辛潤化嚴肅為春溫變凜冽為和氣汗而愈也然餘毒土苴猶有存者周身陽和尚未泰然心中微燥而思涼飲因食冷物服涼劑陽氣復消余陰再作脈退而小弦細而遲激而為吐衄者有之心肺受邪也下而為便血尿血者有之腎肝受邪也三焦出血色紫不鮮此重沓寒濕化毒凝泣水穀道路浸潰而成若見血證不詳本末便用涼折變乃生矣客又問曰吐衄可用辛熱為扶陽抑陰始聞命矣然復有真陽真陰之說可得聞乎答曰醫家之言陰陽者氣血盡之矣豈知火為陽氣之根水為陰血之根乎吾所謂水與火者又非心與腎之謂人身五行之外另有一無形之火無形之水流行於五臟六腑之間惟其無形故人莫得而知之試觀之天日為火之精故氣隨之月為水之精故潮隨之如星家看五行者必以太陽太陰為主然此無形之水火又有以太極為之主宰則又微乎微矣此天地之正氣而人得以生者是立命之門謂之元神無形之氣謂之元氣無形之水謂之元精俱寄於兩腎之間故曰五臟之中惟腎為真此真水真火真陰真陽之說也客又問曰真陰真陽與血何干乎答曰子但知血之為血而不知血之為水也人身涕唾津液痰汗便尿皆水也獨血之水隨火而行故其色獨紅腎中之真水乾則真火炎血亦隨火而沸騰矣腎中之真火衰則真水盛血亦無附而泛上矣惟水火奠其位而氣血各順布焉故以真陰真陽為要也客問曰既是火之為害正宜以水治之而先生獨曰火不可以水滅而反用辛熱何耶答曰子但知火之為火而不知火有不同也有天上之火如暑月傷暑之病是也方可以井水沃之可以寒涼折之若爐中之火得水則滅在人身即脾胃之火脾胃之中無火將以何者蒸腐水穀而分溫四體耶至於相火者龍雷之火水中之火也龍雷之火得雨而益熾惟太陽一照而龍雷自息及秋冬陽氣復藏而雷始收聲龍歸大海矣此火不可水滅而用辛熱之義也當今方書亦知龍雷之火不可以水滅不可以直折但其注皆曰黃柏知母之類是也若是依舊是水滅直折矣誤天下蒼生者此言也哀哉客又問曰黃柏知母既所禁用治之將何如若與前所論理中溫中無異法何必分真陰真陽乎答曰溫中者理中焦也非下焦也此係下焦兩腎中先天之真氣與後天心肺胃脾有形之體毫不相干且乾薑甘草當歸俱入不到腎經惟仲景八味腎氣丸斯為對證腎中一水一火熟地黃壯水之主附桂二味益火之原水火既濟之道蓋陰虛火動者若腎中寒冷龍宮無可安之宅穴不得已而遊行於上故血亦隨火而妄行今用附桂二味純陽之火加於六味純陰水中使腎中溫暖如冬月一陽來復於水土之中龍雷之火自然歸就於原宅不用寒涼而火自降不必止血而血自安矣若陰中水乾而火炎者去附桂而純用六味以神水配火血亦自安亦不必去火總之保火為主此仲景二千餘年之秘豈後人所能筆削一字哉客又問曰假寒假熱之說何如答曰此真病之狀惑者誤以為假也經曰少陰司天之政水火寒熱持於氣交熱病生於上冷病生於下寒熱凌犯而爭於中民病血溢血泄內經蓋指人之臟腑而言少陰司天者腎經也凡腎經吐血者俱是下寒上熱陰盛於下逼陽於上之假證世人不識而為其所誤者吾獨窺其徵而以假寒治之所謂假對假也但此證有二有一等少陰傷寒之證寒氣自下腎經而感小腹痛或不痛或嘔或不嘔面赤口渴不能飲水胸中煩躁此作少陰經外感傷寒看須用仲景白通湯之法治之一服即愈不再作白通湯用附子一枚姜炙黃三錢藥煎好入蔥白四莖加入人尿豬膽汁和服又有一等真陰失守命門火衰火不歸原水盛而逼其浮游之火於上上焦咳嗽氣喘惡熱面紅嘔吐痰涎出血此係假陽之證須用八味地黃湯引火歸元茲二方俱用大熱之藥倘有方無法則上焦煩熱正甚復以熱藥投之入口即吐矣須以水探冷假寒驅之下咽之後冷性既除熱性始發因而嘔噦皆除此加人尿豬膽汁於白通下以通拒格之寒也用八味地黃湯亦復如是倘一服寒涼頃刻即逝慎之哉客又問曰真假之說至矣精矣吾何辨其為假而識之耶又何以識其為傷寒與腎虛而辨之耶曰此未可以易言也將欲望而知之是但可以神遇而不可目欲也將欲聞而知之是可以氣聽而不可心符也將欲問而知之可以意會而不可言傳也將欲切而知之得之心而應之手巧則在人父不能傳其子也若必欲言之姑妄言乎余辨之舌耳凡有實熱者舌苔必燥而焦甚則黑假熱者舌雖有白苔而必滑口雖渴而不能飲水飲水不過一二口甚則少頃亦吐出面雖赤而色必嬌嫩身作燥而欲坐臥於泥水中此為辨也傷寒者寒從下受之女人多有此證大小便閉一劑即愈此暴病也陰虛者大小便俱利吐痰必多此陰虛火衰之極不能以一二藥愈男女俱有之縱使引得火歸又須參耆補陽兼補陰歲月調理倘不節欲終亦必亡而已余所傳如此不過糟粕耳所望於吾子者得意而忘言斯得之矣凡治血調理須按三經用藥心主血脾裹血肝藏血歸脾湯一方三經之藥也遠志棗仁補肝以生心火茯神補心以生脾土參耆甘草補脾以固肺氣木香者先入脾總欲使血歸脾故曰歸脾者有鬱怒傷脾思慮傷脾者尤宜火旺者加山梔子粉丹皮火衰者加丹皮肉桂又有八味丸以培先天之根治無餘法矣薛立齋遇星士張東谷談命時出中庭吐血一二口問之曰賤軀久有此證遇勞即發余曰此勞傷肺氣其血必散視之果然遂與補中益氣湯加麥冬五味山藥熟地茯神遠志服之而愈翌早請見云服四物黃連山梔之類血益多而倦益甚得公一劑吐血頓止精神如故何也答曰脾統血肺主氣此勞傷脾肺致血妄行故用前藥健脾固肺之劑而血自歸其原效如桴鼓一男子咳嗽吐血熱渴痰盛盜汗遺精用六味地黃丸料加麥冬五味治之而愈後因勞怒忽吐紫血塊先用花蕊石散化其紫血又用獨參湯漸愈後每勞則吐血一二口脾脈與肺腎脈皆洪數用歸脾湯六味地黃丸而愈一童子年十四發熱吐血余謂宜補中益氣湯以滋化源不信用寒涼降火愈甚始謂余曰童子未室何腎虛之有參耆用之奚為余述丹溪云腎主閉藏肝主疏泄二臟俱有相火而其繫上屬於心為物所感則易於動心動則相火翕然而起雖不交會其精已暗耗又褚氏精血篇云男子精未滿而御女以通其精則五臟有不滿之處異日有難狀之疾遂與補中益氣湯六味地黃丸而瘥愚謂童子之證須看先天父母之氣而母氣為尤重凡驚風痘疹腎虛發熱俱以母氣為主如母有火者其子必有火其母脾虛者子必多脾病母火衰者子必從幼有腎虛證如齒遲行遲語遲囟門開大腎疳等證皆先天不足從幼填補亦有可復之天不必如上所言方有血證客又問曰吐血衄血同是上炎之火一出於鼻一出於口何也答曰東垣云衄血出於肺從鼻中出也嘔血出於胃吐出成碗成盆也咯血唾血出於腎血如紅縷在痰中唾中咳咯而出也痰涎血者出於脾涎唾中有少血散浸而出也東垣論雖如此然肺不特衄血亦能咳血唾血胃不特嘔血肝亦嘔血蓋肺主氣肝藏血肝血不藏亂氣自兩脅中逆而出之然總之是腎水隨相火炎上之血也腎主水水化液為痰為唾為血腎脈上入肺循喉嚨挾舌本其支者從肺出絡心注胸中故病則俱病也但衄血出於經衄行清道吐血出於胃吐行濁道喉與咽二管不同也蓋經者走而不守走經之血隨氣而行火氣急故隨經直犯清道而出於鼻其不出於鼻者則為咳咯從肺竅而出於咽也胃者守營之血守而不走存於胃中胃氣虛不能攝血故令人嘔吐從喉而出於口也今人一見吐衄便以犀角地黃湯為必用之藥然耶否耶曰犀角地黃湯乃是衄血之的方若陰虛火動吐血與咳咯者可以借用成功若陽虛勞力及脾胃虛者俱不宜用蓋犀水獸也焚犀可分水亦可通天鼻衄之血從任督而至巔頂入鼻中惟犀角能下入腎水水由腎脈而上引地黃滋陰之品故為對證今方書所載如無犀角以升麻代之犀角升麻氣味形性迥不相同何以代之答曰此又有說焉蓋緣任沖二脈附足陽明胃經之脈亦入鼻中火鬱於陽明而不得泄因成衄者故升麻可代升麻陽明藥也非陽明經衄者不可代衄亦有陰虛火衰者其血必點滴不成流須用壯火之劑不可概用犀角有傷寒病五六日但頭汗出身無汗際頸而還小便自利渴飲水漿此瘀血證也宜犀角地黃湯桃仁承氣湯看上下虛實用犀角地黃湯治上桃仁承氣湯治中代抵當湯治下斟酌用之可也有血從齒縫中或牙齦中出名曰齒衄亦系陽明少陰二經之證蓋腎主骨齒者骨之標其齦則屬胃土又上齒止而不動屬土下齒動而不止屬水凡陽明病者口臭不可近根肉腐爛痛不可忍血出或如湧而齒不動搖其人必好飲或多啖炙煿肥甘豢養所致內服清胃湯外敷石膏散甚者服調胃承氣湯下黑糞而愈或有胃虛熱者以補中益氣湯加丹皮黃連若得少陰病者口不臭但浮動或脫落出血縫中出血或痛或不痛此火乘虛而出服安腎丸而愈愚常以水虛有火者六味加骨碎補無火者用八味加骨碎補一兩隨手而應外以雄鼠脊骨散敷之齒動復固又有齒痛連腦者此係少陰傷寒用麻黃附子細辛湯不可不知又有小兒疳證出血口臭肉爛者蘆薈丸主之有怒氣傷肝而成吐衄者其人必唇青面青脈弦須用柴胡梔子清肝散又有鬱氣傷脾者須用歸脾湯加丹皮山梔推而廣之世人因鬱而致血病者多凡郁皆肝病也木中有火郁甚則火不得舒血不得藏而妄行但郁之一字不但怒為郁憂為郁怒與憂固其一也若其人素有陰虛火證外為風寒暑濕所感皮毛閉塞即為郁鬱則火不得泄血隨火而妄行鬱於經絡則從鼻而出鬱於胃脘則從吐而出凡系郁者其脈必澀其人必惡風惡寒不知者便以為虛而溫補之誤矣須視其面色必滯必喜嘔或口苦或口酸審果有如是證必當舒散其鬱為主木鬱則達之火鬱則發之是也其方惟逍遙散為的藥外加丹皮吳萸水炒黃連隨手而應止血後若不用六味地黃丸多服以滋其陰翌日必發吾於五郁論中詳言之矣有飲酒過多傷胃而吐血從吐後出者以葛花解醒湯加丹皮倍黃連使之上下分消酒病愈血亦愈矣有過啖炙煿辛熱等物而得者上焦壅熱胸腹滿痛血出黑紫成塊者可用桃仁承氣湯從大便導之此釜底抽薪之法已上二證雖屬內傷猶作有餘之證治之可用前法也有婦人發熱經水適來適止譫語晝輕夜重如見鬼狀其小便利或不禁此名熱入血室須用小柴胡湯加紅花生地丹皮肉桂歸尾破血之劑熱入血室又方人參當歸柴胡青皮桃仁穿甲炒珠萬年霜見婦科門若舌乾口臭大便秘結方內加大黃三錢酒浸羚羊角三錢磨末此吾師所制方也屢用屢效按用柴胡提出少陽歸尾桃仁紅花以破血結羚羊角瀉熱清肝廓清目中之鬼青皮以開脅下之結萬年霜引裡熱從前陰而出穿山甲直達瘀結之處以攻其堅人參大補元氣以載諸藥而行其用其有中寒而經血適斷者是又寒入血室也仲景雖未言及然亦理之所有者也曾醫一證予以意為之方用耆朮參附薑桂山楂沒藥穿甲數劑而愈若遇中寒而經水適來者或經期已滿者俱不顧慮其血但宜溫經散寒此皆一定而不可易之法也附此以廣後學之所識焉有墜車墜馬跌僕損折失血瘀蓄腫痛發熱者先以桃仁酒軍川芎歸尾赤芍丹皮紅花行血破瘀之劑折其銳氣而後區別治之以和血消毒之藥張子和常以通經散神佑丸大下數十行病去如掃不致有跛癃殘躄之患又常以此法治杖瘡腫痛發熱欲絕者下十餘行而腫消熱退真不虛語也有產後惡露未盡兒枕作痛者須用桃仁紅花歸尾川芎赤芍粉丹皮行血破血之藥加薑桂辛熱以行其瘀又有虛痛無餘血者當另行溫補不可概用破血之劑且以今時之弊言之夫人之吐衄非陰虛即陽虛余備言矣今人一見吐衄失血概以為陰虛者血虛也舍四物何法乎火動者熱也非芩連知柏何藥乎咳嗽者火也非紫菀百部知母貝母何物乎丹溪節齋俱有明訓豈能外之誰知陰虛之證大抵上熱下寒者多始而以寒涼進之上焦非不爽炔醫者病者無不以為道在是矣稍久則食減又以為食不化加神麯山楂再久而熱愈盛痰咳愈多煩躁愈甚又以藥力欠到寒涼增進而瀉泄腹脹之證作矣乃以枳殼大腹皮寬中快氣之品又進至此不斃將待何時是故咳嗽吐血時時發熱未必成瘵也服四物湯黃柏知母之類不已則瘵成矣胸腹膨脹悒悒不快未必成脹也服山楂神麯之藥不已則脹成矣面目浮腫小便秘澀未必成水也服滲利之藥不已則水成矣氣滯膈塞未必成噎也服枳殼青皮寬快藥不已則噎成矣成則不可服藥及阽於危乃曰病犯條款雖對證之藥無可奈何也薛立齋醫一男子年十六發熱咳嗽痰中見血余曰火旺之際必患瘵證遂用六味地黃丸十全大補湯兼服不二旬而愈後不謹慎瘵證復劇仍用前藥而愈是年冬娶妻至春其證復作父母憂之俾其外寢雖其年少尤喜謹疾煎服補中益氣湯三百餘劑六味地黃丸數十斤而愈治驗向日在瀘城曾治曾榮慶患虛勞咳嗽予已治愈三載矣並囑禁服涼藥後因納寵酒色沉迷忽吐血不止醫用瀉火之劑而血愈吐又用止血之劑悶亂不安飲食不進昏暈欲死病者醫家相依為苦聞予在江邑署中買舟告急按其脈小細數而微其勢將脫刻不容緩予曰此血不歸經俗醫誤認為火肆用寒涼真陽受困恐無及也榮慶曰悔不聽先生之言至有今日之苦書曰自作孽不可活宜也痛念老母年逾八旬膝下幼子無養望先生垂憐自當結草予曰僕不居功亦不認過也但視有緣否耳乃與天師引血湯用黃耆一兩六錢當歸七錢黑荊芥穗五錢粉丹皮黑側柏葉黑姜灰各三錢炙草二錢官揀參一錢另熬沖藥水服之一劑而血頓止略進稀粥此方之妙不專補血妙在補氣尤妙在不單去止血反去行血以止血血得寒而凝滯不行逢散則歸經而不逆救危亡於呼吸之間實有神功也再進一劑而起床繼用補中益氣湯合六味地黃湯十劑滋化源以補腎水而行動如常後服人參鹿茸丸一料而元氣大復也向遊永寧曾治陳秀才因父互訟被辱怒氣吐血傾囊而出昏暈於地知予在孫公署內急延予診按之六脈沉小惟左關弦細而數其兄知醫乃謂予曰用止血藥可乎曰不可若強止之則氣悶而不安又問用補血藥可乎曰不可若驟補之則胸痛而不受曰先生高論補止皆不可已聞命矣敢問治之將何法曰乃弟因怒氣傷肝一團鬱氣結在胸中以致沖激而吐宜逍遙散吞左金丸二劑而舒散其肝木之郁繼服散血平氣湯白芍二兩當歸一兩黑荊芥穗軟柴胡鮮紅花黑姜灰黑梔子各三錢甘草一錢水煎服夫怒氣傷肝不能平其氣故至大吐不先舒肝而遽止血愈激動肝木之氣氣愈旺而血愈吐矣方中白芍多用妙竟平肝又能舒氣荊芥穗炒黑皆能引血歸經柴胡舒肝神品適是開鬱之劑所以奏功甚速而攝血歸經甚神也至於當歸非用補血不過佐白芍以成功耳果服一劑而氣舒連服二劑而血無矣再服歸脾湯解鬱結生脾血兼服八仙長壽丸加牛膝鹿茸以滋補腎肝而愈曾治友人周大有之妾性多欲忽暴崩不止昏暈床褥適余在渝回彼知請診按其脈小無力乍有乍無乃血脫之象大有曰敝妾還可治否余曰幸脈小身涼可有救危乃與安崩湯用黃耆白朮各一兩另用人參二錢煎湯調三七末三錢沖服可反危為安也夫血崩之後惟氣獨存不補氣而單補血緩不濟事今亟固其欲脫之氣佐之三七末三錢以澀其血真氣固而血自不脫也果服一劑而崩止吾意男女好色均皆所同遂與補中益氣湯合六味地黃湯大劑煎飲十餘劑頓愈又與六味地黃丸加龜膠鹿茸鹿鞭三味配服一料而元氣大復曾治李符山之妻午膳後聞夫舟覆怒氣填胸忽患血崩四肢作逆痰涎上湧促騎求診按之六脈沉小惟左關尺細數無倫乃與逍遙散加黑山梔黑側柏黑姜灰各三錢炒黑馬通即干馬糞收貯經年者佳五錢桔梗枳殼半夏各二錢白蔻一錢為細末調藥水服一劑吐出痰涎碗許神思稍清明晨進稀粥一碗惟左乳脅脹痛寒熱往來欲嘔不嘔四肢困倦予曰此肝火熾盛中州不運遂與六君子湯加柴胡梔仁芥穗而諸證頓退惟血崩時下其吉歸家謝曰拙荊恐肝火未息先生用涼血之藥可乎予曰不可此乃心肝脾三經血弱氣虛宜服補中益氣湯補脾土脾統血也連服四劑而崩止乃與鹿茸鹿鞭加於六味地黃丸內兼服前湯而元氣復明年四十八雙生曾治雷元子素患衄血一日長流不止奔走求治至即昏暈倒地觀者駭然予曰不妨乃用黃梔子一枚香白芷一錢紙卷燒存性為末以筆管吹之其血立止而蘇令人扶歸乃父曰今承妙方雖然止住但每月數發其流異常敢求先生垂憐再施妙劑拔去根株否則此子終必亡於此病也予曰我有收血妙方治之當效用黃耆熟地生地當歸各一兩黑荊芥穗黑側柏葉黑姜灰各三錢用水煎調三七末三錢明日前證即作乃與一劑少傾其衄微流而止此方補血而不專補血妙在補氣止血而不專止血尤妙在引血歸經夫血即歸經氣又生血自然火不沸騰相安無事矣果服一劑而安連進補中益氣湯加麥冬五味三十餘劑兼服八仙長壽丸至今不發曾醫廩貢王美秀患吐血發熱其病已久精神倦怠肌肉瘦削向治無效漸見沉重乃一日暴吐昏暈床褥其氣將絕周身俱冷獨心中微溫乃兄料不能起將衣冠盡附其身時夜將半忽蘇云到城皇祠中父命速回又昏昏睡去次早促騎求治余診其六脈沉小而微手足厥逆余即用加味補中益氣湯黃耆白朮當歸沙參各五錢升麻一錢柴首三錢懷山茯苓麥冬各三錢遠志二錢五味子六分紅棗六枚干熟地八錢煎服一劑而蘇連進二劑而飲食漸進精神亦長再用補中益氣湯兼服龜鹿地黃丸而痊贈我詩曰國手肱三折青囊蘊太和一經仙術點幾嘆俗家訛虎口醫原少杏林種已多壽人還壽世到處沭恩波曾治曾其恆乃弟冬月患吐血老醫與以犀角芩連知柏數劑叫楚煩亂不能起床其吐加劇乃兄皇皇求治按其六脈沉小而微勢在將脫刻不容緩余曰此太少二陰中寒之證前醫不明六經不知分經辨證溫中散邪肆用寒涼克伐脾陰真陽受困故其血沖激而出孤陽將絕危候也猶幸脈微身涼諒或可救乃與黃耆白朮各用八錢半夏乾薑各二錢砂仁白蔻各一錢碾細末沖藥水服一劑而蘇連進四劑而血頓止飲食漸進因臥室當風夜即壯熱無汗腹痛作泄人事懨懨又似不救之象余細審之壯熱無汗者寒傷營也腹痛作泄屬少陰急於前方中加肉桂故紙大劑溫里少加麻黃桂枝各三錢兼散太陽表邪服一劑而熱退身安腹痛作泄俱已改服補中益氣兼服龜鹿地黃丸一料而愈明年康壯生子曾治國學陽厚重冬月患吐血其人本實先撥因構訟失算忿激暴吐是夜嘔鮮血盈盆昏暈於地不能床褥舉室倉皇莫措伊戚其恆代為請診按之六脈沉微余曰爾勿憂是病雖險猶幸身溫脈微經脈篇云凡失血證脈微身涼者生吐衄後其脈洪數身熱者死足下是勞傷肺腎又兼肝木仲郁故其血沖激而吐但非我不能及乃與補中益氣湯加麥冬五味茯神遠志懷山熟地大劑煎服而安多服補中益氣兼地黃丸而愈曾治門人王臣傑受業未幾患白濁伊岳知醫與之調理一載無效轉加吐血飲食俱困脹悶不安伊師代為請治余細察之病在太少二陰斯時不為之扶脾固腎一味克削致犯腎肝余述丹溪云腎主閉藏肝主疏泄脾主化導今脾腎肝三經失職而誤用茯苓去白陳皮泄其精氣開其孔道以致玉關不禁精無統攝又妄謂為火肆用寒涼孤陽將絕之候何可及也其父變色曰如先生之言此子微矣余曰以脈決之按之沉小而微乃曰王氏有福乃郎之證雖險幸脈微小天猶或永其壽爾勿憂吾與治之遂與黃耆白朮各五錢砂仁八分炒黑姜二錢炙草白蔻各一錢煎服一劑而人事稍定連服數劑而血頓止飲食漸進精神益增又與補中益氣湯歸脾湯生脾血滋化源兼服六味地黃丸壯水之主逾月脾胃頓強精神倍長乃父喜形於色其後每見敬恭有加焉曾治四弟秉珍暴患吐血盈盆每吐則面青形神俱倦不思飲食坐臥不寧按之六脈沉小自胸前背心微熱心中甚緊余曰此少陰厥陰二臟受傷惟肝尤甚因怒氣所致乃與逍遙散煎服吞左金丸三十粒以疏肝氣兼和脾氣二劑而血漸微繼與補中益氣湯加麥冬五味茯神遠志懷山熟地生薑棗子連進數劑以攝血歸經而愈自謂強壯即不服藥已三年矣去冬復吐時因貿易匆匆不以為事今春加劇方來求藥仍與前逍遙散方加左金丸二劑加味補中益氣湯連進數十劑神氣清爽飲食漸旺身漸強壯吾弟顏曰今而後我再不敢不信藥矣又問歸脾湯可服乎曰可但其方中去木香甘草加五味子肉桂脾腎兩補兼服龜鹿地黃丸壯水之主補血生精而愈曾治徐桂之女李徐氏年三十患大便久下鮮血醫治三載無功起坐不寧昏暈床褥飲食不進肌肉瘦體白若枯骨內兄為之請診按之六脈沉微勢在將脫不可救也乃勉強作劑用干熟地一兩當歸七錢酒芍五錢川芎三錢黑姜灰黑側柏葉黑馬通各五錢炙草一錢令進六劑旬日外不見信息余意其病必死矣否知兩旬其兄來寓曰余妹因近日移居諸事匆匆是以覊絆今特請愚來致謝先生並求補劑余聞搖首曰嘻令妹之壽長也李氏之福也我之藥力幸遇也余焉得居功哉又與補中益氣湯兼服龜鹿地黃丸而元氣大復明年生子曾治南邑張配先其家殷實年三十患癆瘵前士乃用全真滋膏治之一載無功病在垂危伊舅宋肇堂代為請視診之兩寸浮大而空餘脈沉微面部黑黯毛髮乾燥膚無潤澤形神俱疲聲啞無音欲咳氣緊步履維艱余曰足下初患三陰虛寒之證法當驅陰回陽醫者不知分經辨證一味滋陰以致陰愈長而陽愈虧種種難明之疾具矣然欲治之非數百劑之湯藥數十斤之丸餌不可問愈期以年計不可以月計僕方認勞也彼曰賤軀十死只冀一生耳先生憐而救之敢不惟命是聽爰與補中益氣湯加麥冬五味茯苓半夏訶子銀杏三十餘劑病未增減又與前藥三十劑兼服八味丸加鹿茸去附子十二斤咳聲雖小其音清亮又三十劑其氣漸平又服十全大補四十劑前丸十二斤是時冬至明年仲春湯丸服畢皮膚光澤聲音諧和歡笑如舊矣又與人參養營湯六十劑前丸十二斤又明年春病已痊愈彼曰再服一年庶免後患余曰善又與補中益氣湯四十劑以滋化原龜鹿地黃丸十六斤滋補腎肝至今十五載而無恙計服湯藥二百三十劑丸餌五十二斤此服藥之最有恆者予亦遇之罕矣可為較量錙銖不知愛身惜命者示曾治西席達夫樊孝廉向有血證來家館復作人事倦怠飲食少進面青唇黑余曰先生貴恙乃心肝腎脾四經俱屬虧損先與逍遙散一服吞左金丸三十粒以舒肝和脾而神氣清爽再與補中益氣湯加麥冬北味茯神遠志懷山熟地以滋化源攝血歸經兼服龜鹿地黃丸一料壯水生血而愈明年赴京至今不發又治其弟廩生三錫亦余西賓也同患血證亦用前法調理而愈次年體偏枯右手足不遂乃與獨活寄生湯二十劑補中湯加紅花三分黃柏三分史國公藥酒四十斤湯藥二十劑而痊愈藥酒方多試之神驗者惟此向日在渝曾治張洪泰年五十形體魁梧酒色過度本實先撥忽吐衄盈盆昏暈床褥不省人事知余在英公署中告急請治按其脈右寸浮大而空左關弦細而數余俱沉小皮膚微溫余曰血勢奔騰脫證已俱刻不容緩乃用人參五錢黃耆一兩當歸七錢熟棗仁三錢濃煎二次布漉去渣調真三七末三錢行內有知醫者進而問曰血乃有形之物今忽暴吐則一身之中如大兵之後倉廩空虛田野蕭然何況傾囊其無血以養可知斯時不急生血補血先生方中一味補氣得無迂而寡效乎余哂曰治吐血不得喻嘉言之傳不讀趙養葵絳雪丹書雖皓首窮經終歸無用經云有形之血不能速生而無形之氣所當急固當奉為吐衄之妙訣蓋血乃有形之物氣乃無形之化有形不能速生而無形實能先得況有形之物必從無形中生來陽生則陰長之義不知補氣正所以補血生氣正所以生血也今既大吐只存幾希一線之氣若不急補其氣一旦氣絕在何地補血而生血哉問者大悅唯唯而退煎服一劑而蘇血亦頓止又與歸脾湯去木香甘草加五味肉桂煎湯調鹿茸末數十劑兼配六味地黃丸一料服之而愈元氣大復曾治庠生聶子聞年十八患吐血屢治不效乃堂伯灼三公為人孝友視侄如子來寓求診按之右關微澀而芤餘脈如常余曰飲食所傷而致吐血乃與理脾滌飲四劑飲食有味精神漸爽忽又吐血甚多其伯曰恐乾薑燥動其血余曰非也今多吐者早有停蓄乃為積滿之故也皆由脾胃氣虛致不能傳布法當理脾健胃大補中氣宣暢胸膈又服數劑而血漸止乃與補中湯加麥味茯神遠志懷山熟地兼服六味地黃丸加五味子鹿茸而愈又治庠生閔晉士年十六患吐血甚多諸醫罔效形神倦怠懶於行動乃舅譚秀才送來求治余曰童子未室病何沉重致此問前所服之藥一味滋陰清火損傷脾胃以致飲食頓減胸中作痞四肢無力乃與加味補中益氣湯以滋其化原兼以攝血歸經又兼服理脾滌飲宣暢胸膈六十餘劑繼用歸脾湯去木香甘草加五味子肉桂鹿茸脾腎兩補而愈曾醫恆裕李曜採其年六十有六為人公直因店務匆匆未暇省親每云思念親恩寸心如割乃一日忽報老母棄世仰天捶心口吐鮮血昏暈於床醫者不察病因但據其形體健旺主用三稜莪朮黑醜大黃等破血破氣寒涼肆投脾胃大傷胸腹痞滿咳嗽增劇飲食大減形神俱憊舉動艱難留連日久舌苔積粉口吐癰膿腥臭稠黏醫又曰肺已壞矣藥不必服速具衣棺可也幸有屈戴二契交者不忍坐視迫余治之余曰病者與僕交厚情深恨當日不信余言致害深矣我亦無如之何也今承二公美意非不欲救餘生奈病沉危恐不可及乃勉強與以人參養營湯加附片倍熟地煎服一劑安眠熟睡明日而人事稍蘇面上病色略退儼有可生之象連進十劑飲食漸進再服二十劑行動自如精神漸起又與加味補中益氣湯兼服龜鹿地黃丸而安三載後因店務勞心血又復吐其勢誠不可當病者惶惶人事困倦形羸不堪仍求余治遂與洋參三錢黃耆八錢白朮五錢自片乾薑炒黑五錢炙甘草二錢煎服二劑而血頓止繼服干極熟地一兩山藥山萸各四錢粉丹澤瀉茯苓各三錢麥冬五錢北味八分歷兩旬而元氣大復若用真正官參更妙已上治內傷吐衄諸案必多重用黃耆昧者不知予為暢發其妙黃耆為諸藥之長本草冠之為首如建中湯用黃耆治諸虛不足準繩曰血不足而用黃耆黃耆味甘加甘草而益氣此仲景二千餘年之秘故東垣補中益氣湯中多用之近世鮮有知其補氣之功補氣即是補血血從氣中生也經曰無陽則陰無以生無陰則陽無以化以甘益胃而生血厥有旨哉余思當歸補血湯黃耆五倍於當歸而慧之所以重用者即此意也敢以告之同志焉夢遺精滑趙氏曰治以腎肝為主經曰陰陽之要陽密乃固苟陽強不密陰氣乃絕陰平陽密精神乃治陰陽離決精氣乃絕夫所謂陽強者乃腎肝所寄之相火強也所謂陰絕者乃腎中所藏之真陰絕也腎為陰主藏精肝為陽主疏泄是故腎之陰虛則精不藏肝之陽強則火不秘以不秘之火加臨不藏之精除不夢夢即泄矣或問曰何故不為他夢而偏多淫夢耶答曰靈樞經淫邪發夢篇云厥氣客於陰器則夢接內蓋陰器者泄精之竅主宗筋足太陰足陽明足少陰足厥陰之筋與夫沖任督三脈之所會諸筋皆結聚於陰器而其中有相火寄焉凡平人入房而強於作用者皆此相火充其力也若不接內不與陰氣合則精不泄一接內與陰相合則三焦上下內外之火翕然而下從百體玄府悉開其滋生之精盡趨陰器以泄而腎不藏矣若其人元精堅固者淫氣不能搖久戰而尚不泄況於夢乎縱相火動而成宵夢夢亦不遺此謂陰平陽秘無病人也今人先天稟賦原虛兼之色欲過度以致腎陰衰憊陰虛則火動相火之系上繫於心為君火感物而動動則相火翕然而隨雖不交會而精已離其位即客於陰器間矣夜臥時當所寄之相火一遇與接內時與陰氣相合同故臥而即夢夢而即遺矣若腎不虛則無復是夢夢亦不遺也故治是證者先以腎肝為主或又問曰陰虛火動而夢遺服丹溪補陰丸以滋陰降火則證與藥相對每依法服之而不效何也答曰此未得丹溪之本義也蓋丹溪心法第一方原以腎氣丸為滋陰之要藥也今人不會其意以黃柏知母為君概用坎離丸固本丸之類凡此皆沉寒瀉火之劑苦寒極能瀉水腎有補而無瀉焉能有裨於陰哉獨薛立齋發明丹溪之所未發專用六味地黃丸以補腎而治夢遺屢效縱有相火水能滋木水升而木火自息矣倘有脾胃不足濕熱下流者以前丸為主煎服補中益氣湯以升提之有用心過度心不能主令而相火代事者亦以前丸為主而兼用歸脾湯有命門火衰元精脫陷玉關不閉者急用八味鎖正丹以壯真陽使之涵乎陰精而不泄此其大略也歸脾湯人參茯神黃耆白朮龍眼肉各三錢木香炙草各五分酸棗仁一錢薑棗煎服薛新甫加當歸曲志各二錢亦妙昔趙以德云予治鄭魯叔二十餘歲攻舉子業四鼓猶不臥遂成此病臥間玉莖但著被與腿便夢交接脫精惟是懸空不著則不夢飲食日減倦怠少氣此用心太過二火俱起夜不得睡血不歸肝腎水不足火乘陰虛入客下焦鼓其精房則精不得聚藏而欲走因玉莖著物厥氣客之故作接內之夢於是上補心安神中調脾胃升其陽下用益精生陰固陽之劑壯水之主近三月乃痊吳茭山有治遺精得法論云一男子用心過度遂夢覺而遺多痰瘦削諸醫以清心蓮子飲久服無效吳先生診其脈緊澀知冷藥利水之劑太過致使陰氣獨降服此愈加劇矣余以升提之法升坎水而濟離火降陽氣而滋陰血次用鹿茸人乳填補精血不愈月而痊愈因思夢遺多端難作一途施治有因飲酒厚味痰火濕熱之人多有之夫腎藏精精之所生由脾胃飲食化生而輸歸於腎今脾胃傷於濃厚濕熱內郁中氣濁而不清則氣所化生之精亦得濁氣腎主閉藏陰靜則寧今所輸之精既有濁氣則邪火動於腎中而水不得寧靜故遺而滑也此證與白濁同丹溪曰白濁為胃中濁氣下流滲入膀胱無人知此也又有欲念太過而致滑遺者當從心腎治但兼脾胃者須兼脾胃治多須審察有因用心積熱而泄者有因多服門冬知母黃柏茯苓車前冷利之藥而泄者有因久泄玉關不閉而泄者治療之法積熱者清心降火冷利者溫補下元腎氣獨降者當升提使水火交而坎離定位以上二案皆以腎為主而兼治心脾也獨有一等腎不虛而肝經濕熱火旺者莖中作痛筋急縮或作癢或腫或挺縱不收白物如精隨尿而下此筋疝也宜用龍膽瀉肝湯張子和曰遺尿閉癃陰痿浮腫精滑白淫皆男子之疝也若血涸不月月罷腰膝上熱足躄嗌乾癃閉而小腹有塊或定或移前陰突出後陰痔漏此女子之疝也惟女子不曰疝而曰瘕按遺精有四有用心過度腎氣不攝而致者有因色欲不遂精氣失位輸精而出者有淫欲太過滑泄不禁者有年壯氣盛久無色欲精氣滿而溢出者有小便出多不禁者或不因小便而自出者或主出而其癢痛非常如欲小便者方宜辰砂妙香散辰砂妙香散山藥薑汁炒二兩人參黃耆茯苓茯神遠志各一兩桔梗五錢甘草木香辰砂各三錢麝香一錢合共為末每服三錢酒調下或威喜丸大補元氣為主方稱醫手曾治汪少宰患白濁用補中益氣湯倍白朮加茯苓半夏而愈後不慎飲食大傷脾陰肌體瘦削不時眩暈用八味丸補脾之母而痊又治陳思舜不慎飲食痰火濕熱白濁大下告急延治乃與補中益氣湯兼服六味地黃丸而瘥又治柴光祿因勞傷患赤白濁遂與歸脾湯而愈又治張思廷小腹不時作痛莖中出白淫乃與小柴胡湯加山梔龍膽草山萸肉川芎當歸而愈愚常以逍遙散加歸芎山萸山梔膽草治前證其效更捷舒馳遠曰余常見有虛寒之人因黃庭火憊真陽不能內守而竭於下者則陽強勢舉腎精傾泄無可聊奈之極醫者無法可施束手待斃而已細繹其故粗工僅知培補腎陽但用附桂枸杞桑螵蛸茯苓陳皮等藥而不重在中宮之陽始初即當重用黃耆白朮則黃庭火種不致滅也稍緩則無及也而況不用者乎且又有誤用茯苓陳皮泄其真氣而開其孔道以致關門不禁精無統攝若再誤以為火妄投寒涼孤陽立絕矣急當灸百會穴溫其上以升其陽則陽自安而勢自收藥中不可溫補腎陽愈動其火而更走其精法宜重用黃耆白朮人參鹿茸溫補黃庭或補中益氣湯加胡巴故紙用鹽水炒收攝腎氣益其氣而舉其陷則腎自固而精自守此一定之法也真陽發露者或衛陽解散則多汗而為亡陽或虛陽上越則面赤而為戴陽或中宮陽去則能食而為除中或孤陽下陷則火動而為下竭總緣黃庭衰憊不能統攝之故務當亟早重用黃耆白朮則黃庭有所主持諸陽不致發露矣治驗曾治魏孝廉發熱遺精或小便不禁診其脈右寸浮大右關微弦左寸關俱沉微兩尺俱遲而芤余曰此勞傷脾腎俱屬虧損遂與補中益氣湯合六味地黃丸料煎服十劑頓愈勸令多服補中益氣湯以滋化原兼服六味地黃丸壯水之主至今不發又治王孝廉勞則遺精牙齦腫痛余即以補中益氣湯加茯苓半夏白芍並服六味地黃丸漸愈更以十全大補湯而元氣大復又治俞萬順夢遺白濁口乾作渴大便燥結午後發熱余以補中益氣湯加白芍元參兼服八味丸而瘥曾治雷監生患莖中痛或小便作癢出白津余用逍遙散加半夏茯苓山梔澤瀉木通龍膽草煎服二劑而痊繼服六味地黃丸壯水永不再發曾治李文隆便血精滑或尿血發熱或小便不禁余曰足下腎經虧損已極遂以補中益氣湯合六味地黃丸料滋其化源而愈又治湯孝廉遇勞遺精申酉二時大熱其齒痛不可忍余曰此脾腎虛熱先煎補中益氣湯送六味地黃丸更服人參養營而瘥曾治春橋茂才魏表弟稟性剛直為人厚道素患中氣不足遺精唾血愚於庚午春診之右寸脈大於五部惟左尺沉遲而芤余曰足下之恙乃濁氣下降清陽不升中州鬱滯脾失健運黃庭衰敗不能攝血兼以腎氣渙散或觀書久坐或作文用心每勞必遺精緣因茯苓陳皮疏泄太過一味滋陰以至陰愈長而陽愈虧矣春橋曰分經用藥陽生陰長既聞命矣敢問治之當何法答曰明乎哉問也乃用黃耆白朮大補中氣益智故紙收司腎氣砂仁半夏醒脾開胃乾薑白蔻宣暢胸膈使中州氣壯轉運有權腎氣收藏胸中之氣肅然下行再加煎當歸茯神遠志棗仁安神益智麥冬甘寒潤燥金而清水源五味子酸溫瀉丙丁而補庚金更以鹿鞭大補腎陽耆朮參茸溫補黃庭益其氣而舉其陷則腎自固而精自守再服龜鹿地黃丸壯水之主大補精血可保長年矣彼見余議病精確依法調理而安明年冬以書謝我曰三折妙手俾得遠近回春萬應仙方普動親疏誦德弟不知何修而得遇此矣沐恩愚表弟奇逢頓首甲戌冬又因驚聞戚友家難不忍坐視代為憂鬱前證復作偶因外寒邪中章門痛如刀插人即昏暈倒臥床褥乃兄倉惶急延予診按之六脈已伏惟右寸浮大乍有乍無細察其候脫證已具八九刻不容緩乃與逍遙散舒肝氣歸脾湯解鬱結合煎一劑而蘇明早復診脈出如常矣以理脾滌飲加草蔻一錢煎服二劑而安春橋復問余曰章門結塊痛似刀插又兼麻木人即昏暈而脈即伏果為何證余曰窘乎哉問也其理莫措靜而籌之明日方得其解麻乃血虛木乃濕痰皆脾腎經寒所致緣君平日憨直善怒怒則未有不傷心肝脾三經者也理脾滌飲乃對證之方兼服歸脾湯解鬱結生脾血補中益氣湯壯脾胃生髮諸經龜鹿地黃丸以滋補腎肝湯丸並進自必永壽丙子秋又書曰弟自幼至壯多病床褥父母常憂不壽庚午春天以兄臺賜弟一飲妙劑回生不獨弟蒙深恩即堂上白髮亦暗自怡顏以為弟身強壯可以讀書稍慰於萬一耳沐恩愚表弟頓首稟謝曾醫優生雷大壯賦性端方為人誠厚素患遺精緣因先天不足中氣大虛雖自調養究之治未得法丙戌之秋病臥床褥脫證已具舉室倉惶乃弟求診按之六脈沉微右寸脈大而空左尺遲細而芤察其色詢其狀腎氣渙散屁無休息尤兼下利不能收固心慌之極自知其不可為矣余哂曰不妨觀子面白唇紅聲音清亮目精尚慧生氣勃勃雷氏尚有福庇也縱病雖重吾藥可解子何憂哉乃與黃耆白朮大補中氣砂仁半夏醒脾崇土胡巴故紙收固腎氣懷山芡實蓮子兜塞大腸澀以固脫大劑多服使精生神足腎氣收藏元氣自復兼服龜鹿地黃丸加牛膝虎膠壯水生津強筋壯骨如法調理果逾月而安汗證遺精自汗盜汗脈大而虛浮而濡者汗在寸為自汗在尺為盜汗自汗屬陽虛盜汗屬陰虛傷寒之脈陰陽俱緊法當無汗若自汗不止名曰亡陽不治盜汗屬陰虛睡中而出醒則止矣當歸六黃湯治盜汗之神藥也當歸六黃湯秦歸熟地生地黃耆各五錢川連川柏黃芩各一錢水煎至酉時連煎二次服應如桴鼓否則功緩忌油葷尤須能自愛惜見效甚補中益氣湯若內傷自汗屬陽虛也法宜補中益氣湯加熟附子蜜炙麻黃根浮小麥老桑葉薑棗煎黎明服之其神效捷於影響但升麻柴胡必要蜜水炙過制其勇悍升騰之性又欲引參耆入肌表不可缺也浮麥收汗桑葉止汗更不可少也如左寸脈浮洪而自汗者心火炎也前方倍參耆加麥冬五味川連左關脈浮弦而自汗者挾風邪也本方加桂枝白芍陰不虛者白芍不用左尺脈浮洪無力而自汗者水虧火旺也前方重加生地或重加熟地尤須斟酌右寸脈浮大而無力者自汗不止前方加五味棗仁右關脈浮洪無力而自汗者前方倍參耆右尺脈洪大無力而自汗者或兼盜汗乃相火挾心火之勢而上伐肺金也又宜當歸六黃湯自汗盜汗陰陽兩虛之證或睡或醒時常出也以補中湯去升柴加茯苓白芍熟棗仁煅蠣粉少加蜜炙知柏浮麥五錢煎服按前證汗出不止肢體倦怠用黃耆附子湯上氣喘急盜汗氣短昏暈者用參附湯腎氣虛弱盜汗又兼發熱用六味地黃丸腎氣虛乏盜汗惡寒者用八味地黃丸氣血虛而盜汗者用八珍湯加黃耆知柏少許或十全大補湯或歸脾湯酌而用之陽盛陰虛者用當歸六黃湯心腎虛弱者六味地黃丸曾治黃孝廉素勤學因冠早患夢遺滑精發熱盜汗醫以清離滋坎湯唾痰見血足熱痿軟又與四物湯加知柏其汗更甚促騎求治六脈皆浮余察其色聞其聲問其因知其病即與補中湯加麥味茯神遠志懷山干熟地數十劑兼服八仙長壽丸而愈耆附湯黃耆一兩附片三錢治氣虛陽弱自汗不休肢體倦怠參附湯人參五錢附片二錢治真陽不足上氣喘急自汗盜汗氣短頭暈姜附湯乾薑五錢附子一枚治霍亂轉筋手足逆冷多吐嘔逆自汗盜汗金鎖正元丹川蚊蛤老的去蟲茯苓各八兩巴戟一斤故紙十兩肉蓯蓉胡巴各一斤龍骨火煅硃砂飛淨各三斤為末酒糊丸每服五錢空心鹽湯吞下或甜酒兼吞服亦妙治真氣不足元臟虛弱飲食減少恍惚健忘氣促喘乏夜多異夢心忪盜汗小便滑數遺精白濁一切元臟虛冷之證並皆治之曾治同庚廩生王蘭香素好勤學四鼓猶未臥忽自汗夢遺瞑目即泄乃翁求治予曰此因勤勞三陰受傷遂與補中益氣湯合六味地黃湯煎服四劑而夢稀少精神稍舒乃依仲景法用芡實八兩懷山生棗仁各十兩建蓮子心中綠芽五錢焙乾和前藥為末米湯打為丸梧子大滾水送五錢日二服此方平淡之中有至理存焉蓋心一動而精即遺乃心虛之故而玉關不閉也方中山藥補腎而生精芡實生精而去濕生棗仁清心而益心包之火蓮子心尤能清心而氣下通於腎使心腎相交閉玉關之聖藥誰知蓮子之妙全在心俗醫棄置弗敢用良由所見不廣耳妙哉斯論乃載在大乘蓮花經內醫道所以須通竺典生棗仁正安其不睡始能不泄妙在與山藥同用又安其能睡而不泄治夢遺成勞者每小便桶內起泡盈桶此腎水衰閉也以人山藥花為末用溫酒調服三錢而愈余嘗聞士子讀書辛苦勤勞最宜節欲蓋勞心而妄想又不節欲則相火必動動則腎水日耗水耗則火熾火熾則肺金受傷而變為勞輕則盜汗自汗夢遺精滑重則咳嗽唾痰吐血衄血體旺者幸遇明醫扶之即起體弱者治之尤難一遇庸醫誤投寒涼輕者重而重者死矣冤哉慧溷杏林五十年來深知讀書之苦心洞鑑得病之情由帝君遏欲文云未犯者宜防失足曾行者急早回頭慎勿馬到臨崖嘆收韁之晚也愛身惜命者速宜猛省自重如珠玉焉可也心跳論心跳一證舉世皆謂心虛主用棗仁柏仁遠志當歸以補心血於法不合心君藏肺腑之中身居大內安靜則百體順昌否則百骸無主顛沛立至豈有君主跳而不安百官泰然無事治節肅然而不亂者乎必無此理也觀仲景書中有心下悸無心跳之說若謂心虛者心跳何以脾虛者脾不跳腎虛者腎不跳耶蓋心下悸者心下有水氣脅下悸者脅下有水氣臍下悸者臍下有水氣皆陰氣挾水而動法主扶陽以御陰補土以逐水彼以心下悸為心跳然則脅下悸與臍下悸者又是何物跳耶何其所見之不廣耳或曰凡受驚而心跳跑急而心跳者非心跳乎是則毋庸置喙余曰非也蓋驚則氣散跑則氣傷不過陽氣受虧陰氣上干而悸尚在肺腑之外安能搖動大內乎是理之一定者也且要知病在氣分不可用血分之藥以犯仲景之戒耳辨肺癰肺痿論咳唾膿血腥臭稠黏為肺癰肺痿也肺癰之證面紅鼻燥咽中乾澀喘咳咽啞胸生甲錯肺痿之證口吐涎沫飲一溲一遺尿失音二證之治法以肺癰宜瀉肺痿宜補之外均當滋陰清火潤肺豁痰愚謂所論一切甚荒唐也肺為嬌臟豈可生癰潰出膿血肺已壞矣尚可生乎哉或曰可生綱目且載有犯凌遲罪者當日訊拷其背肺被拷壞潰而吐血獄吏憫之服以白芨末補長其肺典刑時見其肺上白芨末尚未盡化此更無理也隔諸骨脊不能傷肺何肺拷壞而骨不壞耶且白芨由食管入胃不由氣管入肺其訛顯然矣其所謂肺癰者實由里燥協痰血而上搏結而生臭也胸生甲錯燥侵胸膈上脘乾燥咳逆而刺痛者也面紅鼻燥咽乾暗啞皆燥證也法宜二冬甘桔玉竹蔞仁川貝雞子白俟其燥去津回咽膈清利仍當耆朮參苓砂蔻星半二冬甘桔以善其後又謂肺痿者虛寒協痰血而上鬱結而作臭也吐痰涎沫者寒飲上逆也音啞者痰壅胸膈也虛寒在下溲便清長腎陽衰敗甚則遺尿法宜耆朮參附薑半砂仁白蔻故紙鹿鞭桑螵蛸其證皆與肺經無相涉也何得謬名肺癰肺痿哉茲特辨之治蟲論蟲生於濕法屬太陰緣因脾臟虛寒則停食而生蟲藥主扶陽補土以逐其濕兼用殺蟲其二義也後人咸宗烏梅丸謂蟲得酸則伏得苦則安然黃連苦寒損傷真陽烏梅酸寒滋津生濕安能治蟲乎治蟲之道務當燥濕竭力殺之而已伏之何益乎安之亦何為乎治驗曾醫謝生者初患縮陽服黃耆白朮合四逆湯而愈但人事倦怠飯量反加善消善飢食未久又索食於是日食五餐夜食二餐凡三碗出弓二次通計一日所食過平時三倍人事倦怠不能起床起則暈眩此蟲證顯然凡虛弱之人不能多食食固難消日食三倍非蟲何以消之食愈多而愈倦者飯為蟲消不能養人反消耗其氣也起則暈眩者蟲因人動擾亂而神昏也方用耆術各八錢星半薑附各三錢以扶陽驅濕因其病源從厥陰而來用吳萸川椒各二錢加枯礬二錢以殺蟲服二劑飯減如常人能起床乃減去枯礬又數劑而愈治蟲之法無過於此其他諸藥皆非法也蓋明礬性涼煅枯則溫且燥故能驅濕殺蟲凡治痰飲咳逆於理脾滌飲湯藥中另用枯礬飯碾成丸服一二錢屢見速效治濕毒潰清膿流水不幹者服枯礬丸亦可收功蓋屢試屢效者也門人向於夫子曰吾師醫太平鄉之證人皆稱奇弟子願聞其詳答曰晰理精深難為不知者言也今為子言之其人因家難不決數月一悶忿怒不已歲底歸家抱病不堪神識不清不知晝夜欲寐不寐惺惺達旦醫家為之安神開鬱病轉加劇求予診視脈微如絲按之即絕人事不知飲食不下翕翕微熱濈濈微汗昏眩少氣欲言不出且又興陽強良不已每夜將半胸中攘擾而氣欲脫五更方安日中亦然客問曰此病陽虛之極何得腎陽復強予曰明乎哉問也此乃孤陽下陷為陰所逼陽從下竭之證也客又問曰胸中擾攘痰乎氣乎予曰窘乎哉問也並無形跡其理莫措靜而籌之明日方得其解其人抱悶終日默默不欲人言靜而生陰也濁陰壅遏胸中冒蔽清陽所以神識不清且飲食不下子午二時陰陽代謝因其陰過盛不容陽進代謝之頃故有此脫離之象其所以不得寐者亦為孤陽不得與強陰交也然此證非外邪直中之陰不可以附桂等藥驅而逐之法當大補其陽陽旺則陰消陰消陽不陷且腎火必自安而陽亦自不興矣方用耆朮參薑遠志白蔻一劑而效十餘劑而安醫案方論百病之客乎人身也必有因以客之經曰邪之所湊其氣必虛不治其虛安問其餘又曰治病必求其本誠萬世之醫旨也假如發熱臉紅煩躁似有餘也然究其本乃脾胃氣虛不能傳運則虛乃其本也理宜推揚穀氣助脾消化方稱醫手若徒從標攻伐則內傷之患接踵而至更如傷風感冒頭痛壯熱雖似有餘所謂邪氣盛則實實因衛氣不固所招也若純用猛劑發散則表氣愈虛外邪之乘虛而入何時而已耶更加咳嗽喘促煩躁不安肺氣熱盛似有餘也細究其源非水不能制火即虛陽上浮設從標理肺為事治雖暫愈而發愈甚故凡外湊有餘之證即本經正氣不足之時也若不從源調治正當不足而更不足之虛者愈虛而危亡繼其後矣明通之士貴乎顧本求源杜危防險則病根永絕正氣發生其病全去長年可保慧自入杏林迄今五十年矣凡治傷寒外感一切虛實之證均遵長沙公之法分經治病其餘春夏秋三時之雜病察其證見何經即用何經之藥以治之百發百中至於內傷諸證其所用者多以補中益氣湯理脾滌飲二方出入加減以理脾胃至於陰虛陽虛即以六味八味壯水之主益火之源其餘六君四物八珍四君十全養營歸脾獨參生脈理中對證用藥效如桴鼓不敢私秘敢以盡告同仁客問曰先生治病則甚效而用藥則甚常吾所見之方多用補中益氣湯理脾滌飲六味八味等湯居多余方少用不過偶而用之豈百病同一治法乎余曰子不觀經曰知其要者一言而終昔岐黃神聖不過昭明陰陽盛衰邪正虛實勝負生克此外無別論也蓋天地造化雖奇而其陰陽則一不外五行生剋之用其為真陽真陰之主者日月是也人身大小強弱雖殊而其安危修短不外五臟盛衰之變以血氣為用而水火為根也若將舍此而嗜奇是欲達天地陰陽於五行之外而謂生人另有臟腑水火之用耶夫天人一體造化不能奇而外乎陰陽人生不能奇而殊臟腑司命之士豈能越臟腑水火之外嗜奇為事哉況邪之所湊其氣必虛病至危元神已憊一勝一負理之自然治病者補正攻邪尚虞不及曷敢胡亂瞎撞視人命如兒戲耶夫醫肇自岐黃內經仲景立八味丸以補命門真火是重先天之陽也錢仲陽減桂附名六味丸以治小兒是重先天之陰也李東垣重脾胃立補中益氣湯是培後天化生之源也朱丹溪補氣補血立四君四物為主助後天生化之用也薛立齋以歸脾補中養營八味為主先後二天陰陽並顧也趙養葵守六味八味而互用是先天陰陽兼重也馮兆張法趙養葵立全真一氣湯以醫貫包入錦囊書中先賢博輯群書不敢矜奇說立異方者亦限乎天人一理之常經耳設天地陰陽之理另有一途人身臟腑之間尚有異同則數千載雄才疊出何難創其說而垂後世哉古人凡用熱藥多令飲冷恐有假陽在上一遇熱藥必拒格而不得入故使冷服則冷遇冷相須而入自不吐出下咽之後冷性既除熱性始發假陽自平誠哉良法倘證純是虛寒而無假陽者尤須溫進若誤飲冷亦促亡陽變生呃逆瀉泄諸候至熱性發時功不掩過已無及矣故遇極虛極寒危候而欲挽回垂絕藥中不可不少兼陰分之藥服藥亦不可少存陰寒之性耳純虛純陰真熱假熱宜細詳察庶不致誤也已夫附桂二味古哲不甚常用而所用甚少其效亦速今人常用而且重其效甚緩者何也蓋因天地氣化轉薄人與草木均稟天地以有生況草木更假地氣以成形氣化薄而力亦薄矣凡人先天之氣即元陽之氣也元陽之氣既薄焉得不假桂附之力乎所以今人宜常用也奈附桂亦稟天地之氣而力薄矣雖然重用而奏功甚緩也況百病之生莫不由火離其位也而欲治人之病者可不令火藏其源乎補藥得宜論夫虛者宜補然有不受補者非不受補乃補之不得其法也必須憑脈用藥不可問病執方六脈一部或大或小之間便有生克勝負之別一方分兩或加或減之中便存輕此重彼之殊脈有真假病有逆從假如六脈洪大有力此真陰不足也宜六味地黃湯右寸更洪更大者八仙長壽湯如脈洪大而數者人謂陰虛陽盛者用知柏地黃湯則誤矣如果真陽盛實則當濟其光明之用資始資生而致脈息有神急徐得次以循其常經矣惟其真陽不足假陽乘之乃龍雷之火妄作疾亂變常也宜八味地黃湯加五味子肉桂助天日之陽光以逐龍雷之假火方內去附子至若弦數細數則更系真陰真陽虧損宜當大劑八味地黃湯服之以火濟火類既可從承乃可治火既制而陰易長也況脈之微緩中和胃之氣也不微而洪大不緩而弦數近乎無胃氣之象用此既補真陽以息假陽復藉真火以保脾土此補腎中真陰真陽之至論也更有勞心運用太過飢飽勞役失調以致後天心脾虧損者設以根本為論徒事補腎則元氣反隨而陷化源既絕於上腎氣何由獨足於下縱下實而上更虛也又若六脈浮大無力者此乃中氣不足營陰有虧而失收攝元氣之用宜於溫補氣血之中加以斂納之味如養營湯用五味子更宜減去陳皮是也六脈沉細無力者此元陽中氣大虛大宜培補中州溫補氣血蓋脾胃既為氣血之化源而萬物之滋補亦必仗脾胃運行而始得故古諸方藥中必用薑棗即此意也況中氣既虛運行不健故用辛溫於中鼓舞使藥力自行藥力不勞脾胃之轉輸如歸脾湯之用木香十全湯之用肉桂是也如六脈遲緩甚微者則元陽大虛純以挽救陽氣為主輕則人參理中湯重則附子理中湯不得雜一陰分之藥蓋陽可生陰陰可化陽耳如六脈細數久按元神者此先天後天之陰陽並虧也早服八味地黃丸晚服人參養營湯去陳皮或十全大補湯去川芎生地換熟地可也如兩寸洪大兩尺無力者此上熱下寒上盛下虛也宜八味地黃加牛膝五味子服至尺寸俱平而無力則仍用前湯另煎參湯沖服如兩尺有力右寸浮大而軟者此元氣下陷下實上虛也宜補中益氣湯升而舉之地既上升天必下降二氣交通乃成雨露此氣行而生氣不竭矣先天之陽虛補命門後天之陽虛溫胃氣先天之陰虛補腎水後天之陰虛補心肝蓋心為血之主肝為血之臟然更重乎足太陰脾也夫脾者營之本化源之基血之統也且一方之中與脈有宜有禁宜者加之禁者去之如應用十全大補湯而肺脈洪大者則芎耆應去而麥味應加者也蓋川芎味辛而升黃耆味甘氣厚於味故功專肺脾而固表也六脈無力十全最宜倘無力服參者以耆術倍用只用當歸勿用地芍蓋重在補氣則當歸為陰中之陽地黃白芍為陰中之陰耳至於地黃一湯依脈輕重變化萬病俱見神功若六脈沉微亡陽之證暫所忌之蓋雖有桂附之熱終屬佐使而熟地黃山萸肉一隊陰藥乃系君臣故能消陰翳之火也其熟地黃重可加至二三兩山萸只可用三四錢蓋酸味獨厚能掩諸藥之長況過酸強於吞服便傷胃氣矣此予姑取數端以證變化之無盡學者類推之而自得其神矣至於地黃湯以降為升蓋濁陰下降清陽上升凡一切虛損之病固宜久服者也補中益氣湯以升為降蓋清陽上升濁氣降散東垣先生特為虛人發散而設不宜久服者也經曰胃氣弱而百病生脾陰足而萬邪息又曰脾虛食少不能克化補之自然能食是則更有法焉東方之讎木宜安恐木實則侮土而厥張也西方之子金宜固恐子虛竊母氣以自救也夫少火實為生氣之源故中央之土虛則有補母之論存焉許學士云譬如釜中水穀下無火力其何能熟王叔和云房勞過度真火衰弱不能上蒸脾土中州不運飲食不化痞塞脹滿須知補腎腎氣若壯丹田火盛上蒸脾土土溫自治矣統而言之脾具坤順之德而有乾健之運坤德或慚補土以培其卑監乾健稍弛益火以助其轉運此東垣兼甫以補土立言學士叔和以壯火垂世土強則出納自如火旺則轉輸不怠火為土母虛則補其母治病之常經也世醫不得其傳一味消導麥芽神麯厚朴黃連以為脾胃良藥因而夭枉者不可勝數矣可勝悼哉余又常見服補養氣血之藥久似乎日衰改服疏利之藥一二劑而氣血似乎頓長者此非補養之誤也蓋因補養之日久生氣既多泄氣反重且黏滯太過血則壅而不行氣則伏而不用所以疏利一投而氣血宣行前功頓見也又有服溫補元陽之藥久而元陽似乎日困後服清涼之劑而元陽似乎頓壯者此非溫補之誤也蓋如春夏發生長養則氣血流溢無拘所以人多困倦若非秋冬閉藏之氣何能為成實堅固之用耶更凡一經或虛或病而凡用或攻或補重在一經為治者其功雖捷可暫而不可久也久則勝負相爭反增偏害之勢按人有能食食後而反愈倦者何也此胃不病而脾病也故不能消化其法當用六味地黃湯補坎水加附子肉桂補腎中之真火以生太陰脾經之土土得補而健運有權則自然能消化矣又常見有人終日鬱郁全不戀食勉強食之亦覺相安何也此胃病而脾不病也其法當補離火以生陽明胃經之土上健則飲食自旺歸脾湯是對證之的藥方中棗仁一味色赤屬火味酸屬木炒熱氣香香先入脾故赤能入心酸能入肝香能助脾此乃補木生火補火生土也又心生血肝藏血脾統血三經同補生生不已此歸脾湯之所以得名也經曰虛則補其母由此觀之則是方更屬補其母之外家也又嘗見有人默默不欲食食之則脹悶不安此又何也其人必中氣不足飲食勞倦脾胃俱病也法宜朝服補中益氣湯以滋化源加白蔻宣暢胸膈砂仁半夏醒脾開胃暮服八味地黃丸補少火以生脾陰之土脾胃均得補而健旺自然能食而消化矣又常見時醫治脾胃之病多謂肉黍所傷又疑水穀之積輕則神麯麥芽重則硝黃巴豆克伐肆投真氣愈促豈知隔一隔二之治法其效雖緩其益無窮譬如淵深則流遠根深則蒂固況真臟既得生氣自相長養飲食調和五臟順昌則長有天命何病之有雖有微邪我之氣壯何足懼之偏勝之害烏有哉慧以數十年之攻苦參考諸家分經辨證皆於寤寐神遊中得來敢以告之同仁知我者當不以為僭也大便不通金匱真言曰北方黑色入通於腎開竅於二陰故腎氣虛則大小便難宜於六味加蓯蓉前仁茯苓補其陰利水道少佐辛藥開腠理生津液而潤燥潔古云臟腑之秘不可一概施治有熱秘有冷秘有實秘有虛秘有風秘有氣秘老人與產後及發汗利小便過多病後氣血未復者皆能成秘禁用硝黃巴豆牽牛等藥世人但知熱秘不知冷秘冷秘者冷氣橫於腸胃凝陰固結津液不通胃氣閉塞其人腸內氣攻喜熱惡冷宜以八味地黃丸大劑煎湯飲之即愈或用半硫丸碾生薑汁調乳香末下之或海藏已寒丸性雖熱得芍藥茴香潤劑引而下之陰得陽而化故大小便自通如遇春陽之和水自消矣然不若八味丸更神妙也予嘗體悟東垣之論不用東垣之方如潤腸丸潤燥湯通幽散之類一概不用惟用六味地黃丸料煎服自愈如熱秘而兼氣虛者以前湯內加人參黃耆各五錢立愈此因氣虛不能推送陰虛不能濡潤故耳以上治法予親試之屢治屢驗且又不犯大黃桃仁枳殼等破氣破血之禁可以久服永無秘結故特表而出之或問曰何為不用四物湯曰四物特能補血耳此是先天津液不足故便難經曰大腸主津小腸主液又曰腎主五液津液皆腎水所化與血何干故不用四物湯又問曰如干結之甚硝黃亦可暫用否曰承氣湯用硝黃乃為傷寒從表入里寒變為熱熱入三陰恐腎水乾枯故用硝黃以逐去外邪急救腎水余獨禁用者乃是論老人虛人及病後人腎水不足以致乾枯若再用硝黃等藥以下之是虛其虛矣今日雖暢快明日必愈結再行下之卒不能通矣倘患此證者當勸慰之勿令性急以自取危殆況老人後門固者壽考之徵自是常事若以六味常服可以永保無虞小便不通溲尿不通非細故也小腹急痛狀如覆碗奔迫難禁朝夕不通便令人吐嘔名曰關格嘔證一見便難救矣世人一見此證用五苓散不效即束手待斃若鹽熨丹田螻蛄田螺罨臍之法抑未也若津液偏滲於腸胃大便瀉泄而小便不通者宜五苓散分利之若水停心下不能下輸膀胱者亦宜五苓散滲泄之若六腑客熱轉於下焦而不通者用益元散以清之若氣迫閉塞升降不通者宜升麻以提之或探吐之譬如水注之氣上竅一開而下竅自然通也經曰膀胱者州都之官津液藏焉氣化則能出矣又曰三焦者決瀆之官水液出焉可見膀胱但能藏水必待三焦之氣化方能出水有服附子熱藥太過銷鑠太陰肺經氣所不化用黃連解毒湯而通者有用茯苓陳皮甘草湯送下木香沉香而通者此皆氣化之驗也以上治有餘之法至於不足之證乃虛勞汗多五內枯燥脂腴既去不能生津膀胱中原無水積而欲通之如向乞人而求食窮而益窮矣故東垣分在氣分在血分而治之以渴與不渴辨之如渴而小便不利此屬上焦氣分水生於金肺熱則清化之源絕矣常於肺之分助其秋令水自生焉如天令至秋白露降須用清金之藥如生脈散之類為當又有肺虛者蓋因飲食失節傷其胃氣陷於下焦經云脾胃一虛令人九竅不通用補中益氣湯以參耆甘溫之品先調其胃氣以升柴從九原之下而提之則清升而濁自降矣清肺者隔二之治也補脾者隔三之治也東垣虛則補母之妙用類如此此皆滋夫後天之化原者如不渴而小便不利此屬下焦血分下焦者腎與膀胱也乃陰中之陰陰受熱閉塞其下流經曰無陽則陰無以生無陰則陽無以化若淡滲之藥乃陽中之陰非純陰之劑陽何以化須用滋腎丸此氣味俱陰乃陰中之陰也至於真陰真陽虛者東垣未之及真陰虛者唯以六味地黃丸補腎水滋腎丸又所當禁真陽虛者須用八味地黃丸以補火方為合法至於轉筋喘急欲死不問男女孕婦產婦急用八味地黃丸料煎緩則不救或疑附子辛熱不敢輕用豈知腎氣虛寒冰冷冰凍之義得熱則流通舍此更有何物直達膀胱而使雪消春水來耶丹溪云予治一老人患小便不利因服分利之藥太過遂致秘塞知其胃氣下陷遂以補中益氣湯一服而通因先多用利藥損其腎氣遂致通後遺尿一夜不止急用八味地黃丸料加益智故紙煎飲然後已凡醫之治是證者未有不用泄利之劑誰能顧其腎氣之虛者哉予故重為世戒也治驗曾治一人二便不通余令以牙皂炮枯研細末三錢調稀粥飲下立通曾治梁世琦因病後服附桂熱藥太多消鑠肺氣小便不通醫家又用四物湯加厚朴豬苓澤瀉則脹滿加劇湊上胸膈膀胱脹滿喘促不寧告急求治余曰足下是有餘之證乃附子熱藥之誤也用芩連知柏桔梗梔子茯苓甘草去白陳皮水煎調沉木二香末子服一劑而小便行通如常繼服六味地黃湯加麥冬四劑而安曾治汪多才年七十有六患小便滴瀝醡脹異常醫用破血之劑胸膈膨脹人事昏暈喘促無寧余曰此非血蓄膀胱何用破血為哉醫誤之矣仲景有云小便不利者為無血也病在氣分不當用血分之藥此是蓄尿過滿脹翻出竅以致尿不得出名為癃閉吾用白蔻宣暢胸膈砂仁半夏醒脾開胃肉桂化氣桔梗開提生薑升散令服是劑且以手上拂其肚臍使膀胱之氣能轉運斯竅自順而尿如湧矣少頃果自言鬆了大半而便下行轉瞬又行則安然熟睡睡起又行腹消如故即於前方中加參苓耆術數劑而安曾治吳鹽商患小便不通余以加減禹功散用去白陳皮桔梗赤茯苓澤瀉白朮木通條芩黑山梔法夏各三錢升麻砂仁甘草各六分水煎服少時以雞翎探痰吐之而通此方妙在兼用吐法譬如滴水之器閉其上竅則澀拔之則水通流泄矣余用此方活人亦多敢告同志曾治黃學畬小便閉塞醫用寒涼之藥過多而不通者是元氣虛而不能輸化也余用補中益氣湯加澤瀉肉桂化氣而通繼服六味地黃丸加麥冬至一年而體健又治一人小便淋瀝不通予以六味丸料倍茯苓澤瀉而通又治一人體腫喘嗽小便不通與之補中益氣湯兼服金匱腎氣丸而安曾治老農田子有患小便不通小腹脹滿經云此證宜急治緩則殺人余用連根蔥白一斤搗爛炒熱入寸香三分以布裹分作兩處更換熨臍下即通遂煎服六味地黃丸料二劑而安曾治駱欣患傷寒小便不通余以皮硝少許水煎化用新青布蘸水搭臍上並小便上頃刻立通諸藥不應此可治之男女同法曾治一龍姓大便閉結不通余用大黃皮硝牙皂三味等分水煎一服立通又治一人患前證余用大黃三錢皮硝五錢好酒一碗泡化服之立通又治一人患前證以皮硝五錢熱酒化開澄清去渣入香油四五茶匙溫服立通曾治成老人陰痿思色而精不出小便澀痛如淋余以八味地黃丸料加前仁牛膝而安後遇大小便牽痛愈痛愈欲愈便愈痛以此方服之最神曾治郭平大便閉結余用不蛀皂角安瓦上燒於馬桶內令患者坐上薰其便門立通曾治一人患前後不通脹滿悶亂余以甘遂末水調敷臍下以甘草節煎湯飲之小水來如湧泉少頃大便亦通矣曾治一人患證如前關格脹滿命在須臾又居窮鄉無處覓藥余令以獨蒜燒熟去皮微搗綿裹納下部冷即易之立通曾治一人患二便不通余用苦瓜蒂五錢川烏草烏牙皂北辛各三錢胡椒一錢麝香三分為末吹入肛門內立通歌曰二便閉結甚難醫急炒鹽來塞滿臍蒜片覆鹽堆艾熨利便良方少人知已上諸案余系記用古方屢試屢效救危亡於頃刻但要身體強壯者方可用之若富貴之人多因內虛所致尤須斟酌用開提之法或補中或八味斯為至善不可鹵莽從事以致有誤人性命也
