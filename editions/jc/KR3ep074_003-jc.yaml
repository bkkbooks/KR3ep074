body:
  text: 卷一六經圖說余考黃帝內經經絡圖以六經畫成六象註明某部某脈某經某病主用何藥宜用何方乃一定而不可易之法此愚自悟而自制實六經之至理而曩哲所未發明者余特表而出之使業醫者無分智愚開卷瞭如指掌不致嘆於矇混焉太陽者膀胱也一名尿脬陽明者胃也一名肚子少陽者膽也一名青腸太陽陽明少陽此三陽也太陰者脾也一名鐮貼少陰者兩腎也一名腰子是人身中一太極厥陰者肝也為藏血之臟太陰少陰厥陰此三陰也三陰三陽合而為六經岐伯曰此人之所以參天地而應陰陽不可不知足太陽外合於清水內屬於膀胱津液藏焉氣化則能出矣為州都之官足陽明外合於海內屬於胃為水穀之海職司受納收藏之官足少陽外合於渭水內屬於膽膽善決斷為中正之官足太陰外合於湖內屬於脾腐熟水穀為倉廩之官足少陰外合於汝水內屬於兩腎主藏精與志為作強之官足厥陰外合於澠水內屬於肝肝能謀慮為將軍之官手太陽外合於淮水內屬於小腸化物出焉為受盛之官手陽明外合於江水內屬於大腸變化出焉為傳道之官手少陽外合於漯水內屬於三焦水道出焉為決瀆之官手太陰外合於河水內屬於肺治節出焉為相傅之官手少陰外合於濟水內屬於心神明出焉為君主之官手厥陰外合於漳水內屬於心包絡喜樂出焉為臣使之官故曰主明則下安主不明則十二官危又一歲之中自大寒至驚蟄厥陰風木主氣自春分至立夏少陰君火主氣自小滿至小暑少陽相火主氣自大暑至白露太陰濕土主氣自秋分至立冬陽明燥金主氣自小雪至小寒太陽寒水主氣夫人身中之六經合天之六氣而經脈應地之經水又合於天之六氣而內屬於臟腑每一歲周天三百六十而分四時之風寒暑濕燥火人感之而受病其中輕重各有所因明者知之難為昧者道也愚又觀於易象而有所悟焉伏羲氏明乎先天陰陽之理而知無極生太極太極動而生陽靜而生陰一動一靜互為其根於是畫乾坤以定位蓋已包涵乎天地人妙萬物而為言者也至於文王窺後天之精蘊而乾坤生六子焉坎北離南震東兌西乾位西北民位東北巽位東南坤無定位寄居西南天地之大局先聖之元機胥盡乎此惟人稟天地靈秀以生亦能體備陰陽而上參天地今將臟腑中卦位詳陳之乾金也肺屬金肺即乾為天兌金也大腸屬金大腸即兌為澤震甲木也膽屬木膽即震為雷巽乙木也肝屬木肝即巽為風坎水也兩腎俱屬水左為陰水右為陽水腎即坎為水離火也心屬火心即離為火艮己土也脾屬陰土脾即艮為山坤戊土也胃屬陽土胃即坤為地經曰脾為孤臟位居中州灌溉四旁是以辰戌醜未之月各旺十八日於四季之末明乎此則六經臟腑之理益明矣古人云醫者易也未有不明乎易而通乎醫者也不信然乎合而論之五臟相生則百體諧和一有相剋則千疴競起至哉斯言實可為千古之指南也高曰醫治之源肇自岐軒而內經之書乃三墳之一六經方藥至仲景而始備特著雜病論十六卷起死回生故為醫中之聖由漢至唐蒼蒼生民咸賴福庇不幸後遭祿山兵燹其書湮沒不傳後人無有獲見者以至諸家各逞臆說局方大行鮮能分辨六經按法治病愚髫年習舉業常聆家庭之訓誨流覽曩哲之名言每見無傳者多執陳方既無可憑之理又乏通變之才其貽害也良非淺鮮今是書將六經各繪一圖著明某經系屬某病某病宜用某藥誠欲學者不迷干所往也由斯門者能信心而熟讀之則陰陽表裡寒熱虛實生剋制化之理自得又潛心考究喻氏舒氏薛氏趙氏等書而會通之則慧心日開聰明日發視病如鏡照物無一脈不貫通無一理不融澈毫髮不紊則信手拈來頭頭是道見一人救一人到一方救一方則功德無量文正公云不為良相當為良醫又曰醫道通仙道濟世活人此之謂也分經治病馳遠舒氏曰頭痛一證六經皆有不可妄用川芎藁本白芷細辛胡亂瞎撞法當分經用治太陽頭痛連後腦其法用桂枝麻黃羌活陽明頭痛在前額主葛根少陽頭痛在兩側主柴胡太陰濕痰塞壅胸膈如天之陽氣蔽塞地之陰氣冒明頭為之痛證兼腹痛自利手足自溫法宜耆朮薑附砂半少陰中寒阻截真陽不得上達陰邪僭犯至高之處故頭痛如劈重不可舉證兼身重懶言法宜前方中去半夏加肉桂故紙厥陰頭痛在腦頂蓋陰邪上逆地氣加天證兼腹痛拘急四肢逆冷四肢作冷為逆冷過肘膝為厥法宜前方中去故紙肉桂加吳萸川椒若血虛肝燥風火相煽上攻頭頂痛不可近證兼口苦咽乾惡熱喜冷法宜歸地芩連柴胡膽草六經定法太陽行身之背為在表之表足太陽膀胱經腑之圖圖略太陽病頭項強痛腰背骨節疼痛惡寒發熱此為太陽經證時有微汗者為風傷衛法主桂枝湯以驅衛分之風桂枝白芍甘草生薑大棗壯熱無汗者為寒傷營法主麻黃湯以發營分之寒麻黃桂枝杏仁甘草頭身疼痛發熱惡寒不汗出而煩躁者為風寒兩傷營衛法主大青龍湯營衛互治風寒互驅麻黃桂枝杏仁甘草生薑大棗石膏若非煩躁石膏不可用若非壯熱無汗麻黃不可用太陽邪傳膀胱口渴而小便不利此為太陽腑證法主五苓散以去太陽腑邪按小便不利氣化不行病在氣分不可用血分之藥當以桔梗易之太陽腑證有蓄尿蓄熱二端膀胱有尿熱邪入而搏之則少腹滿為蓄尿若無尿熱邪入無所搏則小腹不滿為蓄熱蓄尿者倍肉桂蓄熱者易滑石有為蓄尿過多膀胱脹滿脹翻出竅尿不得出醡脹異常者名為癃閉不可用五苓愈從下利其脹愈加而竅愈塞尿愈不得出法宜白蔻宣暢胸膈砂仁半夏醒脾開胃肉桂化氣桔梗開提生薑升散如壺蓋吃緊揭起則熱氣自出之意使上焦得通中樞得運而後膀胱之氣方能轉運斯竅既順而尿得出若少腹硬滿小便自利者為膀胱蓄血方用桃仁承氣湯或代抵當湯淯水門人胡清華曰大腸蓄血緣於熱結膀胱其去路應驅前陰而出何乃反用大黃芒硝奪之大腸乎曰子言確乎有理想當時原文得之讀者之口授恐難盡真以理度之桃仁承氣與代抵當二湯大腸蓄血者宜之膀胱蓄血果不合也當用五苓散加歸尾生地紅花小薊萬年霜以逐其邪由小便而出庶乎可也又問大腸蓄血膀胱蓄血何以辨之曰血蓄膀胱小腹硬滿小便自利大腸蓄血糞雖硬色必黑仲景之法以此為別耳陽明行身之前為在表之裡足陽明胃經腑之圖圖略陽明病前額連眼眶脹痛鼻築氣而流清發熱不惡寒此為陽明經證法主葛根以解陽明之表口燥心煩汗出惡熱渴欲飲冷此熱邪漸入陽明之裡法主白虎湯以撤其熱石膏知母粳米甘草張目不眠聲音響亮口臭氣粗聲輕惡熱而大便閉者此熱邪已歸陽明之腑法主小承氣湯微蕩其實略開其閉大黃枳實厚朴加之胃實腹滿微發譫語者可以調胃承氣湯以蕩其實而去其滿大黃芒硝甘草更加舌燥苔干焚熱如火痞胸腹塞悶滿胸腹膨脹實胃上按痛燥便閉乾結堅按之石硬與夫狂譫無倫者法主大承氣湯急驅其陽以救其陰大黃芒硝枳實厚朴少陽為半表半裡足少陽膽經腑之圖圖略少陽病頭痛在兩側耳聾喜嘔不欲食胸脅滿往來寒熱此為少陽經證法主柴胡湯以解少陽在經之表柴胡半夏人參甘草生薑大棗口苦咽乾目眩此為少陽腑證法主黃芩以瀉少陽裡熱附少陽經易病說余考足少陽膽經屬甲木化氣於相火順則下蟄而溫腎水逆則上炎而刑肺金故少陽經最易病少陽為出腑入臟之門戶出則陽入則陰二陽在表三陰在裡陰盛則傳太陰脾臟陽盛則傳陽明胃腑少陽居半表半裡是以寒熱往來仲景立小柴胡湯清散經邪杜其出腑入臟之路也又一易藥捷法一見少陽兩側脹悶頭痛用老生薑煨熱切片以兩大拇指重按熱姜於印堂中推擦至太陽穴兩側岔青筋重以兩大拇指甲掐青筋幾下忌風寒一日即愈不愈必是因風雨浸染即用燈心搓細蘸油焠印堂中一壯次焠兩側交岔青筋各一壯隨手而應亦忌風寒一日服小柴胡兼行此法但須忌服豬油二三日蓋亥屬豬豬性寒涼食之恐因寒而病者亦因寒而發也足太陰脾經之圖圖略太陰病腹滿而吐飲食不下時腹自痛自利不渴手足自溫法主理中湯加砂半若胸膈不開飲食無味而兼咳嗽者乃留飲為患法主理脾滌飲耆朮薑蔻砂半若由胃而下走腸間瀝瀝有聲微痛作泄者名曰水飲即於前方內加附桂若由胃而上入胸膈咳逆倚息短氣不得臥者名曰支飲即於前方內加故紙益智更用斬關丸以下痰而愈若由胃而旁流入脅咳引刺痛者名曰懸飲即於前方內加芫花草果搜出脅縫之痰自愈若由胃而溢出四肢痹軟痠痛者名曰溢飲即於前方內加虎骨威靈仙在手加薑黃在足更加附子又有著痹行痹二證痛在一處者為著痹流走無定者為行痹與溢飲相似而證不同乃為火旺陰虧熱結經隧赤熱腫痛手不可近溢飲不赤不熱法宜清熱潤燥人參竹瀝生地阿膠天冬玉竹在手加桑枝在足加桑根若身目微黃而小便不利不惡寒者為陽黃法宜茵陳五苓散若腹痛厥逆身重嗜臥而發黃者法主茵陳附子湯參苓附朮乾薑茵陳若濕鬱黃疸誤服茵陳必死又宜逍遙散以舒其鬱而黃自退矣太學黃子一清余同庚也其妻初患四肢煩疼類中風而實非風醫家不識其證謬用消風活血之劑余遇力止之曰不可此太陰脾經溢飲之證我見世醫誤作風治而釀成痿廢鶴膝者恆多不聽任他醫治之果成鶴膝枯瘦如柴形如鵠立方求診治按之六脈沉遲而伏余曰風藥誤矣病尚可治但兩腳終身不能履地乃與理脾滌飲加川牛膝虎脛骨威靈仙兼服八味地黃丸後猶享壽十九年足少陰腎經之圖圖略少陰真陽素旺者外邪傳入則必協火而動心煩不眠肌膚熯燥神氣衰減小便短而咽中干法主黃連阿膠湯分解其熱潤澤其枯黃連黃芩芍藥阿膠雞子黃真陽素虛者外邪傳入則必協水而動陽熱變為陰寒自瞑倦臥聲低息短少氣懶言身重惡寒四肢逆冷腹痛作泄法主耆朮薑附砂半故紙益智溫經散邪回陽止泄足厥陰肝經之圖圖略厥陰有純陽無陰之證有純陰無陽之證有陰陽錯雜之證張目不眠聲音響亮口臭氣粗身輕惡熱熱深厥深上攻而為喉痹下攻而便膿血此純陽無陰之證也法主破陽行陰以通其厥喉痹者用玉竹天冬麥冬百膏雞子白便膿血者用生地阿膠雞子黃按雞子甘寒其白象天輕清上浮用治上燥其黃象地重濁下降故用之以治下燥四肢厥冷爪甲青黑腹痛拘急下利清穀嘔吐酸苦冷厥關元此純陰無陽之證也法宜耆朮薑附砂半吳萸川椒驅陰止泄以回其陽腹中急痛吐利厥逆心中煩熱頻數飲冷飲而即吐煩咳轉增腹痛加劇此陰陽錯雜之證法主耆朮薑附砂半吳萸川椒濃煎另用黃連浸取輕清之汁攪和溫服法主寒熱互投以去錯雜之邪凡病不外六經以六經之法合而治之無不立應一經見證即用一經之法經證腑證兼見即當表裡兩解若太陽與陽明兩經表證同見即用桂枝葛根以合解兩經之邪兼少陽加柴胡兼口渴而小便不利即以三陽表藥加入五苓散中兼口苦咽乾目眩更加黃芩兼口燥心煩渴欲飲冷當合用白虎湯於其間並三陽表裡而俱解之若三陽表證與三陰裡寒同見謂之兩感即當解表於溫經之內若里重於表者但當溫里不可兼表無論傳經合病並病陰陽兩感治法總不外乎此病有陰陽之分辨不得其法無從分認即如舌苔乾黑芒刺滿口者皆有陰陽之分有為少陰中寒真陽遭其埋沒不能熏騰津液而致舌苔乾黑起刺者法當驅陰救陽陽回則津回方用耆朮薑附砂半故紙等藥其證必目瞑嗜臥聲低息短少氣懶言身重惡寒辨陰病十六字有為陽明火旺爍干津液而致舌苔乾黑起刺者法宜驅陽救陰陰回則津回方宜斟酌於白虎承氣諸法以消息之其證必張目不眠聲音響亮口臭氣粗身輕惡熱辨陽病十六字凡辨諸證之陰陽總不外此各十六字也又如厥逆一證亦有陰陽之分凡四肢厥逆者外見張目不眠聲音響亮口臭氣粗身輕惡熱為陽厥法主破陽行陰以通其厥若外見目瞑嗜臥聲低息短少氣懶言身重惡寒之證為陰厥法主驅陰散邪以回其陽又如譫語一證原有陰陽虛實不同經曰實則譫語虛則鄭聲在陽明為實證為譫語乃陽明胃實燥結不通陽火亢極真陰立亡而神明內亂狂譫無倫法主大承氣湯急驅其陽以救其陰在少陰為虛證為鄭聲乃少陰中寒魄汗出而下利氣虛陽脫神魂無主細語呢喃錯亂顛倒法當急回其陽以固其脫方用耆朮薑附參苓益智故紙等藥二證陰陽均以上十六字辨之又如煩躁一證陰陽互關曰陽煩陰躁又曰煩出於心躁出於腎其實不然然煩者未有不躁躁者未有不煩煩躁皆同而證之陰陽不同有為少陰亡陽身熱多汗而煩躁者乃腎中真陽隨汗而浮越於外法主薑附耆朮故紙以回其陽有為陽明熱越身熱多汗而煩躁者乃胃中津液隨汗而盡越於外法主人參白虎等法以撤其熱二證陰陽亦以上十六字辨之又如昏睡一證在少陰為陰霾盛而陽不開法當急回其陽以御其陰在陽明為熱盛神昏法當速撤其熱以退其陽以上陰陽俱以十六字辨之且昏睡與不眠其證不同而法相同在陽明張目不眠者常也然又有熱盛神昏之證其人均為口臭氣粗汗出惡熱其法亦均當撤其熱在少陰但嗜臥者常也然又有里陰過盛拒格真陽隨汗外越不得內交於陰亦不得眠其人均為頭眩身重少氣懶言其法亦均當回其陽又如口渴一證有為實熱亦有虛寒若為熱邪傷津而渴者必小便短大便硬若自利而渴者乃為火衰作渴證屬少陰者以寒中少陰腎陽受困火衰不能薰騰津液故口渴法主薑附助陽溫經正所謂釜底加薪津液上潮而口渴自止又如直視一證亦有陰陽之分若陽明胃實火亢水虧外見口臭惡熱等證最患直視直視者腎水垂絕之徵也法當急奪其土以救腎水若少陰中寒真陽遭其埋沒津液不上騰而直視者津不榮目也外見身重惡寒等證此則不患水絕最患亡陽法當補火殖土以回其陽打呃一證有虛寒有實火若胃實閉結陽火上衝而打呃者真陰立盡之候也其證張目不眠身輕惡熱法當急下以救其陰若脾氣虛寒健運無權氣不調達而打呃者其勢緩非死證其證目瞑倦臥身重惡寒法宜參朮薑附甘草半夏丁香白蔻仁以溫中而散逆凡遇瀉泄法屬太陰宜主理中世醫僅知分利則氣化愈傷脾土日衰陽神日陷陽光漸墜眼見昏蒙至於雙目不開閉久生障而目漸壞此乃陽氣下陷不能升舉羞光怕日眼皮欲墜津液不上騰目中乾澀緊閉難開而又謬謂泄動肝火兼之腎水不足轉與泄火滋水左金伐木謂之瀉南補北益西損東愈誤愈深不可為矣法宜耆朮附桂補火殖土回陽止泄更加白蔻宣暢胸膈故紙益智收固腎氣則陽回而津自升目開而障自落有等瞳仁散大而眼見昏蒙者乃為火敗土衰水邪氾濫法當補火殖土以御其水世醫皆謂腎水不足安知水有餘而火不足也如果腎水不足自必瞳仁縮小縮小者火土熬干腎水也法宜壯水之主以制陽光凡遇留飲不可兼滋其陰以致陰愈長而陽愈消脾氣愈虧不能傳布水穀精氣所生之血皆為停蓄上逆而吐勢所必致故治咳嗽誤兼滋陰而釀吐血者恆多皆由不識陰陽消長之理也凡遇嘔吐不可發汗蓋氣上逆而不下降更用表藥助其升散其氣必脫法宜耆朮參苓砂半炮薑丁香吳萸故紙上吐下泄者表證雖重不可發汗蓋為上爭下奪法主理中急用耆朮參苓砂半炮姜若兼腹痛厥逆更加附桂川椒若誤用表藥重耗其陽中氣立斷陰陽兩脫脾約一證不可發汗其人素稟陽臟多火少水惡熱喜冷三五日一次大便結燥異常者名為脾約縱有太陽證壯熱無汗不可發表緣其平素火旺津虧營衛枯燥汗不可得法宜生地阿膠黑脂麻核桃肉大黃枳實原方用麻仁丸今改易數味功效倍潤其里燥通其大便結去津回自汗而解設不知此妄投麻桂強發其汗徒令津愈傷而熱愈結汗與大便愈不可得表裡閉固內火加熾立竭其陰而死矣故治病而不知救人之津液者真庸工也統而言之凡病外無表證者俱不可發汗即如當行發汗者必察其人本氣陰陽無虧方可徑用若真陽素虧平日惡寒喜熱貫服辛溫大便溏滑者宜加耆朮薑附助陽御表若真陰素虧平日不服辛熱大便常結者宜歸地阿膠滋陰助汗燥甚者心煩尿短身熯燥而神氣衰宜加二冬玉竹蔞仁潤燥除煩火旺者張目不眠口臭氣粗宜加石膏梔子花粉連翹清火退熱曾醫李解元堯賓之孫里重於表者其證身壯熱而頭重痛又兼腹痛作泄體重惡寒起則眩暈醫家妄用發表兼以分利數劑而加劇叫楚煩亂日夜無寧舉室倉皇無措予診其脈浮虛無力觀其證里重於表即用砂半耆朮薑附肉桂故紙一劑而頭痛即止身微汗而熱俱清次日群醫請見予語之曰習醫不得喻嘉言之傳雖皓首窮經終歸無用此證乃少陰中寒真陽不得上達陰邪僭犯至高之處故頭痛如劈重不可舉兼之腹痛作泄其里證何等重也里重於表法當專主溫里雖有壯熱不可兼表肆然亂表非徒無益而反害之吾用乾薑附子以回其陽而御其陰猶恐道遠而效不速故用黃耆以補胸中之陽白朮以助脾中之陽接引真陽上達速於置郵所以一劑而頭痛即止前此各位亂用表藥而汗不出以陽虛不能作汗也今得是劑則微汗而熱解蓋溫里則陽回兼可托表也群醫羞慚而退於是再投前藥腹痛作泄諸證漸減但覺腹中發熱李君恐附子太過予曰最妙陰病難於得熱熱則陽回在裡之積寒積滯從茲蒸化易易耳又數劑而痊愈曾治鄧得宜令正六經皆見之證初起右耳根一條筋痛引耳中走入舌根舌即縮不能言良久方已日發數次詢其證胸膈不開飲食無味太陰也頭懸身重少氣懶言少陰也四肢微厥腹痛拘急屬厥陰且耳中亦屬少陰舌縮亦屬厥陰醫家謬用舒筋活血十餘劑而加劇曰怪證也不可為也予即用耆朮砂半補中開胃以理太陰乾薑附子以溫少陰之經吳萸川椒以散厥陰之寒一劑而諸證減復於後腦及前額右鬢三處各起一塊大如蟹殼赤熱而痛意度其初必有三陽表證陷入於裡今得溫補托出則仍現於外於是方加桂枝葛根柴胡再投一劑諸證減去其半又數劑而痊愈治驗向在興邑署中回寓適有友人徐盈科年五十真陽素虛本實先撥患頭重痛而身壯熱腹痛作泄少氣懶言起則眩暈門人夏萬書與之表裡兩解數劑無功謂予曰盈科之病乃是兩感何以與之兩解而不應余曰里重於表法當專主溫里表重於里方言表裡兩解此里重於表之證與李君之案相同何不依其方而與之用耆術各五錢砂仁八分炮薑附桂各錢半故紙三錢煎服一劑明日病者喜曰我之病若枯朽萬不冀其回春也何以一劑而諸證盡退如失老先生之醫神乎技矣語云走馬醫傷寒信然又在長邑有祝青之來寓求藥云稱伊妻月前患寒熱往來腹痛作泄醫治一月腹痛微而泄亦漸止忽於頭面左側突起一塊青如蟹殼痛不可忍乍熱乍寒臥床不起起則眩暈余意其初寒熱往來腹痛作泄一屬少陽一屬厥陰是肝膽二經一表一里證也緣因前醫不知表裡兩解糊亂雜投以致表邪陷入於裡今被溫補托出於外遂與理脾滌飲加川椒吳萸柴首二劑而效去柴胡連進四劑而愈二證治法同前效捷於影響附錄之以見考驗貴確信而有徵耳答門人問門人問曰熊子寶田證多疑竇先生醫可願問顛末答曰見理確而奏效捷正欲暢言其中用法之妙以示二三子也其人真陽素虛偶患風疹風疹者俗名也其癢異常蓋為陽虛受濕火衰作癢法當助陽驅濕庸醫無傳謬用消風解熱之劑致使陰陽愈虛不能御邪風疹頓消濕邪直入少陰轉見頭眩身重少氣懶言惡寒腰痛舌黑苔干刺如爍殼目直視而無潤色醫曰舌黑生刺津液枯竭必須人參以生津液予曰據識何經之病主用人參出自何書不得其法恐費人參而反殺之也因語之曰此等舌苔有二一則為正陽陽明陽亢熱極陰津立亡法主芒硝大黃急奪其陽以救其陰陰回則津回再則為少陰中寒真陽遭其埋沒不能熏騰津液而致乾燥起刺法主附子炮姜急驅其陰以回其陽陽回則津回凡此皆非人參之所能門人曰病陽明者法當張目不眠聲音響亮身輕易於轉側惡熱喜冷少陰為病目瞑嗜臥聲低息短少氣懶言身重難於轉側喜熱惡寒以此而論其為少陰審矣但又有一說直視者腎水垂絕之徵也是則腎水可無慮乎予曰此乃陽明之謂也陽明胃實火亢水虧最患直視法當急奪其土以救腎水少陰中寒陽衰陰盛故不患水絕最患亡陽法當補火殖土以回其陽今病少陰目直視者津不榮目也亦腎陽衰不能熏騰之故耳方用耆朮砂半薑附甘苓補火殖土以回其陽服一劑舌潤津回苔滑刺軟矣但目精不慧仍如故再服一劑明早視之目中水色睛瑩顧盼如常矣病者曰腹中發燒恐薑附太過予喜曰休徵也陰病難於得熱熱則陽回在裡之陰寒從茲蒸化易易耳又服數劑而痊愈凡三陰虛寒諸證用薑附肉桂諸法惟恐陰不去而陽不回其腹中微有熱象小便短赤者最妙乃一陽來復積陰可以盡去庸醫不解謬謂熱藥過燥火從內起恐灼真陰改用寒涼則陰復進而陽更退前功盡廢良可慨也門人舒帝錫問曰昨看一證脈浮而大且弦而數身大熱而多汗口苦咽乾渴欲飲冷小便短赤惡熱腹滿不大便頭昏欲睡少氣而又息高恐犯少陰經之脫證不可為也余曰少陰病法當脈沉遲惡寒今惡熱脈數知非少陰其浮屬太陽大屬陽明弦屬少陽身大熱而多汗者熱越也法宜白虎湯口苦咽乾者少陽腑證也宜加黃芩小便短赤者太陽腑證也宜合五苓散去肉桂加滑石燥渴飲冷便閉腹滿者陽明胃實也頭昏欲睡者熱盛神昏也少氣者熱傷氣也息高者燥結阻塞胃中濁氣上干而喘非腎氣發動宜合調胃承氣湯因其氣弱加人參帝錫依法一劑而大便通病減其半於是方中去大黃芒硝再投一劑諸證盡退但見身倦少氣心煩不寐不思飲食於是改用人參黃耆大補其氣麥冬瓜蔞霜解熱除煩砂仁陳皮以開其胃數劑而痊愈帝錫又問曰陽明息高何以不死予曰各經皆有氣促無干先天腎氣是以不死惟少陰腎氣發動上並胸中有升無降蓋為本實先撥真死證也曾見厚溪圖九官者壯盛健漢因落井身被水冰寒浸少陰腹中急痛四肢逆冷頭重腰痛舌苔干而口渴醫家不諳六經不知分經辨證陰陽虛實懵然不識但據苔干口渴以為火盛而誤用知柏芩連等藥四劑而加劇且更息高其兄來寓求治余曰喘促無寧脫證已具不可救也張子恢先瞿然曰當初我亦氣促尚且無害彼何為不治余曰子為中氣不足病在太陰無干先天腎氣後天脾病氣促何妨彼病少陰誤服芩連孤陽立鏟所謂本實先撥尚可為哉夜果死矣門人帝錫爽然曰可見治病總要分經辨證即如舌苔一證在陽明當救津液在少陰當救腎陽昏睡一證在陽明為熱盛神昏法當解熱少陰為陰霾盛而陽不開法當驅陰息高為少陰經之脫證其在他經無干腎氣是以不死正陽陽明直視者腎水垂絕之徵也法當驅陽救陰少陰中寒直視者不患水虧而患陽虛不能熏騰津液法當驅陰回陽凡此妙義皆千古不傳之秘吾師昭然挈出較若列眉請識之俾後學奉為指南云溫病夫傷寒二字蓋冬時嚴寒而成殺厲之氣觸冒之而即病者乃名傷寒不即發者寒毒藏於肌膚至春變為溫至夏變為暑暑病者熱極重於溫也即變為溫則不得復言其為寒不惡寒而渴者是也此仲景經義也其麻黃湯桂枝湯為即病之傷寒者而設與溫熱何干受病之源雖同所發之時各異仲景治之當別有方緣因兵燹至唐湮沒是以諸家議論紛紛至今未明劉氏謂麻黃桂枝必加涼藥於其中以免發黃之病張子和六神通解散以石膏涼藥加麻黃蒼朮皆非也蓋麻黃桂枝辛熱乃冬月表散寒邪對證之藥不宜於春夏之時陶氏欲以九味羌活湯謂一方可代三方亦非也九味羌活湯乃易老所制之方治外感四時不正之氣如春宜溫而反寒夏宜熱而反溫又有春夏秋三時為暴寒所折雖有惡寒發熱之證不若冬時肅殺之氣為甚故桂枝麻黃不必用也不若逍遙散為尤妙真可一方代三方也然則欲治溫者將何如余有一法請申明之經曰不惡寒而渴者是也不惡寒則知表無寒邪矣曰渴則知腎水乾枯矣蓋緣其人素有火者冬時觸冒寒邪雖傷而亦不甚惟其有火在內邪亦不能深入所以冬時不即發而寒氣伏藏於肌膚自冬以至三月四月歷時既久火為寒鬱中臟亦久將腎水熬煎枯竭蓋甲木陽木也藉癸水而生腎水既枯至此時強木旺無以為發生滋潤之本故發熱而渴非感冒也海藏謂新邪喚出舊邪非也若復有所感冒又當惡寒矣余以六味地黃丸以滋其水以柴胡辛涼之藥舒其木鬱隨手而應此方活人多矣余又因此而推廣之凡冬時感傷寒者亦是鬱火證若其無火則為直中矣惟其有火故由皮毛而肌肉肌肉而臟腑今人皆曰寒邪傳裡寒變為熱既曰寒邪何故入內而反為熱又何為而變熱耶不知即是本身中之火為寒所鬱而不得泄一步反歸一步則純熱而無寒矣所以用三黃解毒解其火也升麻葛根湯即火鬱發之也三承氣湯即土鬱奪之也小柴胡即木鬱達之也此理甚簡而易明只多了傳經六經諸語支離多歧凡雜證有發熱者皆有頭痛項強目痛鼻乾脅痛口苦等證何必拘為傷寒局方方以治之也余於冬月正真傷寒獨用桂枝湯麻黃湯二方作寒鬱治其餘不惡寒者俱作鬱火治此余不佞之創論也聞者孰不駭然吐舌及後得閱虞天明醫學正傳傷寒篇云有至人傳曰傷寒是郁證也余見之不覺竊喜而言曰可見古人先得我心之所同然耳及又考之內經黃帝曰人傷於寒而傳為熱何也岐伯曰寒氣外凝內郁之理腠理堅緻玄府閉密則氣不宣通濕氣內結中外相搏寒盛熱生故人傷於寒轉而為熱汗之則愈則外凝內郁之理可知觀此余先以傷寒為郁者不為無據矣故接著郁論一篇論陽毒陰毒金匱要略云陽毒之病面赤斑斑如錦紋咽喉痛唾膿血五日可治七日不可治陰毒之病面目青身痛如被杖咽喉痛死生反掌如陽毒升麻鱉甲湯二方主之千金方云陽毒湯治傷寒一二日變成陽毒或服藥吐下後變成陽毒身重腰脊背痛煩悶不安狂言亂走或見神鬼或吐血下利其脈浮陽毒升麻湯升麻五錢當歸三錢川椒去子二錢雄黃五分桂枝二錢水煎服覆手足取汗得吐亦佳陰毒甘草湯甘草升麻各五錢當歸三錢川椒二錢鱉甲一兩此二方與傷寒陽毒陰毒特異二證是感天地之疫厲非常之氣沿家傳染所謂時疫也溫疫初起人參敗毒散神妙郁論內經曰木鬱則達之火鬱則發之土鬱則奪之金鬱則泄之水鬱則折之然調達其氣過者折之以其畏也所謂瀉之也注內經者謂達之者吐之也令其調達也發之者汗之也令其疏散也奪之則下之令其無壅滯也泄之謂滲泄解表利小便也折之謂制其沖逆也余謂病起多由於郁郁者折而不通之義內經五法為因五運之氣所乘而致郁不必作憂鬱之郁但憂鬱亦在其中丹溪云氣血沖和百病不生一有怫鬱諸病生焉因立六郁之論制越鞠丸此方一出而內經之旨晦又因註釋之誤而復晦此郁之不明於世也久矣苟能神而明之擴而充之其於天下之病斯過半矣且以注內經之誤言之其曰達之謂吐之吐中自有發散之義凡屬木鬱乃足少陽膽經半表半裡之病多嘔酸吞酸雖吐亦有發散之益但謂無害耳烏可便以吐字改達字達者暢茂達生之義王道安曰肝性急怒氣逆胠脅或脹火時上炎治以苦寒辛散而不愈者則用升發之藥加以厥陰報使而從治之又如久風入中為飧泄及不因外風之入而清氣在下為飧泄則以輕揚之劑舉而散之凡此之類皆達之法也此王氏推廣達之之義甚好火鬱則發之發之汗之也東垣升陽散火湯是也使勢窮則止其實發與達不相遠蓋火在木中木鬱則火鬱相因之理達之即所以發之即以達之之藥發之無有不應者但非汗之謂也汗固能愈然火鬱於中未有不蒸蒸汗出鬚髮之得其術耳土鬱奪之謂下奪之如中滿腹脹勢甚而不能頓除者非力輕之劑可愈則用鹹寒峻下之劑以劫奪其勢而使之平此下奪之義也愚意奪不止下如胃亦土也食塞胃中下部有脈上部無脈法當用燒鹽湯探吐法不吐則死內經所謂高者因而越之以吐為上奪而衰其胃土之郁亦無不可金鬱泄之如肺氣膹滿胸臆仰息非解利肺氣之劑不足以疏通之只解表二字足以盡泄金鬱之義不必更滲泄利小便而滲利自在其中況利小便是涉水鬱之治法矣獨水鬱折之難解愚意然調其氣四句非總結上文也乃為折之二字恐人不明特說此句以申明之耳然猶可也水之鬱而不通者可調其氣而愈內經曰膀胱者州都之官津液藏焉氣化則尿出矣肺為腎水上源凡水不通者升舉肺氣法宜白蔻宣暢胸膈砂仁半夏醒脾開胃肉桂化氣桔梗開提如壺揭蓋揭起則出之義生薑升散使上竅通而下竅通若水注之法自然之理其過者淫溢於四肢四肢浮腫如水之泛溢須折之以其畏也蓋水之所畏者土也土衰不能制之而寡於畏故妄行茲惟補其脾土俾土能制水則水道自通不利之利正所謂瀉之也如此說則折字與瀉字於上接續而折之之義益明矣內經五法之注出自張子和之注非王啟玄舊文故多誤余改釋其誤又推廣其義以一法代五法神而明之屢獲其效故表而書之蓋東方先生木木者生生之氣即火氣空中之火附於木中木鬱則火亦鬱於木中矣不特此也火鬱則土自郁土鬱則金亦郁金鬱則水亦郁五行相因自然之理惟其相因也予以一方治其木鬱而諸郁皆因而愈一方者逍遙散是也方中惟柴胡薄荷二味最妙蓋人身之膽木乃甲木也少陽之氣氣尚柔嫩象草穿地始出而未伸此時如被寒風一郁即萎軟抑遏而不能上伸不上伸則下克脾土而金水並病矣惟得溫風一吹鬱氣即暢達蓋木喜舒風搖則舒暢寒風則畏溫風者所謂吹面不寒楊柳風木之所喜薄荷柴胡辛而溫者辛也故能發散溫也故入少陽古人立方之妙如此其甚者方中加左金丸左金丸止黃連吳茱萸二味黃連但治心火加吳萸氣燥肝之氣亦燥同氣相求故入肝以平木木平則不生心火火不刑金而金能制木不直伐木而佐金制木此左金所以得名也此又法之巧者然猶未也一服之後繼用六味地黃丸料加柴胡白芍服之以滋腎水俾水能生木逍遙散者風以散之也地黃飲者雨以潤之也木有不得其天者乎夫此法一立木火之郁既舒木不下克脾土且土亦滋潤無燥槁之患金水自相生予謂一法可通五法者如此豈惟是哉推之大之千之萬之其益無窮凡寒熱往來似瘧非瘧惡寒惡熱嘔吐吞酸嘈雜胸痛小腹脹悶頭暈盜汗黃疸溫疫疝氣飧泄等證皆對證之方推之傷風傷寒傷食除直中外凡外感者俱作郁看以道遙散加減出入無不獲效如小柴胡湯四逆散九味羌活湯大同小異然不若此方之應響也神而明之變而通之存乎人耳倘一服即愈少頃即發或半日或一日又發發之愈頻愈甚此必屬下寒上熱之假證此方不宜復投當改用溫補之劑如陽虛以四君子湯加溫熱藥陰虛者則以六味地黃湯加溫熱藥其甚者尤須寒因熱用少以冷藥從之用熱藥探冷之法否則拒格不入非惟無益而反害之病有危甚治有逆從玄機之士不須予贅古逍遙散方柴胡三錢芍藥當歸白朮茯苓炙草薄荷炮姜去白陳皮集解無加味者加丹皮山梔余以山梔曲屈下行泄水改用茱連丸尤妙左金丸大川連六兩家吳萸一兩以水煮半時焙乾為末粥丸小梧子大服用去白陳皮煎湯吞下功較甚逍遙散足少陽足厥陰二經藥也肝虛則血病當歸芍藥養血而斂陰木盛則土衰甘草白朮和中而補土補土生金亦以平木柴胡生陽散熱合白芍以平肝而使木得調達木喜通達故以為補取疏通義茯苓清熱利濕助甘術以益土能令心氣安定通心腎也生薑暖胃祛痰調中解鬱薄荷搜肝瀉肺理氣消風疏逆和中所以有逍遙之名雜病論醫書昉自岐軒而六經之法大備於仲景其書軼於兵燹亂於叔和後人不得其傳妄謂仲景之書僅治冬月傷寒春夏秋三時之雜病非所能也於是各逞所見著立方論主治雜病欲與並駕其於六經之法茫如也安望其所著方論有以合乎理而中乎用也哉夫仲景三百九十七法萬法之祖也無論何時雜病見證總不外乎六經以仲景六經之法按而治之無不立應即以暑病言之暑病者夏月之病也當看暑邪侵於何經即用何經之法以治之侵太陽之經非桂枝麻黃不可治也入太陽之腑非五苓散不可治也侵陽明之經法主葛根入陽明之腑看其腑證之淺深而斟於白虎承氣諸法以消息之侵少陽之經法不外柴胡入少陽之裡亦不外乎黃芩侵太陰理中與之少陰真陽素旺者暑邪侵入則必協火而動陽熱為患其證屬陽法宜黃連阿膠湯分解其熱潤澤其枯真陽素虛之人暑邪侵其少陰則必協水而動陽熱變為陰寒其證屬陰法宜耆朮薑附溫經回陽以散暑邪厥陰受暑有純陽無陰之證法主破陽行陰以通其厥有純陰無陽之證法主溫經止泄以回其陽有陰陽錯雜之證法主寒熱互投以去錯雜之邪凡此暑月之病安能外仲景之法乎彼皆不得其傳不分六經但以香薷飲六和湯清暑益氣諸方混施一切貽害蒼生可勝悼哉學者但當熟讀三百九十七法體備六經陰陽之理則信手立方百發百中諸家雜病方論毋庸置喙客問亦有不在六經之內者如其人感冒盛暑壯熱多汗煩渴惡熱眩暈仆倒昏睡懶言此六經無其法也予曰此暑邪侵入陽明之裡則壯熱多汗煩渴惡熱乃為熱越法主白虎湯以撤其熱兼之內氣素弱不能御邪熱邪入里陽明受困則眩暈欲睡而為熱盛神昏宜加人參大補其氣其治法仍不出六經之外何得謂不在六經之內乎客乃折服人參敗毒散論此方之秘宜讀到極熟悟到徹底則發表之法斯過半矣專治傷寒頭痛惡寒壯熱項強睛暗鼻塞聲重風痰咳嗽及治時氣疫癘嵐瘴鬼瘧或聲如蛙鳴赤眼口瘡濕毒流注腳腫腮腫喉痹毒痢諸瘡斑疹傷寒在表則惡寒發熱頭痛項強風寒在肺則鼻塞聲重痰多咳嗽聲如蛙鳴俗名蛤蟆瘟乃是邪氣實也風寒濕熱之氣上干則目赤口瘡下流則腳腫傷於陽明則腮腫結於少陰則喉痹壅於腸胃則毒痢注於皮膚則瘡疹人參羌活獨活柴首前胡川芎枳殼桔梗茯苓各一兩甘草五錢每服一兩加生薑三片薄荷少許煎水調服口乾舌燥加黃芩腳氣加大黃蒼朮膚癢不安加蟬蛻此足太陽足少陽手太陰三經藥也羌活入太陽而理遊風獨活入少陰而理伏風兼能去濕除痛柴胡散熱升清協川芎和血平肝以治少陽經兩側頭痛目昏前胡枳殼降氣行痰協桔梗茯苓以泄肺熱而除濕消腫甘草和中發表人參輔正匡邪疏導經絡表散邪滯故曰敗毒喻嘉言曰暑濕熱三氣門中惟此方為第一三氣合邪豈易當哉其氣互傳則為疫矣方中所用皆辛平升散之藥更有人參大力者荷正以祛邪病者日服二三劑使邪疫不復留詎不快哉奈何俗醫減去人參曾與它方有別耶又曰傷寒宜用人參其辨不可不明蓋人受外感之邪必先汗以驅逐惟元氣旺者外邪始乘藥勢以出若素弱之人藥雖外行氣從中餒輕者半出不出重者反隨元氣縮入發熱無休矣所以虛弱之體必用人參三五七分入表藥中少助元氣以為驅邪之主使邪得藥一湧而出全非補養衰弱之意也即和解藥中有人參之大力者居間外邪遇正自不爭而退舍否則邪氣之強悍安肯聽命和解耶不知者謂傷寒無補法邪得補而彌熾及痘疹瘧痢以及中風中寒中暑中痰癰疽產後初時藥總不敢用而虛人之遇重病可生之機悉置不理矣古方表散用五積散參蘇飲敗毒散和解之法用小柴胡白虎湯竹葉石膏湯等方皆用人參領內邪外出乃得速愈世醫奈何不察耶外感體虛之人汗之熱不退下之和之熱亦不退大熱呻吟津液灼盡身如枯柴醫者技窮止為元氣已漓故藥不得應耳倘元氣未漓先用人參三五七分領藥深入驅邪何至汗和不應耶東垣治內傷外感用補中益氣湯加表藥一二味以散外邪有功千古傷寒專科從仲景至今明賢方書無不用參何為今日醫家棄除不用全失相傳宗旨使體虛之人百無一活曾不悟其害之也蓋不當用參而殺人者是與耆朮薑附歸桂等藥同行溫補之誤不謂與芎獨柴前羌半枳桔苓膏等同行汗和之法所致也安得視等砒鴆耶明朝嘉靖己未江淮大疫用敗毒散倍人參去前胡獨活服者盡活萬曆己卯大疫用前方復效崇禎辛巳壬午大飢大疫道殣相望惟加人參者多活更有發斑一證最毒惟加參於消斑藥中全活甚眾凡遇飢殣兵荒之歲飲食起居不謹致患時疫者宜用此法本方除人參名敗毒散治同有風熱加荊芥防風名荊防敗毒散治腸風下血清鮮亦效血鮮者為腸風隨感而見血瘀者為臟毒積久而發去人參加連翹金銀花名銀翹敗毒散治瘡毒去人參加黃芩名敗毒散加黃芩湯治瘟病不惡寒而渴去人參加芒硝大黃名硝黃敗毒散能消熱毒壅積全方加荊防樸陳僵蟬藿香名消風敗毒散治風毒癮疹及風水皮水在表宜從汗解者本方加陳倉米名倉廩散治噤口痢乃熱毒衝心食入即吐單陳倉米煎湯治痢後大渴飲水不止湧吐要法原方在痰飲今移六經篇末甜瓜蒂如無以絲瓜蒂代之邪在表宜汗在上宜吐在中下宜下此汗吐下三法也若邪在上焦而反下則逆其性矣經曰高者因而越之又曰在上湧之是也先賢用此法者最多今世俗惟知汗下而吐法絕棄不用遇當吐者而不行湧越使邪氣壅結而不散輕病致重重病致死者多矣冤哉枉人性命良可悲也朱丹溪曰吐中就有發散之義張子和曰諸汗法古方多有之惟以吐發汗者世罕知之故予曰吐法兼汗以此夫瓜蒂散甜瓜蒂炒黃赤小豆等分為末熟水調飲或用酸薺水更佳量人虛實服之良久不吐者口含沙糖一塊即吐吐時須令閉目緊束肚皮若吐不止者蔥白湯解之亡血虛家禁用尺脈絕者不宜服恐損胃氣若胸中窒塞悶亂以物探吐之得吐即止如探不出方以此散吐之此散專治風眩頭痛懊憹不眠癲癇喉痹頭目濕氣水腫黃疸諸黃急黃濕熱諸病或吹入鼻中取出黃水亦可愈卒中痰迷涎潮壅盛癲狂煩亂人事昏沉五癇痰壅火氣上衝咽喉不得息及食填太陰欲吐不出者均皆當用吐法傷寒如桂枝湯證頭不痛項不強寸脈微浮胸中痞硬氣上衝喉不得息者胸中有寒也宜當吐之如頭額兩側痛者令病人噙水一口以此散一字吹入鼻中立效余曾治大頭瘟內服普濟消毒飲外以此散㗜鼻取出髓中黃水而效此太陽陽明藥也胸中痰食與虛煩者不同越以瓜蒂之苦湧以赤小豆之酸吐去三焦有形之物則木得舒暢易曰天地交而萬物通矣當吐而胃弱者改用參蘆參猶帶補不致耗傷元氣也十劑曰燥可去濕桑白皮赤小豆之屬是也赤豆瓜蒂並能行水濕痰涎頭痛胸滿寒熱脈緊不大者並宜此散吐之或問何謂木鬱曰厥陰少陽屬木於令為春乃人身生髮之氣也食者陰物也脾者坤土也飲食填塞太陰則土盛而反侮木生氣不得上升而木鬱矣吐去上焦有形之物則木得條達而遂其升生之性矣綱目云甜瓜蒂一名苦丁香象形瓜短團者良白瓜蒂與長如瓠瓜勿用其子曰㼓其肉曰瓤其跗曰環謂脫花處也其蒂曰疐謂系蔓處也去瓜皮用蒂約半寸許俟瓜氣長足採收聽用此散主治風涎暴作諸風諸癇腦寒熱齆眼昏吐痰風熱痰涎頭目濕氣得麝香細辛治鼻不聞香臭及食諸果物病在胸腹中並皆吐下有急黃喘息捫心堅硬欲得水吃者可驗有遍身如金色者有熱病發黃者有黃疸陰黃者有身面浮腫者有四肢浮腫者有濕氣頭痛者以上諸證均以此散末一字吹入鼻中取出黃水自愈有十種蠱氣者用甜瓜蒂末棗肉丸梧子大每服三十丸棗湯下甚效瘧疾寒熱者用瓜蒂二枚水半盞浸一宿頓服取吐神效有發狂欲走者亦以此散一錢取吐而愈有鼻中瘜肉者用陳久瓜蒂末吹之日三次瘥又方用瓜蒂末白礬末各五分綿裹塞鼻或以豬板油和挺子塞之一日一換又方用青甜瓜蒂二枚明雄麝香各半分為末先抓破後貼之日三次神效又方用瓜蒂十四枚丁香一個粟米四十九粒研末口中含水㗜鼻取下乃止有風熱牙痛者瓜蒂七枚炒研入麝香少許和之綿裹咬定患牙流涎即止否則再咬有齁喘痰氣者瓜蒂三個為末水調服吐痰即止聖濟總錄云咽生瘜肉先刺破出血用鹽豉搗和塗之慧屢試屢驗本方除赤小豆名獨聖散治太陽中暑身重痛而脈微弱本方除赤小豆加防風藜蘆名三聖散本方除赤小豆加鬱金韭汁鵝翎探吐亦名三聖散治中風風癇痰厥頭痛本方除赤小豆加全蠍五分治吐風痰本方加淡豆豉治傷寒煩悶瓜蒂梔豉皆吐劑也要知瓜蒂吐痰食宿寒梔豉吐虛煩客熱如未經汗下邪郁胸脅而痞滿者謂之實宜瓜蒂散此重劑也已經汗下邪乘虛客胸中而懊憹者為虛煩宜梔豉湯此輕劑也同志君子務於此法仔細參詳庶可稱為良醫
