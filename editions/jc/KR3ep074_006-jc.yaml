body:
  text: 卷四後天圖余讀趙氏書見畫一先天太極之象獨以水火為重知其學超千古發前人所未發然萬物以土為根元氣以土為宅後天非不並重也予因畫脾經形象復疏通證明其說亦可為後學升階之一助云圖略後天圖說夫後天脾土有陰土有陽土隨火寄生即當隨火而補然而補火有至妙之理足陽明胃土隨手少陰心火而生故補胃土者補心火而歸脾湯一方又從母之外家而補之俾木生火火生土也足太陰脾土隨少陽相火而生故補脾土者補相火而八味丸一方合水火既濟而蒸腐之此一理也至理也人所不知人所不信余特重申言之蓋混沌之初一氣而已何嘗有土自天一生水而水之凝成處始為土此後天卦位艮土居坎水之次也其堅者為石而最堅者為金可見水土金先天之一原也又有補子之義蓋肺為土之子先補其子使子不食母之乳其母不衰亦見金生土之義又有化生之妙不可不知甲木戊土所畏畏其所勝不得已以己妹嫁之配為夫婦後歸外氏成家此甲己化土其間遇龍則化不遇龍則不化凡化物以龍為主張仲景立建中湯以健脾土木曰曲直曲直作酸芍藥味酸屬甲木土曰稼穡稼穡作甘炙草味甘屬己土酸甘相合甲己化土又加肉桂蓋桂屬龍火使助其化也仲景立方之妙類如此又以見火生土之義蓋土無定位旺於四季四季俱有生理故及之至於木也者以其剋土舉世欲伐之余意以為木藉土生豈有反克之理惟木鬱於下故其根下克蓋木氣者乃生生之氣始於東方盍不觀之為政者首重農事先祀芒神芒神者木氣也同出而異名也我知種樹而已雨以潤之風以散之日以暄之使得遂其發生長育之天耳及其發達既久生意已竭又當斂其生生之氣而歸於水土之中以為來春發生之本焉有伐之之理此東垣脾胃論中用升柴以舒木氣諄諄言之詳矣但未及雨潤風散與夫歸根覆命之理余於木鬱論中備言之總以申明五行陰陽之妙用專重水火焉耳又木金土三者俱為寄生故其死為真死惟水火從真生故能不死而絕處逢生歸庫者絕其生氣而收藏也返魂者續其死氣而變化也況水火隨處有生機鑽木取火擊石取火圓珠取火附桂是也掘地取水承露取水方諸取水熟地是也若金死不救木死不救土死不救余故重水火為根本焉黃耆白朮不固表說舒馳遠曰後天以脾為主耆術大補中氣之藥皆入足太陰脾經之裡不走軀殼之外何以固表外科用之脫毒外出可見其性外攻不為收斂顯然矣即不當用而誤用之亦止壅塞中焦無固表之理也當雲實者不必用虛者必當用之以御其表也彼不知分經解表又不能辨其虛實用之不當能無害乎無怪乎其視如砒毒也且說治病必先表而後補烏知三陰虛寒諸證法當溫補並用者若但驅陰散寒而不知急早重用耆術則寒雖去而虛不能回甚且不治矣而況妄行表散者乎若能早知重用耆術補中宮之陽以翊之則火種不致滅也否則火種無存吹然無益矣況夫先天真陽屬腎者以媾精屬腎故曰屬腎此生身之本健順之根先天之火種也然非養生之物養生之道在於黃庭黃庭者即中宮之陽氣乃發育之元先天之宰養生之火種也黃庭真固真陽不露黃庭寂滅真陽立亡故有腎痿精絕而不死者黃庭之火種在也仙家修煉進陽火歸於黃庭以造其基可見主宰先天之權在是矣而驅陰回陽必宜重用黃耆白朮者即仙家修煉造其基以歸於黃庭之妙旨也余讀舒氏妙論誠哉補前人之所未及至於末年復刊所制理脾滌飲與仲景黃耆建中東垣補中歸脾十全養營補血等湯咸皆重用黃耆白朮而珍之如寶醫者明乎此訣凡遇三陰虛寒諸證依脈輕重變化效如桴鼓予非謬執臆說屢用奏功故重言以申明之同志君子誠能推廣而變通焉於醫道也雖不及上工亦在中工之列又常見陰寒腹痛之證法當溫補並用者世俗名曰氣痛即用順氣之藥以耗其氣而更傷其陽雖能暫快目前必至漸見加重久而釀成不治之證矣且云其氣既痛豈可補氣而耆術又視如鴆毒焉是未讀仲景六經之法不明陰陽表裡寒熱虛虛實實之理也若此輩者信口雌黃全無識見拘執幾個陳方混施一切貽害蒼生縱王法幸脫天律難逃粗工者其速當猛省後天要論補中益氣湯官揀參北箭耆白貢術當歸身綠升麻軟柴首廣陳皮炙甘草大紅棗此東垣先生末年所制以治內傷之方方中止有黃耆一錢余各三分後薛立齋參耆常用三五錢慧入斯門至今五十年耆術二味輕則三五錢重則八錢或一兩進退加減神應無窮大凡脾胃喜甘而惡苦喜通而惡滯喜升而惡降喜燥而惡濕此方得之業醫者慎毋忽視岐伯曰升治者乃氣虛下陷不能升而升之也凡人飢飽勞役內傷正氣以致氣乃下行脾胃不能克化飲食不能運動往往變成癆瘵或疑飲食不進謂是脾胃之火或疑黍肉所傷謂是水穀之積輕則枳殼砂仁山楂麥芽重則芒硝大黃牽牛巴豆紛紛雜投必至臌悶不已倘先以升提之法治之一切內傷飲食飢飽勞役內感風寒有何不可治哉世多昧此不知李東垣補中益氣湯實為對證之方智者明乎此秘依脈輕重變化萬病俱見神功予特表而出之欲學者奉為金丹也凡人右手寸口脈大於左手寸口之脈者即是內傷證也無論左右關脈尺脈大小浮沉即以此方投之無不效如桴鼓此方之奇妙妙在用升麻柴胡雜於參耆歸術之中以升提其至陽之氣不使其下陷於陰分之間尤妙用去白陳皮炙草二味於補中解紛則補者不至呆補而升者不致偏墜所以下口安然奏功如響之應聲耳或疑參耆大多不可驟補不妨竟為減少不知二味略輕則升柴無力譬如繩索細小欲升重物於百尺之上難矣或用參而不用耆或用耆而不用參則必至功力減半然猶有盡去之者也倘又以升柴提氣或疑清氣不升濁陰之騰上者此必左手寸口之脈大於右手寸口之脈者是也可以借言苟或不然殺人無算必是此人創說也余最惡此輩似是而非為吾道之鄉原須宜辭而避之也東垣一生學問神而明之千古之下一人而已或問曰古稱補中益氣湯為萬世無窮之利其義云何曰此發前人之所未發也繼仲景河間而立其意深遠也世人一見發熱便以為外感風寒暑濕燥火之邪若不發散邪從何解又不見用風寒暑濕燥火而施治何乃通用九味羌活湯敗毒散十神湯之類甚多涼膈散白虎湯糊亂雜投因而夭枉致斃者多矣冤哉東垣先生深痛其害創立此方經曰邪之所湊其氣必虛世間內傷者多外感者兼而有之縱有外邪亦是乘虛而入但補其中益其氣而邪自退聽不必攻邪補正氣邪自無所容若以攻邪為主虛者愈虛而危亡隨其後矣倘有外感而內傷不甚者即於本方中酌加對證之藥而外邪自退所謂仁義之師無敵於天下也至於飲食失節勞役過度胃中陽氣自虛下陷於陰中而發熱者此陽虛自病誤作外感而發散之益虛其虛矣為害豈淺鮮哉又有一種內傷真陰而發熱者與內傷陽氣相似此當補真陰非四物湯之謂又非坎離丸之類詳見先天要論中而斟酌於六味八味有火者用六味無火者用八味夫心肺在上肝腎在下脾胃居中州為四臟之主氣者中焦無形之氣所以蒸腐水穀升降出入乃先天之氣又為脾胃之主後天脾土非得先天之氣不行是方蓋為此氣因勞而下陷於腎肝清氣不升濁氣不降故用升麻使由右腋而上柴胡使由左腋而上非藉人參黃耆之功則升柴無力是方所以補益後天中之先天也或問曰余見先生動輒以先天後天立論余見之易中先天後天之圖乾南坤北離東坎西等卦方位於醫道甚無所合而先生屢言之不已其義云何曰怪乎子之問也予所謂先天者指一點無形之火氣也後天者指有形之體自臟腑及血肉皮膚與夫涕泣津液皆是也既曰先天此時尚未有天何有乾南坤北八卦對待之圖乎或又曰然則此圖伏羲何為而設也余曰此非先天之圖乃中天八卦之圖天位乎上地位乎下日出乎東水源於西風雨在天上山雷在地下人與萬物位乎中余常見邵子排列如此是為中天八卦其當今所用者止一文王后天圖出乎震齊乎巽相見乎離致役乎坤悅言乎兌戰乎乾勞乎坎成言乎艮以春秋晝夜十二時相配因以定陰陽決死生推之而天文地理卜筮星相無一不以此圖為則至於先天無形可見即易中帝出乎震之帝神也者妙萬物而為言者之神是也帝與神即於予先天要論中所稱真君真主本系無形不得已而強立此名以為主宰先天之體以為流行後天之用而東垣先生獨會其宗立補中益氣湯中用柴胡升麻者正以升發先天之氣於脾土之中真萬世無窮之利余所為諄諄言也蓋人身以脾為主人皆知之而先天隱於無形者置而不論余故既立先天要論矣復於後天論中發明東垣脾胃論亦用先天無形者為主讀東垣脾胃論者讀至人生受水穀之氣以生所謂清氣營氣衛氣元氣穀氣春升之氣皆謂氣之別名則可見矣飲食入胃猶水穀在釜中非火不能熟脾能化食全藉少陽相火之無形者在下焦蒸腐始能運化也若用寒涼之藥飲食亦不運化矣蓋脾胃中之火土中之火納音所謂丙丁之火爐中火也蓋養爐中火者必頻頻加炭宜以熱灰溫養其火而火氣自存一經寒水便成死灰將以何者蒸腐水穀以何者接引燈燭舉目皆地獄光景可不畏哉故經曰勞者溫之損者溫之正取溫養之義也東垣曰岐伯曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通而胃氣熱熱氣熏胸中故內熱舉痛論云勞則氣耗勞則喘且汗出內外皆越故氣耗夫喜怒不節起居不時有所勞傷皆損其氣氣衰則火旺火旺則乘其脾土脾主四肢故困熱無氣以動懶於言語動作喘乏表熱自汗心煩不安當病之時宜安心靜坐以養其氣以甘寒瀉其熱火以酸味收其散氣以甘溫補其中氣經曰勞者溫之是也金匱要略云平人脈大為勞脈極虛亦為勞夫勞之為病其脈浮大手足煩熱春夏劇秋冬瘥以黃耆建中湯治之方用人參黃耆白芍甘草肉桂大棗飴糖此方亦溫之之義也夫胃氣為水穀之海也飲食入胃遊溢精氣上輸於脾脾氣散精上輸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也若飲食失節寒溫不適脾胃乃傷喜怒憂恐耗損元氣脾胃氣衰元氣不足而火獨盛火者陰火也起於下焦元氣之賊也壯火食氣少火生氣火與元氣不兩立一勝則一負脾胃氣虛則下流腎肝名曰重強陰火得以乘其土位故脾證始得則氣高而喘身熱而煩其脈洪大而頭痛或渴不止其皮膚不任風寒而生寒熱蓋脾胃之氣下流使穀氣不得升浮是春生之令不行則無陽以護其營衛遂不任風寒而生寒熱此皆脾胃之氣不足所致也然與外感風寒證雖同而實則異內傷脾胃乃傷其氣外感風寒乃傷其形傷其外則有餘有餘者泄之傷其內則不足不足者補之汗之吐之下之克之之類皆泄也溫之和之調之養之之類皆補也果是內傷不足之病苟誤認作外感有餘之證而反泄之則虛其虛也實實虛虛之禍如此死者皆醫殺之耳然則奈何惟當用辛熱甘溫之劑補其中而升其陽則愈矣經曰勞者溫之損者溫之又曰甘溫能除大熱大忌苦寒之劑損其脾胃故東垣先生立補中益氣湯主之夫因飢飽勞役損傷脾胃或專因飲食不調或專因勞力過度或勞力之後加之飢飽或飢飽之後加之勞力皆為內傷脾胃一虛肺氣先絕故用黃耆以益皮毛而閉腠理不令自汗損其元氣上喘氣短人參以補之心火乘脾須炙草之甘以泄大熱而補脾胃中之元氣若脾胃急痛並大虛腹中急縮者宜多用之經曰急者緩之白朮苦甘溫除胃中熱利腰臍間血胃中清氣在下必加升麻柴胡以引之引黃耆甘草甘溫之氣味上升能補衛氣之解散而實其表也又緩帶脈之縮急二味皆苦平味之薄者陰中之陽引胃中清氣升於陽道及諸經生髮之氣以滋春氣之和也氣亂於胸中為清濁相干用去白陳皮以理之清升而濁自降矣胃氣虛不能升浮為陰火傷其生髮之氣營血大虧榮氣不營陰火熾起日漸熬煎氣血日減心主血減則心無所養致使心亂而煩故用當歸以和之如煩猶未止加服地黃丸以補腎水水旺而心火自降以手捫之而肌表熱者表證也只服補中益氣湯一二劑得微汗而已非止發汗乃陰陽氣和自然汗出也補中益氣湯加減法如精神短少倍加人參及五味子如頭痛加蔓荊子如頭痛有痰沉重乃足太陰痰厥頭痛證也加半夏天麻如腹中痛者加酒芍藥惡寒痛者加附桂如惡熱喜寒熱痛者更加黃連如腹中痛惡寒而脈弦者是木來剋土也小建中湯主之如脈沉細腹痛以理中湯主之乾薑味熱於土中瀉水以為主也如臍下痛者加干極熟地黃不已乃大寒也更加桂附凡小腹痛多屬腎氣奔豚惟桂能泄奔豚故加之如脅痛或脅下縮急俱加柴胡白芍以舒肝木如體重肢節痛或腹脹自利脈來濡緩者濕勝也加蒼朮厚朴主之如風濕相搏一身盡痛加羌活防風藁本別作一服病去切勿再服以諸風藥損人元氣也如冬月惡寒發熱無汗脈浮而緊本方中酌加麻黃桂枝如用麻黃五分參耆各用二錢如冬月惡風發熱有汗脈浮而緩加桂枝芍藥傷寒必惡寒傷風必惡風傷食必惡食烈火不能熱重綿不能溫者傷寒也內傷者得就暖處著綿溫火便不惡寒矣內傷飲食口不知味不思飲食傷寒者雖不能食未嘗不知味也勞力內傷者身體沉重四肢困倦百節煩疼心滿氣短懶於語言若傷寒者太陽則頭痛少陽則脅痛陽明則目痛不若內傷之倦怠嗜臥也傷寒發熱拂拂如羽毛之熱熱則在肌表皮毛內傷者肌體壯熱捫之烙手右手氣口脈大於左手人迎三部其氣脈急大而數時一代而澀澀是肺之本脈代是氣不相接乃脾胃不足之脈大是洪大洪大而數乃心脈刑肺急是弦急乃肝木挾心火刑肺金也其右關脈屬脾此五脈獨大而數數中時顯一代此不甚勞役是飲食不時寒溫失所胃脈損弱隱而不見亦惟內顯脾脈乃是如此若外感則人迎脈大於氣口也東垣先生以手捫熱有三法以輕手捫之則熱重按之則不熱是熱在皮毛血脈也重按筋骨之間則熱蒸手輕捫之則不熱是熱在骨髓也輕手捫之不熱重手按之亦不熱不輕不重按之而熱者是在筋骨之上皮毛血肉之下乃熱在肌肉肌肉間熱正內傷勞倦之熱也若余於內熱真陰者以手捫熱亦有二捫之烙手骨中如炙者腎中之真陰虛也捫之烙手按之筋骨之下反覺寒者腎中之真陽虛也面赤者陰盛於下逼陽於上也口渴者腎水乾枯引水自救也若吐痰多如清水者腎水泛上為痰口必不渴也咯痰如沫者水拂為痰陰火熬煎口必渴也腰脅痛者腎肝虛也足心如烙者湧泉涸竭者也膝以下冷者命門衰絕上氣必喘也尺脈數者陰火旺也尺脈數而無力或欲絕者真陽衰也骨痛如折者腎主骨骨衰乘火也此陽虛陰虛之辨而陰虛之中又有真陽真陰之不同其治法詳於先天要論中或問曰丹溪云東南之人陽氣易以升不可服補中益氣湯當今江以南之人果盡不當服乎曰此東南指人之臟腑而言也蓋東方屬肝南方屬心肝與心有火者不可服恐木火愈旺也若黃帝起四方之問岐伯有四治之能此東南西北方指地位也既不可服東南二方之劑其人上盛者必下虛其腎氣大虛矣急須填補北方先天之元氣為要總而言之先天後天不得截然兩分上焦元氣不足者下陷於腎中也當取之至陰之下下焦真陰不足者飛越於上部也焉可不引而歸原耶是以補中益氣湯與腎氣丸並用朝服補陽暮服補陰互相培養但先後輕重之分明者參之難於盡述或問曰腎氣丸中以地黃為君恐其泥膈或於脾胃有妨礙乎曰腎氣丸中盡是腎經的藥並無一味脾胃藥雜於其中徑入腎經焉能泥膈凡用藥須要分得陰陽水火清淨如朝廷有六部一部有一部之事一部有一部用事之人今欲輸納錢糧而可與天曹用事之神同議乎曰若如所言正予謂腎經水部不可與脾經戶部相雜之謂耳曰余所謂不雜者謂腎水藥中不可雜脾土藥脾胃藥中不可雜腎經藥如四君子湯脾經藥也雜地黃其中則泥膈矣八味地黃腎經藥也加人參則雜矣若論腎與脾胃水土原是一氣人但知土之為地而不知土亦水也自天一生水而水之凝成處始為土土之堅者為石此後天卦位坎之後繼之艮蓋艮為土為山艮土者先天之土水中之土也土無定位隨母所生隨母而補故欲補太陰脾土先補腎中少陽相火若水穀在釜中非釜底有火則蒸不熟補腎者補腎中之火也須用八味地黃丸補坎水桂附以補水中之火生艮土醫不達此而曰健脾非探本之術蓋土之本初原是水世謂補腎莫如補脾余謂補脾莫如補腎也薛立齋曰大凡瘧證服青皮飲草果飲不應當以補中益氣湯倍柴胡加半夏生薑養正攻邪而瘧自除或以補中益氣湯加半夏人參煨姜此不截之截也一服即愈神應瘧疾丸白砒礵淨末一兩綠豆子連皮乾磨細粉四兩用絲羅篩勻米糊為丸如綠豆子大水飛明雄為衣磁壇收固經久不壞此方余昔在武昌遊黃鶴樓遇一羽士秘授治擺子不論男婦老幼寒熱虛實於臨發日先一時以冷水吞下壯盛者五丸老弱小兒止可三丸一服截住否下日臨發再服酌量用之神應無窮飲食須扇涼吃若誤吞熱物必至大吐擺子仍然截住但恐有虧脾胃余獲此方三十餘年刻帖遍送丸子每年計以斗數三江閩廣云貴本省近屬用極神效伏望醫士仁人見此方者抄錄遍傳修制濟人所費無多陰功甚大傷飲食脾胃論陰陽應象論云水穀之寒熱感則害人六腑是飲食之傷傷於寒熱也古人治法分上中下三等而治之在乎上者因而越之瓜蒂散吐之不若燒淡鹽湯探吐法更神在乎中者消化神麯麥芽山楂三稜在下者硝黃巴豆牽牛甘遂下之傷熱物者以寒藥治之傷寒物者以熱藥治之隨其所傷而施治之庶乎其可也今之方家以平胃散出入增減似乎克伐余見不若枳朮丸為善夫枳朮丸乃潔古老人所制方用枳實一兩白朮二兩補藥倍於消藥先補而後消以荷葉裹飯燒熟和二味為丸蓋取荷葉色青得震卦之體有震仰盂之象中空而清氣上升燒飯為丸以助穀氣謂潔古枳朮丸一方啟東垣先生末年之悟制補中益氣湯自此始也但潔古枳朮丸專為傷食者設世人多以此丸補脾胃者非也吾憂枳實有掀牆倒壁之功而人之腸胃既已有傷如牆壁之不固矣其能經幾番摧挫乎至若神麯麥芽山楂三味舉世所當用者余獨屏棄之不用蓋山楂能化肉積婁豬肉老煮不脆者入一撮同煮皮肉盡爛又產婦兒枕作痛用山楂二十粒砂糖水煎一碗服之兒枕立化其破血破氣可知豈可輕用又世之釀酒者以米與水貯瓦缸中必借曲糵而成前之藥味猶曲糵也但脾胃在人身非瓦缸比脾胃強健自有化食之能食有所停積脾弱不能轉運乃不能消化而成傷食病也今只補其虛助其弱自能食而化矣何必肆用克伐貽害於人余痛念此弊因申言之凡太平丸保和丸肥兒丸之類其名雖美其藥實霸乃以美名賜之欺人耳目遺害蒼生可勝悼哉故智者咸知東垣先生為治脾胃之聖手補中益氣調中益氣二方因人增減真知其寒涼物傷也本方中加薑桂熱物傷也加黃連肉傷也加山楂數粒酒食傷也加葛花一味隨證調理此東垣之法方士之繩墨也然以寒治熱而熱不去以熱治寒而寒不除其奈之何經曰寒之不寒是無水也熱之不熱是無火也壯水之主益火之原此則東垣所未及也又有食填太陰名曰食厥者上部有脈下部無脈不急治則死即以陰陽水燒淡鹽湯探吐之即愈如有食積腸腹絞痛者手不可按不得不下審知其為寒積必用巴豆感應丸審知其為熱積必用大承氣湯急下之否則死生立判慎之慎之余於脾胃分別陰陽水火而調之如不思飲食此陽明胃土受病須補少陰心火歸脾湯補心火以生胃土者也如能食而不化此屬太陰脾土受病須補少陽相火八味丸補相火以生脾土者也無非欲人培補一點先天之火氣以補土之母耳若理中湯用乾薑所以制土中之水也建中湯用芍藥所以制土中之木也黃耆湯所以益土之子使不食母之食也六味丸所以壯水之主也八味丸所以益火之原也土無定位寄旺於四時能代天以成化故四臟中兼用之總以補土為主不用克伐脾氣下陷補中益氣湯肝木乘脾左金丸鬱怒傷脾歸脾湯脾虛不能攝痰六君子湯脾腎兩虛四君四神陰火乘脾六味地黃丸命門火衰不生脾土八味地黃丸先天之氣足而後天之氣不足補中益氣湯為主或問曰正當胸膈飽悶之時數日粒米不下陳皮枳殼木香烏藥日夜吞嚥尚且不通復可補乎曰此正因初先不知補益擅用發散克伐太過虛痞之病也內經曰下焦虛乏中焦痞滿欲治其虛則中滿愈甚欲消其痞則下焦愈乏庸醫值此難以措手疏啟其中峻補於下少用則邪壅於上多用則峻補於下所謂塞因塞用者也善治者能以人參一兩或七八錢少加綠升麻一錢大劑一服即愈此內經之妙用不可不知也張仲景曰余有一方治痞塊腹痛手不可按者甚神方用治痞塊腹痛方枳實一兩麩炒白朮二兩土炒馬通炒焦八錢水煎服馬通即馬糞也最能定痛又不傷氣又能逐邪化物藥櫥中最宜早備不然倉猝間不可即得此物陳年愈久者佳今之與枳實同用則積塊自消又加以白朮大健脾氣則馬通與枳實各施其驅蕩之功愚屢用之其效捷於桴鼓治驗曾治親友太學譚庭才拔貢知縣譚瀛公三子也患腹痛俱急命在須臾來寓求治余曰此絞腸痧也急用干馬糞炒黑存性一兩干黃壁土塊少許搗碎微炒入黃酒一品碗無黃酒淡水酒亦可煎好布濾去渣乘熱服之少頃即睡醒來病去如失蓋馬通治腹痛如神用黃土者因馬通行之迅速得土性而稍緩且黃土與脾土同氣相求同性相親引之於痛處使馬通易於奏功也況又用黃酒佐之則無微不達非吐則瀉內經曰痛則不通通則不痛此雷公法也愚常用之活人多矣故錄此以告救世君子中風論東垣曰有中風者卒然昏憒不省人事痰涎壅盛語言蹇澀等證此非外來風邪乃本氣自病也凡人年逾四旬或憂喜忿怒傷其氣者多有此證壯盛之時無有也若肥盛者則間而有之亦是形盛氣衰而如此耳觀東垣之論當以氣虛為主縱有風邪亦是乘虛而襲經曰邪之所湊其氣必虛是也當此之時豈尋常藥餌能通達於上下哉急以三生飲生南星五錢生川烏生附子各二錢五分木香一錢和人參一兩煎服即蘇夫三生飲乃行經活痰之劑斬關奪旗之將每服必用人參兩許駕驅其邪而補助真氣否則不惟無益適以取敗觀先哲用耆附湯參附湯其義可見矣若遺尿手撒口開鼾睡為不治也然用前藥多有得生者又不可不知劉河間曰所謂中風癱瘓者非為肝木之風實甚而卒中之亦非外中於風良由將惜失宜心火暴甚腎水虛衰不能制之則陰虛陽實而熱氣怫鬱心神昏冒筋骨不用而卒倒無知也亦有因喜怒思悲恐五志有所過極皆卒中者夫五志過極皆為熱甚俗云風者言末而忘其本也觀劉氏之論則以風為末而以火為本世之遵劉氏者專為劉氏主火之說所拘泥殊不知火之有餘水之不足也劉氏原以補腎為本觀其地黃飲子之方可見劉氏之意亦屬推本尋原而以真陰之虛為重也地黃飲子干熟地巴戟天山萸肉製附子肉蓯蓉五味子白茯苓石菖蒲遠志肉紫油桂麥門冬薄荷葉金釵石斛大紅棗生薑水煎服注云古喑不能言足廢不能行此謂少陰氣厥不至急當溫之名曰痱證但陰虛有二有陰中之水虛有陰中之火虛火虛者專以河間地黃飲子為主水虛者又當以六味地黃湯丸為主果是水虛辛熱之藥與夫參耆之品俱不可加入臨證者明辨以晰之功不可少也河間東垣專治本而不治風可為至當不易之論學者必須以陰虛陽虛為主自後世醫書歧出而使後學猶豫狐疑丹溪曰有氣虛有血虛有濕痰左手脈不足及左邊半身不遂者以四物湯補血之劑為主而加以竹瀝薑汁右手脈不足及右邊半身不遂者以四君子湯補氣之劑而佐以竹瀝薑汁如氣血兩虛者且又挾痰以八物湯為主而加南星半夏竹瀝薑汁之類丹溪之論平正通達宜世之人咸宗之但持此法以治中風而多不效或少延而久必斃何也蓋治氣血痰之標而不知治氣血痰之本也夫人之有四肢也如木之有枝幹也人之氣血營養於四體也猶木之漿水灌溉於枝葉也木有枝葉木有本根人之氣血豈無根本乎人有半身不遂而遷延不死者如木之根本未甚枯而一邊之枝幹先萎耳人有形容肥壯忽然倒僕而即斃者如木之根本已絕其枝葉雖榮易曰枯楊生華何可久也忽遇大風而摧折矣觀此則根本之論明矣然所謂氣血之根本者何蓋火為陽氣之根水為陰氣之根而火與水之總根兩腎間動氣是也此五臟六腑之本十二經之源呼吸之門三焦之根又曰守邪之神經曰根於中者命曰神機神去則機息根於外者名曰氣立氣止則化絕今人縱情嗜欲以致腎氣虛衰根先絕矣一或內傷勞役或六淫七情少有所觸皆能卒中此陰虛陽暴絕也須以參附湯大劑峻補其陽繼以六味地黃丸十補丸之類填實真陰又有心火暴甚腎水虛衰兼之五志過極以至心神昏悶卒倒無知其手足牽掣口眼喎斜乃水不能營筋急而縱也俗云風者乃風淫末疾之假象風自火出也須以河間地黃飲子峻補其陰繼以麥門冬五味子之類滋其化源此根陽根陰之至論也若夫所謂痰者凡人之將死必有痰何獨中風為然要知痰者水也從何處來乎其原蓋出於腎張仲景曰氣虛痰泛以腎氣丸補而逐之觀此凡治中風者即以前法治其根本則痰不治而自去矣若初時痰涎壅盛湯藥不入少用稀涎散之類使喉咽疏通能進湯液即止若必欲盡攻其痰頃刻立斃戒之哉戒之哉乾坤生氣云凡人有手足漸覺不遂或臂膊或髀股指節麻木不仁或口眼喎斜語言蹇澀或胸膈迷悶吐痰相續或六脈弦續而虛軟無力雖未至於倒僕其中風暈厥之候可指日而決矣須預防之愚謂預防之理當節飲食戒七情遠房事此至要也如欲服餌須察其脈證之虛實如兩尺虛衰者以六味丸八味丸切補肝腎如寸關虛弱者以六君子湯十全大補湯之類急補脾肺才有補益若以搜風順氣及清氣化痰等藥適足以招風取中也不可不知治驗曾治凌秀才之母年五十已生九男二女氣血衰憊一日外出飲食過傷途遇風雨食填太陰倒暈床褥水漿不入已四日矣舉家議以必無生理三子促騎而請予因家有要事辭以不果其七子廩生弼祖在館攻書聞之來寓長跪而請予念救母心誠扶起允之登輿頃刻而至視之衣棺俱備靜候死耳其夫亦府庠引予入室見其手撒口開診之寸關如絲兩尺全無乃謂其夫曰經云上部有脈下部無脈其人當吐不吐者死令其子燒淡鹽湯三品碗入童便一碗攪勻扶起病人三飲而三吐之果吐出宿食痰涎碗許而人事稍蘇乃與六君子湯加耆朮白蔻一劑是夜即服稀粥一碗明早乃起床矣又用歸脾湯數十劑兼服六味地黃丸而安又治傅福興年三十形體魁梧因酒色過度忽一日至街仆地口眼喎斜語言蹇澀不省人事痰涎上湧右手足不活腰俯不伸四肢不動乃弟迎診按之六脈沉伏惟肝脈洪數面色青而兼黑予曰此腎水枯竭也乃與大劑補中益氣湯加酒炒黃柏三分以滋化源瀉陰中之伏火酒炒紅花三分以入血分而養心血連進二劑人事稍蘇痰涎漸少語言頗覺爽利行動亦覺自如仍用前湯去黃柏紅花合六味地黃湯大劑煎飲十劑而諸證悉退單服補中益氣湯又兼服龜鹿地黃丸而元氣大復曾治元配周氏年四十勤儉過甚氣血久枯忽一日早頭暈仆地人事不省痰涎滿口手撒鼾睡氣息如絲按之六脈浮遲乍有乍無吾料其不可為也勉強與三生飲濃煎灌之外以神應散吹鼻得嚏而蘇乃以六君子湯兼六味地黃丸服之一載無功交春而歿可見氣血虛甚者即治之得法亦竟不能保其長年曾治宋豪士令正年二十七性稟端淑忽一早將飯自去空室以腰帶結喉微笑而不語若癡騃狀其家以為染邪巫師以為邪制桃符棘矢御之不應乃叔肇堂曰此必病耳盍請醫診之急延予視予曰喉中有雞聲乃風痰塞喉即以神應散吹鼻取嚏吐痰而蘇其人仍然鬱郁予思其家富饒姑亦賢良因何而思自縊又不死於金死於水死於火而必欲死於木木者肝也肝藏魂肝血不足而外邪深入肝木被鬱而人不知也乃與逍遙散吞左金丸平肝開鬱一劑而效繼服六君子湯加黃耆八劑而愈後余見松峰說疫書中載有扣頸瘟一案其所論證皆與愚見符合可見理無二致古人已先得我心之所同然耳今之男婦多有無因而竟以一繩自縊於一木者其枉死良多也後學知此或可為救生廣一法門神應散方明雄水飛枯礬煅研藜蘆生用牙皂炙黃等分為末磁瓶收貯每用豆大一粒吹入鼻內取嚏吐痰神效治時氣纏喉水藥不下牙關緊閉不省人事等證愚以此方活人甚多修合之佩以濟人德莫大焉中暑傷暑論中暑者面垢自汗口燥悶倒昏不知人背冷手足微冷或吐或瀉或喘或滿是也當是時切勿便與冷水或臥冷地如行路暍死者暍音謁傷暑也即置日中曬地上以小便淋熱土上取熱土填患者臍眼急以二氣丹同蘇合香丸湯調灌下如無二氣搗大蒜水灌之亦可蓋中傷暑毒外陽內陰治暑藥多用暖劑如大順散之用薑桂枇杷葉散之用丁香獨蒜亦辛熱之物蓋蒜氣臭烈亦通諸竅之靈藥也東垣先生分陰陽動靜而治之靜而得之者為陰證或水閣深堂過處涼室以傷其外或沉李浮瓜過食生冷以傷其內所謂因暑而傷暑也其病必頭痛惡寒肢節逆冷而心煩肌膚大熱無汗腹痛吐瀉為幽室冷物之陰寒所遏周身陽氣不得伸越以大順散主之動而得之者為陽證或行人或農夫於日中勞役得之為熱傷元氣其病必苦頭疼發燥惡熱捫之肌膚大熱且大渴引飲汗大泄齒燥無氣以動乃為傷暑蒼朮白虎湯主之若人元氣不足前藥不應惟清暑益氣湯或補中益氣湯為當大抵夏月陽氣浮於外陰氣伏於內若人飲食勞倦內傷中氣或酷暑勞役外傷陽氣者多患之法當調補元氣為主而佐以解暑若陰寒之證用大順散桂附大辛熱之藥此內經舍時從證之良法也業醫者不可不知今人患暑證卒歿而手足指甲及肢體青黯者此皆不究其因不溫其內而泛用香薷飲之所誤也夫香薷飲乃散陽氣導真陰之藥也須審果有是證而服之斯為對證今世人於平時恐患此病而先服之以預防適足以招暑取病也若其人元氣素虛或房勞過度而服之者為禍尤深必欲預防惟孫真人生脈散為夏月最宜暑乃六氣中之一即天上火也惟此火可以寒水折之非比爐中火與龍雷火也凡傷暑腹痛與吐瀉交作者一味清涼井花水加青蒿汁飲之立愈暑毒從小便中瀉矣名曰臭靈丹暑喜傷心心屬南方火從其類也小腸為心之腑利心經暑毒使由從小腸出故青蒿香薷為要有因傷暑遂極飲冷水或醫家過投冷寒苦涼之劑致吐利不止外熱內寒煩躁多渴甚欲裸體狀如傷寒此陰盛格寒宜用辛溫藥香薷飲中加附子浸冷與服又有因冒暑吐極胃虛百藥不入粒米不下入口即吐病甚危篤急用人參一錢黃連五分薑汁炒焦糯米一勺水二鍾熬一小盞候冷用茶匙徐徐潤下少頃再入一匙得入數時不吐盡一小盞便可頻投藥食矣暑證與熱證相似但熱病脈盛暑病脈虛斯為辨耳臨證慎之二氣丹硝石硫黃各等分為末瓦上火炒令黃色再研極細糯米糊丸如梧子大每服四十丸治伏暑傷冷二氣交錯中脘痞結或吐或瀉大順散甘草三兩乾薑杏仁肉桂各四兩製法先將甘草炒黃次入乾薑同炒令姜裂又次入杏仁同炒以杏仁不作聲為度取起同桂一處搗為末入絲羅篩細每服二錢水一鍾煎七分溫服如煩躁井花水調服不拘時刻香薷散香薷八兩扁豆炒四兩厚朴薑汁炒二兩黃連薑汁炒二兩咀片共為細末每服三錢水一鍾入酒少許水煎七分溫服治伏暑引飲口燥咽乾或吐或瀉並皆治之清暑益氣湯北箭耆綠升麻白貢術官揀參廣陳皮炙甘草老蒼朮吳神麯廣青皮麥門冬五味子當歸身黃柏皮光澤瀉甜葛根內經曰陽氣者衛外而為固也熱則氣泄今暑邪侵衛故身熱自汗以黃耆甘溫補之為君人參陳皮當歸甘草微溫補中益氣為臣蒼朮白朮澤瀉滲利而除濕升麻葛根甘苦平善解肌熱又以風勝濕熱則濕不消而作痞故以炒曲辛甘青皮辛溫消食快氣腎惡燥急食辛以潤之故以黃柏苦寒借其氣味瀉熱補水虛者滋其化源故以麥冬五味酸甘微寒救天暑之傷庚金為佐此病由飲食勞倦傷其元氣乘天暑而發也元氣不虛暑邪何自而入哉治驗曾治一書生附余館患嘔吐瀉利煩躁搐搦咽乾引飲醫者誤作驚風治之病漸昏沉延予視之曰此子因脾虛氣弱乃傷熱暑也遂與人參一錢麥冬三錢五味子十三粒搗碎酒炒黃連八分甘草四分煎一劑冷服少頃即睡醒來病去如失曾治一富翁張某感冒盛暑壯熱大汗煩渴惡熱暈眩倒僕昏睡懶言其子來寓求診按其六脈微細而緩惟右關弦緊而芤余曰此暑邪侵入陽明之裡故壯熱大汗煩渴飲冷乃為熱越暈眩不言熱盛而神昏也乃與白虎湯以撤其熱更加人參二錢黃耆五錢桑葉十三片以大補其氣而收其汗果服一劑而熱退汗止再服生脈散二劑而痊愈夫曾治汪三元暑月吐利汗出惡寒腹痛厥逆喜手摩按心中煩熱無狀時時索飲飲而即吐服薑附不納心中煩熱加劇此為伏陰在下錯雜陽邪在上予依白通湯加半夏吳萸白朮茯苓入人尿豬膽汁因有汗去蔥白煎服一劑而效二劑而遂收功焉又治鄉中一人暑月忽吐利發熱以手觸之則痛甚其父求診按之六脈弦細而芤余曰此溽暑也乃與益元散合四苓散煎服一劑而吐利痛熱退去大半因其人氣弱更用補中益氣湯倍參耆加麥味二劑而安中濕附腳氣四案有在天之濕雨霧露是也在天者本乎氣故先中表之營衛有在地之濕泥水是也在地者本乎形故先傷肌肉筋骨血脈有飲食之濕酒水乳酪是也胃為水穀之海故傷於脾胃有汗濕之濕謂汗液出而沾衣濕透未經解換者是也有足太陰脾土所化之濕不從外入者也陽盛則火勝化為濕熱陰盛則水勝化為寒濕其證發熱惡寒身重自汗筋骨疼痛小便秘澀大便溏泄腰痛而不能轉側跗腫肉如泥按之不起經曰因於濕首如裹濕氣蒸於上故頭重又曰濕傷筋故大筋緛短小筋弛長緛短為拘弛長為痿又曰濕勝則濡泄故大便溏泄大便泄故小便澀又曰濕從下受之故跗腫又曰諸濕腫滿皆屬脾土故腹脹肉如泥濕氣入腎腎主水水流濕各從其類以故腰腎痛治法在上者羌活勝濕湯微汗之在下者五苓散利之夫脾者五臟之至陰其性惡濕今濕氣內客於脾故不能腐熟水穀致清濁不分水入腸間虛莫能制故濡泄法當除濕利小便也東垣曰治濕不利小便非其治也又曰在下者引而竭之聖人之言雖布在方策其不盡者可以意求耳夫濕淫從外而入里若用淡滲之劑以除之是降之又降復益其陰而重竭其陽則陽氣愈消而精神愈短矣是陰重強陽重衰反助其邪之謂也宜用升陽風藥乃瘥以羌活獨活升麻柴胡各一錢防風甘草各五分水煎熱服大法云濕淫所勝助風以平之又曰下者舉之得陽氣升騰而愈矣又曰客者除之是因曲而為之直也夫聖人之道可以類推舉一而知百也有腳氣類傷寒發熱惡寒必腳脛間腫痛而不能步履俱從濕治千金方有陰陽之分陰腳氣腫而不紅陽腳氣腫而紅者是也有濕熱發黃者當從郁治凡濕熱之物不郁者則不黃禁用茵陳五苓散誤用之者百難一生當用逍遙散方見郁論凡傷寒必惡寒傷風必惡風傷濕必惡雨如傷濕而兼惡寒而無汗骨節疼痛者宜甘草附子湯炙甘草一錢大附子錢半白貢術三錢上桂枝四錢水煎服金匱防己湯黃耆四錢防己白朮各三錢炙草錢半紅棗三枚生薑引水煎服此方主實表以勝濕也治傷濕身重陽微中風汗出而惡風者羌活勝濕湯羌活獨活藁本炙草防風川芎各一錢蔓荊三分通治濕證如身重腰痛沉沉然此經中有寒也於方內酌加防己酒炒一錢附片八分防己飲防己蒼朮白朮黃柏酒炒生地川芎檳榔木通甘草水煎磨犀角汁沖服當歸拈痛湯當歸羌活白朮蒼朮豬苓澤瀉茵陳人參苦參防風葛根黃芩知母升麻甘草水煎空心服羌活導痰湯羌活獨活當歸防風大黃枳實水煎服治驗曾治庠生劉某因入闈遇雨一身濕透出場疾作足上至腿腫痛異常憎寒壯熱次早兩腳不能履地乃兄來寓求治余曰此腳氣證也因受濕熱搏激而作氣痛也乃與防己飲一劑而熱減半其痛微止又與當歸拈痛湯一劑而病去若失行動如常二方見前又治唐辛元因移新宅患腳氣證初發寒熱一身盡痛肢節腫脹便尿滯隔其父求治余診之而知其內氣大虛乃寒與濕熱之所褻也先與羌活導痰湯而寒熱不作又與當歸拈痛湯而腫痛盡消繼服補中益氣湯倍耆術以實表加蒼之未已以驅濕數劑而安昔余在楚北從吾師遊黃鶴樓中見一紈袴富翁開軒敞扉乘風納涼忽兩腿發熱不能履地有知醫者在旁驚曰此腿癰也非高明外科不可吾師視之曰非癰也是因風濕相搏所致乃與補中益氣湯加羌活防風各一錢服一劑靜坐半午病去如失登車而去余在楚歸船上受濕忽右睪丸腫如雞卵發熱疼痛以濕熱藥治之不應余意必是因感寒濕在睪丸中即煎六味地黃湯料加柴胡羌活吳萸肉桂各一錢獨活五分一服而熱退再服而腫消愚於邇來常以此法治偏墜者甚神錄之以告同志氣虛中滿論養葵趙氏曰氣虛中滿與鼓脹水腫無異病後水腫後方善矣請明言之氣虛中滿者腎中之火氣虛也中空似鼓而非實滿也大約皆脾腎兩虛所致王海藏曰夫水氣者乃胃土衰不能制水水逆而上行傳入於肺肺主皮毛故令人腫世醫惟知泄水不知補土是治腫之上上絕妙法也先賢治腫之法以脾氣為主須用補中益氣湯或六君子湯溫補其化源俾脾土旺則能散精於肺通調水道下輸膀胱水精四布五經並行矣如此治法初服似覺不快過時藥力得行大有調理矣兼服金匱腎氣丸宣明五氣論下焦溢為水以水注之所氣窒而不泄則溢而為水腫也經曰三焦病者氣滿小腹尤堅不得小便溢則水流而為脹惟仲景制立此方補而不滯通而不泄誠治腫之神方國朝立齋薛氏屢用此法無不奏功先生醫按內中載之甚詳予依其法而親試之甚效故敢詳著之焉世有患此證者當不河漢余言也金匱腎氣丸方藏玉函金匱中故名白茯苓三兩大附子五錢川膝根肉桂心車前仁光澤瀉山茱萸淮山藥粉丹皮各一兩熟地黃四兩中滿之證原於腎中之火氣虛不能行水此方八味為主以補腎中之火則三焦有所稟命浩然之氣塞乎天地腎水不虛而能行水矣內有附桂辛熱之品熱則流通又火能生土土實能制水矣又加牛膝車前最為切當車前子利小便而不走真氣與茯苓同功強陰益精令人有子牛膝治老人失尿補中續絕壯陽益精病人虛損加而用之方見金匱要略如此治百不失一之法也若用內經去菀陳莝開鬼門潔淨府之法治與夫舟車丸禹功散等類必察知其真是水濕之氣客於中焦侵於皮膚如水晶光亮手按隨起者一服方退至於久病大病或傷寒痢瘧後女人產後小兒痘後及元氣素弱者偶誤用之則禍不旋踵矣慎之慎之喘脹喘與脹二證相因必皆小便不利喘則必生脹脹則必生喘但要識得標本先後先喘而後脹者主於肺先脹而後喘者主於脾何則肺經司降外主皮毛肺朝百脈通調水道下輸膀胱又曰膀胱為州都之官津液藏焉氣化則能出矣小便之行由於肺氣之下降而輸化也若肺氣受邪而上喘則失下行之令故小便漸短以致皮膚必生脹滿之疾此則喘為本而脹為標治當清金降火為主而行水次之脾土惡濕外主肌肉土能剋水若脾土受傷不能制水則水濕妄行浸漬肌肉水邪上溢則邪反侵肺氣不得降而生喘矣此則脹為本而喘為標治當實脾行水為主而清金次之苟肺證而用燥脾之藥則金得燥而喘愈加脾病而用清金之劑則脾得寒而脹愈甚矣舉世治二證但知實脾行水而不分別脾肺二經愚故為發明其說按前證者肺中伏熱不能生水而喘自渴者用黃芩清肺飲以治肺用五苓散以清小便若脾肺虛弱不能通調水道者宜用補中益氣湯以培元氣用六味地黃丸以補腎水若膏粱厚味脾肺積熱而喘者宜清胃散以治胃用滋腎丸以利小便若心火克肺金而不能生腎水者用人參平肺散以治肺用滋腎丸以滋小便若腎陰虧敗虛火灼肺而小便不生者用六味地黃丸以補腎水補中益氣湯以培脾土若脾土虛弱不能相制而喘者用補中益氣湯以培元氣六味地黃丸以滋腎水若肝木克脾土不能相制而喘者用六君子湯加升麻以培元氣六味地黃丸以補腎水若脾肺虛寒不能通調水道而脹者宜用加減金匱腎氣丸補脾肺生腎水若脾胃虛寒而脹者用八味地黃丸壯水之主益火之原以補脾肺若因酒色過度三陰虧敗而致脹喘痰壅二便不調大小便道相牽作痛者用金匱腎氣丸為妙治驗曾治一富翁內傷飲食起居失宜大便乾結常服潤腸等丸後胸腹不利飲食不甘口乾體倦發熱吐痰服二陳黃連之類其證益甚小便滴瀝大便瀉泄腹脹少食又用五苓瞿麥小便不通體重喘嗽愚用補中益氣湯兼服金匱腎氣丸不浹旬而愈曾治一儒學失於調養飲食難化胸膈不利醫家用行氣消導咳嗽喘促又用化痰行氣肚腹漸脹又用行氣分利睡臥不安兩足浮腫小便不利大便不實肺腎兩部脈浮大按之微細兩寸皆短朝與補中益氣湯加薑附夕與金匱腎氣丸加故紙肉果各服數劑諸證漸退再與八味地黃丸兩月乃能步履又用六味丸兼服補中益氣湯而康氣血兩虛辨氣虛補氣用四君子湯血虛補血用四物湯虛甚者加熟附子蓋四君四物皆和平寬緩之劑須當得附子健悍之性行之方能成功然未易輕用在暑月之病斟酌可也治驗曾治一人時五月病熱醫用平調血氣兼清熱和解之劑服之不應其熱愈甚舌上焦黑膈間有火漱水不咽診其脈兩手皆虛微而右手微甚六七日內譫語撮空循衣捫床惡證俱見予用四物湯加陳皮耆朮參麥知母熟附子服之良久汗出而熱退次日復熱再服前藥而退又次日又熱予知其虛極也遂連進十服皆加附子而安又治一人亦夏月病熱口渴唇乾譫語診其脈細而遲予與之四君子湯加歸芍黃耆附子令進一服其熱愈甚狂言亂走旁觀者曰附子之誤也復診其脈如舊仍增附子進一大劑服之汗出而熱退其脈如常按前證治法真所謂舍時從證舍證從脈卓有定見者也又治一男子發熱煩渴頭痛誤行發汗喘急腹痛自汗譫語用十全大補湯加附子服之熟睡喚而不醒至覺證退再劑而安又治黃武進士飲食勞倦發熱惡寒誤用發表神思昏憒胸發赤斑脈洪數而無力余曰此內傷元氣非外邪也宜急用溫補之劑或可得生其兄曰明明斑見敢用溫補為耶不聽余言重投消斑化斑而歿矣冤哉消渴上消者舌上赤裂大渴飲水氣厥論云此乃心移熱於肺傳於膈消者是也以人參白虎湯治之中消者善食而瘦自汗大便硬小便數叔和云口乾飲水多食肌膚瘦成消中者是也以調胃承氣湯治之下消者引飲煩躁耳輪焦乾小便如膏叔和云焦煩水易虧此腎消也腎氣丸治之古人治三消之法詳別如此余又有說人之水火得其平氣血得其養何消之有其間攝養失宜水火偏勝津液枯槁以致龍雷之火上炎熬煎既久腸胃合消五臟乾燥令人四肢瘦削精神倦怠則治消之法無分上中下先以治腎為急也六味八味加減行之隨證而服降其心火滋其腎水而渴自止矣白虎承氣等方皆非法也總錄謂不能食而渴者未傳中滿能食而渴者必發背癰腦疽設不知分辨能食不能食概以寒涼瀉火之藥而施治之則內熱未除中寒復生能不末傳鼓脹耶惟七味白朮散人參生脈散之類恣意多飲復以八味地黃丸滋其化源如發癰疽而渴者或黑或紫火極似水之象乃腎水已竭不治惟峻補其陰亦或可救也或問曰人有服地黃湯而渴仍不止者何也答曰此方士拘於繩墨而不能更變其道也蓋心肺位近宜小制其服肝腎位遠宜大制其服如高消中消可以前丸緩而治之若下消已極大渴大燥須加減八味丸半料內肉桂一兩水煎六七碗恣意冰冷飲之熟睡而渴病如失矣處方之要在乎人之通其變神而明之可也或又問曰下消無水用六味地黃丸可以滋少陰之腎水矣又加肉桂附子者何也答曰蓋因命門火衰不能蒸腐水穀水穀之氣不能上潤乎肺譬如釜底無薪鍋蓋乾燥故渴至於肺亦無所稟不能四布水精並行五經其所飲之水未經火化直入膀胱正所謂飲一升尿一升飲一斗尿一斗試嘗其味甘而不咸可知矣故用附桂之辛熱以壯其少火灶底加薪枯籠蒸潤槁禾得雨生意維新惟明者知之昧者鮮不以為迂也昔漢武帝病消渴張仲景為立此方藥止八味故名八味地黃丸誠良方也可與天地同壽至聖玄關今猶可想瘡疽將痊及痊後口渴甚者舌黃堅硬者及未患先渴或心煩口燥小便頻數或白濁陰痿飲食少思肌膚消瘦及腿腫腳瘦口舌生瘡已上諸證均宜服之無不神效治驗曾治一貴人患疽疾未安而渴大作一日飲水數升愚進以加減八味地黃湯諸醫大笑曰此藥若能止渴我輩當不復業醫矣皆用紫蘇木瓜烏梅人參茯苓百藥煎生津之藥止之而渴愈甚數劑之後茫無功效不得已而用予方連服三日而渴止因相信久服不特渴疾不作氣血亦壯飲食加倍強健勝於壯年蓋用此藥非予自執鄙見實有本原薛氏家藏書中屢用奏捷久服輕身令人皮膚光澤耳目聰明故詳著之使有渴疾者能聆余言專志服餌取效甚神庶無為庸醫所惑亦善廣前人之功方內五味子最為得力獨能補腎水降心氣其肉桂一味不可廢若去肉桂則服之不應曾治一男子患前證余以前丸方治之彼則謂肉桂性熱乃私易以知柏等藥遂口渴不止發背疽而殂彼蓋不知肉桂為腎經藥也前證乃腎經虛火炎上無製為患故用肉桂導引諸藥以補之引虛火歸元故效也有一等病渴惟欲飲冷但飲水不過二三口即厭棄少頃復渴其飲水亦如前第不若消渴者之飲水無厭也此證乃是中氣虛寒寒水泛上逼其浮游之火於咽喉口舌之間故上焦一段欲得水救若到中焦以水見水正其惡也治法如面紅煩躁者乃煎理中湯送八味丸二三服而愈若用他藥必無生理又有一等病渴急欲飲水但欲下不安少頃即吐出片刻復欲飲水至於藥食毫不能下此是陰盛格陽腎經傷寒之證也予反復思之用仲景之白通加童便膽汁熱藥冷探之法一服少解二服全瘳其在男子間有之女子恆多有此證陶節庵先生名回陽返本湯頭痛久頭痛病略感風寒便發夏日須棉帕包裹者此屬鬱熱本熱而標寒世醫不識率用辛溫解散之藥暫可得效誤認為寒殊不知其本有鬱熱毛竅常疏故風寒易入外寒束具內熱閉逆而為頭痛辛熱之藥雖開通閉逆散其標之寒邪然以熱濟熱病本益深惡寒愈甚矣惟當泄火涼血為主而佐以辛溫解表之劑則其病可愈而根可除也愚按前證多主於痰痛甚者乃風毒上攻有氣虛者有血虛者有諸經氣滯者有因氣外傷有勞役所傷有可吐者有可下者當分辨寒熱虛實兼變化而施治之若夫偏正頭風久而不愈乃內挾痰涎風火鬱遏經絡氣血湧滯甚則目昏緊小二便秘澀宜砭出其血以開鬱解表治驗余治一人遇怒則少陽兩側頭痛先用小柴胡湯加茯苓山梔二服而效繼用六味地黃丸壯水之主以鎮陽光而再不發又治譚侍御每頭痛必吐清水不拘冬夏吃薑便止余曰此中氣虛寒用六君子湯加當歸耆朮木香炮姜而安又治商姓者遇勞則頭痛余曰脾陰下陷陽虛不能上升遂與補中益氣湯加蔓荊子而痊耳證耳鳴證或鳴甚如蟬或左或右或時閉塞世醫多作腎虛治不效殊不知此是痰火上升鬱於耳中而為鳴郁甚則壅閉矣若遇此證細審其平日飲酒厚味上焦素有痰火只作清痰降火治之大抵此證多因先有痰火在上又感惱怒而得怒則氣上少陽之火客於耳也若腎虛而鳴者其鳴不甚其人必多色欲當見在勞怯等證愚按前證若血虛有火用四物湯加山梔柴胡若中氣虛弱用補中益氣湯若氣血虛用八珍湯加柴胡若怒便聾而或鳴者屬肝膽氣實用小柴胡加川芎當歸山梔若虛用八珍湯加山梔陽氣虛甚用補中益氣湯加柴胡山梔午後甚者陰血虛也四物湯加白朮茯苓若腎虛火動或痰甚作渴者必用六味地黃丸以補腎水經曰頭痛耳鳴九竅不通腸胃之所生脾胃一虛耳目九竅皆為之病治驗曾治少宰李蒲汀耳如蟬鳴服四物湯耳鳴益甚余曰此足三陰虛極也食前服補中益氣湯更服六味地黃丸而愈又治大司馬因怒耳鳴吐痰作嘔默默不欲食寒熱脅痛余用小柴胡湯合四物加陳皮山梔茯神服之而愈眼目眼赤腫痛古方用藥外內不同在內湯散用苦寒辛涼之藥以瀉其火在外點洗則用辛熱辛涼之藥以散其邪故點藥莫要於冰片而冰片性大辛熱以其性熱因借其力以拔出火邪而散其熱氣經曰火從火化此義是也古方用燒酒洗眼或用白乾薑末或生薑汁點眼皆同此意蓋赤眼是火邪上炎直攻於目故內治用苦寒之藥是治其本如釜底之去薪也然火邪既客於目從內出外若外用寒涼以阻逆之則鬱火內收不得散矣故點眼用辛熱而洗眼用熱湯是火鬱則發因而散之從治之法也世人不知冰片為劫藥而誤認為寒性常用點眼遂致積熱入目而昏暗瘴翳故曰眼不點不瞎者此之謂也又不知外治忌寒涼而妄將冷水冷物冷藥挹洗故昏瞎者多矣按前證若體倦少食視物昏花或勞役益甚脾胃虛弱者用補中益氣湯若眵多緊澀赤脈貫珠或臟腑秘結者用芍藥清肝丸若赤翳布白畏熱羞明或痛如針刺者上焦風熱也用黃連飲子若久坐生花畏日遠視如霧者神氣傷也用神效黃耆湯凡午前甚而作痛者東垣助陽活血湯凡午後甚而作痛者黃連天花粉丸午後甚而不痛者益陰地黃丸能近視而不能遠視者八味地黃丸能遠視而不能近視者定志丸六味地黃丸東垣曰五臟六腑之精氣皆稟受於脾土上貫於目脾者諸陰之首也目者血脈之宗也故脾虛則五臟之精氣難周運乎目故多不明心者君火也主人之神宜靜而安相火代行其令相火包絡也主百脈皆榮於目既勞役運動勢乃妄行又曰形氣所並而損血脈故目中諸病生焉世醫治目不知理脾健胃及養血安神治標不治本是不明正理乃庸工也若概用辛涼苦寒之劑損傷真氣促成內障之證矣曾醫張給事患目赤不明醫用祛風散熱藥反畏明重聽脈大而虛此因勞心過度飲食失節余以補中益氣湯加茯神棗仁遠志山萸山藥五味頓愈又因勞役復甚與十全大補湯漸愈仍用補中益氣湯兼服六味丸料加四制枸杞菊花為丸服之目明如舊余讀岐伯曰目赤而痛腫如含桃淚出不止痠痛多眵火眼是也其眵多淚多紅腫而痛如針刺不可忍方用柴胡梔子白蒺藜各三錢半夏甘草各一錢水煎服此方神妙不測全在直散肝膽之鬱火火散而熱自退不攻之勝於攻不下之勝於下也輕者一劑獲效重者四劑立愈余得此方數十年用之如桴鼓相應願同志寶之以廣其傳德莫大焉治驗曾治門人梁世傑及門肆業未十日而兩目紅腫羞明怕日痛不可忍余因外回見左目烏珠暴出一團狀若藍豆二顆門人呼號曰吾年二十行止未虧無故患此惡證有何顏面偷生也余慰之曰無傷也天師有方治此等證神驗之至乃與前方四劑而腫痛頓消暴出之物化為烏有又與六味地黃丸料加柴胡白芍白菊各三錢五味子一錢四劑而安又服六味地黃丸而久不發曾治程監生患目痛而澀紅赤無淚自謂知醫一味清熱發散反羞光怕日來寓求治余曰尊目乃火衰水虧肝木無養虛火上炎若用清熱發散則誤矣令服逍遙散吞左金丸二劑以舒肝木乃與大劑地黃湯加柴芍四劑而安張仲景曰火眼初起我有一方最神止須一劑可以化為烏有方用柴胡白芍梔子各三錢茯苓半夏羌活各一錢方名先解湯未發之先服之更妙家有患此證不為所染蓋鬱火既散外邪無自入矣此亦與前方同功余故並錄之曾治方人賢其家鉅富為人孝友已單傳三代矣惜幼斲喪本實先撥艱於子嗣已成虛勞屢醫不效形體尪羸雙目昏暗羞光怕日陽事不舉來寓求治診畢謂曰經曰男子寸強而尺弱女子寸弱而尺強今貴脈尺強寸弱陰陽相反矣宜補中益氣湯加白菊茯苓以滋化源繼服四神丸加鹿茸壯水明目填補精血多服自效觀子行止端方語言溫柔且肯方便廣施自必螽斯衍慶彼曰先生妙論弟幸重聞敢不惟命是聽賤軀如愈奕祀感德矣四神丸方甘枸五斤去蒂分四制一分黑芝麻同炒去芝麻一分小茴同炒去小茴一分川椒去子同炒去川椒一分獨炒麻茴椒各五兩茯苓白菊各十二兩熟地極干一斤嫩血茸八兩為末蜜丸此方孫真人在龍宮得來大補虛損明目廣嗣不可傳與匪人人賢服至二載而康連生三子一女慧獲此方三十餘年屢用屢效活人多矣膽泄真人之秘敢以告之同志以廣其傳焉口瘡口瘡上焦實熱中焦虛寒下焦陰火各經傳變所致當分辨陰陽虛實寒熱而治之若發熱作渴飲冷實熱也輕則用補中益氣湯重則六君子湯飲食少思大便不實中氣虛也用人參理中湯口晡熱內熱不時而熱血虛也用八物湯加丹皮五味子麥冬發熱作渴唾痰小便頻數腎水虛也用八味地黃丸若日晡發熱或從小腹起陰虛也用四物參朮五味子麥冬不應用加減八味地黃丸若熱來復去晝見夜伏夜見晝伏不時而動或無定處或從腳起乃無根之火也亦用前方八味丸及十全大補湯加麥味更以生附子末唾津調抹湧泉穴若概用寒涼損傷生氣為害匪輕或問虛寒何以能生口瘡而用附子理中耶蓋因胃虛谷少所勝者腎水之氣逆而承之反為寒中脾胃虛衰之火被迫炎上作為口瘡經曰歲金不及炎火乃行復則寒雨暴至陰厥乃格陽反上行民病口瘡是也故用參朮甘草補其土薑附散其寒則火得所助接引而退矣按聖濟總錄有元臟虛冷上攻口瘡者用巴戟白芷高良薑末豬腰煨服又有用丁香胡椒松脂細辛末蘇木湯調塗舌上有用當歸附子蜜炙含咽皆治龍火上迫心肺之陽不得下降故用此以引火歸原也岐伯制方岐伯曰口舌生瘡乃心火鬱熱舌乃心苗故病先見方用川黃連三錢石菖蒲一錢水煎服一劑即愈此方不奇在黃連而奇在菖蒲菖蒲引入心經之藥黃連亦入心經然未免肝膽亦入未若菖蒲之單入心經也況不雜以各經之品孤軍深入又何疑哉此所以奏功如響也倘不知用藥神機又混之以肝脾之藥雖亦有效終不能捷如桴鼓此治心熱之妙法也齒病素問曰男子八歲腎氣實而齒生二八而真牙生五八則齒槁八八而齒去矣女子亦然以七為數蓋腎主骨齒者骨之標髓之所養也凡齒屬腎上下齦屬陽明上齦痛喜寒而惡熱取足陽明胃下齦痛喜熱而惡寒取手陽明大腸凡動搖脫而痛或不痛或出血或不出血全具如欲落之狀者皆屬腎經曰腎熱者色黑而齒槁少陰經者面黑齒長而垢其蟲疳齦腫不動潰爛痛穢者皆屬陽明或諸經錯雜之邪與外因為患又當分經辨其寒熱虛實而治腎經虛寒者安腎丸還少丹重則八味地黃丸其冬月時大寒犯腦連頭痛齒牙動搖疼痛者此太陽少陰傷寒也仲景立麻黃附子細辛湯凡腎虛之人多有之如齒牙痛而搖動肢體倦怠飲食少思者脾腎虧損之病用安腎丸補中益氣湯兼服如喜寒惡熱者乃胃血傷也宜清胃湯若惡寒喜熱者胃氣傷也又宜補中益氣湯加白芍茯苓丹皮熟地凡齒痛遇勞即發或午後甚者或口渴面黑或遺精者皆脾腎虛熱宜服補中益氣湯送八味丸或十全大補湯若齒齦腫痛連及腮頰者此胃經風熱用犀角升麻湯若善飲者齒痛腮頰腫此胃經熱濕用清胃湯加葛根或用解醒湯凡小兒行遲語遲齒遲囟門開者皆先天母氣之腎衰須以地黃丸加鹿茸為主行遲者再加川牛膝根慧五十年來屢用屢效又常有人齒縫出血者名曰齒衄余以六味地黃丸加骨碎補大劑一服即愈如不愈者腎中真陽之火衰也又宜八味地黃湯去附子加五味子骨碎補而獲愈鼻病鼻塞不聞香臭或但遇寒月多塞或略感風寒便塞不時傳染者世俗皆以為肺寒而用解表通利辛溫之藥不效殊不知肺經素有火邪火鬱甚則喜得熱而惡見寒故遇寒便塞遇感便發也治法宜以清肺降火為主而佐以通氣之劑若如常鼻塞不聞香臭者細審之作肺熱治清金瀉火理氣清痰或丸藥噙化或末藥調服久之自必有效余按法治驗者亦多其平素原無鼻塞舊證一時偶感風寒而窒塞聲重者或流清涕者自作風寒治愚按前證若因飢飽勞役所傷脾胃發生之氣不能上升邪害空竅故不利而不聞香臭此則宜養脾胃使陽氣上行鼻自通矣東垣云膽移熱於腦則為鼻淵治之以防風湯蓋由胃氣不和所致者多矣治驗曾治一男子房勞兼怒風府脹悶兩脅脹痛余曰此色欲損腎怒氣傷肝用六味地黃丸料加柴芍當歸一劑而安又治一男子面白鼻流清涕已三年矣且不聞香臭余曰此肺經氣虛補之宜用補中益氣加麥冬山梔多服而愈咽痛喉痹痄腮聲啞脈兩寸浮洪而溢者喉痹也脈微而伏者死證也經曰一二經中惟足太陽經下項余經皆湊於喉嚨蓋君相二火獨盛則熱正絡故痛者數也余謂一言可了者火也嗌乾嗌痛喉腫舌本強皆君火也咽痛急速是相火所為腫也夫君火者人火也相火者龍火也人火焚木其勢緩龍火焚木其勢速後世名詳其狀名曰單乳蛾雙乳蛾子舌脹木舌脹纏喉痹走馬喉痹皆因熱氣結於外其形似乳蛾一為單二為雙比乳蛾差小者名曰喉痹熱於舌下復生以小舌子名曰子舌脹熱結於舌舌腫名曰木舌脹強而不柔和也熱結於咽喉腫繞於外且麻且癢且腫大者名曰下喉風暴發暴死名曰走馬喉風故喉痹之證死生反掌其不誤人者無如砭針出血血出即磨紫金錠服之立已易曰血去惕出此之謂也此慧屢試而屢驗同志慎宜留意焉一論時氣纏喉漸入喉塞水穀不下牙關緊急不省人事即以神應散用豆大一粒吹入鼻內吐痰神效方見中風門案尾凡治喉痹用針出血最為上策但人畏針委曲旁求瞬息喪命如針過而有針瘡者宜搗生薑汁調白開水時時呷之則瘡口易愈肆斯業者務於此證留心瓶中開關神效散不可一時無之盆硝殭蠶去嘴微炒青黛各八分甘草二分蒲黃五分馬勃三分麝香洋片各一分上各為細末秤足和勻磁瓶收貯如遇急慢喉痹咽痛腫塞不通即用前藥一錢以新汲水半盞調勻細細呷咽果是喉痹即破出紫血而愈不是喉痹亦立即消散若是諸般舌脹用藥五分以指蘸藥擦在舌上下嚥唾小兒只用二三分亦如前法用並不計時候馬勃俗名馬屁包菌主治諸瘡敷之甚良以白蜜揉拌水調呷咽治咽痛喉痹神效韓文公曰牛溲馬勃敗鼓之皮俱收並蓄待用無遺者醫師之良也不可不知又鱧魚膽擦喉痹蛾子立即潰膿出紫惡血而愈凡物類膽均苦惟此魚膽味甘俗名烏魚又名七星魚長沙公曰少陰客熱咽痛甘草湯少陰寒熱相搏桔梗湯少陰客寒咽痛半夏散及湯少陰病咽中生瘡不能言語聲不出者苦酒湯世醫多知咽痛是火少知咽痛是寒經曰太陽在泉寒淫所勝民病咽痛項腫陳藏先生用附子去皮臍炮裂切片以白蜜塗炙令蜜入內噙咽其津俟甘味盡去之換一片再噙又有下利清穀裡寒外熱脈微欲絕面赤咽痛宜通脈湯蓋因冬月伏寒在腎經發則咽痛下利宜用附子湯溫經則愈至有司天運氣其年鄉村傳染若惡寒者多是暴寒所折寒閉於外鬱熱於內切忌膽礬酸寒點喉反使陽氣不伸切忌硝黃等寒劑下之反使陽氣下陷禍不旋踵須宜表散或用甘桔湯陽毒咽痛升麻湯陰毒咽痛甘草湯千金方云咽痛用諸藥不效者乃是鼻中生一條紅絲如發懸一黑泡大如櫻珠垂掛咽門則口中飲食不入速選川牛膝根直而獨條者入好酒醋三五滴同研細就鼻孔滴二三點入內去紅絲即斷泡破立安若咽痛日久潰爛不愈此必是楊梅瘡毒又須以萆薢為主趙氏引薛案云一人年五十患咽喉腫痛用針去血神思雖清其尺脈洪數無倫次按之微細若無余曰有形而若無戴陽證也先宜峻補其陰今反傷陰血必死是夜果歿舉此一案以為粗工輕用刀針之戒纏喉風腫透達於外且麻且癢且痛可用謙甫先生雄黃解毒丸明雄水飛一錢鬱金一分巴豆十四粒用紙捶浸務要將油去得盡淨酒醋糊丸綠豆大熱茶送下吐頑痰立蘇未吐再服古方用巴豆油浸紙作捻子點燃吹滅以煙薰鼻即時口鼻流涎牙關自開用前藥捻末㗜鼻即愈治驗曾治春橋魏表弟素稟陽虛牙齦不時腫痛針出膿血即已診其脈浮大而空余曰此太陰脾肺二經氣虛兼足太陽膀胱經虛熱所致遂與人參理中湯加山萸山藥煎服而瘥曾治曾大有色欲過度患痰喘喉痹其聲如鼾痰吼如鋸延予視之曰此肺氣將絕之候也速令熬人參膏入薑汁竹瀝調服而愈如遇危急之候恐膏亡時不可即得速煎獨參湯救之能見機於早十人可全七八次則十人可全四五遲則不救曾治縣令曹秉讓因本實先撥忽患咽痛喉痹求余診之其脈浮大重取細澀余曰此先天之真陰虛極真陽飛越故痰結於喉間去生已遠速煎獨參湯細細呷之三日乃平繼以六味丸加麥味不兩旬而安曾治湯時順患咽喉腫痛內熱口乾痰涎上湧按之尺脈數而無力余曰此腎水虧損相火無制而然乃與六味丸料加麥冬一兩北味三錢盡一日飲之而腫痛消痰涎少再以前湯為丸調理三月而安又治李時中色欲過度忽喉間腫痛醫治罔效命在須臾求余診治按之兩尺微弱余曰足下先天之真陰真陽虧損無根之火遊行無制客於咽喉遂與八味地黃丸料煎好冰冷分六碗盡一日服完而效後服丸藥旬日而安經曰上病療下是此法也曾治宋飛鳴患咽喉腫閉不省人事痰涎上湧喘促汗出肢體痿軟診之其脈浮大而數余曰此飲食勞傷是無根虛火上促也乃與補中益氣湯磨油桂心三錢沖服而安又治王文玉患咽痛口舌生瘡勞則愈甚余曰此脾肺氣虛足太陽膀胱經虛熱也乃與補中益氣湯加元參酒炒知柏稍愈去知柏加山萸山藥服之而安又治張思良口舌常破如無皮狀或咽喉作痛服涼藥愈痛以理中湯令伊常服而不發曾治俞光裕患雙蛾余用鵝翎蘸酒醋攪喉中去盡痰涎復以鵝翎探吐之令伊用力一咯咯破蛾中紫血即潰用玉樞丹磨服而安又治一人以此法治之而腫不散余以小刀刺出紫血立愈又治程國用患咽喉腫痛余察是上焦風熱乃與荊防敗毒散二劑而腫消繼與六味地黃丸加麥冬一料而愈又治蕭大明患咽喉腫痛作渴飲冷大便秘結按之六脈俱實乃與防風通聖散因自汗去麻黃加桂枝因涎嗽加薑製半夏重用硝黃下之而愈但余歷驗五十年來虛熱者多實熱者少此方不可輕用又治程二官患咽腫不能咽牙關緊閉余依古法刺少商穴血出口開用膽礬末吹患處吐痰碗許即磨玉樞丹服之而安少商穴在大拇指內側去爪甲角一韭菜葉許曾治王文堂患纏喉腫痛余以皂角末酒醋調塗外頸上干則再塗其乳蛾即破而愈至捷法也曾治黃五官患聲啞余用真蘇子百藥煎各二兩杏仁三十粒大訶子三個共為極細末用酒調服而愈又治吳千佐失音余用訶子去核木香各一兩甘草五錢水煎入生地汁一合再煎數沸去渣分六服日進一料而愈曾治患咽痛痰響聲啞余以蘇薄荷二兩細茶葉一兩白硼砂七錢烏梅肉二十個川貝去心二錢兒茶五錢為細末入洋片三分研勻煉白蜜為丸皂角子大每日噙化十餘次一料而痊又治陳尚文聲啞余以甘草烏梅桔梗各二錢水煎磨臺烏三錢調服而愈曾治胡元善患痄腮腫痛余以防風荊芥穗羌活連翹牛蒡子甘草水煎服外用赤小豆末酒醋調敷而安此證防毒氣入喉即難治矣慎之又有一法用石灰不拘多少炒七次潤地攤七次酒醋調敷腫處立效曾治楊孝廉患痄腮疙瘩腫痛余用薄荷三錢斑蝥糯米炒去翅足三分共為末每服一分燒酒調下立效服藥後小便頻數用益元散而安余以此治婦人吹乳腫痛亦一服而安韻府痄字牙病甚也宋仁宋患痄腮道士用赤小豆為末敷之立愈神仙通隘散硼砂兒茶青黛寒水石各一錢蒲黃牙硝枯礬川黃連黃柏各六分洋片朝腦二分共研極細末磁瓶收貯每用吹鼻立效治咽喉腫痛生瘡聲啞危急之甚並治虛勞聲嘶咽痛又方烏梅肉一兩蘇薄荷四兩白糖四兩拌白蜜和前藥末為丸如黃豆大每用一丸噙化能利膈生津清音止渴妙不可言
