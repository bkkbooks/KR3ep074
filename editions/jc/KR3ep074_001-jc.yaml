front:
  text: 序余幼業儒性嗜勤學奈命生不辰而多疾病彼時弱冠正有志青雲以復箕裘之望不意先君遭家多故徙居長邑先君曰離鄉矣家貧矣子暫餬口再作良圖遂從嚴命舌耕九年形容枯槁顏色憔悴腰俯不伸形如鵠立維時囊中始有貿往渝瀘訪求良醫竟不一遇噫何求醫之難耶歸至舟中同伴者買有薛氏醫案一書得觀補益門內始知凡人患病之因當用何藥峻補之法選方對證揀買良藥數年來湯藥服至數百劑丸餌服至百十斤未嘗停歇一日腰俯自伸飲食健旺身體康壯非藥之力何能及此嘉慶丁巳時年三十三歲復貿漢鎮獲遇超凡黃公老師乃西昌喻嘉言之小門生受業於舒馳遠者也幸得拜門於楚北武昌客邸即示予曰吾今者老矣年已七十矣久因勞攘風塵日為人役而未傳於徒觀子穎敏可當吾意乃將數十年親承於嘉言馳遠口授之秘旨遂一一以傳於慧晨夕問難分辨六經陰陽表裡寒熱虛實條分縷晰金針並度罄傳無隱至詳且盡我師弟二人依依三載拜別回川屏去營謀志在濟世杜門樂飢窮究醫學購求黃帝內經靈樞素問難經脈訣元始綱目張劉李朱四大家之秘訣喻氏醫門法律尚論篇寓意草及御纂金鑑薛氏醫案趙氏醫貫馮氏錦囊診家正眼密齋集解龍宮方石室秘錄等書晝夜苦讀殫心悉慮寢食研求其中五行生剋制化一一辨明字字領悟於凡要妙疑關會族肯綮無不迎刃而解嘻有莫之為而為者我今果知醫耶然雖發脫將盡覺肌膚光澤體健身輕心中喜不盡言言不盡意於斯時也城鄉遠近府縣廳州送往迎來醫治咳嗽吐痰咳血吐血咯血衄血遺精癆瘵虛勞癆蟲愈者十之八九每治一人即立一案至今活人已盈千累萬內選病之奇醫之良易易者百十案附於熟習各條之下商諸高明僉曰宜亟梓行世慧何人斯而敢妄為著書立說以取畫蛇添足之誚況生於千百年成法大備之後即有所說又豈能出古人範圍乎恨祿山兵燹真書淹沒後人以訛傳訛世多不分陰陽不辨虛實用方用藥鮮能中病敢將數十年寤寐誠求心得仲景嘉言之蘊奧立齋養葵之秘旨吾師超凡之心法古今諸家之議論乃為之暢發其義針砭諸家啟迪後賢俾不至有虛虛實實之害貽誤後世慧故於是編之所以作要訣之所以明足快償吾生平之大願也知我罪我又何計焉是為序嘉慶十一年歲在丙寅孟秋月有堂秉慧自序
