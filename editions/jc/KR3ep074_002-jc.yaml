body:
  text: 卷首醫門十勸七言排律十首勸醫士盡心診治一自勤搜海上方順時調氣貴周詳凝神腠理咸昭徹入手根由細較量敢道無錢分厚薄惟求有疾盡安康良醫良相功歸一願起斯人菜色黃勸醫士安貧莫苛取顛連抱病剝床膚全仗春風拂朽枯盡爾勤勞心內術忍教抑勒病中軀人酬未及天酬巧近報須將遠報圖莫學段家承務子縑金索得便神誅事見丹桂籍勸醫士恤孤寡寡婦孤兒已寂寥無端染病倍魂銷悽風黯雨連床泣妙藥靈丹趁手調死者有知應結草生而無恙賴承祧一腔仁愛天心鑑定卜芝蘭姓字標勸醫士憐貧乏一家衣食賴馳驅無奈沉疴已瘦癯妙劑渥如沾雨露神方蘇爾出泥塗彥明張氏蘭芽秀不可陳生桂萼敷事載丹桂籍休說貧民難買命濟人須濟急時無勸醫士施給凶年藥餌人人誰不願平安瘟疫流行禍慘然窮極已經朝慮夕病深難度日如年臥床苦惱炊無米闔戶哀號藥少錢命似草菅溝壑滿傾囊解橐好施捐勸醫士勿誤用藥回生藥力可通神用合機宜在我身未識陰陽和表裡終淆佐使與君臣立方補瀉宜斟酌執意溫涼貴認真一命終須償一命果報昭昭勿誤人勸醫士勿私奇方秘傳奇方珍重獨超群一派淵源許共聞吝教本非天地意傳薪宜體聖賢文價雖簡便偏療疾藥似平常轉建勳莫飽私囊誇秘訣流行陰德首推君勸醫士勿多傷生命製藥汝欲延生須放生前賢戒語好推尋殘它肢體傷多命入爾丹丸索數金雀飼百頭需藥米蟾羅千隻費刀砧一般怕死情無異我輩宜懷惻隱心勸醫士預儲缺藥嘗來藥味總成虛真則無多㚄有餘馬勃牛溲宜預蓄銀丸金液亦須儲居奇莫謂能邀利愈病方知有令譽春滿囊中無缺陷倉皇臨證亦舒徐勸醫士勿好為人師妄教子弟授業先將品行看莫教無學並貪婪靈區朗朗懸金鏡妙理深深啟玉函善悟聰明能集益苛求殘刻更何堪誤人在彼猶如我仁術藏身貴渾涵上詩十首言雖平庸意實懇切願諸君子身體而力行之更勸大有力人登高一呼轉相化導使人人咸以利濟為心則於聖朝仁民愛物之治化亦未必無小補云題詞有堂先生以十勸詩求正余誦其詩嘉其意且喜其為風雅雋才也因即詩以志之學問精時術亦精良醫良士並知名數行珠玉隨風落底勝陽春腕下生斧藻無從細品評仁言利溥耐重賡慈航已作迷津渡莫負婆心委曲呈賜進士出身奉政大夫知宜賓縣事李嘉佑拜手雜誌俚言小引余不能讀父之書拋荒太早筆墨未工敢言詩文哉但性耽吟詠每即事率書數言不計工拙迨後遊滇黔之三江過河南山東諸地兼澄心於醫學稍暇輒搦管頗為當代賞識如同學進士徐績臣廣文王成齋夫子俱有勸予理舊業納監入闈之議然交遊往來而人莫予休也惟究心方術考疑辨難搜輯要略數十年於茲石火電光倏焉老矣十勸詩已不足存今又從殘書簿記中撿出俚言二十餘首第即歷年行事編次之聊以見半生之窮通得失大概如此若欲以詩法律之則過望矣懷清堂德甫齊秉慧謹識五字擢英才得才字此雷波開學觀風題時肄業邑孝廉母舅羅子容夫子處彤庭勤策士昭代集英才燭已三條盡賢因五字來捻鬚頻措置倚馬任敲推句向冰壺濯聲疑玉佩回詩成隨撿點議就待刪裁甲乙憑公取龍門報曉開戊戌大旱時肄業於南邑孝廉張訂西夫子處赤日無雲蔭長風四野清略無涼雨過遑暇計秋成水熱真如沸魚浮不敢生麥莖焦若火禾穗暴聞聲雛燕侵晨出新蟬竟夜鳴一旬猶未滿郊外盡心驚己亥年荒千金鬥粟莫能量腰束青蚨一貫長買得數筒盈半斛頻誇饘粥養生湯菜羹瓜粥滿康莊人似蠶眠色腫黃委身溝壑埋無土難盡招魂向北邙束書尋得芸香闢蠹魚竹樓收拾幾行書前人手澤輕如土拋盡青緗痛有餘徙居淯水頑梗強徒氣正雄災殃眉睫漸當躬皇天老眼能昭鑑憐我流離道路中就蒯玉隆西席舌耕勞碌遇何窮衣食經營用不充苦到聽經猶牧豕依稀學步漢承宮販牛於滇南甯戚當年亦販牛高風千載自悠悠笑予老稚無能辨也負包囊學遠遊販馬黔西馬群蹀躞走幽燕正值清明二月天名駿千金猶待價孫陽知遇在何年販靛艱難歷盡白雲岑茅屋依稀隱茂林野火遠看燈燦燦靛池宿注水深深人惟求舊多公直青出於藍自古今聲氣相投無間隔試憑交易索兼金自敘之瀘舟中偶成雙流水激奮驚雷一葉扁舟趁曉開數百里餘江路遠夕陽初下泊城隈謁江南家祠相國家風舊平章世澤長途窮人意懶客到犬聲忙族黨咸親密盤餐盡不常登堂瞻拜肅一瓣奉心香寓漢鎮感題關津大都會於此信為最土語雜五方人音殊萬籟安居繡屋中貿易珠簾外士女嬌綺羅往來騁冠蓋樓臺起笙蕭街市揚旌旆更有漢之濱遊春圖難繪桃花復李花春色正芳藹想象周南詩熙朝正交泰學醫於遊仙館纖毫脈息辨求明靈素諸書伴短檠臟腑隱微圖畫出江潮聲和讀書聲青囊溫罷二三更隱約鄉關夢未成危坐樓頭星月朗蕭蕭長夜聽雞鳴夜泊渝城險灘歷盡泊江城萬點燈光撲面迎斜倚檣頭歌一曲浪花催月上三更王明府召即詩達之月白風清仰彼姝善將青眼識泥塗杏林願覓瓊漿液為灌甘棠樹萬株督刻救世真言板成口占時監生向代鈞吏員高連捷共贊襄其事神威顯赫萬民瞻浣誦鴻文自整嚴利害關頭經道破分明報應不須占蜀川瘟疫遍閭閻賴有神恩雨露沾喜爾回頭諸善士心香一瓣儘先拈楊刺史仁甫四兄五十介壽月居嘉平萬象回欣逢公誕誦臺來康疆本自箕疇紀造物還從栽者培清政豈邀民善禱休齡悉本理相推知非令尹今猶昔願上南山酒一杯應孫太守聘敢云觸手便生春惟此婆心育物仁車馬道途隨即至喜逢君是個中人與舅翁魏繼堂夜話公以副車舉孝廉方正人服公盛德咸稱為善人云髫齡一別便匆匆偶聚相逢若夢中三十餘年歸故土而今把酒快臨風丁亥病中閱醫案稿長天永夜思難禁襆被無眠病又侵絕少故人來問訊聊翻舊稿自沉吟遠年事若當前在汲古心偏入悟深宿火烹茶將夜半朦朧月色紙窗臨憶超凡夫子壯遊改業習岐黃許我潛心可擅長楚水卅年成夢想今余老眼辨膏肓遇事感題七十年來閱歷微出頭煩惱自知非驚魂已作傷弓鳥悟到塵寰禍福機凡例一醫書自內經素問雖備醫藥之理而六經尚無定法定方至漢儒張仲景治傷寒始創三百九十七法一百一十三方大開六經法門不特專治傷寒一切雜病治法統在其中故曰三百九十七法萬法之祖也學者不由斯入門臨證如涉大洋茫無邊際雖皓首窮經有何益哉必當熟讀六經條分縷晰自然胸有成竹目無全牛否則不足以稱為醫也一仲景六經之法醫家之要典也自兵燹散失缺而不完王叔和誤以偽撰成編陰陽乖舛錯雜無倫歷代相沿未及精察幸喻嘉言從而尚論之舒馳遠從而集註之極力攘斥詆誹削去偽撰獨表精微義例之善無出二公之右者予故悉遵之而不敢易一業醫者宜讀內經素問及薛氏趙氏馮氏喻氏河間東垣丹溪松峰之書始能學識高超見地獨迥故予是書中多纂輯諸家抉要鉤元至於閒文概置不錄或辭多於意者纂其要而登之或辭隱於意者微加損益以顯捷而出之或先賢有不分六經及後世糊亂瞎撞之句盡皆削之所有論說即以治療一案證之極知僭越無似然輔翊先哲之心引誘後來之意大不得已救世君子當必有以諒我一業醫者宜淹博明通方能入道一知半解者未許窺毫末也然明通者又為功名所拘牽即或學之又無傳授動謂醫有何難一望便曉甚矣無學者難知夫醫有學者易視夫醫所以良醫之不概見也惟能經史貫通爻象參悟五行八卦生剋制化之理自然了徹尤要熟諳藥性中之寒熱溫平五味五走如東方屬木其色青其味酸酸入肝南方屬火其色赤其味苦苦入心西方屬金其色白其味辛辛入肺北方屬水其色黑其味鹹鹹入腎中央屬土其色黃其味甘甘入脾故水曰潤下火曰炎上木曰曲直金曰從革土原稼穡潤下作咸炎上作苦曲直作酸從革作辛稼穡作甘明乎此則以藥性之五味五走參之六經定法臨證施之萬舉萬當果能此道矣即是上工一凡學醫必須謙恭下士訪友求師稍有餘閒便將今古明醫諸書熟讀揣摩一一融會貫通得之於心熟之於目自然應之於手而無差謬一凡病家請診必先問其病勢之緩急急者則先診之不得以富貴貧賤分別先後審證用藥務要仔細留心即或倉卒貽誤轉念知之或增某藥或減某藥必須隨後囑主人更改不得護短因仍蓋救人為切務也一遇危迫之病必須盡力挽回然必與病家講明方可用藥尤須璧彼藥資則見效有功不效無怨也至於乘危嚇詐徒索人財使病家懸心患者作苦不顧人之性命者必有冥報一方藥二者俱宜講究苟徒善其方而不善其藥則見功遲而見過速矣故立方時必囑病家揀買良藥至於上品藥餌亦須預儲靈效丹丸處制收用庶免臨時束手一凡診視貧賤鰥寡煢獨者尤宜格外加意誠心施治以全其生至於賢婦孝嗣貧病無依者付藥之外量力周給以羨補不足未必遽虧於己也如此存心方稱仁術上天知之厚福必至一宜行止端方凡診婦女及孀尼必俟侍者在旁然後診視既可杜邪念亦可遠嫌疑即娼優家亦必視如良人子女不可存一些子兒戲以取不正之名致獲邪淫之報一診視回寓後宜翻書驗病援古證今以觀吾意之當否庶學問日有長進不可任意行樂登山久久離寓攜酒遊玩倘有暴病求援而不得豈不有垂危之慘一宜衣冠整飭儒雅端莊然不可過於奢華以致誚於彼其之子不稱其服也語云一流舉子二流醫卑瑣者徒取輕賤一不可惟利是圖矜言財禮於顯宦者求匾額於鉅富者索金珠蓋實至名歸貴乎自然而受人與者常畏人也余見庸工之輩既無名師指點剿襲幾個陳方草率妄為動輒包治包愈需索數千數十幸而得之詡詡揚揚自謂在道其實背謬殊多失亂不少以致冤鬼夜號藥櫃中無非黑氣陰魂慘結招牌下盡是啼聲營營於蠅頭微利貿貿如鬼蜮傷人其流品愈卑其識見愈陋醫道之流弊尚可勝言哉一醫法云醫者意也藥不執方合宜而用全在醫者圓融變通活法以行之且一病主治非一方一方亦不止主治一病萬不可專執一方而無可憑之理以貽害於人必要神而明之心以會之投機應病方為濟世婆心否則誤人性命雖世俗可欺而冥冥之中放過誰來一考明醫用藥不論有毒無毒須審其病之當用者用之當起死於芩連薑附活人於參朮硝黃無奈俗人反生疑謗或言芩連苦寒敗胃或言薑附熱毒傷陰或言參術補起虛火或言硝黃瀉傷元氣彼不知有是病必用是藥而創此不經之謬談用平常藥者反為得計不知壞事之甚愚勸司命之士寧可受人謗言切勿誤人性命以自干陰譴而取罪戾也一宜知煎藥之法凡藥入罐開水浸透濕紙蓋緊務要老誠看守不可炭多火急致藥水沸出亦不可過煎致令藥枯惟火候得宜則藥之氣味不損服必有力而其效速於置郵藥渣又不必再煎要知病人以求疾愈為急豈惜此一劑藥渣而必再煎乎但藥中有厚味者有芳香者一煎氣味已去渣有何力愚意以補中益氣湯為則黃耆白朮味厚先入罐煎十數沸次入參歸升柴甘陳薑棗又煎十數沸則氣味均出矣舉此一方而為例則他方可以類推白蔻川貝研末廣香肉桂磨膏宮參一味銀盒獨蒸湯汁且芳香之藥不見火為佳見火則功力減半況至於久熬者乎救世君子立方之後必將此以告病家之知事者一是書稿成於庚申復編次於丙寅至今壬辰窮究三十三載餘年已七十矣自覺閱歷愈多而見識愈確於是殫厥心力再加訂正辭意冗者刪之可節去者削之邇來醫治案頭更多內選奇者加之種種議論皆以六經為主並拈出諸名家精義用作巴鼻於每條末附案分帙六卷顏曰齊氏醫案回視前作煥然改觀余滿擬秘藏笥中使吾兒及諸門人輩有所遵循待百年後身盡名滅然後梓行如其速刻求明令業醫之士從前師說漫無著落必嫉為欺世盜名耳恐未能邀知音之賞鑑已先犯無識者之譏談也奈當世名公咸慫恿予曰此濟世事也曷不付之剞劂而反遲滯乎遂如命登梨棗焉倘復有高明者起而見教則幸甚熊吉堂曰凡例十七條中勸戒詳陳字字金玉堪為後學津梁業斯術者果能遵行不怠則治病用藥諸法庶乎不差為功不小慎勿棄髦視之而昧作者之苦心焉臨證必讀昔長沙公教人以望聞問切四法妙哉其神矣然庸工無傳遂謂此非長沙之聖不能知何其所見之不廣也不知具有明徵顯而易見望者望其人之顏面氣色以察形體之勞瘁如青屬肝病赤屬心病白屬肺病黃屬脾病黑屬腎病也聞者聞其語言聲息以審內氣之盛衰復問其病起於何時得於何因所見之證屬於何經於是再問其平日有何舊病與否其本氣宜寒宜熱則病之六經陰陽表裡寒熱虛實確有所據而後切其脈以驗證不過再加詳慎之意並非盡得其證於脈息之中倘脈證不符猶必舍脈而從證可見重在證不重在脈故以切為獨後彼不諳仲景之法藉脈理之說而欺於世至於望聞問三字不得其傳則病之六經表裡陰陽寒熱虛實懵然不識求其不殺人者幾希矣切脈須知余讀雷真君曰脈訣內經已暢言矣王叔和發明沈微垣規正余不可不一一論之脈訣大約言愈多則旨愈晦吾獨尚簡要以切脈不必紛紛於七表八里也切脈之最要者在浮沉其次則遲數其次則大小又其次則虛實又其次則滑澀而已知此十脈則凡人之病不能出其範圍至於死脈尤易觀也不過魚蝦之遊禽鳥之喙屋漏彈石劈索水流之異也知十法之常即可知六法之變又何難知人之病哉靈樞之形容脈象萬不可以為法仲景曰脈訣原不必多多則反晦真君之妙論至簡至要可為萬世切脈之定法聶灼三曰余觀前二則愷切詳明真可為俗醫之換骨金丹也令人讀之千遍不厭杜執病困醫之弊醫以浮沉遲數等脈分別病之表里寒熱虛實非以某脈專主某病亦非以某病必無某脈經云陽病得陰脈者死陰病得陽脈者生是陰病有陽脈陽病有陰脈也又中風之脈浮遲者吉大數者危是中風有浮遲亦有大數也吐衄之脈洪大者危沉小者吉是吐衄有洪大亦有沉小也凡患病者必先將病之始末細說與醫以脈證病瞭然無疑則藥無不效也今多有自隱病因以脈困醫令其猜病偶合則稱為神手不合則薄為庸才不服其藥是以明醫反不見信良可慨也彼不知古人治病未有外望聞問三法而獨以切脈神其治者東坡先生云吾求愈病而已豈以困醫為事哉且人生平有六陽脈者六陰脈者有左右偏盛者有反關脈者凡有疾病難以合診又飢飽房勞驚醉之後脈難作準又寒熱之病寒時則脈衰熱時則脈盛不可不辨以上數端醫者臨證時以望色聞聲問因審之庶可以得病情而手到春生矣
