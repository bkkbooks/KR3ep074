body:
  text: 卷二風寒證辨喻嘉言曰足太陽主表也而表有營衛不同病有風寒各異風則傷衛寒則傷營風寒兼受營衛兩傷三者之病各分疆界仲景立桂枝湯治風傷衛麻黃湯治寒傷營大青龍湯治風寒兩傷營衛此天然不易之法也舒氏曰風為陽邪衛為陽道氣行之路寒為陰邪營為陰道血行之路風邪之所以傷於衛不傷於營者陽與陽相親也寒邪之所以傷於營不傷於衛者陰與陰相接也故邪雖由太陽而傳遍六經其風邪終不犯於營寒邪仍不犯於衛此陰陽各從其類不相混也喻嘉言曰太陽為六經之首主皮毛而統營衛所以為受病之始桂枝湯桂枝白芍生薑各三兩甘草二兩大棗十二枚考漢時一兩即今三錢三分水煮三碗服一碗汗收熱退不必盡劑否再服又否方盡服後凡服表藥皆如此法服已須臾啜熱稀粥一碗以助藥力溫覆令一時許遍身津津微似有汗者益佳切不可令汗如水淋漓按桂枝走太陽之表專驅衛分之風白芍和陰護營甘草調中解熱姜辛能散甘棗能和又以行脾之津液而調和營衛者也按風傷衛主桂枝湯一定之理也然必察其臟無他病方可用之而無虞不然自當見證加減若本氣虛寒宜加薑附溫經御表本氣燥熱宜加歸地滋陰助汗如此之類詳其兼證察其二便問其平日有何舊病與否其所用飲食宜寒宜熱以盡臨證之妙則神乎技矣辨訛一則難經云腎之積曰奔豚則奔豚屬腎矣方用桂枝加桂湯於足少陰腎其法不合也既陰邪上逆從少腹衝心悖亂已極豈猶敢用桂枝之升散以重耗其陽而愈動其陰乎仲景必無此法偶與景陸閔公談醫曰昨見一少年其身壯盛患少腹痛以漸上攻而至心下醫者用桂枝加桂湯四劑遂汗迫厥逆而死矣此誤也是證乃少陰中寒宜吳萸四逆湯驅陰降逆俗庸之輩謬據奔豚法而放膽用桂枝以殺之耳豫聞而爽然曰先生高識足以釋我疑而破天下之惑也今而後益知奔豚之法不可從也爰是更進而求之燒針者溫經以御表也腎邪當不致發矣且核起而赤者尚在軀殼之表昌為必發奔豚耶此必後人之誤門人張太和曰太陽除脾約外切不可用下法慎之慎之麻黃湯麻黃絨甜桂枝各三兩生甘草二兩大杏仁七十枚凡用麻黃去根節醋湯煎煮撇去浮泡曬乾以蜜炒炙冬月生用先煮麻黃數沸去沫入諸藥合煎如前法熱服覆取微汗汪昂曰麻黃辛溫走太陽發營分之寒用桂枝以接引營邪出外舒馳遠曰桂枝湯中用芍藥以內護於營而麻黃湯中用桂枝以外導於衛此陰陽互根之妙者也蓋衛行脈外營行脈中營邪出表必假道於衛用麻黃髮出營分之邪用桂枝接引衛外但用麻黃湯者當察其人本氣無虧乃可徑用若元陰不足方中宜加歸地真陽素虛宜加附子肺胃素有蓄熱者宜加石膏何以見真陽素虛其人平日惡寒喜熱愛服椒姜若其人不服辛燥喜服寒涼生冷之物者自必陰虧火旺也又曰傷寒有傳經之邪化熱則傳經未化則不傳脈靜者邪未熱也故不傳然不但一日不傳雖數日而終不傳也若見欲吐煩躁脈數則寒邪化熱之徵故為傳也雖一日太陽二日陽明三日少陽然必以脈憑之浮屬太陽大屬陽明弦屬少陽然不定限日期必察其所見之證屬於何經所憑之脈與何證相合否倘病不合脈尤必舍脈而從證看傳至何經又必轉見何經之證不然何所徵驗故仲景復申之曰傷寒二三日陽明少陽證不見者為不傳也總之六經皆各自有定法參其伍而錯其綜自無往而有不得之者矣大青龍湯麻黃六兩桂枝二兩甘草二兩杏仁四十枚大棗十二枚石膏如雞子大一塊碾碎舒馳遠曰大青龍湯為表寒裡熱者而設小青龍湯為表裡俱寒者設白虎湯為表熱裡熱者設客問曰石膏之性寒涼重墜表藥中所不宜用而青龍湯中用之何以不牽制其升騰之勢而反說能助何也答曰汗者津液之餘也其人津液素乏陽邪內壅則營衛失潤何由得汗耶故於麻黃湯中重加石膏以全津液而除煩躁否則汗亦無所釀矣是青龍之妙妙在用石膏胃陽得之則熱化津生煩躁乃解方中有石膏猶龍之有水助然龍之所以為龍者全藉水以變化風雨上天下地不難也不得水則尋常尺寸不能至於斯時也欲轉之清波非負大力之石膏渠將能乎通斯義者進乎技矣喻嘉言曰天地鬱蒸得雨則和人身煩躁得汗則解大青龍證為太陽無汗而設與麻黃湯證何異因有煩躁一證兼見則非此法不能解蓋風為煩寒為躁故用之發汗以除其煩躁也究竟本方原無汗者取微似汗若有汗者之躁與煩其不藉汗解甚明加以惡風脈微弱是則少陰亡陽之證與此湯不相似也誤服此湯而速之亡陽耶仲景更立真武湯以救其誤特為大青龍對峙見一不汗出之煩躁興雲致雨為陽亢者設一則救汗不收之煩躁燠土製水為陰盛者設煩躁一證陰陽互關不可不辨及毫釐之仔細也真武湯製附子白茯苓芋貢朮白乾薑各三兩白芍藥按白芍性味酸寒生陰壅滯之物中寒門中不宜用不如以黃耆易之方為合法喻嘉言曰真武乃司水之神龍惟藉水可能變化水者真武所司也設真武不與之以水青龍之不能奮然升天可知矣故方中用茯苓白朮附子黃耆生薑醒脾崇土之功多於回陽名曰真武湯乃收拾分馳離絶之陰陽互鎮於北方少陰之位其所收拾者全在收其坎水也使龍潛而不見設有一毫水氣上浮便即得遂其升騰之變化縱獨用乾薑附子以回其陽其如迫汗不止何哉厥後晉旌陽祖師以仙術斬蛟捕至蛟龍遁跡之所戒其家勿蓄勺水乃從硯池中逸去可見水怪原有尺水丈波之能向非真武坐鎮北方天壤間久為龍蛇之窟矣其亡陽之證乃少陰腎中真陽飛越耳真陽飛越亟須鎮攝歸根陽既歸根豈更能飛越乎故舍天人一致之理以談醫者非真至也小青龍湯麻黃桂枝半夏乾薑甘草加附子更為合法喻嘉言曰麻黃桂枝湯無大小而青龍湯有大小者以麻桂二湯之變法多而大青龍變法不過於麻桂二湯內施其化裁或增或減或饒或去其中神化莫可端倪又立小青龍湯一法散邪之功兼乎滌飲取義山澤小龍養成頭角乘雷雨而翻江攪海直奔龍門之勢用以代大青龍湯而擅江河行水之力立法誠大備也昌於分篇之際特以大青龍湯為綱於中麻桂諸法悉統於青龍項下擬為龍背龍腰然後以小青龍尾之或飛或潛可沵可伏用大用小曲暢無遺仲景通天手眼馭龍心法矣又曰或問青龍自為一隊即白虎且剔出另峙其後然則脈證之縱橫者何與青龍事耶答曰傷寒中多有忽然自汗突爾亡陽之候雖不犯青龍之藥早已犯青龍之逆矣蓋屈蠖者龍之所以伏也縱橫者龍之所以飛也縱橫之脈證不同刺穴用期門期門肝木所主東方青龍之位也刺其穴者正所以制其木而預弭其亡陽之變故一青龍方中張大其施則天行而為霖雨挾小其制則鼓浪而奔江海馴制其性則逾越女婢之卑柔刺其經穴則銷弭靈幻於寂若仲景於其奮鬣升天萬難把捉之時尚以真武一方坐鎮北方之水俾地氣不上天氣不下所謂其雨其雨杲杲出日龍之既升於天者不得不復返於淵況未及升騰可訓可撫顧無法以制伏之耶此余所以有會於縱橫之義也倘其不然匪但無與於青龍之事亦並無與於傷寒之事矣吾不知仲景制方之時其為龍乎其為仲景乎必有倏焉雷雨滿盈倏焉密雲不雨倏焉波浪奔騰倏焉天日開朗以應其生心之經綸者神哉青龍湯等方即擬為九天之龍經焉可矣白虎湯知母六兩石膏一斤甘草一兩粳米六合喻嘉言曰白虎湯但能解熱不能解表必惡寒頭身疼痛之表證皆除但熱渴而求救於水者方可以此藥與之程郊倩曰熱結在表則身發熱而時時惡風以表氣鬱而不舒也熱結在裡則大渴舌上乾燥而煩欲飲水數升白虎湯中或加人參或不加當視其人元氣何如耳滌熱除煩生津止渴解去鬱結中外清肅了無余義矣喻嘉言曰寒與風俱傷宜從辛甘發散矣而表與里又俱熱則溫熱為不可用欲並風寒表裡之熱而俱解之不亦難乎故立白虎湯一法以補青龍之不逮其藥乃知母石膏辛涼二物也辛者西方金也涼者秋令也酷熱之時欲求金風薦爽萬不可得計惟虎嘯虎嘯則風生風生則熱解耳所以取辛涼二物偶成方以象白虎之陰也夫青龍變化莫測方無定體故各用制伏之法若白虎乃地獸之靈得風從而威愈震亦不易制伏之物況裡熱已極津液垂亡元氣所存無幾而領西方之肅殺以入胃中能無慮乎於是以甘草之緩和其猛性而入粳米同煎以助胃中水穀之氣虛者更加人參以助胃中天真之氣乃可用之而無患製法早具於一方之內矣世傳孫思邈有降龍伏虎之能豈非以仲景之心法為道法耶麻杏甘石湯麻絨四錢杏仁二十一粒去皮尖甘草二錢石膏八錢水煎服治氣逆變喘飲水灌水表邪未盡諸法神而明之余觀仲景常言發汗後乃表邪悉解今汗出而喘無大熱當知上焦餘邪未盡宜以麻杏甘石湯散之夫傷寒一證雖云傳足不傳手余閲歷有年所見足經而兼手經者恆多近世醫家每遇足經六傳之證尚爾分證模糊至於兼手經之證鮮不五色無主矣而況全不知分經用藥辨證明晰者乎如太陽陽明兩經合病其邪襲入手太陰必至氣逆發喘者何也要知足太陽之邪由背而貫胸足陽明之邪由胸而徹背肺為華蓋覆於胸背之上明者才病外感便當早為足經傳手之慮俾得汗出邪散不致留連方稱醫哲曾治王卣臣感足太陽膀胱足陽明胃兩經合病醫家不知分經用桂枝葛根以合解兩經之邪以通套方藥胡亂雜投以致兩經合病之邪襲入手太陰肺經肺主皮毛統一身之氣者也氣通則汗出氣閉則汗壅是以氣逆發喘未得大下而兼發黃且手太陰肺與手少陰心膜屬相聯若藥再誤其注肺經之邪直攻心臟形如煙燻髮直頭搖竟成心絶之候正如足太陽誤用葛根即領其邪入陽明之例耳不然傷寒之邪過經不解蘊祟日久不過襲入厥陰心包已耳豈有直攻心臟之理哉吾用柴胡清外邪大黃蕩內熱麻黃髮肺邪杏仁下肺氣甘草緩肺急石膏清肺熱煎服一劑得大下喘止黃退而思飲食繼以養營清補調理兩旬而安此余深識仲景制方之妙專主足太陽經藥復可於手太陰經用之故一舉而解手足兩經之危此法傳之千古俾後學奉為指南也須審陽明果有實熱方可以用大黃陽明經證治大意喻嘉言曰傷寒之證無如太陽一經風寒參錯表裡差殊難於辨認昌分三篇先立鄙言以引其端後隨仲景原文闡其立言精意俾業醫者得其門而入庶足以窺其富美也而陽明一經之病治之尤難蓋胃為水穀之海五臟六腑之源多血多氣之沖乃吉凶生死之所攸關仲景著論精詳後人讀之憒憒今請得而要言之也夫陽明者胃也陽明以胃實為證胃實則皆下證也然陽明之邪其來路由太陽其去路趨少陽然必辨其在經在腑在經則遞傳入腑則不傳腑證則當下經證不可下也庸愚無識妄守專門必俟七日傳經已盡方敢言下詎知太陽一經早有十餘日不解者若不分經而但計日其誤下仍在太陽至陽明二三日下證即見者反以計日當面錯過其陽明以趨少陽者又以計日妄行攻下而犯少陽所禁甚至少陽復傳陽明更不識其證為何證坐令熱邪在胃爍盡津液以致輕者重而重者死矣所關詎不大耶謹將陽明之證亦比太陽之例分為三篇以太陽陽明為上篇正陽陽明為中篇少陽陽明為下篇其三陰復轉陽明附於篇末俾觀者瞭然不致差誤耳舒馳遠曰太陽陽明者是太陽之邪傳入陽明而太陽尚有未盡者邪由太陽而來非陽明自受者此為傳經之邪也若合病並病皆自受之邪為不傳之候也然其證雖有傳經不傳經之別治法總不外乎兩經合治而已的是陽明經證必鼻塞前額連眼眶脹痛發熱不惡寒法主葛根以解陽明在經之表張蓋仙曰陽明之病在經主葛根入里主白虎入腑主承氣不必辨其為中風與傷寒之證也喻嘉言曰發太陽經之汗即當顧慮陽氣以膀胱主氣化故也發陽明經之汗即當顧慮陰津以胃中藏津液故也所以陽明多有熱越之證胃中津液隨熱而盡越於外汗出不止耳然而陽明證不論中風傷寒脈微脈實汗出少而邪將自解汗出多陰津易至竭絶業醫者可不謹持其柄而用重劑發汗以竭人之津液也大承氣湯大黃酒洗芒硝四兩厚朴枳實二兩小承氣湯大黃生用四兩厚朴枳實二兩徐忠可曰此於大承氣湯中單去芒硝取其能微和胃氣和者緩也無硝則勢緩矣謂稍有未硬且微通其氣略解其熱緩以待之也故曰調和胃氣非調胃之謂也調胃承氣湯大黃四兩酒浸甘草二兩炙芒硝半升以水三升煮取一升去渣入硝微煮少少溫服舒馳遠曰調胃者調和胃氣也大黃用酒浸緣酒性上升大黃得之則緩於下矣若不爾乃隨急性之芒硝一直達下而無戀膈生津之用何謂調胃耶大黃之用酒洗於大承氣湯者蓋洗輕於浸是微升其下走之性總因芒硝性急恐其直過未得與邪相當耳而大黃又生用於小承氣者以無芒硝勢已緩矣大黃再製正如欲用其勇反掣其肘庸有濟乎再按承氣者承領一線未亡之陰氣也大實大滿法當急下者則用大承氣稍輕則宜調胃而小承氣之法但心下痞微煩而無實滿故不用芒硝較輕調胃又可知矣喻嘉言曰陽明主藏津液者也津液充則不渴津液少則渴矣故熱邪傳入陽明必先耗其津液加以汗多奪之於外復利其小便奪之於下則津液有立亡而已故示戒也陽明病法宜多汗今反無汗衛陽不足也其人不能食可知衛陽既虛不能透出肌表故怫鬱皮中如蟲行狀虛指胃言實則痛虛則癢若無汗兼嘔咳厥法宜葛根合附朮薑半以治之陽明若無腑證則厥為陽厥法宜驅陽之中仍兼散逆斯可矣蜜煎導法白蜂蜜七合用銅器微火熬頻攪勿令焦候煉如飴捻作挺子長二寸許頭鋭如指摻皂角末少許乘熱入穀道中用手捫住欲大便時去之加鹽少許亦可蓋蜜能潤燥鹽能軟堅汪昂曰蜜能潤腸以行氣皂角能通竅凡表解已而無里證者胃雖實亦忌攻不可以苦寒傷胃豬膽導法豬苦膽一枚取汁入酒醋少許用竹管子長三四寸以一半入穀道中將膽汁灌入頃刻大便汪昂曰膽汁寒勝熱滑潤燥苦能降酸善入故能引入大腸而通之矣津液枯者宜蜜導熱盛者宜膽導如冷祕削醬姜亦可導也馳遠又曰大承氣之用義大黃蕩實熱厚朴通氣壅枳實破氣結芒硝能軟堅而兼潤腸中之乾澀也馳遠治驗曾治白以採患腹痛作泄愈月不愈薑附服過無數其人稟氣素盛善宴啖肉食因自恃強壯病中不節飲食而釀胃實之證大便轉閉自汗出昏憒不醒人事譫語狂亂心腹脹滿舌苔焦黃乾燥開裂反通身冰涼脈微如絲寸脈更微殊屬可疑豫細察之見其聲音烈烈揚手擲足渴欲飲冷而日夜不寐參諸腹滿等症則胃實確無疑矣更察遍身冰冷厥熱亢極隔陰於外也脈微者結熱阻結中焦營氣不達於四肢也正所謂陽極似陰之證急於大承氣湯一劑無效連服四劑無效豫因忖道此證原從三陰而來想有陰邪未盡觀其寸脈其事著矣竟於大承氣湯中加附子三錢以破其陰使各行其用而共成其功服一劑得大下寸脈即出狂反大發豫知其陰已去矣附子可以不用單投承氣病勢略殺連服四劑前後芒硝大黃各服半斤而安可見三陰寒證因有宿食轉屬陽明而成結燥者有如是之可畏也曾治張天元患腹脹不大便來寓求治診其脈微而澀舌潤不渴豫告之曰此裡氣虛脫證已具法當扶陽固腎醒脾和氣使收藏之本固則氣化歸元而化自行脾氣有權則健運行而升降清其患當自愈其家以豫言迂也聽醫用下大便暫通腹脹因減彼以為有效矣豫知其必死也次日復閉腹脹加甚於是又下閉脹愈加甚焉更下之卒不能通則氣壅而死矣噫庸醫殺人恬不知改頑夫受殺實可憫也經曰陽明居中土也萬物所歸無所復傳所以惟有下奪一法奪其土而邪自不留耳否則邪住腑中漫無出路逮耗盡津液而死也若其人津液足以供邪雖留連日久而亦不死且腑中之邪久而久之仍從外轉或反來路而還太陽或趨去路而往少陽此又不傳中復有傳之妙理也然其權實賴中土以為之總司嘉言有曰即如天以四時成歲中土各旺於季月之末然後木庇其根火收其焰金銷其肅水藏其瀾使非傳之中土則木火金水不能相貫何以化機盈眸不息乎人之飲食入胃清氣升濁氣降渣滓不留者其妙惟在於傳設一時不傳則積滯而不化矣至於仙家攢簇五行東三南二木火相戀歸於中土西四北一金水相親歸於中土其妙更在於不傳設傳則流散而不造矣然則中土之傳與不傳足盡天人之蘊又何疑於多事哉陽明病大便溏者胃中虛寒也潮熱者虛陽浮越於外非胃實也兼見胸脅滿者是胃中流飲旁流入脅也雖屬少陽陽明不宜解表當用耆朮參半薑砂草果理中逐飲而病自愈小柴胡湯不合也按陽明不大便其胃實矣兼見脅下硬滿飲邪上逆而為嘔鬱蒸而結苔當用耆朮砂半補中滌飲草果以破脅下懸飲合小承氣微蕩其實乃為合法小柴胡湯不中用也舒馳遠曰少陽經本有渴服柴胡湯則病愈而渴未有不止者今不但病不解而反有加何也乃邪熱轉歸陽明而成胃實證也以法治之自是斟酌白虎調胃耳附太陰轉陽明一證按脾脈主緩證本發黃若小便利則濕行而黃可免若大便硬則胃有夙燥因復轉陽明附少陰轉陽明一證按少陰本氣虛寒者多自利此言六七日不大便是必熱邪內脅真陽矣加以腹脹邪轉陽明此少陰負而趺陽勝腎水勢在立盡不可緩也法宜急下以救之附厥陰轉陽明一證按此證為熱結旁流法宜附子湯合小承氣湯單小承氣非法也然下利譫語者亦有陰陽虛實之分辨但見嗜臥目瞑身重惡寒而無煩渴惡熱等證兼見乃屬虛寒純陰之證不可妄用大黃必有陽明熱濕徵驗方是熱結旁流但只譫語不足為據也治驗曾治王玉珏未發譫語外見頭眩嗜臥身重惡寒便泄不渴夜間發熱漸加大熱不惡寒轉惡熱掀去衣被揚手擲足身漸出汗漸至大汗其勢方解明日亦復如是醫經半月無效仔細察之果何證也將謂陰盛格陽於外耶亡陽之證無此大熱將謂三陽之表熱耶並無頭項腰背骨節疼痛及耳聾口苦等證且未見煩渴飲冷白虎非所宜也以此而論定為熱結旁流矣不煩渴者乃為結燥隱匿腸間不在胃腑故不能耗其在上之津液也吾用黃耆白朮炮薑附子半夏故紙重加大黃一劑而下燥屎二三枚是夜不發熱矣於是方中去大黃數劑而痊愈曾醫繼唐魏舅氏善人也身舉孝廉形體素豐謙恭仁厚自謂六十後多食則脹悶今年七十有三目精不慧近視不明六七年矣乃一日午膳後縣尊請商公事時當酷熱過勸緑豆粥一碗是夜下利數十次不能起床起則眩暈明早診視按之六脈沉細而微其糞內帶清水愚曰此太少二陰鶩溏之證而兼陷暑邪也雖有外邪不可清解法當大補中氣扶脾固腎溫經御邪回陽止泄方可無虞乃用耆朮芡實懷山各八錢胡巴故紙苡仁半夏各三錢炮薑附桂各一錢砂仁白蔻各七分連進五劑而利稍減再進十劑仍然昏沉又服十全大補湯十劑病微退而精神漸爽飲食亦進但四肢無力難於轉側利微下而卒不止又與人參養營湯十劑雖然起床不能久坐但見皮膚光澤身輕易於轉側又與理脾滌飲十劑是夜不安煩悶之甚愚意日久雖在下利而未見糞更見脹悶不安以此察之定為熱結旁流矣遂以參耆附子湯加桔梗一錢大黃二錢服之不安又用麩麵炒尉夜半稍安次早復作更甚自覺腹中氣壅十分危急其間豫為舅氏調理在五十餘日往返在二百餘次晨夕焦勞又令前湯再進炒麥麩再尉自云目中出火其心欲落急令扶起掙下一物其狀如茄子不軟不硬良久病去如失自出中堂即進飲食言語如常隨即剃頭見鬚髮內長出一層黑髮約長數分公聞之而喜曰我之病難望保餘生耳今何以病愈而長黑髮目睛復明竟能視細細字乎神哉醫也此後之壽而康皆賴吾甥之力也賜酒漿脯醢領謝孔方十萬卻之少陽經證治大意程郊倩曰少陽在六經之中典開闔之樞機太陽為開陽明為闔少陽為樞出則陽入則陰職守最重非若他經之表裡截然不相管攝也半表者指在經之風寒而言所云寒熱往來胸脅苦滿是也半里者指在腑之裡熱而言所云口苦咽乾目眩是也表為寒里為熱寒熱互拒所以有和解一法以柴胡解少陽在經之表證黃芩和少陽在腑之裡熱猶恐陽神退而裡氣虛邪陰乘虛而起故用薑棗人參以壯其裡氣而御其表三陽為盡三陰不受邪方成妙算若腑熱未具誤投黃芩伐其裡氣是為開門揖盜矣蓋裡氣虛不能御表也識透此決方可讀仲景少陽篇之論與夫條中之所示之所禁之所加減而為從表從里及一切斟酌之法不然汗吐下之禁未犯而先犯本方之黃芩則陽去入陰此時即能救誤所失已良多矣豫常目擊世醫以小柴胡湯殺人不少非其認證不真蓋亦得半而止耳又曰口苦咽乾者熱聚於膽也目眩者木盛生風而眩暈也口苦咽乾目眩者少陽之腑證也腑證未具萬不可用黃芩程氏之論至詳且盡嘉言謂目眩者木盛生風而目眩暈也愚謂當是目昏蓋以少陽厥陰臟腑相連因熱乘肝膽而目昏蒙也治驗曾治張太來之妻寒熱間作口苦咽乾頭痛兩側默不欲食眼中時見紅影動其家以為雷號來寓備述豫曰非也此少陽腑邪溢於肝經目為肝竅熱乘肝膽而目昏花也豫用小柴胡和解少陽加當歸香附宣通血分羚羊角瀉肝熱而廓清目中不數劑而愈又治豫八女年六歲寒熱往來每於夢中驚叫而醒爬上人身且哭且怕至十餘夜不能瞑目將閣眼即大叫大哭維時豫南署外回歸家婦語以故余曰此為膽虛熱乘用小柴胡湯去黃芩未見口苦咽乾不用黃芩加白獲神遠志寧心安神竹茹開鬱真琥珀定驚一劑而安語云熟讀王叔和不如見證多信然小柴胡湯軟柴胡法夏子八兩官揀參三兩炙甘草白生薑一兩大紅棗十二枚原方黃芩誤入方內若見口苦咽乾方用黃芩三兩水煎二次和一處分三碗服其服法同前桂枝湯程郊倩曰柴胡解少陽在經之表黃芩和少陽在腑之裡熱半夏散逆豁濁氣而還清參甘補正氣而和中薑棗助少陽生髮之氣使邪無內向也喻嘉言曰風熱上壅則耳聾目赤風熱與痰飲搏結則胸中滿而煩宜用小柴胡湯加白蔻宣暢胸膈栝蔞實以除其煩若誤汗吐下則胸中正氣大傷而邪得逼亂神明故悸而多驚也舒馳遠曰少陽原有經證腑證表裡各有一定之法毫不容混豈但汗吐下三禁而已哉至於溫經回陽養陰清燥及利小便諸法何得不禁抑何其見之不廣也門人王臣傑曰夫陽明胃為四臟之主胃若強健而思飲食則百病自愈是以三陰不受邪也少陽病六七日加煩躁乃邪漸入陽明之裡法宜小柴胡合白虎而兼解之一定之法也按身熱惡風頸項強痛太陽風傷衛也脅下脹滿懸飲也手足溫而渴里有熱也法宜桂枝湯以解太陽之表半夏草果以治懸飲石膏以撤裡熱小柴胡湯何取乎陽脈澀陽虛也陰脈弦陰盛也陽虛陰盛當腹中急痛宜用耆朮炮薑附桂以助陽御陰小建中湯不中用也小柴胡湯亦不合理太陰經證治大意胡章級曰太陰脾經之法散見於六經耳六經之證未有能外太陰者以脾為一身之主也脾氣強健何病不愈否則諸法皆不驗矣舒馳遠曰太陰經病是必腹滿而吐腹痛自利矣其證屬裡陰脈雖浮亦不宜於發汗即令外兼太陽表證惟當以理中為主內加桂枝兩經合治此一定之法也若只據脈浮用桂枝專顧太陽不顧太陰大不合法五飲病見前六經定法曰留飲曰水飲曰支飲曰懸飲曰溢飲豫常治留飲為患十用八九按人身後天水穀之精氣生血精氣者精微純靜之氣故屬陰水穀之悍氣生津悍氣者勇悍浮動之氣故屬陽血入於營津行於衛皆藉脾中之陽而為傳布周流苟脾氣里乏其所生之血傳布不盡者停蓄膈中不能復行經絡而為敗濁兼之胸中之陽不能宣布痰血即上逆而吐也其所生之津傳布不盡者不得復為津精皆由胸中之陽不能宣布則上逆胸中而為咳唾痰血兼見並五飲諸證均宜大補中氣宜暢胸膈醒脾逐飲隨飲加藥一定之法也外有著痹行痹二證又當清熱潤燥不致混爻方為獲法理中湯官揀參白貢術炮乾薑炙甘草水煎服汪昂曰理中湯治傷寒太陰病自利不渴寒多而嘔腹痛鶩溏脈沉無力或厥冷拘急或結胸吐蛔及感寒霍亂自利腹痛者加木香不痛自利者倍白朮白朮益氣燥濕能生津液木香順氣定痛體重踡臥昏沉下利不止加附子此兼少陰證腹滿去甘草甘令中滿嘔吐去白朮加入半夏薑汁白朮甘壅薑半散逆臍下動氣去白朮加肉桂術能助氣桂泄奔豚心下悸加茯苓飲停則悸茯苓利水寧心陰黃加茵陳陰寒結胸加枳實本方等分蜜丸名理中丸加法夏砂仁尤妙大如雞子以百沸湯和一丸溫服本方加附子名附子理中湯張仲景曰大病瘥後喜睡久久不了乃胃中有積飲宜理中丸劉宏壁曰積飲者脾虛也若以順氣逐飲藥與之其痰雖去轉盼復積惟大補溫中脾氣有權則積者自去不復再積矣此足太陰脾經藥也人參補氣益脾故以為君白朮健脾燥濕故以為臣甘草和中補土故以為佐炮姜溫胃散逆故以為使以脾居中州故名之曰理中愚意人參價昂無力者以黃耆代之更加砂仁半夏醒脾開胃溫中散逆馳遠太老夫子制理脾滌飲方北箭耆白貢術各五錢法夏子三錢西砂仁一錢炮乾薑白蔻仁一錢為末水煎調白蔻末溫服此方奏功甚速豫歷試有年活人多矣其制方之義蓋亦仿理中而變化也門人楊宗煦曰此方黃耆白朮大補中氣砂仁半夏醒脾開胃白蔻宣暢胸膈乾薑溫中散逆以此方加味統治五飲諸證效如桴鼓治驗曾治知府楊迦懌任興邑事稟性仁慈居官清肅因署馬邊撫夷府軍務焦勞患溢飲證右肩痹軟痠痛又署邛州不能簽押神色衰憊醫治無效納稟告病上以廉能不允令復興邑任促騎請治診之兩寸洪大而緊余皆沉微余曰公之恙乃太陰溢飲為患病在氣分前醫不知分辨氣血誤用血分之藥以貽害耳法宜大補中氣醒脾崇土宣通氣分即當奏功乃用耆朮砂半乾薑白蔻虎骨威靈仙桂枝薑黃十劑而效再服十劑其痛如失遂與歸脾湯去木香甘草加五味子鹿茸肉桂為丸脾腎兩補而愈但公行年五十尚未生子向余索求種子方餌余念公謙恭仁厚與之龜首丸服畢致書曰前賜妙丹服之神效懇煩再配二料遂如命復之調理數月步履輕健精神康壯如夫人有喜矣明年壬申降生一子又明年又生一子骨秀神清均甚壯美余見而喜公頓首謝曰起我沉疴身受益矣賜我後嗣澤及先矣綢繆訂交濃情款洽後升遷別去者二十三年辛卯秋闈卸寧遠府事引見候升吾子於省垣一遇年已七十二矣重話巴山猶深綣念是時精神矍爍尚運筆如飛前後手書見惠不一中酬我以錦聯曰自是君身有仙骨遍與人間作好春匾曰妙合六經蓋公之書法見重當時久矣附龜首種子丸方大龜首一個醋炙大生地四兩山萸肉二兩懷山藥二兩白茯苓二兩乳蒸粉丹皮一兩光澤瀉肉蓯蓉酒洗焙乾真瑣陽醋炙各一兩蜜煉丸如梧子大酒下取龜首法以盆水貯之靜室中伺其頭出突然持刀取之否則縮頭難取此仙傳方也有德者服之神驗切勿傳與匪人蓋殘忍刻薄之輩罪重惡極天必欲絶其嗣非人力所能挽也何可悖逆天常乎太上垂訓云無故殺龜打蛇若用非其人妄傷戕生命尤足以攖神怒而干陰譴領此方者寶之祕之曾治大學士海山周大人六公郎州官桐峰者患吐痰三十餘年自云少壯時一年三五發將發二三日左脅內脹漸大如米瓜即吐吐出之痰狀若破絮形似癰膿臭不可聞待三五日痰盡乃平每發如是至今年衰一月數發飲食不進日夜無寧來寓求診右寸關浮大滑而弦甚餘脈如常余曰足下之恙乃太陰脾經之患巢囊之痰如蜂兒宿於房中蓮子嵌於蓬內生長則易剝落則難吐盡又積積滿又吐桐峰曰先生明若觀火治之將何如余曰補正攻邪方與理脾滌飲加南星草蔻溫中散結芫花草果大破懸飲更用斬關丸以剗巢囊蕩滌濕痰自必有效彼聞之顏曰先生良醫也即依其法煎服二劑而痰活又服二劑是晚吞斬關丸五錢次日乘輿來寓頓首謝曰妙哉先生之藥何其神也我三十餘年之疾昨晚得先生一劑服之至二鼓其痰自大便長驅而下今早自覺右脅下毫無形跡矣此後不發皆君賜也弟惟每飯不忘耳附斬關丸方石硫黃五兩研細末貫入豬大腸內線扎煮爛去腸滾水淘數次曬乾紫油桂白蔻仁川花椒生白朮生附子吳茱萸法夏子雞內金各一兩共為細末飯碾為丸梧子大收貯聽用曾治北關口王相患咳嗽吐痰右脅刺痛胸膈不開飲食無味顏色枯槁形神俱憊自謂知醫服藥無功方求余診按之右寸關浮滑而緊餘脈如常余曰君之恙乃脾經虛弱痰飲由胃而旁流入脅其病名曰懸飲也法以黃耆以補胸中之陽白朮以助脾中之陽砂半醒脾開胃薑蔻溫中逐飲宣暢胸膈芫花草果搜剔脅縫之痰自愈果服二劑而效惟痰仍盛乃與八味丸補而逐之乃安足少陰腎經證治大意舒馳遠曰少陰前後二篇寒熱迥別治法亦大相懸殊推其源頭標同而本不同也蓋腎中真陽素虧之人陰寒是其本也邪入少陰則必挾水而動而為前篇諸證宜急溫之固不待言其在太陽發表藥中亦早宜加附子以助陽御陰庶毋逼汗亡陽之患也若腎中真陰素乏之人則必挾火而動而為後篇諸證宜從養陰退陽固不待言其在太陽發表藥中亦早宜加阿膠地黃等藥以回護真陰方可得汗否則陰精被劫汗亦無所釀矣又曰外邪挾水而動陽熱變為陰寒則陰盛故但欲寐外邪挾火而動則陽盛故煩躁不得臥嘉言先生論之詳矣喻嘉言曰炙之以火助陽而消陰也主之以附子湯溫經而散邪也附子湯製附子二枚炮用官揀參二兩白貢術四兩白茯苓三兩白芍藥水煎溫服愚謂本方白芍不如以黃耆易之方為合法舒馳遠曰中寒門中用附子破陰回陽取其飛騎突入豈有用白芍酸寒凝陰之物以羈絆附子雄入之勢而致遷緩無功耶仲景原方必無白芍又曰陰邪上逆則欲吐真陽擾亂則心煩但欲寐者陰𮦦盛而陽不升也宜用附子湯加半夏若舍此不圖延至五六日則下焦寒甚邪急奔而下利腎水缺溫津液不上潮而口渴非從溫經之法飲水終難自救也以小便色白而證少陰之寒更當以不喜飲冷而證虛寒之渴也門人楊宗煦曰余曾考經絡篇云舌下有二隱竅名曰廉泉運動開張津液湧出然必藉腎中真陽而為之薰騰乃足以上供若寒邪侵到少陰則真陽受困津液不得上潮故口渴與三陽之邪熱爍干津液者大相反也舒馳遠曰少陰有寒利復有寒閉以腎氣為寒所困則關門不開而二便俱閉宜亟溫之酒客常有此證人設不知此誤投大黃其閉愈甚則輕者重而重則死矣可不慎歟或問曰酒性固熱燒酒尤甚每傷於酒者反宜辛熱何也曰酒中有熱有濕均足為患因其本氣而患之本氣虛寒者原不患熱惟患其濕其濕日積陽神日衰一旦挾水而動陰邪橫發閉痛嘔逆上下交劇法當急驅其陰以回其陽真陽素旺者不患其濕而患其熱熱從後陰便血生痔熱遺前陰莖生諸疳法宜分解其熱而清其毒曾治樊子敬天陰頭赤腫碎裂如絲其痛異常乃因素稟陽旺嗜飲燒酒乘醉入房求若所欲酒毒隨欲火下注於前陰也吾用葛花解酒毒大黃瀉濕熱桂枝前仁引導前陰五劑而愈斬關丸方見太陰證治開關丸方巴豆去殼去油色白如霜入絲羅篩過者乃可用之吳神麯攪稀糊入巴霜細末為丸丸成後用制硫黃生附子法夏子西砂仁白蔻仁各等分為極細末取前丸團於其上為衣收貯用時煎淡吳萸湯吞下病人脈陰陽俱緊反出汗者亡陽也屬少陰法當咽痛而復吐利也法當二字疑誤舒馳遠曰陰邪上逆則為吐下注則為利咽痛者陰火上結也治驗曾治錢仲仁患喉痹陰火上蒸津垢積而成塊堅白如骨橫於喉間痛痹異常其證惡寒嗜臥二便不利舌苔滑而冷口不渴而懶言觀諸證形狀總屬虛寒何以二便不利蓋為陰邪上逆喉間清涎成流而出津液逆而不降故二便不利吾用生附子驅陰散寒熟附片助陽溫經桔梗苦以發之炙草甘以緩之半夏辛以開之阿膠以潤咽膈服一劑喉間白骨即成腐敗而脫去其半痹痛稍緩略可糜粥小便漸長三四劑而大便行糞多且溏如是十二劑而愈由今思之曩時學識猶缺阿膠桔梗可以不必用當用黃耆以助胸中之陽白朮以助脾中之陽接引真陽上達方為合法舒馳遠曰五行皆一惟火有二所謂二者陽火也陰火也諸陽火乃柴炭之火得水則滅陰火乃石灰之火火燒無焰得水則焚其有半陰半陽之火乃煤炭之火仍用火燒必以水調其焰益烈人身之火亦分陰分陽陽火者實火也其證惡熱不惡寒舌苔乾燥渴欲飲冷宜用寒涼等藥陰火者虛火也其證惡寒倦臥舌潤不渴宜用辛熱溫補之劑半陰半陽之火即陰陽錯雜之邪法宜寒熱互用附齒痛方與治驗又常見患齒痛者亦有寒痛亦有火痛即陰火陽火之謂也凡火痛者宜用寒涼寒痛者宜薑附甚至薑附不效用胡椒二錢研末煮雞湯一碗服之立已又有蟲痛一證乃為陰濕生蟲胡椒亦可治又有風火相煽而為齒痛者外見頰車赤熱焮腫口中臭穢方用露蜂房研末一錢川黃連研末五分白明礬研末一錢洋冰片上麝香少許共為末合研勻細擦牙上痛即止又蟲蝕有孔眼者須用明雄黃二分上麝香三釐合勻擦蟲孔中其痛即止再痛再擦藥儘自愈屢試屢驗曾治餘三子輯五年七歲患蟲牙蠹一大孔每痛欲死諸方不應以前藥少許與之入蟲孔內痛止而安其效神速録之以備採用少陰病下利脈微乾嘔心煩則為陰寒在下陽煩在上法宜薑附以驅其陰然必加入尿膽汁以制胸中錯雜之陽邪庶薑附得以下行其用其脈微續者陽氣已漸復也暴出者勢必有雀啄釜沸之象又必主死也白通湯白蔥頭四莖炙乾姜一兩生附子一枚去皮加人尿五合豬膽汁一合白通加人尿膽汁湯加人尿膽汁名白通加人尿膽汁湯先煮白通湯一升加人尿膽汁和令相得煎溫再服若有汗去蔥白脈不出者用通脈四逆湯通脈四逆湯生附子一枚炮乾薑三兩炙甘草二兩白蔥頭九莖利止脈不出者加人參以生其陽而長其陰也此證一線微陽未散法當急投溫補於本方中可加黃耆白朮大補中氣速回其陽豈可用蔥白以耗散其陽乎仲景原方必無蔥白舒馳遠曰陽虛氣墜陰弱津衰而出恭反少也古人如廁必更衣出恭者大便也曾治汪少宰妻腹中急痛惡寒厥逆嘔吐下利脈見微澀豫以四逆湯投之無效其夫明日來寓告曰昨夜依然作泄無度然多空坐醡脹異常尤可奇者前陰醡出一物大如柚子想是尿脬老婦尚可生乎豫即躊躇良久曰是證不可溫其下以逼迫其陰當用灸法溫其上以升其陽而病自愈用生薑一片貼頭頂中百會穴上灸艾三壯其脬自收仍服四逆湯加黃耆白朮二劑而愈喻嘉言曰少陰水也趺陽土也諸病惡土剋水而少陰見證惟恐不能制水其水反得泛溢而真陽失溫飛越於外矣此消悉病情之奧旨也又曰少陰水臟也水居北方原自坎止惟挾外邪而動則波翻浪湧橫流逆射無所不至為嘔為咳為下利為四肢沉重仲景惟以真武湯一方坐鎮北方之水水不橫溢諸證自止而人之命根賴以攸固命根者何即父母媾精時一點真陽先身而上藏於腎水之中是也其有真陽素旺者外邪傳入轉而內挾真陽外顯心煩舌燥咽痛不眠等證主用黃連阿膠湯之類以分解其熱而潤澤其枯俱用重劑潤下一日三服始勝其任設熱邪不能盡解傳入厥陰則熱深者厥亦深咽痛者轉為喉痹嘔咳者轉吐癰膿下利者轉便膿血甚者發熱厥逆燥不得臥仍是陰竭而死也必識此意然後知仲景溫經散邪之法與清熱潤燥之法細微曲折與九轉還丹不異矣後人窺見一斑者遇陰邪便亟溫遇陽邪便亟下其魯莽滅裂尚不可勝言而況於聾聵之輩乎茲分前後二篇暢發其義知我者當不以為僭也喻嘉言曰少陰後篇熱邪挾火上攻而為咳下攻而為利內攻而為譫語小便難者火旺陰虧也又曰強發少陰汗而動其血勢必逆行而上屬陽竅以諸表藥皆陽經藥主上升也前篇諸厥為陰厥其證身重惡寒少氣懶言必欲得熱熱則陽回而厥自愈後篇諸厥為陽厥其證身輕惡熱心煩不眠然又必欲除熱熱除則陰復而厥自愈黃連阿膠湯川黃連四兩炒黃芩一兩白芍藥二兩真阿膠三兩雞子黃二枚以水五升先煮芩連白芍取二升入阿膠煨化令小冷入雞子黃攪令相得分三次日三服徐忠可曰芩連苦寒解熱為君阿膠雞子黃二味甘寒養陰潤燥為臣復以白芍之酸寒收攝外散之微陰為佐舒氏曰咽痛咽瘡者既是外邪挾火之證當分解其熱潤澤其枯所主甘草湯桔梗湯半夏湯苦酒湯皆不中用也咽瘡方雞蛋一個開一小孔漉去其清將黃攪勻燈心以水洗淨築滿蛋內以紙封孔外包黃泥曬乾火煅紅透候冷取出研為細末二錢壁錢長針穿燈上燒枯研末膽礬瓦炕黃丹水飛雞內金炕碎鴨嘴殼炕碎降真香共研細末鵝毛管吹虛寒咽瘡方燈心灰一錢生附子漂去鹽曬乾研末三錢共合研勻亦鵝毛管吹虛寒實火何以辨之凡虛寒者不熱不赤略可硬飯而飲水吞津則痛甚實火痛者赤熱而腫飲水吞津不甚痛而飯粒不能下咽舒馳遠曰少陰有熱結旁流復轉陽明之證腹脹不大便者然必兼見舌苔乾燥惡寒飲冷方為實證法當急下若兼見身重嗜臥舌潤不渴惡寒等證又屬虛寒法宜白蔻宣暢胸膈砂半醒脾開胃附子溫經肉桂化氣桔梗開提生薑升散使轉運之機乃得先升而後降所謂上焦得通中樞得運而氣化自行兼服斬關丸以通其閉然後加參耆苓術等藥及故紙類以收全功若不辨陰陽虛實但見腹脹便閉即行攻下未必盡當慎之慎之厥陰經證治大意舒馳遠曰兩陽相麗謂之陽明兩陰交盡謂之厥陰究竟六經皆有陽明六經交盡於厥陰也嘉言不便分為二篇者以厥陰中多有陰陽錯雜不分之證若據陰厥陽厥分為二篇則陰陽錯雜又三篇矣所以不便分也至於陰厥陽厥之證仍從外證辨之凡陰厥證必惡寒身重下利不渴陽厥證必惡熱身輕煩渴不眠故陰陽之辨雖曰甚微以此而論顯而易見篇中用治矩則雖多總之陰厥證重在溫經回陽以止其泄陽厥證重在破陽行陰以通其厥其陰陽錯雜不分之證法當陰陽互治寒熱雜投縱或陰陽多寡不一大概不出乎此喻嘉言曰胃暖乃能食今胃冷而反能食則是胃陽發露無餘頃之即去故為必死曾見黃居士患寒熱往來無口苦咽乾庸醫誤用黃芩致使邪入厥陰胃中冷而反能食真除中也居士乃未幾而歿冤哉舉世妄用黃芩觀此可以為戒舒馳遠曰厥陰證陰陽錯雜消渴者膈有熱也厥陰邪氣上逆故上撞心疼熱者熱盛也心中疼熱陽熱在上也飢而不欲食者陰寒在胃也飲食不納飢蛔必出法宜寒熱互投以去錯雜之邪吐蛔用烏梅丸不中用之方也王叔和誤人甚矣又曰陰邪直中埋沒真陽肌膚凍冽無汗或爪甲青黑唇青舌縮與夫渾身青紫成塊身重如壓皆陰盛而陽不虛也法當生附子以驅其陰熟附子不中也若真陽外亡身微熱而多汗或眩暈眼花神思恍惚者皆陽虛而陰不勝也法主熟附子以回其陽又非生附子之所能也治驗曾治蕭以德患陰寒面白膚冷青紫成團見於足而足不能移見於臂而手不能舉見於腮而口不能言且牙齦凍冽潰爛然時而心悸昏眩欲絶此為陽虛陰盛並見也吾以生熟附子並用更加參耆茸術以固其脫歷兩旬而愈如此條證大汗出者真陽外亡也熱不去者微陽尚在軀殼也四肢拘急者陰寒內結也四肢疼者陰寒侵入關節也兼之厥逆下利而惡寒在裡又純陰也合而觀之與陰邪盛並見法宜生熟附子並用更加耆術以助後天之陽庶乎有當單用四逆於法尚缺門人古常新曰生附子驅陰熟附子回陽一用之以溫經一用之以壯表舒馳遠曰痰飲壅塞胸中陽氣不得四布而致厥法當宣暢胸膈溫中散結以驅逐其痰而厥自通也又曰陽邪在上耗其津液而咽喉不利日誤下而脾胃大傷不能傳布則蓄血停痰協陽邪上逆混濁而唾血也或唾痰也復有虛寒在下而泄利不止此為陰陽錯雜之邪其治法仍宜理脾健胃宣暢胸膈兼以養陰清燥解熱豁痰更兼溫經止泄而病自愈不得錯雜以他經之藥而誤用之以亂仲景之戒耳白頭翁湯諸家注釋全不合理謂此湯走陽明血分誤矣仲景用之於厥陰陽明未當用也又曰白頭翁湯中黃連黃柏並能堅腎厚腸悉屬荒唐夫腸之厚薄何以辨之將謂腸薄大腸滑泄乎滑泄者法當溫中健胃以止其泄苦寒不可犯也若謂大便燥結乎燥結者法當滋陰潤燥以去其結苦寒性燥不可以燥益燥也至於堅腎之說更見謬甚凡真陽素旺之人腎氣強堅不堅者其人必陽虛也法當大補其陽豈可更用涼瀉愈傷其陽乎何人創此不通之言貽害千古竟有不通之輩紛紛信從殊屬可笑厥陰熱結旁流之證已見前陽明篇末按嘔吐涎沫乃陰邪協肝氣上逆則嘔吐涎沫逆而不已上攻頭頂而為頭痛宜用吳萸湯吳茱萸一升官揀參三兩乾生薑六兩大紅棗十二枚製附子二枚若寒利再加川椒耆術大補中氣而益脾土則頭痛與嘔吐自愈然六經各有定法頭痛之證已詳見前篇首喻嘉言曰厥陰之邪上逆乾嘔吐涎沫可用吳萸湯以下其逆若熱氣有餘結而為癰潰出膿血即不可復治其嘔正恐人以吳茱萸湯誤之識此意者以辛涼開提疏壅亦何不可為哉嘉言又曰厥陰篇中次第不一有純陽無陰之證有純陰無陽之證有陰陽差多差少之證有陽進欲愈陰進未愈之證復有陰居八九陽居一二之證熱而發厥熱深厥深上攻而為喉痹下攻而便膿血此純陽無陰之證也脈微細欲絶厥冷灸之不溫惡寒大汗大利躁不得臥冷厥關元此純陰無陽之證也厥三日熱亦三日厥五日熱亦五日手足厥冷而熱邪在胸火熱在胃此陰陽差多差少之證也渴欲飲水飢欲得食脈滑而數手足自溫此陽進欲愈之證也默默不欲食嘔吐涎沫腹脹身疼此陰進未愈之證也下利清穀裡寒外熱嘔吐下利其脈微弱復誤吐下面反戴赤陰居八九陽居一二之證也大率陽脈陽證當用三陽經治法陰脈陰證當用三陰經治法厥陰病見陽為易愈見陰為難痊其表裡錯雜不分又必先溫其里後攻其表證見咽喉不利咳唾膿血則溫法不可用又宜分解其熱潤澤其枯世醫遇厥陰諸證如涉大洋茫無邊際可測是以開口動手即錯我今不厭煩復復闡其奧於厥陰篇末俾後學奉為指南云張蓋仙曰壞病既經誤治而成勢必六經皆有壞病何以只言太少二陽有壞病他經無之意者闕文耳喻氏創陽明無壞證之解周旋其說大不近理合病並病過經不解三條亦皆可以不必究竟仍在六經之內按仲景六經之法辨其證在何經即用何經之法以治之自無往而不得之矣夫亦安用此三法為也乎舒馳遠曰病後水腫乃為脾胃氣虛不能升清降濁腎氣渙散膀胱氣化不行水邪泛濫而為腫法宜砂半椒蔻宣暢胸膈附子溫經肉桂化氣桔梗開提生薑升散俾轉運之機乃得先升而後降兼服斬關丸開通其壅俟小便略長飲食稍進再加人參茯苓黃耆白朮大補中氣其腫漸消更加鹿鞭大補腎陽故紙收納腎氣多服自愈若牡蠣澤瀉散大傷元氣人斷不可用再按病後腹脹俗名膨脹亦由脾胃氣虛升降失職壅而為滿推而原之總因服過順氣等藥耗散元氣刻削脾胃故不可再服順氣消滿之藥當同前法若脹滿過甚上下阻塞轉運不通升降不行藥不奏效急用紙卷艾絨於頭頂百會穴上隔生薑一片灸數次以升其陽而化其氣藥自有效甚至腎囊脹滿更於臍下灸淬燈火七壯接引頂上艾火藥必速效腳腫未消再淬湧泉穴在腳底中喻嘉言曰傷寒病後新瘥人與不病人交男病傳女女病傳男名陰陽易病即交易之義剪褲襠近陰處一方燒灰水和服男取女褲女取男褲取其同氣相求服之小便利陰處微腫蓋陰毒仍從陰竅出也舒馳遠曰此證無非得之少陰腎虛未必即是新瘥人之病也果爾法當該用人參耆朮薑桂枸杞故紙等藥無不立效恐非褲襠散之所能然無病之人不應有此虛證於鄙心不能無疑附傷寒發狂發斑結胸中寒等證雷公真君曰人有一時身熱即便身冷而滿體生斑如疹者乃火從外泄而不得盡泄於皮膚故鬱而生斑人盡以為熱也用寒涼瀉火之藥不效有斑不得消而死者殊可憫也吾傳汝以消斑散治之其效如桴鼓又曰傷寒發斑危證也然斑亦有不同有遍身發斑者有隻心窩內發斑者若遍身發斑證似重而反輕心窩發斑證似輕而轉重蓋遍身發斑內熱已盡發於外心窩發斑熱存於心中而不得出必須用化斑之藥以解熱毒吾傳起斑湯神效治驗曾治鄉中一家八口患斑皆同急求醫治豫即用消斑神效湯而施治之方用元參一兩麥冬一兩升麻三錢白芷二錢白芥子三錢沙參三錢丹皮五錢水煎服一劑斑勢減再劑斑紋散三劑斑影盡消矣此方妙在元參麥冬以消斑尤妙在升麻多用引元參麥冬以入於皮膚使群藥易於奏功而斑無不消也此證如衆人患一般者天行時疫也嘉慶丙寅豫在淯水城鄉皆染斑疫概施前方而活人者多甲戌回郡又遇大疫兼有夾斑者亦以此方救活甚衆若非神力人豈盡能之耶吾願仁人醫士寶之録之以遍傳天下則功德無量曾治王榮慶心窩發斑壯熱口渴神昏志亂告急求治豫以起斑湯與之方用升麻二錢當歸一兩元參二兩荊芥三錢黃連三錢天花粉五錢甘草一錢茯神三錢水煎服連進三劑而安此證乃火毒結於內必須盡行發出然內無血以養心則心中更熱火毒益熾而不得外越也故用當歸元參以滋心中之血用黃連以瀉心中之火天花粉以消心中之痰然無開關之散則火藏於內而不得外泄故又用升麻荊芥以發之甘草茯神以和之自然引火外出而不內蓄也火即外越斑亦漸消又何致於危殆曾治蕭萬有患傷寒發狂棄衣而走不避羞恥登高而歌遇岩而跳詈罵呼號終日惟思飲水其友請治以祛熱生胃湯用石膏三兩知母三錢人參五錢元參三兩茯苓一兩麥冬三兩車前五錢煎水十碗一日灌完是夜狂定明日亦如前法一劑明夜而口渴減半又明日亦如前法一劑而口渴方止火亦頓息乃改用四物湯重用生地一兩以保護元陰滋養肝血而愈前方妙在石膏知母以瀉胃火人參以生胃氣元參去浮游之焰麥冬生肺中之陰茯苓車前引火下行於膀胱從小便而出且火盛者口必渴口渴必多飲水吾用茯苓車前二味以分消水濕則水流而火自隨水而散矣方中瀉火又不傷氣較勝於白虎湯豫常以此治火熱發狂或汗如雨下口渴舌燥或起芒刺者即奏奇功但要知病之輕重而斟酌乎用藥之輕重庶不致誤耳曾治鄉中一健漢患傷寒結胸證具煩躁不寧胃氣將絶之候促騎求治豫與之化結湯用天花粉五錢枳殼二錢陳皮二錢麥芽三錢天門冬三錢桑白皮三錢吳神麯三錢連煎二劑即結胸開而津液自生也此方用天花粉代瓜蔞不至陷胸之過猛蓋天花粉即是瓜蔞之根也最善陷胸而無性猛之憂枳殼消食寬中麥芽與桑皮同用而化導更速神麯陳皮調胃真有神功天門冬善生津液佐天花粉有水乳之合世人鮮有知也且天花粉得天門冬化食化痰殊有不可測識之妙所以既結者能開將死者可活若以大陷胸湯蕩滌於已汗已下之後鮮不速其死矣豫又不得不深為告誡也曾治毛天祿惡寒身蜷四肢逆冷下利不止命在須臾其弟求治豫用黃耆一兩附子二錢甘草二錢乾薑二錢白朮一兩茯苓五錢水煎服方名救逆止利湯一劑而逆回二劑而利止三劑而痊愈此證雷真君用參附湯豫因貧人無力購參故易耆附湯加減亦效蓋耆附回元陽於頃刻以追其散失之元陽更祛其陰寒之氣白朮茯苓以分消水濕而仍固其脾中之陽乾薑甘草調和腹中而使其熱生於內則外寒不祛而散自然寒者不寒蜷者不蜷逆者不逆利者不利矣夫亦安有不愈者乎曾治黃大元患傷寒吐利交作四肢逆冷又加煩躁飲食不進來寓求治豫以奠安湯用黃耆二兩以代人參白朮二兩肉桂二錢丁香二錢故紙三錢水煎灌之立即救危此方用黃耆以救胸中陽氣之絶白朮以救脾胃之崩實有至效丁香止嘔肉桂溫中又能止泄故紙收固腎氣救中土之危亡奠上下之變亂轉生機於頃刻杜死禍於須臾若有真正官參十人可救九人活也曾治楊子寬患陰寒直中腎經面青鼻黑腹痛欲死更加囊縮促騎告急豫曰死亡頃刻之證治之少遲必一身盡黑而死急與之救亡丹用人參五錢白朮二兩附子一枚乾薑三錢肉桂五錢水煎急與之服一劑而效此證全是一團死氣現於身之上下若不用此等猛烈之大熱重劑又何以逐陰寒而追亡魂驅毒氣而奪陽魄哉故人參少用而附桂不可不多用也然而白朮又何以多用之耶不知白朮最利腰臍腹痛欲死非此不能通達故多之以驅駕附桂以成其祛除掃蕩之功而奏返魂追魄之效耳曾治王尚賢患陰寒直中腎經心痛欲死嘔吐不欲食下利清水其兄求治豫曰乃弟病犯不治寒邪犯心脾胃立絶此時藥緩不濟事速以針刺一下於心窩穴出紫血少許然後用逐寒返魂湯救之或可得生否豫以黃耆一兩良薑三錢附子五錢茯苓五錢白朮三兩丁香一錢煎服而蘇此方專逐心中之邪返元陰於頃刻心君定而諸邪退走脾胃自安不致上下之逆庶可冀其重生否則因循觀望有立死矣曾治陳會元患陰寒直中腎經手足指甲盡青兩脅作痛腎囊縮入拽之不出蜷曲而臥其弟告急豫曰此陰寒從腎氣以入肝而筋先受病肝氣欲絶勢在不可救之例夫肝木之絶由於腎氣先絶今欲救肝不得不先救腎乃與之救腎活肝湯用白朮二兩當歸一兩熟地一兩山萸肉五錢附子三錢肉桂二錢人參五錢連進三劑而安此方祛寒之中仍用回陽之藥且加入熟地山萸則參術無過資之益附桂無過燥之憂肝得火而溫亦得水而養自然筋活而青去囊寬而縮解也曾治李映山亦患證如前豫診之曰險候也乃與蕩寒湯重用白朮三兩以利腰臍之氣肉桂三錢以溫命門之火丁香一錢止嘔逆吳萸一錢返厥逆則寒邪無所匿藏故能一劑陽回神清而氣爽矣豫於五十年內經歷此危證數十人均以一劑回春故敢告之同志曾治一鄉人中暑亡陽汗出不止其兄求治豫曰此氣從汗出法當急補其陽氣則陽氣接續陰氣而不致氣脫也用獨參湯神應之極但足下無力買參不若以當歸補血湯救之當歸一兩嫩北耆二兩蜜炙加大桑葉三十皮煎服而汗立止又與十全大補湯重加黃耆二劑而安前方妙在桑葉故有補陰之功無陰則陽無以生無陽則陰無以化黃耆補氣得當歸則補血得桑葉則尤能以生陰也曾治一人患口舌生瘡鼻中不時流血口中不時吐血來寓求治豫曰此乃火氣勃於上焦不能分散故上衝而吐衄口舌生瘡也其法當用寒涼之品以清其火熱燎原之勢並瀉其炎上巔頂之威遂與生地一兩搗成泥汁當歸一兩老芎五錢元參一兩黃芩三錢炒黑荊芥三錢甘草一錢水煎調三七末服之連進三劑而效此方妙在不用大苦大寒以逐火而用微寒之藥以滋陰蓋陰氣生則陽氣自然下降尤妙用黑荊芥引血歸經用三七末以上截其新來之路加黃芩以清其奔騰之路誠恐過於寒涼冷熱相戰又加甘草以和之此治熱之最巧妙法也若用寒涼之重者折之非不取快於一時然火降而水不足則火無所歸仍然焰生風起必較前更甚而始以清補之藥救之則胃氣已虛何能勝任今之速效者是病之初起也若再遲緩主治者又自當有法又不可作如是治療也曾治鄉中一人患心中卒痛手不可按來寓求治豫曰此火邪直犯心君也若不急救其火則臟腑內焚頃刻立逝急與黑梔三錢白芍五錢甘草一錢良薑七分天花粉三錢蒼朮三錢貫衆二錢煎服二劑而效此方妙在用梔子以清火若疑心經之熱而用黃連誤矣黃連性燥不可以燥益燥而轉助其焰矣惟梔子瀉肝木之火母衰則子亦衰不瀉心火正所以瀉心火也且又重用白芍同以瀉肝又加良薑以引入心經復增天花粉以逐其火熱之痰痰去而火熱自散肝鬱亦舒此急治肝而以治心也諺云要得鍋中不滾除是釜底抽薪余可類識曾治一鄰友患心痛欲死問治於余即與貫衆三錢乳香二錢白芍三錢黑梔子三錢甘草六分煎服而痛去如失又以此方治一人口渴呼號煎服渴止曾治梁濟舟患腹中痛極手足皆青豫曰此乃寒邪直中腎經也急與人參三錢白朮五錢黃耆五錢熟地五錢附子二錢肉桂二錢吳茱萸五分乾薑五分煎服即安此方妙在急溫命門之火而佐熱其心包絡之冷故痛立止不致上犯心而中犯肝也臨證之工當於平日留心不致以倉卒誤人性命也曾治張天元患心中疼痛手足溫和豫以熱手試按之則痛微乃曰此寒氣侵入心經也宜用散寒止痛湯良薑三錢白朮三錢蒼朮三錢貫衆三錢甘草一錢肉桂一錢草烏一錢煎服一劑而安此方妙在用貫衆以祛邪用二術以祛濕邪濕俱去而又加之散寒之品自然直中病根而其病去如掃也曾治鍾興順患心中疼痛三日而加劇危在此刻豫捫其手足反冷即語之曰此乃火氣焚心而痛也遂與瀉火止痛湯用炒梔三錢甘草一錢白芍二兩半夏二錢柴胡三錢水煎服一劑而安此方之妙在用白芍之多瀉水中之火又加梔子直折其熱而柴胡散邪半夏逐痰甘草和中用之得當故奏功如響耳前後二案一寒一火皆一劑奏效全在認證之確也曾治俞天明患腹痛不能忍按之愈痛口渴飲冷水即止少頃依然大痛其兄惶迫豫曰此火結在小腸若不急療頃刻即逝乃與定痛至神湯用炒梔三錢甘草一錢茯苓一兩白芍五錢蒼朮三錢大黃二錢厚朴二錢水煎一劑服畢痛止此方妙在舒肝木之氣利膀胱之水更妙在甘草和諸痛梔子瀉鬱熱又恐其效不速更佐之走而不守之大黃則瀉火逐淤尤為至神也痢門挈綱馳遠曰痢之為病其綱凡四一曰陷邪一曰秋燥一曰時毒一曰滑脫四者痢門所謂陷邪者六經之邪陷入而為痢也治法仍從六經之例然而陷邪亦由脾虛藥中當以黃耆白朮砂仁半夏理脾開胃為主再看兼見何經之證即加何經之藥於其間合而治之若兼太陽風傷衛主桂枝寒傷營主麻黃兼太陽腑證仍兼五苓陽明表證主葛根陽明腑證兼見察其淺深而斟酌於白虎承氣諸法之中兼見少陽表用柴胡里用黃芩太陰虛寒之證附子理中少陰挾水而動者溫經回陽挾火而動者滋津解熱厥陰有純陽無陰之證破陽行陰純陰無陽之證溫經止泄陰陽錯雜之證寒熱互投陰陽並驅凡此六經陷邪以六經之法合而用之無不立應又有鶩溏一證常見陷邪之中鶩者鴨也其證糞內帶清水言其狀如鴨糞故名鶩溏屬太陰臟寒法主耆朮附桂芡實炮姜溫經散邪理脾崇土其氣固其泄自止矣秋燥者秋分之後燥金主氣之時涼風漸起暑氣退而濕氣收大氣清而土氣燥斯時也人皆精神爽慧起居咸康然而天道靡常時有不正之氣混亂清肅之令轉見暴熱流行謂之秋燥人感之而為燥病其燥上侵於膈則乾咳失音咽痛心煩膚無潤澤法宜玉竹蔞仁天冬麥冬桔梗雞子白其燥下侵於腹則腹痛下利裡急後重皮毛焦槁索澤無汗心煩咽乾法宜生地阿膠桔梗蔞仁雞子黃燥與火不同火為實證熱盛陽亢身熱多汗法宜苦寒奪其實而泄其熱燥為虛證陰虧失潤肌膚熯燥法宜甘寒養其陰而潤其燥然又與陷邪之脾虛者不同脾虛為寒濕宜溫補秋燥為陰虧宜清潤至於耆朮砂半不可用也時毒者天行癘疫時氣流行人觸之而為病外見心煩惡熱口臭氣粗渴欲飲冷滿腹攪痛鼻如煙煤肛門似烙乃熱毒內攻臟腑有立壞之勢急宜三黃湯以救內焚加桔梗開提肺氣宣其壅而舉其陷則腹痛自止熱毒除而癘疫消下痢亦自愈前證腹痛乃肺氣為火熱所逼陷入腹中壅滿過盛而為攪痛其與虛寒腹痛不同虛寒者腹不滿喜手摩按法當溫補重用耆朮砂半川椒乾薑火熱內壅者其腹滿不喜手摩按耆術溫補毫不敢犯即如陳皮木香川朴皆不可用惟有桔梗開提一法投之立應誤用耆術立殺之矣庸醫無傳不知耆術之所用又不知耆術之所禁操戈任殺造孽無涯世人哪知其庸而自任其殺可悲也夫我蓋有志昌明斯道以救斯世不惜金針以廣其傳俾天下後世之人知其庸殺人而不受其殺是於之所厚望者也奈何世人不特不聽吾言而且毀謗妄加焉吾亦未如之何也已矣滑脫者由病後久虛脾胃土敗腎陽衰乏中氣下陷而為滑脫法宜大補元氣扶脾固腎理脾健胃更加澀以固脫方用耆朮參苓鹿茸附桂砂半川椒芡實山藥故紙益智建蓮重劑多服俾令陰消陽回脾胃強健腎氣收固元氣大復滑脫自止痢門諸書不知仍從分經辨證分門用法所立方論皆未中肯概不足録即如醫門法律中之痢疾論可謂詳矣然於治痢之道亦未能曲盡無遺子雖學識譾陋敢將數十年寤寐誠求心得痢門肯要昭然挈出亦可以為後學升階之一助也治驗嘉慶庚辰曾治公祖貢太守夏月患痢證見身重欲寐少氣懶言胃中夙有寒飲喜食辛溫此太少二陰陷邪也前醫不明陰陽虛實不知分門為治誤用下法克伐真陽損傷胃氣嘔逆不止腹痛加劇神氣昏寐余用六君子湯倍加黃耆白朮各八錢砂仁丁香草果草蔻各八分為末沖藥水服一劑其嘔止而腹痛減人事稍蘇略進飲食但醡脹不安豫曰醡脹者大腸氣滯也藠白能利之即苦薤子前藥中加入此味十三顆打碎俟藥煎好入薤子再煎一沸去渣服之連進二劑醡脹頓除明日又曰腹中又微膨脹先生可用厚朴檳榔乎余曰不可公祖今當大病之後腎氣渙散氣化不行中氣不得升降壅而作滿若再破氣行氣則真氣愈傷其滿愈甚曰然則治之當何法余曰其法當用黃耆白朮大補中氣益智故紙收固腎氣砂仁半夏醒脾開胃白蔻宣暢胸膈四劑膨脹消而痢亦微再加芡實懷山又四劑而痊愈曾治貢太守門丁張四美秋月患痢惡寒嗜臥見食即吐下痢純白其證甚微醫者曰痢而魚腦必死辭以不治徐友來寓謂豫曰此證還可生乎答曰痢如魚腦一味虛寒何云死證此太少二陰之陷邪也乃與人參三錢黃耆白朮各五錢故紙三錢苓半薑附各二錢吳萸丁香白蔻各八分研細末調藥水一劑而效四劑而痊愈矣又治門丁王五美亦患痢也身體熯燥聲音重濁腹痛心煩口澀無味證日加劇晝夜無寧脹醡異常諸醫不效來寓求治豫曰此秋燥證也乃與生地真阿膠各二兩桔梗甘草麥冬各五錢煎三碗一日服盡再煎夜又服之明日神清氣爽忽想黃蠟丁魚湯拌飯與之食得大汗而病去如失門人清華問曰吾師方中無治腹痛之藥而效其證寒乎熱乎豫曰非寒非熱此乃肺氣為燥氣壅塞混亂清肅之令陷入腹中搏結而為腹急痛故止清其燥邪而病去如掃矣何不效之有清華曰吾師所論直切了當弟子渙然而冰釋矣又治牛四病後久虛下痢滑脫諸醫不效延豫治之乃與參耆歸術各五錢懷山砂半白蔻草蔻各一錢芡實故紙益智各三錢薑附各一錢煎服二劑而病略減不思飲食因令其家以白飯鮮魚置其前令香氣入鼻觀中胃口頓開飲食漸進調理而愈豫常見病後不思食者即令以鮮肴美食嗅之亦可為引開胃口外助一妙法也蓋香先入脾脾喜食自進矣神而明之存乎人耳曾治武生張三元患痢甚危三日不食醫治無效促騎告急往視其證上身發熱下身作冷此乃陽熱在上陰寒在下也心中煩熱乃陽明裡證法用石膏口苦咽乾乃少陽裡熱法主黃芩飲食不下屬太陰脾身熱多汗少陰亡陽厥逆腹痛厥陰裡寒其證錯雜寒熱互用遂與耆朮砂半以理太陰石膏以清陽明腑熱黃芩以解少陽裡熱薑桂故紙以溫少陰亡陽吳萸川椒生附子以驅厥陰之寒逆煎服一劑諸證減半於是減去生附子石膏黃芩再加熟附茯苓炙草芡實山藥服數劑而痊愈矣曾治一武童患痢寒熱往來默默不欲食下痢赤白兼緑凍其糞內帶青水來寓求藥豫乃與小柴胡湯去黃芩以治少陽之經證以耆朮砂半薑附以溫太陰脾經之臟寒四劑而痊愈豫曰凡不能食皆為噤口皆因不知分經辨證之故耳此證寒熱往來不欲食是少陽之表證也緑凍者少陽之本色也少陽屬甲木主東方青色清水為鶩溏是太陰之裡寒也陰陽表裡懵然不識求其不殺人者幾希耳又治一武生黃姓者患赤白痢其證身壯熱飲食不下醫家誤用香茹黃連利轉純紅不能起床起則暈眩延豫視之其證惡寒發熱頭項強痛微汗自出太陽風傷衛也前額兩側連痛者陽明少陽之表證也胸膈不開飲食不下屬太陰目瞑倦臥少氣懶言屬少陰腹痛拘急屬厥陰余曰先生乃六經陷邪皆見之證宜桂枝葛根柴胡以解三陽在經之表耆朮砂半補中開胃以理太陰附子炮姜以溫少陰而散寒邪吳萸川椒以入厥陰而驅寒降逆煎服一劑而頭痛即止利轉白而無紅其三陽表證皆退三陰裡寒未減乃於方中去桂枝葛根柴胡倍耆術再接一劑飲食漸進腹痛略鬆利亦稍輕於是方中再加山藥芡實連進數劑而安也曾治萬人和患痢純紅一日間至數十次醫治無功來求豫治乃豫與天師救絶神丹方用歸芍各二兩枳殼檳榔甘草滑石萊蔔子各三錢磨廣香末一錢調藥水又和苦薤汁服之一劑輕二劑止三劑痊愈此方妙在白芍用至二兩之多則肝血有餘不去剋制脾土則脾氣有生髮之機自然大腸有傳導之化加之枳殼檳榔萊蔔子俱逐穢驅積之神藥尤能於補中用攻而滑石木香甘草調和其遲速薤子善能破滯不急不徐使淤濁盡下而無內留之患也其有些小痢疾不必用此大劑減半治之無不應不分紅白痛不痛凡夏秋感熱氣而患痢用之皆神效
